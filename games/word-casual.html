<!DOCTYPE html>
<html lang="en">
<head>

<title>Babak's Word & Casual Pack</title>
<style>
  :root{--bg:#f3eef9;--panel:#ffffff;--accent:#8a4fd0;--accent2:#e0892b;--text:#1d1430;--dim:#6a5a80;--border:#e0d6ec;}
  html[data-theme="dark"]{--bg:#13101c;--panel:#221a30;--accent:#b9f;--accent2:#fc8;--text:#f2eaff;--dim:#a99ac0;--border:#352a48;}
  #themeToggle{position:fixed;top:12px;right:12px;z-index:200;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 13px;cursor:pointer;font-weight:700;font-size:13px;box-shadow:0 2px 8px #0002}
  #host{max-width:100%;overflow:visible}.wrap{max-width:100%}
  @media (max-width:560px){#app{padding:10px}h1{font-size:24px}.bar{gap:8px}}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
  #app{max-width:740px;margin:0 auto;padding:16px}
  h1{font-weight:800;text-align:center;margin:8px 0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{text-align:center;color:var(--dim);margin-bottom:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;text-align:center;transition:transform .12s,border-color .12s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .card .ico{font-size:34px;display:block;margin-bottom:8px}
  .card .name{font-weight:700}.card .hs{color:var(--dim);font-size:12px;margin-top:4px;min-height:14px}
  #stage{display:none}
  .bar{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  button.btn{background:var(--accent);color:#1a0a2a;border:0;border-radius:10px;padding:9px 16px;font-weight:700;cursor:pointer}
  button.btn:hover{filter:brightness(1.1)}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .score{margin-left:auto;color:var(--dim)}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .hint{color:var(--dim);font-size:13px;text-align:center;margin-top:8px}
  .big{font-size:20px;font-weight:700}
  body{background:radial-gradient(900px 520px at 12% -8%,rgba(110,140,255,.18),transparent 60%),radial-gradient(900px 520px at 112% 2%,rgba(255,110,180,.16),transparent 55%),var(--bg);background-attachment:fixed}
  .card{position:relative;background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(0,0,0,.05)),var(--panel);box-shadow:0 6px 18px rgba(0,0,0,.18);animation:pop .45s ease both}
  .card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 16px 36px rgba(0,0,0,.28)}
  .card .ico{transition:transform .15s;filter:drop-shadow(0 3px 5px rgba(0,0,0,.22))}
  .card:hover .ico{transform:scale(1.2) rotate(-5deg)}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  button.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px rgba(0,0,0,.22);transition:transform .12s,box-shadow .12s,filter .12s;letter-spacing:.3px}
  button.btn:hover{transform:translateY(-2px);filter:brightness(1.06);box-shadow:0 9px 22px rgba(0,0,0,.3)}
  button.btn:active{transform:translateY(1px)}
  canvas{box-shadow:0 8px 26px rgba(0,0,0,.3)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
<style id="shared-game-polish">
  body{overflow-x:hidden;padding-top:48px}
  a[href="index.html"]:not(.pack),#themeToggle{min-height:34px;display:inline-flex!important;align-items:center;justify-content:center;white-space:nowrap;line-height:1.1;backdrop-filter:blur(10px)}

  #app{padding-top:4px}.wrap,#host{max-width:100%;overflow:visible}.hint{padding:0 8px}
  .bar{width:100%;display:grid!important;grid-template-columns:auto auto auto minmax(0,1fr);align-items:center;gap:8px!important;margin:0 0 12px!important;padding:8px;border:1px solid var(--border,#d3d8ec);border-radius:16px;background:color-mix(in srgb,var(--panel,#fff) 86%,transparent);box-shadow:0 8px 26px rgba(0,0,0,.12);position:sticky;top:48px;z-index:180;backdrop-filter:blur(12px)}
  .bar .big{min-width:0;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar .score{grid-column:1/-1;margin-left:0!important;width:100%;text-align:center;font-size:13px;line-height:1.35}
  #gameZoomBar{left:50%!important;right:auto!important;bottom:max(10px,env(safe-area-inset-bottom))!important;transform:translateX(-50%)!important;z-index:330!important;padding:6px 10px!important;border:1px solid rgba(255,255,255,.2)!important;backdrop-filter:blur(10px)}
  #gameZoomBar button{width:38px!important;height:38px!important;font-size:20px!important}#gameZoomBar span{font-size:13px!important;min-width:48px!important;color:#fff!important}
  .kid-choice-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}.kid-choice-row .btn,.kid-choice-row button{min-width:58px}.kid-win-overlay{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;pointer-events:none;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.32),rgba(0,0,0,.18) 55%,rgba(0,0,0,.35));animation:kidFadeIn .18s ease-out}.kid-win-card{max-width:min(92vw,520px);padding:24px 28px;border-radius:28px;color:#fff;text-align:center;background:linear-gradient(135deg,#ff7ac8,#7c5cff 48%,#19c37d);box-shadow:0 24px 80px rgba(0,0,0,.42),inset 0 0 0 3px rgba(255,255,255,.32);transform:scale(.9);animation:kidPop .42s cubic-bezier(.2,1.4,.3,1) forwards}.kid-win-title{font-size:clamp(34px,9vw,62px);font-weight:1000;line-height:.95;text-shadow:0 4px 12px rgba(0,0,0,.28)}.kid-win-msg{font-size:clamp(18px,4.8vw,26px);font-weight:900;margin-top:10px}.kid-win-stars{font-size:clamp(24px,7vw,42px);margin-bottom:8px;letter-spacing:6px}.kid-confetti{position:fixed;top:-42px;z-index:901;pointer-events:none;animation:kidFall linear forwards}
  @keyframes kidPop{to{transform:scale(1)}}@keyframes kidFadeIn{from{opacity:0}to{opacity:1}}@keyframes kidFall{to{transform:translateY(115vh) rotate(540deg);opacity:.75}}
  @media(max-width:560px){body{padding-top:58px}#app{padding:8px 8px 92px!important}a[href="index.html"]:not(.pack),#themeToggle{top:8px!important;padding:6px 9px!important;font-size:12px!important;min-height:32px!important;border-radius:18px!important}a[href="index.html"]:not(.pack){left:8px!important;max-width:44vw}#themeToggle{right:8px!important;max-width:44vw;overflow:hidden;text-overflow:ellipsis}.bar{top:46px;grid-template-columns:1fr 1fr 1fr;padding:7px;margin-bottom:10px!important}.bar .big{grid-column:1/-1;grid-row:2;text-align:center;font-size:18px;white-space:normal}.bar .score{grid-row:3;font-size:12px}.bar button.btn{width:100%;padding:8px 8px!important;font-size:12px!important}.grid{grid-template-columns:repeat(auto-fill,minmax(132px,1fr))!important;gap:10px!important}.card{padding:14px 10px!important}.card .ico{font-size:30px!important}#gameZoomBar{bottom:max(8px,env(safe-area-inset-bottom))!important}.kid-win-card{padding:22px 20px;border-radius:24px}}
</style>

<body>
<a href="index.html" style="position:fixed;top:12px;left:12px;z-index:200;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-weight:700;font-size:13px;text-decoration:none;box-shadow:0 2px 8px #0002">🏠 All Games</a>
<button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
<div id="app">
  <div id="menu">
    <h1>Babak's ✏️ WORD & CASUAL</h1>
    <div class="sub">Word games and quick casual fun.</div>

  </div>

</div>
<script>
const GAMES=[
  {id:'wordbuilder',name:'Word Builder',ico:'🔤'},
  {id:'hangman',name:'Hangman',ico:'🎯'},
  {id:'wordsearch',name:'Word Search',ico:'🔍'},
  {id:'typing',name:'Typing Test',ico:'⌨️'},
  {id:'reaction',name:'Reaction Test',ico:'⚡'},
  {id:'clicker',name:'Clicker',ico:'👆'},
  {id:'slots',name:'Slot Machine',ico:'🎰'},
  {id:'syn',name:'Word Synonyms',ico:'🟰'},
  {id:'ant',name:'Word Antonyms',ico:'↔️'},
  {id:'rhyme',name:'Word Rhyming',ico:'🎵'},
  {id:'plural',name:'Word Plurals',ico:'📦'},
  {id:'past',name:'Word Past Tense',ico:'⏪'},
  {id:'homo',name:'Word Homophones',ico:'👂'},
  {id:'compound',name:'Word Compounds',ico:'🧩'},
  {id:'prefix',name:'Word Prefixes',ico:'🔤'},
  {id:'contraction',name:'Word Contractions',ico:'✂️'},
  {id:'comparative',name:'Comparatives',ico:'📈'},
  {id:'syll',name:'Word Syllables',ico:'👏'},
  {id:'vowelcount',name:'Word Vowel Count',ico:'🅰️'},
  {id:'conscount',name:'Word Consonant Count',ico:'🅱️'},
  {id:'lettercount',name:'Word Letter Count',ico:'#️⃣'},
  {id:'firstL',name:'Word First Letter',ico:'🔡'},
  {id:'lastL',name:'Word Last Letter',ico:'🔚'},
  {id:'midL',name:'Word Middle Letter',ico:'🔠'},
  {id:'unscram',name:'Word Unscramble',ico:'🔀'},
  {id:'missL',name:'Word Missing Letter',ico:'➖'},
  {id:'abc1',name:'Word ABC Order',ico:'🔤'},
  {id:'abcZ',name:'Word Last in ABC',ico:'🔚'},
  {id:'longest',name:'Word Longest',ico:'📏'},
  {id:'shortest',name:'Word Shortest',ico:'🐜'},
  {id:'aan',name:'Word A or An',ico:'🅰️'},
  {id:'startV',name:'Word Starts with Vowel?',ico:'🔎'},
  {id:'endV',name:'Word Ends with Vowel?',ico:'🔚'},
  {id:'dblL',name:'Word Double Letter?',ico:'🔁'},
  {id:'sameLen',name:'Word Same Length',ico:'📐'},
  {id:'wpercent',name:'Percent Of',ico:'％'},
  {id:'wtriple',name:'Triple It',ico:'3️⃣'},
  {id:'wsign',name:'Greater or Less',ico:'⚖️'},
  {id:'wcountback',name:'Count Back',ico:'🔽'},
  {id:'wsquare',name:'Square Numbers',ico:'⏹️'},  {id:'wquarter',name:'Quarter Of',ico:'¼'},
  {id:'wmult10',name:'Multiply by 10',ico:'✖️'},
  {id:'wnear100',name:'Nearest 100',ico:'💯'},
  {id:'wskip',name:'Skip Counting',ico:'👣'},
  {id:'wchange',name:'Make Change',ico:'💵'},
  {id:'wtimeadd',name:'Time Later',ico:'⏰'},
  {id:'wdivby',name:'Division',ico:'➗'},
  {id:'wnumword',name:'Number Words',ico:'🔤'},
  {id:'wexpand',name:'Expanded Form',ico:'📋'},
  {id:'wordinal',name:'Which Position',ico:'🥇'},];
const host=document.getElementById('host'),statusEl=document.getElementById('status'),titleEl=document.getElementById('title'),hintEl=document.getElementById('hint');
let current=null;
function hs(id){return +(localStorage.getItem('wc_'+id)||0)}
function setHs(id,v){if(v>hs(id)){localStorage.setItem('wc_'+id,v);return true}return false}
function lowerBest(id,v){const c=localStorage.getItem('wc_'+id);if(c===null||v<+c){localStorage.setItem('wc_'+id,v);return true}return false}
function getRaw(id){return localStorage.getItem('wc_'+id)}
const HIDDEN_MATH_IDS=new Set(['wpercent','wtriple','wsign','wcountback','wsquare','wquarter','wmult10','wnear100','wskip','wchange','wtimeadd','wdivby','wexpand','wordinal','wnumword']);
function visibleGames(){return GAMES.filter(gm=>!HIDDEN_MATH_IDS.has(gm.id));}
function buildMenu(){const g=document.getElementById('grid');g.innerHTML='';visibleGames().forEach(gm=>{const d=document.createElement('div');d.className='card';
  d.innerHTML=`<span class="ico">${gm.ico}</span><div class="name">${gm.name}</div><div class="hs">${getRaw(gm.id)?'Best: '+getRaw(gm.id):'&nbsp;'}</div>`;d.onclick=()=>launch(gm);g.append(d);});}
function setStatus(s){statusEl.textContent=s}
function setHint(s){hintEl.textContent=s}
function clearCelebrations(){document.querySelectorAll('[data-game-celebration],.kid-win-overlay,.kid-confetti').forEach(n=>n.remove());}
function backToMenu(){clearCelebrations();window.__activeGameId='';window.__activeGameName='';if(current&&current.stop)current.stop();current=null;host.innerHTML='';document.getElementById('stage').style.display='none';document.getElementById('menu').style.display='block';buildMenu();}
function launch(gm){clearCelebrations();window.__activeGameId=gm.id;window.__activeGameName=gm.name;window.__lastGameCelebration='';document.getElementById('menu').style.display='none';document.getElementById('stage').style.display='block';titleEl.textContent=gm.name;setStatus('');setHint('');host.innerHTML='';current=window['game_'+gm.id](gm);}
function el(tag,props={},...kids){const e=document.createElement(tag);Object.assign(e,props);if(props.style)e.style.cssText=props.style;kids.forEach(k=>e.append(k));return e;}

const WORDS5=['apple','brave','crane','doubt','eagle','flame','grape','house','input','joker','knife','lemon','mango','noble','ocean','piano','quiet','river','stone','tiger','urban','vivid','wagon','yacht','zebra','bread','chair','dream','earth','frost','glory','heart','ivory','jelly','koala','light','music','night','olive','plant','queen','radio','sugar','table','unity','value','water','xenon','youth'];
const WORDSBIG=['javascript','keyboard','elephant','mountain','computer','rainbow','treasure','butterfly','adventure','chocolate','dinosaur','umbrella','telephone','waterfall','crocodile','strawberry','helicopter','submarine','xylophone','kangaroo'];

/* ---------------- WORD BUILDER ---------------- */
function game_wordbuilder(gm){
  setHint('Read the clue and tap the matching word. No keyboard needed.');
  const CLUES=[
    ['A red fruit','apple',['table','river','chair']],['A place with trees','forest',['piano','blanket','radio']],
    ['A big animal with a trunk','elephant',['rabbit','penguin','koala']],['A thing you read','book',['cookie','window','helmet']],
    ['Something you wear on your foot','shoe',['spoon','lamp','ocean']],['Water falling from high rocks','waterfall',['sandwich','keyboard','garden']],
    ['A flying insect with colorful wings','butterfly',['dinosaur','telephone','mountain']],['A musical instrument with strings','guitar',['rocket','basket','pencil']]
  ];
  let score=0;
  const q=el('div',{className:'big',style:'font-size:24px;max-width:560px;text-align:center'});
  const opts=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:520px;width:100%'});
  const fb=el('div',{className:'big',style:'min-height:30px'});
  const next=el('button',{className:'btn',textContent:'Next ▶'});
  host.append(q,opts,fb,next);
  function round(){const item=CLUES[Math.floor(Math.random()*CLUES.length)],ans=item[1];q.textContent=item[0];fb.textContent='';opts.innerHTML='';[ans,...item[2]].sort(()=>Math.random()-0.5).forEach(w=>{const b=el('button',{className:'btn ghost',textContent:w,style:'font-size:18px;padding:14px'});b.onclick=()=>{[...opts.children].forEach(x=>x.disabled=true);if(w===ans){score++;b.className='btn';fb.textContent='🎉 Correct!';}else{fb.textContent='Try again — answer: '+ans;}};opts.append(b);});setStatus('Score: '+score+' • Best: '+hs(gm.id));}
  next.onclick=round;round();
  return {stop:()=>{}};
}

/* ---------------- HANGMAN ---------------- */
function game_hangman(gm){
  setHint('Guess letters before the figure is complete. 7 wrong guesses ends the game.');
  let word,guessed,wrong;
  const figure=el('pre',{style:'font-size:16px;line-height:1.1;color:#fc8;min-height:150px'});
  const wordEl=el('div',{style:'font-size:34px;letter-spacing:8px;font-weight:800;margin:6px 0'});
  const kb=el('div',{style:'display:flex;flex-wrap:wrap;gap:5px;max-width:480px;justify-content:center'});
  const newBtn=el('button',{className:'btn',textContent:'New Word'});
  host.append(figure,wordEl,kb,newBtn);
  const STAGES=[" \n \n \n \n \n====="," +---+\n |\n |\n |\n |\n====="," +---+\n |   O\n |\n |\n |\n====="," +---+\n |   O\n |   |\n |\n |\n====="," +---+\n |   O\n |  /|\n |\n |\n====="," +---+\n |   O\n |  /|\\\n |\n |\n====="," +---+\n |   O\n |  /|\\\n |  /\n |\n====="," +---+\n |   O\n |  /|\\\n |  / \\\n |\n====="];
  function reset(){word=(WORDSBIG[Math.floor(Math.random()*WORDSBIG.length)]).toUpperCase();guessed=new Set();wrong=0;draw();}
  function draw(){figure.textContent=STAGES[wrong];
    wordEl.textContent=word.split('').map(ch=>guessed.has(ch)?ch:'_').join(' ');
    kb.innerHTML='';'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(ch=>{const used=guessed.has(ch);
      const b=el('button',{textContent:ch,disabled:used||wrong>=7||win(),style:`width:34px;height:36px;border:0;border-radius:6px;font-weight:700;cursor:pointer;background:${used?(word.includes(ch)?'#5a9':'#553'):'#3a2f4d'};color:#fff;opacity:${used?0.7:1}`});
      b.onclick=()=>{guessed.add(ch);if(!word.includes(ch))wrong++;draw();};kb.append(b);});
    if(win()){setHs(gm.id,hs(gm.id)+1);setStatus('🎉 You won! Total wins: '+hs(gm.id));}
    else if(wrong>=7){setStatus('💀 Lost! Word was '+word);}
    else setStatus('Wrong: '+wrong+'/7  •  Wins: '+hs(gm.id));}
  function win(){return word.split('').every(ch=>guessed.has(ch));}
  newBtn.onclick=reset;reset();
  return {stop:()=>{}};
}

/* ---------------- WORD SEARCH ---------------- */
function game_wordsearch(gm){
  setHint('Click or touch-drag across letters to find the listed words.');
  const N=10;let grid,words,found,start;
  const list=el('div',{style:'display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:6px'});
  const board=el('div',{style:`display:grid;grid-template-columns:repeat(${N},34px);gap:2px;user-select:none;touch-action:none`});
  const newBtn=el('button',{className:'btn',textContent:'New Puzzle'});
  host.append(list,board,newBtn);
  function reset(){const pool=[...WORDSBIG].map(w=>w.toUpperCase()).filter(w=>w.length<=N).sort(()=>Math.random()-0.5).slice(0,6);
    grid=Array.from({length:N},()=>Array(N).fill(''));words=[];found=new Set();start=null;
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    pool.forEach(w=>{let placed=false;for(let tries=0;tries<60&&!placed;tries++){const[dr,dc]=dirs[Math.floor(Math.random()*dirs.length)];const r=Math.floor(Math.random()*N),c=Math.floor(Math.random()*N);
      let ok=true;for(let i=0;i<w.length;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=N||nc<0||nc>=N||(grid[nr][nc]&&grid[nr][nc]!==w[i])){ok=false;break;}}
      if(ok){for(let i=0;i<w.length;i++)grid[r+dr*i][c+dc*i]=w[i];words.push(w);placed=true;}}});
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!grid[r][c])grid[r][c]='ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random()*26)];
    draw();setStatus('Found 0/'+words.length);}
  function draw(){board.innerHTML='';list.innerHTML='';
    words.forEach(w=>list.append(el('span',{textContent:w,style:`padding:3px 8px;border-radius:6px;background:#221a30;${found.has(w)?'text-decoration:line-through;color:#5a9':''}`})));
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const d=el('div',{textContent:grid[r][c],
      style:`width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:5px;background:#2a2138;cursor:pointer`});
      d.onmousedown=()=>{start=[r,c];};d.onmouseup=()=>finish(r,c);d.onpointerdown=e=>{start=[r,c];if(e.pointerType==='touch')e.preventDefault();};d.onpointerup=e=>{if(e.pointerType==='touch')e.preventDefault();finish(r,c);};
      board.append(d);}}
  function finish(r,c){if(!start)return;const[sr,sc]=start;start=null;
    const dr=Math.sign(r-sr),dc=Math.sign(c-sc);const len=Math.max(Math.abs(r-sr),Math.abs(c-sc))+1;
    if(r-sr!==0&&c-sc!==0&&Math.abs(r-sr)!==Math.abs(c-sc))return;
    let s='';for(let i=0;i<len;i++)s+=grid[sr+dr*i]?.[sc+dc*i]||'';
    const rev=s.split('').reverse().join('');
    const hit=words.find(w=>w===s||w===rev);
    if(hit&&!found.has(hit)){found.add(hit);setStatus('Found '+found.size+'/'+words.length);
      if(found.size===words.length){setHs(gm.id,hs(gm.id)+1);setStatus('🎉 All found! Puzzles solved: '+hs(gm.id));}}
    draw();}
  newBtn.onclick=reset;reset();
  return {stop:()=>{}};
}

/* ---------------- TYPING TEST ---------------- */
function game_typing(gm){
  setHint('Keyboard typing practice: type the sentence as fast and accurately as you can. Timer starts on first key.');
  const SENT=['the quick brown fox jumps over the lazy dog','practice makes perfect every single day','coding is fun when the games actually work','a journey of a thousand miles begins with one step','keep calm and keep on typing faster now'];
  let target,started,t0;
  const text=el('div',{style:'font-size:20px;line-height:1.6;background:#221a30;padding:14px;border-radius:10px;max-width:560px'});

function game_reaction(gm){

function game_wnear100(gm){return mcqW(gm,'Round to the nearest 100.',function(){var n=rW(Dw(900,4900,49000))+50;var a=Math.round(n/100)*100;return{q:'Round '+n+' to the nearest 100',a:a,wr:[a+100,a-100,a+200,a-200].filter(function(x){return x>=0&&x!==a;})};});}
