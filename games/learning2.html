<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babak's Learning Room II</title>
<style>
  :root{--bg:#eef6f0;--panel:#ffffff;--accent:#2aa775;--accent2:#d98a2b;--text:#13261d;--dim:#5a7568;--border:#d2e6da;}
  html[data-theme="dark"]{--bg:#0c1814;--panel:#142420;--accent:#6fe0b0;--accent2:#ffc27d;--text:#e9f6ef;--dim:#9bbcaf;--border:#274038;}
  #themeToggle{position:fixed;top:12px;right:12px;z-index:200;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 13px;cursor:pointer;font-weight:700;font-size:13px;box-shadow:0 2px 8px #0002}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(900px 520px at 12% -8%,rgba(110,200,150,.18),transparent 60%),radial-gradient(900px 520px at 112% 2%,rgba(255,180,110,.16),transparent 55%),var(--bg);background-attachment:fixed;color:var(--text)}
  #app{max-width:900px;margin:0 auto;padding:16px}
  h1{font-weight:800;text-align:center;margin:8px 0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{text-align:center;color:var(--dim);margin-bottom:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .card{position:relative;background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(0,0,0,.05)),var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px 12px;cursor:pointer;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s;box-shadow:0 6px 18px rgba(0,0,0,.14);animation:pop .4s ease both}
  .card:hover{transform:translateY(-5px) scale(1.03);border-color:var(--accent);box-shadow:0 14px 30px rgba(0,0,0,.22)}
  .card .ico{font-size:32px;display:block;margin-bottom:6px}
  .card .name{font-weight:700;font-size:14px}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  #stage{display:none}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  button.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:0;border-radius:11px;padding:9px 15px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:transform .12s,filter .12s}
  button.btn:hover{transform:translateY(-2px);filter:brightness(1.06)}
  button.btn:disabled{opacity:.6;cursor:default}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--border);box-shadow:none}
  .score{margin-left:auto;color:var(--dim)}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:100%}
  .hint{color:var(--dim);font-size:13px;text-align:center;margin-top:8px;max-width:620px}
  .big{font-size:20px;font-weight:700;text-align:center}
  #host{max-width:100%;overflow-x:auto}
  @media(max-width:560px){#app{padding:10px}h1{font-size:24px}.opts{grid-template-columns:1fr !important}}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:12px;left:12px;z-index:200;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-weight:700;font-size:13px;text-decoration:none;box-shadow:0 2px 8px #0002">🏠 All Games</a>
<button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
<div id="app">
  <div id="menu">
    <h1>🎓 LEARNING ROOM II</h1>
    <div class="sub">50 more learning games — pick Easy, Medium or Hard and level up as you go!</div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="stage">
    <div class="bar">
      <button class="btn ghost" onclick="backToMenu()">← Menu</button>
      <button class="btn ghost" onclick="showRules()">❓ Rules</button>
      <span class="big" id="title"></span>
      <span class="score" id="status"></span>
    </div>
    <div class="wrap" id="host"></div>
    <div class="hint" id="hint"></div>
  </div>
</div>
<script>
const host=document.getElementById('host'),statusEl=document.getElementById('status'),titleEl=document.getElementById('title'),hintEl=document.getElementById('hint');
let current=null,currentGm=null,score=0;
let DIFF=localStorage.getItem('l2diff')||'med';
function D(e,m,h){return DIFF==='easy'?e:DIFF==='hard'?h:m;}
function setStatus(s){statusEl.textContent=s}
function setHint(s){hintEl.textContent=s}
function el(tag,props={},...kids){const e=document.createElement(tag);for(const k in props){if(k==='style')e.style.cssText=props[k];else e[k]=props[k];}kids.forEach(k=>e.append(typeof k==='string'?document.createTextNode(k):k));return e;}
function applyTheme(t){document.documentElement.dataset.theme=t;localStorage.setItem('theme',t);var b=document.getElementById('themeToggle');if(b)b.textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
function toggleTheme(){applyTheme((localStorage.getItem('theme')||'light')==='light'?'dark':'light');}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickItem(a){return a[Math.floor(Math.random()*a.length)];}
function wf(pool,ans,n){return shuffle(pool.filter(x=>x!==ans)).slice(0,n||4);}
function nums(ans,spread,n){const s=new Set([ans]);let g=0;n=n||4;while(s.size<n+1&&g<200){g++;const v=ans+ri(-spread,spread);if(v>=0&&v!==ans)s.add(v);}return [...s].filter(x=>x!==ans).slice(0,n);}
const RN=[[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
function toRoman(n){let r='';for(const[v,s]of RN){while(n>=v){r+=s;n-=v;}}return r;}
function buildMenu(){const g=document.getElementById('grid');g.innerHTML='';GAMES.forEach(gm=>{const d=el('div',{className:'card'});d.innerHTML=`<span class="ico">${gm.ico}</span><div class="name">${gm.name}</div>`;d.onclick=()=>launch(gm);g.append(d);});}
function backToMenu(){if(current&&current.stop)current.stop();current=null;host.innerHTML='';document.getElementById('stage').style.display='none';document.getElementById('menu').style.display='block';buildMenu();}
function launch(gm){currentGm=gm;score=0;document.getElementById('menu').style.display='none';document.getElementById('stage').style.display='block';titleEl.textContent=gm.name;setStatus('');setHint(HELP[gm.id]||'');host.innerHTML='';current=gm.fn();}
function showRules(){if(!currentGm)return;const ov=el('div',{style:'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:18px'});
  const box=el('div',{style:'background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:16px;max-width:460px;width:100%;padding:22px;box-shadow:0 10px 40px #0008'});
  box.append(el('div',{className:'big',style:'font-size:20px;margin-bottom:10px',textContent:currentGm.ico+' '+currentGm.name}));
  box.append(el('div',{style:'line-height:1.6',textContent:(HELP[currentGm.id]||'Read the question and tap the correct answer.')+'  Use the Easy / Medium / Hard buttons to change the level.'}));
  const c=el('button',{className:'btn',textContent:'Got it!',style:'margin-top:16px'});c.onclick=()=>ov.remove();box.append(c);ov.append(box);ov.onclick=e=>{if(e.target===ov)ov.remove();};document.body.append(ov);}

/* generic multiple-choice game with Easy/Med/Hard selector */
function quiz(gen){
  score=0;
  const diffRow=el('div',{className:'row',style:'display:flex;gap:6px;flex-wrap:wrap;justify-content:center'});
  function refreshDiff(){[...diffRow.children].forEach((c,i)=>c.className='btn'+(['easy','med','hard'][i]===DIFF?'':' ghost'));}
  [['easy','😊 Easy'],['med','🙂 Medium'],['hard','🤓 Hard']].forEach(([d,lbl])=>{const b=el('button',{className:'btn',textContent:lbl,style:'padding:7px 14px'});b.onclick=()=>{DIFF=d;localStorage.setItem('l2diff',d);refreshDiff();score=0;round();};diffRow.append(b);});
  refreshDiff();
  const qEl=el('div',{className:'big',style:'max-width:580px;min-height:46px;line-height:1.4'});
  const opts=el('div',{className:'opts',style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:540px;width:100%'});
  const fb=el('div',{className:'big',style:'min-height:26px'});
  const next=el('button',{className:'btn',textContent:'Next ▶'});
  host.append(diffRow,qEl,opts,fb,next);
  function round(){const d=gen(DIFF);qEl.innerHTML=d.q;fb.textContent='';
    const optN={easy:2,med:3,hard:4}[DIFF];
    const all=shuffle([d.a,...(d.wr||[]).slice(0,optN)]).map(String);
    const long=all.some(o=>o.length>14);opts.style.gridTemplateColumns=long?'1fr':'1fr 1fr';opts.innerHTML='';
    all.forEach(o=>{const b=el('button',{className:'btn ghost',textContent:o,style:'padding:14px;font-size:16px'});
      b.onclick=()=>{[...opts.children].forEach(x=>x.disabled=true);
        if(o===String(d.a)){b.style.background='#2ecc71';b.style.color='#fff';score++;fb.textContent='✅ '+(d.ok||'Correct!');setStatus('Score: '+score+'  •  '+DIFF);}
        else{b.style.background='#e74c3c';b.style.color='#fff';[...opts.children].forEach(x=>{if(x.textContent===String(d.a)){x.style.background='#2ecc71';x.style.color='#fff';}});fb.textContent='Answer: '+d.a;}};
      opts.append(b);});
    setStatus('Score: '+score+'  •  '+DIFF);}
  next.onclick=round;round();
  return {stop:()=>{}};
}
