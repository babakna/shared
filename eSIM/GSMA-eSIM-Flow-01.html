function showChecklist(type,btn){
  btn.parentElement.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.querySelectorAll('.checklist-pane').forEach(function(p){p.style.display='none'});
  var el=document.getElementById('cl-'+type);
  if(el)el.style.display='block';
}

function showSDDetail(domain){
  var info={
    isdr:{title:'ISD-R \u2014 Issuer Security Domain \u2013 Root',desc:'The master security domain on the eUICC. In M2M, managed by the SM-SR. In Consumer, managed by the eUICC operating system. Controls creation/deletion of ISD-Ps. Only one ISD-R per eUICC.'},
    isdp:{title:'ISD-P \u2014 Issuer Security Domain \u2013 Profile',desc:'One per installed profile. Contains the operator\'s subscription data, file system, and applications. Created during profile download (ES10b.LoadBoundProfilePackage). Deleted when profile is deleted.'},
    mnosd:{title:'MNO-SD \u2014 Mobile Network Operator Security Domain',desc:'Optional domain inside an ISD-P controlled by the operator for remote key management and application updates within the profile.'},
    ecasd:{title:'ECASD \u2014 eUICC Certificate Authority Security Domain',desc:'Holds the eUICC\'s private key and X.509 certificate chain. Used during mutual authentication with SM-DP+ and SM-DS. Provisioned by the EUM during manufacturing. Cannot be modified remotely.'}
  };
  var i=info[domain];
  if(!i)return;
  var el=document.getElementById('sd-detail');
  if(!el)return;
  el.classList.add('vis');
  el.innerHTML='<div style="font-weight:700;color:var(--mag);margin-bottom:6px">'+i.title+'</div><div style="color:var(--tx1)">'+i.desc+'</div>';
}

  bindHexConverter();
  bindCertViewer();
  bindRemoteDecoder();
  bindACGenerator();
  bindBatchValidator();
  bindIMSIDecoder();
  bindDecisionTree();

function ctrl(fid,a){
  var fl=FL[fid];if(!fl)return;
  var tot=fl.steps.length,s=gs(fid);
  if(a==='next'){if(s<tot)s++}
  else if(a==='prev'){if(s>0)s--}
  else if(a==='reset')s=0;
  else if(a==='showall')s=tot;
  curStep[fid]=s;
  updDiag(fid);
}

function updDiag(fid){
  var fl=FL[fid],s=gs(fid),tot=fl.steps.length;
  var si=document.getElementById('si-'+fid);
  if(si)si.textContent='Step '+s+' / '+tot;
  var dx=document.getElementById('dx-'+fid);
  if(!dx)return;
  dx.querySelectorAll('.mrow').forEach(function(r){
    var sn=+r.dataset.sn;
    r.className='mrow '+(s>=sn?(s===sn?'vis cur':'vis'):'dim');
  });
  var dp=document.getElementById('dp-'+fid);
  if(dp){
    if(s>0){dp.innerHTML=detHTML(fl,s-1);dp.classList.add('vis')}
    else{dp.innerHTML='';dp.classList.remove('vis')}
  }
  requestAnimationFrame(function(){
    var scrollContainer=dx.querySelector('.dscroll');
    var cur=dx.querySelector('.mrow.cur');
    if(cur&&scrollContainer){
      var containerRect=scrollContainer.getBoundingClientRect();
      var rowRect=cur.getBoundingClientRect();
      if(rowRect.top<containerRect.top+60||rowRect.bottom>containerRect.bottom-20){
        var scrollTop=cur.offsetTop-scrollContainer.querySelector('.nhdr').offsetHeight-40;
        scrollContainer.scrollTo({top:Math.max(0,scrollTop),behavior:'smooth'});
      }
    }
  });
}

function refreshPane(tab){
  var el=document.getElementById('p-'+tab);if(!el)return;
  if(tab==='esim101')el.innerHTML=esim101HTML();
  else if(tab==='appendix')el.innerHTML=appxHTML();
  else if(tab==='troubleshoot')el.innerHTML=tsHTML();
  else if(tab==='quickref')el.innerHTML=qrHTML();
  else if(tab==='tools-id')el.innerHTML=toolsIdHTML();
  else if(tab==='tools-dbg')el.innerHTML=toolsDbgHTML();
  else el.innerHTML=specHTML(tab);
  bindUI();
  requestAnimationFrame(function(){drawArrows()});
}

/* ── AC Parser ── */
function bindACParser(){
  var btn=document.getElementById('ac-parse');
  var input=document.getElementById('ac-input');
  var result=document.getElementById('ac-result');
  if(!btn||!input||!result)return;
  function parse(){
    var val=input.value.trim();
    if(!val){result.innerHTML='<div class="ac-error">Please enter an activation code.</div>';return}
    if(val.indexOf('LPA:')===0)val=val.substring(4);
    var parts=val.split('$');
    if(parts[0]!=='1'){result.innerHTML='<div class="ac-error">Invalid format: must start with "1" (or "LPA:1").</div>';return}
    var labels=['Format','SM-DP+ Address','Matching ID','SM-DP+ OID','Confirmation Code'];
    var colors=['#888','#E20074','#2563EB','#D97706','#059669'];
    var descs=['Format version (always "1" for default RSP activation code format)','The FQDN of the SM-DP+ server that holds the profile','Token that identifies the specific profile order on the SM-DP+','Object Identifier for SM-DP+ certificate verification (optional)','User must enter this code during download for additional security (optional)'];
    var rh='<div class="ac-segments">';
    parts.forEach(function(p,i){
      if(i>=labels.length)return;
      rh+='<div class="ac-seg" style="border-color:'+colors[i]+';color:'+colors[i]+'">';
      rh+='<div class="ac-seg-label">'+labels[i]+'</div>';
      rh+='<div class="ac-seg-value">'+p.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
      rh+='</div>';
      if(i<parts.length-1&&i<labels.length-1)rh+='<span class="ac-delim">$</span>';
    });
    rh+='</div><div class="ac-descs">';
    parts.forEach(function(p,i){
      if(i>=labels.length)return;
      rh+='<div class="ac-desc"><b style="color:'+colors[i]+'">'+labels[i]+':</b> '+descs[i]+'</div>';
    });
    rh+='</div>';
    result.innerHTML=rh;
  }
  btn.onclick=parse;
  input.onkeydown=function(e){if(e.key==='Enter')parse()};
  var clr=document.getElementById('ac-clear');
  if(clr)clr.onclick=function(){input.value='';result.innerHTML='';input.focus()};
  
  var qrUpload=document.getElementById('ac-qr-upload');
  var qrStatus=document.getElementById('ac-qr-status');
  if(qrUpload&&qrStatus){
    qrUpload.onchange=function(){
      var file=this.files[0];
      if(!file)return;
      qrStatus.style.display='block';
      qrStatus.textContent='Processing image...';
      var reader=new FileReader();
      reader.onload=function(e){
        var img=new Image();
        img.onload=function(){
          var canvas=document.createElement('canvas');
          canvas.width=img.width;
          canvas.height=img.height;
          var ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0);
          var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
          if(typeof jsQR==='function'){
            var code=jsQR(imageData.data,imageData.width,imageData.height);
            if(code&&code.data){
              input.value=code.data;
              qrStatus.style.display='none';
              parse();
            } else {
              qrStatus.textContent='Could not decode QR code from image. Try a clearer image.';
              qrStatus.style.color='#DC2626';
            }
          } else {
            qrStatus.textContent='jsQR library not loaded. Please refresh the page.';
            qrStatus.style.color='#DC2626';
          }
        };
        img.onerror=function(){
          qrStatus.textContent='Could not load image file.';
          qrStatus.style.color='#DC2626';
        };
        img.src=e.target.result;
      };
      reader.onerror=function(){
        qrStatus.textContent='Could not read file.';
        qrStatus.style.color='#DC2626';
      };
      reader.readAsDataURL(file);
      qrUpload.value='';
    };
  }
}

function eidChecksumValid(digits){
  try { return BigInt(digits) % 97n === 1n; } catch(e){ return false; }
}

function bindEIDDecoder(){
  var btn=document.getElementById('eid-decode');
  var input=document.getElementById('eid-input');
  var result=document.getElementById('eid-result');
  if(!btn||!input||!result)return;
  function decode(){
    var val=input.value.replace(/[\s\-]/g,'');
    if(!val){result.innerHTML='<div class="ac-error">Please enter an EID.</div>';return}
    if(!/^\d+$/.test(val)){result.innerHTML='<div class="ac-error">EID must contain only digits (0\u20139). Found non-digit characters.</div>';return}
    if(val.length!==32){result.innerHTML='<div class="ac-error">EID must be exactly 32 digits. You entered '+val.length+' digit'+(val.length!==1?'s':'')+'.</div>';return}
    var prefix8=val.substring(0,8);
    var platform=val.substring(8,11);
    var serial=val.substring(11,30);
    var chk=val.substring(30,32);
    var mii=val.substring(0,2);
    var reserved=val.substring(2,3);
    var cc=val.substring(3,5);
    var mfgCode=val.substring(5,8);
    var checksumOk=eidChecksumValid(val);
    var stdMII=mii==='89';
    var altMII=mii==='35';
    var nonStdMII=!stdMII&&!altMII;
    var eumName=EUM_TABLE[prefix8]||null;
    var deviceMatch=null;
    var patternName=null;
    for(var i=0;i<DEVICE_PATTERNS.length;i++){
      var p=DEVICE_PATTERNS[i];
      if(prefix8!==p.eum)continue;
      var match=true;
      for(var rangeKey in p.rules){
        var parts=rangeKey.split('_');
        var start=parseInt(parts[0],10)-1;
        var end=parseInt(parts[1],10);
        if(val.substring(start,end)!==p.rules[rangeKey]){match=false;break}
      }
      if(match){deviceMatch=p.device;patternName=p.name;break}
    }
    var countryName=stdMII?(COUNTRY_CODES[cc]||'Unknown ('+cc+')'):'N/A (non-standard MII)';
    var seg=[
      {label:'EUM Prefix',value:prefix8,color:'#E20074'},
      {label:'Platform/Product',value:platform,color:'#7C3AED'},
      {label:'Serial Number',value:serial,color:'#0891B2'},
      {label:'Check Digits',value:chk,color:checksumOk?'#059669':'#DC2626'}
    ];
    var rh='';
    if(nonStdMII)rh+='<div class="eid-warn">\u26A0 Non-standard MII: "'+mii+'" (expected "89" for telecom)</div>';
    if(stdMII&&reserved!=='0')rh+='<div class="eid-warn">\u26A0 Reserved digit is "'+reserved+'" (expected "0" per SGP.29). Non-zero reserved digit may indicate a non-conformant EID.</div>';
    var formatted=val.replace(/(.{4})/g,'$1 ').trim();
    rh+='<div class="eid-formatted">'+formatted+'</div>';
    rh+='<div class="ac-segments">';
    seg.forEach(function(s){
      rh+='<div class="ac-seg" style="border-color:'+s.color+';color:'+s.color+'">';
      rh+='<div class="ac-seg-label">'+s.label+'</div>';
      rh+='<div class="ac-seg-value">'+s.value+'</div></div>';
    });
    rh+='</div>';
    rh+='<div class="eid-subfields">';
    rh+='EUM Prefix Breakdown: MII=<b>'+mii+'</b> | Reserved=<b>'+reserved+'</b> | Country=<b>'+cc+'</b> ('+countryName+') | Manufacturer=<b>'+mfgCode+'</b>';
    if(eumName)rh+=' ('+eumName+')';
    rh+='</div>';
    rh+='<div class="eid-info">';
    rh+='<div class="eid-row"><b>EID Validation</b><span>'+(checksumOk?'\u2705 Valid':'\u274C Invalid')+'</span></div>';
    rh+='<div class="eid-row"><b>MII</b><span>'+(stdMII?'Standard (89)':(altMII?'Alternative (35)':'Non-standard ('+mii+')'))+'</span></div>';
    rh+='<div class="eid-row"><b>Country</b><span>'+countryName+'</span></div>';
    rh+='<div class="eid-row"><b>EUM (Manufacturer)</b><span>'+(eumName||'Unknown EUM (prefix: '+prefix8+')')+'</span></div>';
    rh+='<div class="eid-row"><b>Device</b><span>'+(deviceMatch?deviceMatch:'Not identified')+'</span></div>';
    rh+='<div class="eid-row"><b>Google SM-DS Pattern</b><span>'+(patternName?patternName+' \u2014 Google SM-DS supported':'No pattern matched')+'</span></div>';
    rh+='</div>';
    rh+='<div class="eid-note">EID format and checksum defined in GSMA SGP.29 (EID Definition and Assignment). Historical reference: SGP.02 Annex H.</div>';
    result.innerHTML=rh;
  }
  btn.onclick=decode;
  input.onkeydown=function(e){if(e.key==='Enter')decode()};
  var clr=document.getElementById('eid-clear');
  if(clr)clr.onclick=function(){input.value='';result.innerHTML='';input.focus()};
}

/* ── ICCID Decoder ── */
function luhnCheck(digits){
  var sum=0,alt=false;
  for(var i=digits.length-1;i>=0;i--){
    var n=parseInt(digits[i],10);
    if(alt){n*=2;if(n>9)n-=9}
    sum+=n;alt=!alt;
  }
  return sum%10===0;
}

/* ── TLV Parser ── */
function parseTLV(hex,offset,depth){
  var nodes=[];
  var i=offset||0;
  var maxDepth=depth||0;
  if(maxDepth>15)return nodes;
  while(i<hex.length){
    if(i+2>hex.length)break;
    var tagStart=i,firstByte=parseInt(hex.substr(i,2),16);i+=2;
    if(firstByte===0||firstByte===0xFF)continue;
    var isConstructed=(firstByte&0x20)!==0;
    if((firstByte&0x1F)===0x1F){while(i<hex.length){var nb=parseInt(hex.substr(i,2),16);i+=2;if((nb&0x80)===0)break}}
    var tagHex=hex.substring(tagStart,i).toUpperCase();
    if(i+2>hex.length)break;
    var lenByte=parseInt(hex.substr(i,2),16);i+=2;
    var len=0;
    if(lenByte<0x80)len=lenByte;
    else if(lenByte===0x81){if(i+2>hex.length)break;len=parseInt(hex.substr(i,2),16);i+=2}
    else if(lenByte===0x82){if(i+4>hex.length)break;len=parseInt(hex.substr(i,4),16);i+=4}
    else if(lenByte===0x83){if(i+6>hex.length)break;len=parseInt(hex.substr(i,6),16);i+=6}
    else break;
    var valHex=hex.substr(i,len*2);i+=len*2;
    var children=null;
    if(isConstructed&&valHex.length>0)try{children=parseTLV(valHex,0,maxDepth+1)}catch(e){}
    nodes.push({tag:tagHex,len:len,value:valHex,name:TLV_TAGS[tagHex]||null,children:children});
  }
  return nodes;
}
function renderTLV(nodes,depth){
  var h='';
  nodes.forEach(function(n){
    var indent=depth||0;
    h+='<div class="tlv-node" style="margin-left:'+(indent*20)+'px">';
    h+='<span class="tlv-tag">'+n.tag+'</span>';
    if(n.name)h+='<span class="tlv-name">('+n.name+')</span>';
    h+=' <span class="tlv-len">['+n.len+' bytes]</span>';
    if(n.children){h+=' {';h+=renderTLV(n.children,(depth||0)+1);h+='<div style="margin-left:'+((depth||0)*20)+'px">}</div>'}
    else{var disp=n.value.length>64?n.value.substring(0,64)+'\u2026':n.value;h+=' <span class="tlv-val">'+disp+'</span>'}
    h+='</div>';
  });
  return h;
}
function bindTLVParser(){

/* ── Hex/Base64/UTF-8 Converter ── */
function bindHexConverter(){
  var fromSel=document.getElementById('conv-from'),toSel=document.getElementById('conv-to');
  var inp=document.getElementById('conv-input'),out=document.getElementById('conv-output');
  var btn=document.getElementById('conv-convert'),copyBtn=document.getElementById('conv-copy'),clearBtn=document.getElementById('conv-clear');
  if(!fromSel||!toSel||!inp||!out||!btn)return;
  function hexToBytes(h){if(h.length%2!==0){h='0'+h}var a=[];for(var i=0;i<h.length;i+=2)a.push(parseInt(h.substr(i,2),16));return a}
  function bytesToHex(a){return a.map(function(b){return b.toString(16).padStart(2,'0')}).join('').toUpperCase()}
  function bytesToB64(bytes){var bin='';for(var i=0;i<bytes.length;i+=8192){bin+=String.fromCharCode.apply(null,bytes.slice(i,i+8192))}return btoa(bin)}
  function b64ToBytes(s){var raw=atob(s);var bytes=[];for(var i=0;i<raw.length;i++)bytes.push(raw.charCodeAt(i));return bytes}
  function bytesToUtf8(bytes){return new TextDecoder().decode(new Uint8Array(bytes))}
  function utf8ToBytes(s){return Array.from(new TextEncoder().encode(s))}
  function updateBtn(){btn.disabled=(fromSel.value===toSel.value);}
  fromSel.onchange=toSel.onchange=updateBtn;
  updateBtn();
  btn.onclick=function(){
    var v=inp.value;if(!v){out.value='';return}
    var from=fromSel.value,to=toSel.value;
    if(from===to){out.value='';return}
    try{
      var bytes;
      if(from==='hex'){var hv=v.replace(/[\s]/g,'');if(!/^[0-9a-fA-F]*$/.test(hv)){out.value='Error: Input contains non-hex characters.';return}if(hv.length%2!==0){out.value='Error: Hex input has odd length ('+hv.length+' characters). Hex must have an even number of characters (each byte = 2 hex digits).';return}bytes=hexToBytes(hv)}
      else if(from==='b64')bytes=b64ToBytes(v.trim());
      else bytes=utf8ToBytes(v);
      if(to==='hex')out.value=bytesToHex(bytes);
      else if(to==='b64')out.value=bytesToB64(bytes);
      else out.value=bytesToUtf8(bytes);
    }catch(e){out.value='Error: '+e.message}
  };
  if(copyBtn)copyBtn.onclick=function(){if(out.value){navigator.clipboard.writeText(out.value);copyBtn.textContent='Copied!';setTimeout(function(){copyBtn.textContent='Copy Output'},1500)}};
  if(clearBtn)clearBtn.onclick=function(){inp.value='';out.value=''};
}

/* ── Certificate Viewer ── */
function bindCertViewer(){
  var btn=document.getElementById('cert-parse'),inp=document.getElementById('cert-input'),res=document.getElementById('cert-result');
  if(!btn||!inp||!res)return;
  function parse(){
    var v=inp.value.trim();if(!v){res.innerHTML='<div class="ac-error">Paste a PEM certificate.</div>';return}
    var b64=v.replace(/-----BEGIN CERTIFICATE-----/,'').replace(/-----END CERTIFICATE-----/,'').replace(/[\s\r\n]/g,'');
    try{
      var raw=atob(b64),hex='';
      for(var i=0;i<raw.length;i++)hex+=raw.charCodeAt(i).toString(16).padStart(2,'0');
      hex=hex.toUpperCase();
      var nodes=parseTLV(hex,0,0);
      var rh='<table class="cert-tbl">';
      rh+='<tr><td>DER Length</td><td>'+raw.length+' bytes</td></tr>';
      rh+='<tr><td>Raw Structure</td><td>'+nodes.length+' top-level TLV node(s)</td></tr>';
      if(nodes.length>0&&nodes[0].children){
        var tbs=nodes[0].children[0];
        if(tbs&&tbs.children){
          var fields=tbs.children;
          fields.forEach(function(f){
            var name=TLV_TAGS[f.tag]||f.tag;
            var val=f.value.length>80?f.value.substring(0,80)+'\u2026':f.value;
            if(f.tag==='02'&&f.len<=20)rh+='<tr><td>Serial Number</td><td style="font-family:monospace;font-size:12px">'+f.value+'</td></tr>';
            if(f.tag==='30'&&f.children){
              var child0Tag=f.children.length>=2?f.children[0].tag:null;
              var child1Tag=f.children.length>=2?f.children[1].tag:null;
              if(f.children.length===2&&(child0Tag==='17'||child0Tag==='18')&&(child1Tag==='17'||child1Tag==='18')){
                function parseTime(hex,tag){try{var bytes=hex.match(/.{2}/g).map(function(h){return parseInt(h,16)});var str=String.fromCharCode.apply(null,bytes);if(tag==='17'){var yy=parseInt(str.substring(0,2),10);var year=yy>=50?1900+yy:2000+yy;return year+'-'+str.substring(2,4)+'-'+str.substring(4,6)+' '+str.substring(6,8)+':'+str.substring(8,10)+':'+str.substring(10,12)+' UTC'}if(tag==='18'){return str.substring(0,4)+'-'+str.substring(4,6)+'-'+str.substring(6,8)+' '+str.substring(8,10)+':'+str.substring(10,12)+':'+str.substring(12,14)+' UTC'}}catch(e){return 'Parse error'}return hex}
                var notBefore=parseTime(f.children[0].value,f.children[0].tag);
                var notAfter=parseTime(f.children[1].value,f.children[1].tag);
                rh+='<tr><td>Not Before</td><td>'+notBefore+'</td></tr>';
                rh+='<tr><td>Not After</td><td>'+notAfter+'</td></tr>';
                try{var now=new Date();var afterDate=new Date(notAfter.replace(' UTC','Z').replace(' ','T'));if(afterDate<now){rh+='<tr><td style="color:#DC2626;font-weight:700">\u26A0 Status</td><td style="color:#DC2626;font-weight:700">EXPIRED</td></tr>'}}catch(e){}
              } else {
              var cn='',org='';
              function extractDN(ch){ch.forEach(function(s){if(s.children)s.children.forEach(function(seq){if(seq.children)seq.children.forEach(function(atv){if(atv.children&&atv.children.length>=2){var oidNode=atv.children[0],val=atv.children[1].value;if(oidNode.tag!=='06')return;var oid=oidNode.value;try{var decoded=new TextDecoder().decode(new Uint8Array(val.match(/.{2}/g).map(function(h){return parseInt(h,16)})));if(oid==='550403')cn=decoded;if(oid==='55040A')org=decoded}catch(e){}}})})})}
              extractDN(f.children);
              if(cn||org)rh+='<tr><td>DN</td><td>CN='+cn+(org?', O='+org:'')+'</td></tr>';
              }
            }
          });
        }
      }
      rh+='<tr><td>SHA-256 Fingerprint</td><td style="font-family:monospace;font-size:11px;word-break:break-all">(compute with OpenSSL for accuracy)</td></tr>';
      rh+='</table>';
      rh+='<details style="margin-top:10px"><summary style="cursor:pointer;font-size:12px;color:var(--mag)">View TLV Structure</summary><div class="tlv-tree" style="margin-top:8px">'+renderTLV(nodes,0)+'</div></details>';
      res.innerHTML=rh;
    }catch(e){res.innerHTML='<div class="ac-error">Could not parse certificate: '+e.message+'</div>'}
  }
  btn.onclick=parse;
  var c=document.getElementById('cert-clear');if(c)c.onclick=function(){inp.value='';res.innerHTML='';inp.focus()};
}

/* ── Remote Command Decoder ── */
function bindRemoteDecoder(){

  function decode(){
    var v=inp.value.replace(/[\s]/g,'').toUpperCase();

    var cla=v.substr(0,2),ins=v.substr(2,2),p1=v.substr(4,2),p2=v.substr(6,2);
    var insName=REMOTE_INS[ins]||'Unknown';
    var claDesc='00'===cla?'ISO 7816':'80'===cla?'GlobalPlatform':'A0'===cla?'SIM Toolkit':'Other (0x'+cla+')';
    var seg=[{l:'CLA',v:cla,d:claDesc,c:'#7C3AED'},{l:'INS',v:ins,d:insName,c:'#E20074'},{l:'P1',v:p1,d:'Parameter 1',c:'#2563EB'},{l:'P2',v:p2,d:'Parameter 2',c:'#0891B2'}];

      if(v.length>10+lc*2){rh+='<div class="eid-row"><b>Le</b><span>0x'+v.substr(10+lc*2,2)+'</span></div>'}
      rh+='</div>';
    }
    if(ins==='E6'){
      var installTypes={'02':'for install','04':'for make selectable','08':'for install and make selectable','10':'for extradition'};
      rh+='<div class="eid-note"><b>INSTALL type (P1='+p1+'):</b> '+(installTypes[p1]||'Unknown install type')+'</div>';
    }
    res.innerHTML=rh;
  }
  btn.onclick=decode;inp.onkeydown=function(e){if(e.key==='Enter')decode()};
  var c=document.getElementById('ota-clear');if(c)c.onclick=function(){inp.value='';res.innerHTML='';inp.focus()};
}

/* ── EID Batch Validator ── */
function bindBatchValidator(){
  var btn=document.getElementById('batch-validate'),inp=document.getElementById('batch-input'),res=document.getElementById('batch-result');
  if(!btn||!inp||!res)return;
  var fileInput=document.getElementById('batch-file'),fileName=document.getElementById('batch-file-name');
  if(fileInput){fileInput.onchange=function(){var file=this.files[0];if(!file)return;fileName.textContent=file.name;var reader=new FileReader();reader.onload=function(e){var text=e.target.result;var eids=[];text.split(/[\r\n]+/).forEach(function(line){line.split(/[,;\t]/).forEach(function(cell){var cleaned=cell.trim().replace(/[\s\-"']/g,'');if(/^\d{32}$/.test(cleaned))eids.push(cleaned)})});if(eids.length>0){inp.value=eids.join('\n');fileName.textContent=file.name+' ('+eids.length+' EIDs found)'}else{fileName.textContent=file.name+' (no 32-digit EIDs found)'}};reader.readAsText(file)}}
  function validate(){
    var lines=inp.value.split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length>0});
    if(!lines.length){res.innerHTML='<div class="ac-error">Paste at least one EID.</div>';return}
    var valid=0,invalid=0,formatErr=0;
    var results=[];
    lines.forEach(function(line,idx){
      var v=line.replace(/[\s\-]/g,'');
      var fmt=v.replace(/(.{4})/g,'$1 ').trim();
      if(!/^\d{32}$/.test(v)){formatErr++;results.push({eid:v,fmt:fmt,valid:null,eum:'',dev:'',pn:'',error:'Format error ('+v.length+' digits)'});return}
      var ok=eidChecksumValid(v),prefix8=v.substring(0,8),eum=EUM_TABLE[prefix8]||'Unknown';
      var dev='Not identified',pn='';
      for(var i=0;i<DEVICE_PATTERNS.length;i++){var p=DEVICE_PATTERNS[i];if(prefix8!==p.eum)continue;var match=true;for(var rk in p.rules){var pts=rk.split('_'),s=parseInt(pts[0],10)-1,e=parseInt(pts[1],10);if(v.substring(s,e)!==p.rules[rk]){match=false;break}}if(match){dev=p.device;pn=p.name;break}}
      if(ok)valid++;else invalid++;
      results.push({eid:v,fmt:fmt,valid:ok,eum:eum,dev:dev,pn:pn,error:null});
    });
    var total=lines.length,showAll=total<=10,displayCount=showAll?total:10;
    var rh='<div class="rtwrap"><table class="rtbl"><thead><tr><th>#</th><th>EID</th><th>EUM</th><th>Validation</th><th>Device Pattern</th></tr></thead><tbody>';
    for(var i=0;i<displayCount;i++){

      if(r.error){rh+='<tr style="background:rgba(217,119,6,.08)"><td>'+(i+1)+'</td><td style="font-family:monospace;font-size:11px">'+r.fmt+'</td><td>\u2014</td><td>\u26A0 '+r.error+'</td><td>\u2014</td></tr>';continue}
      var bg=r.valid?'rgba(5,150,105,.06)':'rgba(220,38,38,.06)';
      rh+='<tr style="background:'+bg+'"><td>'+(i+1)+'</td><td style="font-family:monospace;font-size:11px">'+r.fmt+'</td><td>'+r.eum+'</td><td>'+(r.valid?'\u2705 Valid':'\u274C Invalid')+'</td><td>'+(r.pn?r.dev+' ('+r.pn+')':r.dev)+'</td></tr>';
    }
    rh+='</tbody></table></div>';
    if(!showAll){rh+='<div style="font-size:12px;color:var(--tx2);margin-top:8px;font-style:italic">Showing first 10 of '+total+' EIDs. Download CSV for complete results.</div>';}
    var summary='<div style="padding:10px 14px;background:var(--bg2);border-radius:8px;margin-bottom:12px;font-size:14px;font-weight:600"><span style="color:#059669">'+valid+' valid</span>, <span style="color:#DC2626">'+invalid+' invalid</span>';
    if(formatErr)summary+=', <span style="color:#D97706">'+formatErr+' format errors</span>';
    summary+=' out of '+total+' total';
    if(total>=2){
      summary+='<button class="cbtn" id="batch-csv" style="margin-left:12px;font-size:12px">Download CSV</button>';
    }
    summary+='</div>';
    res.innerHTML=summary+rh;
    if(total>=2){
      var csvBtn=document.getElementById('batch-csv');
      if(csvBtn){csvBtn.onclick=function(){
        var csv='EID,Valid,EUM_Manufacturer,Device_Pattern,Pattern_Name\n';
        results.forEach(function(r){
          var validStr=r.error?'FORMAT_ERROR':(r.valid?'Yes':'No');
          csv+='"'+r.eid+'","'+validStr+'","'+(r.eum||'').replace(/"/g,'""')+'","'+(r.dev||'').replace(/"/g,'""')+'","'+(r.pn||'').replace(/"/g,'""')+'"\n';
        });

        link.href=URL.createObjectURL(blob);
        link.download='eid-validation-results.csv';
        link.click();
        URL.revokeObjectURL(link.href);
      };}
    }
  }
  btn.onclick=validate;
  var c=document.getElementById('batch-clear');if(c)c.onclick=function(){inp.value='';res.innerHTML='';inp.focus()};
}

            h+='<div style="margin-bottom:4px"><a href="#" onclick="jumpToFlow(\''+lk.tab+'\',\''+lk.flow+'\','+(lk.step||0)+');return false" style="color:var(--mag);font-size:12px">'+lk.label+'</a></div>';
          } else {
            h+='<div style="margin-bottom:4px"><a href="#" onclick="curTab=\''+lk.tab+'\';document.querySelectorAll(\'.tbtn\').forEach(function(t){t.classList.toggle(\'on\',t.dataset.t===\''+lk.tab+'\');t.setAttribute(\'aria-selected\',String(t.dataset.t===\''+lk.tab+'\'))});document.querySelectorAll(\'.pane\').forEach(function(p){p.classList.toggle(\'on\',p.id===\'p-'+lk.tab+'\')});refreshPane(\''+lk.tab+'\');window.scrollTo(0,0);return false" style="color:var(--mag);font-size:12px">'+lk.label+'</a></div>';
          }
        });
        h+='</div>';
      }
      h+='</div>';
    } else {
      h+='<div style="font-size:15px;font-weight:700;color:var(--tx0);margin-bottom:12px">'+node.q+'</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
      node.opts.forEach(function(opt){
        h+='<button class="fbtn" onclick="renderDT(\''+opt.next+'\')">'+opt.label+'</button>';
      });
      h+='</div>';
    }
    container.innerHTML=h;
  }
  window.renderDT=renderNode;
  renderNode('root');
}

/* ── euiccInfo Decoder (C7) ── */
function bindEuiccInfoDecoder(){
  var btn=document.getElementById('euicc-decode'),inp=document.getElementById('euicc-input'),res=document.getElementById('euicc-result');
  if(!btn||!inp||!res)return;
  function decode(){
    var v=inp.value.replace(/[\s\n\r]/g,'').replace(/[^0-9a-fA-F]/g,'');
    if(!v){res.innerHTML='<div class="ac-error">Paste euiccInfo hex data to decode.</div>';return}
    try{
      var nodes=parseTLV(v.toUpperCase(),0,0);
      if(!nodes.length){res.innerHTML='<div class="ac-error">Could not parse TLV structures from input.</div>';return}
      var root=nodes[0];
      var isInfo1=root.tag==='BF20';
      var isInfo2=root.tag==='BF22';
      var rh='<div style="font-size:14px;font-weight:700;color:var(--mag);margin-bottom:8px">'+(isInfo1?'euiccInfo1 (ES10a \u2014 pre-authentication)':isInfo2?'euiccInfo2 (ES10b \u2014 during authentication)':'Unknown structure (tag: '+root.tag+')')+'</div>';
      if(isInfo1)rh+='<div style="font-size:12px;color:var(--tx2);margin-bottom:12px;padding:6px 10px;background:var(--bg2);border-radius:4px;border:1px solid var(--bdr)">euiccInfo1 contains basic capabilities (svn, CI PKIDs). For detailed fields like free memory, firmware version, and PPR support, decode euiccInfo2 (tag BF22).</div>';
      if(isInfo2)rh+='<div style="font-size:12px;color:var(--tx2);margin-bottom:12px;padding:6px 10px;background:var(--bg2);border-radius:4px;border:1px solid var(--bdr)">euiccInfo2 contains detailed eUICC data including free memory (extCardResource), firmware version, installed profiles, and PPR capabilities.</div>';
      if(!root.children||!root.children.length){rh+='<div class="ac-error">No child TLV elements found.</div>';res.innerHTML=rh;return}
      rh+='<div class="eid-info">';
      var svn=null,ciVerify=[],ciSign=[],freeMem=null,profileCount=null;
      root.children.forEach(function(child){
        if(child.tag==='80'&&child.value.length===6){
          var major=parseInt(child.value.substring(0,2),16);
          var minor=parseInt(child.value.substring(2,4),16);
          var patch=parseInt(child.value.substring(4,6),16);
          svn=major+'.'+minor+'.'+patch;
        }
        if(child.tag==='A9'&&child.children){
          child.children.forEach(function(pk){if(pk.value)ciVerify.push(pk.value)});
        }
        if(child.tag==='AA'&&child.children){
          child.children.forEach(function(pk){if(pk.value)ciSign.push(pk.value)});
        }
        if(child.tag==='82'){
          if(isInfo2){freeMem=parseInt(child.value,16)}
          else if(isInfo1){freeMem=parseInt(child.value,16);/* note: tag 82 in euiccInfo1 is unusual */}
        }
      });
      if(svn)rh+='<div class="eid-row"><b>Spec Version (svn)</b><span>'+svn+'</span></div>';
      if(freeMem!==null){
        var kb=Math.round(freeMem/1024);
        rh+='<div class="eid-row"><b>Free Memory (extCardResource)</b><span>'+freeMem.toLocaleString()+' bytes ('+kb+' KB)'+(isInfo1?' <span style="color:#D97706;font-size:11px">\u26A0 extCardResource is typically only in euiccInfo2 (BF22)</span>':'')+'</span></div>';
      }
      if(svn){
        var mep=parseInt(svn.split('.')[0],10)>=3;
        rh+='<div class="eid-row"><b>MEP Capable</b><span>'+(mep?'Likely (v3.x svn)':'No (v2.x svn)')+'</span></div>';
      }
      rh+='</div>';
      function renderPkids(list,label){
        if(!list.length)return '';
        var ph='<div style="margin-top:12px"><div style="font-size:13px;font-weight:700;color:var(--tx0);margin-bottom:6px">'+label+'</div>';
        list.forEach(function(pk){
          var trunc=pk.length>32?pk.substring(0,32)+'\u2026':pk;
          var ciMatch=null;
          if(typeof CI_PKIDS!=='undefined'){
            CI_PKIDS.forEach(function(ci){if(ci.pkid.toUpperCase()===pk.toUpperCase())ciMatch=ci});
          }
          var badge=ciMatch?'<span style="display:inline-block;background:'+(ciMatch.status==='Active'?'#059669':'#D97706')+';color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;margin-left:8px">'+ciMatch.gen+'</span>':'';
          ph+='<div style="font-size:12px;padding:4px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:4px;margin-bottom:4px;font-family:monospace"><code title="'+pk+'">'+trunc+'</code>'+badge+'</div>';
        });
        ph+='</div>';
        return ph;
      }
      rh+=renderPkids(ciVerify,'CI PKIDs for Verification (euiccCiPKIdListForVerification)');
      rh+=renderPkids(ciSign,'CI PKIDs for Signing (euiccCiPKIdListForSigning)');
      rh+='<div style="margin-top:12px"><details style="font-size:12px;color:var(--tx2)"><summary style="cursor:pointer;color:var(--mag);font-weight:600">Raw TLV Parse Tree</summary><div class="tlv-tree" style="margin-top:8px">'+renderTLV(nodes,0)+'</div></details></div>';
      res.innerHTML=rh;
    }catch(e){res.innerHTML='<div class="ac-error">Parse error: '+e.message+'</div>'}
  }
  btn.onclick=decode;
  var c=document.getElementById('euicc-clear');if(c)c.onclick=function(){inp.value='';res.innerHTML='';inp.focus()};
}

/* ── QR Batch Generator (C6) ── */
function bindBatchQR(){
  var genBtn=document.getElementById('batchqr-gen'),printBtn=document.getElementById('batchqr-print'),dlBtn=document.getElementById('batchqr-download');
  var inp=document.getElementById('batchqr-input'),res=document.getElementById('batchqr-result'),clr=document.getElementById('batchqr-clear');
  var fileInput=document.getElementById('batchqr-file'),fileName=document.getElementById('batchqr-file-name');
  if(!genBtn||!inp||!res)return;
  if(fileInput){
    fileInput.onchange=function(){
      var f=this.files[0];if(!f)return;
      if(fileName)fileName.textContent=f.name;
      var reader=new FileReader();
      reader.onload=function(e){inp.value=e.target.result};
      reader.readAsText(f);
      fileInput.value='';
    };
  }
  genBtn.onclick=function(){
    var lines=inp.value.trim().split('\n').filter(function(l){return l.trim()});
    if(!lines.length){res.innerHTML='<div class="ac-error">Paste CSV data with SM-DP+ Address and Matching ID.</div>';return}
    var entries=[];
    lines.forEach(function(line){
      var stripped=line.replace(/^(SM-DP\+\s*Address|Address)\s*,\s*(Matching\s*ID|MatchingId)\s*$/i,'');
      if(!stripped.trim())return;
      var parts=stripped.split(',');
      if(parts.length>=2){
        var addr=parts[0].trim(),mid=parts[1].trim();
        if(addr&&mid)entries.push({addr:addr,mid:mid});
      }
    });
    if(!entries.length){res.innerHTML='<div class="ac-error">No valid entries found. Format: SM-DP+ Address, Matching ID</div>';return}
    var h='<div style="font-size:13px;color:var(--tx0);font-weight:700;margin-bottom:12px">'+entries.length+' QR Code'+(entries.length!==1?'s':'')+' Generated</div>';
    h+='<div id="batchqr-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">';
    entries.forEach(function(e,i){
      var ac='1$'+e.addr+'$'+e.mid;
      h+='<div style="background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;padding:14px;text-align:center">';
      h+='<div id="batchqr-canvas-'+i+'" style="margin-bottom:8px"></div>';
      h+='<div style="font-size:11px;font-weight:700;color:var(--mag);word-break:break-all">'+e.mid+'</div>';
      h+='<div style="font-size:10px;color:var(--tx3);margin-top:2px">'+e.addr+'</div>';
      h+='</div>';
    });
    h+='</div>';
    res.innerHTML=h;
    entries.forEach(function(e,i){
      var ac='LPA:1$'+e.addr+'$'+e.mid;
      var container=document.getElementById('batchqr-canvas-'+i);
      if(container&&typeof QRCode!=='undefined'){
        new QRCode(container,{text:ac,width:160,height:160,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
      } else if(container){
        container.innerHTML='<div style="width:160px;height:160px;border:2px dashed var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3);margin:0 auto">QR library not loaded</div>';
      }
    });
  };
  if(printBtn)printBtn.onclick=function(){
    var grid=document.getElementById('batchqr-grid');
    if(!grid||!grid.innerHTML){return}
    window.print();
  };
  if(dlBtn)dlBtn.onclick=function(){
    var grid=document.getElementById('batchqr-grid');
    if(!grid){return}
    var images=grid.querySelectorAll('canvas');
    if(!images.length){var errDiv=document.createElement('div');errDiv.className='ac-error';errDiv.textContent='No QR codes to download. Generate QR codes first, or check that the QR library loaded (requires internet).';errDiv.style.marginTop='10px';dlBtn.parentNode.appendChild(errDiv);setTimeout(function(){if(errDiv.parentNode)errDiv.parentNode.removeChild(errDiv)},4000);return}
    var cards=grid.children;
    var canvas=document.createElement('canvas');
    var cols=Math.min(images.length,4);
    var rows=Math.ceil(images.length/cols);
    var cw=220,ch=260;
    canvas.width=cols*cw;canvas.height=rows*ch;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
    images.forEach(function(img,i){
      var col=i%cols,row=Math.floor(i/cols);
      var x=col*cw+30,y=row*ch+10;
      ctx.drawImage(img,x,y,160,160);
      var card=cards[i];
      if(card){
        var midEl=card.querySelectorAll('div');
        var midText=midEl.length>=3?midEl[2].textContent:'';
        var addrText=midEl.length>=4?midEl[3].textContent:'';
        ctx.fillStyle='#E20074';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
        ctx.fillText(midText.substring(0,28),x+80,y+178);
        ctx.fillStyle='#999999';ctx.font='9px sans-serif';
        ctx.fillText(addrText.substring(0,32),x+80,y+192);
      }
    });
    var link=document.createElement('a');
    link.download='esim-qr-batch.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  };
  if(clr)clr.onclick=function(){inp.value='';res.innerHTML='';if(fileName)fileName.textContent=''};
}

/* ── Jump to Flow (D1 cross-linking) ── */
function jumpToFlow(tab,flowId,stepNum){
  curTab=tab;
  if(flowId){curFlow[tab]=flowId;curStep[flowId]=stepNum;}
  else{var s=SPEC[tab];if(s){var firstFlow=Object.keys(s.flows)[0];curFlow[tab]=firstFlow;curStep[firstFlow]=stepNum||0;}}
  document.querySelectorAll('.tbtn').forEach(function(t){
    t.classList.toggle('on',t.dataset.t===tab);
    t.setAttribute('aria-selected',String(t.dataset.t===tab));
  });
  document.querySelectorAll('.pane').forEach(function(p){
    p.classList.toggle('on',p.id==='p-'+tab);
  });
  refreshPane(tab);
  window.scrollTo(0,0);
}

/* ── Global Search (D2) ── */
var searchIndex=[];
function buildSearchIndex(){
  searchIndex=[];
  GLOSSARY.forEach(function(g){searchIndex.push({text:(g.term+' '+g.def).toLowerCase(),label:'Glossary: '+g.term,action:function(){curTab='quickref';document.querySelectorAll('.tbtn').forEach(function(t){t.classList.toggle('on',t.dataset.t==='quickref');t.setAttribute('aria-selected',String(t.dataset.t==='quickref'))});document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-quickref')});requestAnimationFrame(function(){drawArrows()})}})});
  TS_CARDS.forEach(function(c){searchIndex.push({text:(c.symptom+' '+c.causes.join(' ')+' '+c.checks.join(' ')).toLowerCase(),label:'Troubleshooting: '+c.symptom.substring(0,60),action:function(){curTab='troubleshoot';document.querySelectorAll('.tbtn').forEach(function(t){t.classList.toggle('on',t.dataset.t==='troubleshoot');t.setAttribute('aria-selected',String(t.dataset.t==='troubleshoot'))});document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-troubleshoot')});requestAnimationFrame(function(){drawArrows()})}})});
  Object.keys(FL).forEach(function(fid){FL[fid].steps.forEach(function(s,i){
    var tab=null;
    Object.keys(SPEC).forEach(function(t){if(SPEC[t].flows&&SPEC[t].flows[fid])tab=t});
    if(!tab)return;
    searchIndex.push({text:(s.n+' '+s.d).toLowerCase(),label:fid+' Step '+(i+1)+': '+s.n,action:function(){jumpToFlow(tab,fid,i+1)}});
  })});
  var toolNames=[
    {name:'Activation Code Parser',tab:'tools-id'},{name:'QR Code Generator',tab:'tools-id'},{name:'Activation Code QR',tab:'tools-id'},
    {name:'EID Analyzer',tab:'tools-id'},{name:'EID Decoder',tab:'tools-id'},{name:'EID Batch Validator',tab:'tools-id'},
    {name:'ICCID Decoder',tab:'tools-id'},{name:'IMSI Decoder',tab:'tools-id'},
    {name:'Device Pattern Database',tab:'tools-id'},{name:'EUM Manufacturer Database',tab:'tools-id'},
    {name:'APDU Status Word Decoder',tab:'tools-dbg'},{name:'SGP.22 Error Code Decoder',tab:'tools-dbg'},
    {name:'Profile State Machine',tab:'tools-dbg'},{name:'ASN.1 TLV Parser',tab:'tools-dbg'},
    {name:'Hex Base64 Converter',tab:'tools-dbg'},{name:'Certificate Viewer',tab:'tools-dbg'},
    {name:'Remote Command Decoder',tab:'tools-dbg'},
    {name:'euiccInfo Decoder',tab:'tools-dbg'},{name:'euiccInfo1 euiccInfo2',tab:'tools-dbg'},
    {name:'QR Batch Generator',tab:'tools-id'},{name:'Batch QR Codes',tab:'tools-id'},
    {name:'CI PKID Reference',tab:'quickref'},{name:'Certificate Issuer',tab:'quickref'},
    {name:'BPP Structure',tab:'quickref'},{name:'Bound Profile Package',tab:'quickref'},
    {name:'Deployment Checklist',tab:'quickref'},{name:'Readiness Checklist',tab:'quickref'},
    {name:'Compatibility Matrix',tab:'quickref'},{name:'Version Compatibility',tab:'quickref'},
    {name:'Vendor Quirks',tab:'appendix'},{name:'Thales IDEMIA G+D',tab:'appendix'},
    {name:'Error Triage',tab:'troubleshoot'},{name:'Decision Tree',tab:'troubleshoot'},
    {name:'MEP Multi-Port Enable',tab:'consumer'},
    {name:'eSIM 101',tab:'esim101'},{name:'What Is eSIM',tab:'esim101'},
    {name:'Architecture Decision Matrix',tab:'esim101'},{name:'Terminology Cheat Sheet',tab:'esim101'},
    {name:'Spec Evolution Timeline',tab:'esim101'},{name:'Security Domain Hierarchy',tab:'quickref'},
    {name:'IFPP In-Factory Profile Provisioning',tab:'ifpp'},{name:'Factory System',tab:'ifpp'},
    {name:'Late Binding',tab:'ifpp'},{name:'Profile Provider',tab:'ifpp'},
    {name:'SGP.41 SGP.42 Factory',tab:'ifpp'},{name:'Factory Installation',tab:'ifpp'}
  ];
  toolNames.forEach(function(t){
    searchIndex.push({text:t.name.toLowerCase(),label:'Tool: '+t.name,action:function(){
      curTab=t.tab;
      document.querySelectorAll('.tbtn').forEach(function(b){b.classList.toggle('on',b.dataset.t===t.tab);b.setAttribute('aria-selected',String(b.dataset.t===t.tab))});
      document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-'+t.tab)});
      requestAnimationFrame(function(){drawArrows()});
    }});
  });
}
function bindSearch(){
  var btn=document.getElementById('search-btn'),overlay=document.getElementById('search-overlay'),backdrop=document.getElementById('search-backdrop'),inp=document.getElementById('search-input'),results=document.getElementById('search-results');
  if(!btn||!overlay||!inp||!results)return;
  function open(){overlay.classList.add('open');backdrop.classList.add('open');inp.value='';results.innerHTML='';inp.focus()}
  function close(){overlay.classList.remove('open');backdrop.classList.remove('open')}
  btn.onclick=open;
  backdrop.onclick=close;
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();open()}
    if(e.key==='Escape')close();
  });
  inp.oninput=function(){
    var q=this.value.toLowerCase().trim();
    if(!q){results.innerHTML='';return}
    var matches=[];
    searchIndex.forEach(function(item){if(item.text.indexOf(q)!==-1)matches.push(item)});
    matches=matches.slice(0,10);
    if(!matches.length){results.innerHTML='<div style="padding:14px 18px;font-size:13px;color:var(--tx3)">No results found.</div>';return}
    var rh='';
    matches.forEach(function(m,i){
      rh+='<div class="search-item" data-idx="'+i+'"><div class="search-item-label">'+m.label.replace(/</g,'&lt;')+'</div></div>';
    });
    results.innerHTML=rh;
    results.querySelectorAll('.search-item').forEach(function(item,i){
      item.onclick=function(){matches[i].action();close();window.scrollTo(0,0)};
    });
  };
}

/* ── Print Mode (D3) ── */
function bindPrint(){
  var btn=document.getElementById('print-btn');
  if(!btn)return;
  btn.onclick=function(){
    var tsCards=document.querySelectorAll('.ts-card');
    tsCards.forEach(function(c){c.setAttribute('open','')});
    var rows=document.querySelectorAll('.mrow');
    rows.forEach(function(r){r.classList.remove('dim');r.classList.add('vis')});
    var panels=document.querySelectorAll('.dpanel');
    panels.forEach(function(p){p.classList.add('vis')});
    setTimeout(function(){window.print()},200);
  };
}

/* ── Share / Deep Link (D12) ── */
function bindShare(){
  var btn=document.getElementById('share-btn');
  if(!btn)return;
  btn.onclick=function(){
    var hash='#'+curTab;
    if(SPEC[curTab]){
      var fid=gf(curTab);
      if(fid){
        hash+='/'+fid;
        var step=gs(fid);
        if(step>0)hash+='/'+step;
      }
    }
    window.location.hash=hash;
    var url=window.location.href;
    navigator.clipboard.writeText(url).then(function(){
      btn.textContent='\u2705';
      setTimeout(function(){btn.textContent='\uD83D\uDD17'},1500);
    }).catch(function(){
      btn.textContent='\u274C';
      setTimeout(function(){btn.textContent='\uD83D\uDD17'},1500);
    });
  };
}

/* Tab switching */
document.getElementById('tabs').onclick=function(e){
  var b=e.target.closest('.tbtn');if(!b)return;
  curTab=b.dataset.t;
  document.querySelectorAll('.tbtn').forEach(function(t){t.classList.toggle('on',t.dataset.t===curTab);t.setAttribute('aria-selected',String(t.dataset.t===curTab))});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-'+curTab)});
  requestAnimationFrame(function(){drawArrows()});
};

/* Theme */
(function(){
  var t=localStorage.getItem('esim-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  updThm(t);
})();
document.getElementById('thm').onclick=function(){
  var c=document.documentElement.getAttribute('data-theme');
  var n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('esim-theme',n);
  updThm(n);
};
function updThm(t){document.getElementById('thm').textContent=t==='dark'?'\u263E':'\u2606'}

/* Keyboard */
document.onkeydown=function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(!SPEC[curTab])return;
  var fid=gf(curTab);if(!fid)return;
  if(e.key===' '||e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();ctrl(fid,'next')}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();ctrl(fid,'prev')}
  else if(e.key==='Home'||e.key==='r'||e.key==='R'){e.preventDefault();ctrl(fid,'reset')}
  else if(e.key==='End'){e.preventDefault();ctrl(fid,'showall')}
};

/* Resize */
var rt;window.onresize=function(){clearTimeout(rt);rt=setTimeout(drawArrows,200)};

var bttBtn=document.getElementById('btt');
window.addEventListener('scroll',function(){
  if(bttBtn) bttBtn.classList.toggle('show',window.scrollY>400);
});
if(bttBtn) bttBtn.onclick=function(){window.scrollTo({top:0,behavior:'smooth'})};

boot();
buildSearchIndex();
bindSearch();
bindPrint();
bindShare();
</script>
