<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babak — eSIM Specification Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#FFFFFF;--bg1:#F8F8FA;--bg2:#F0F0F2;
  --tx0:#000000;--tx1:#333333;--tx2:#6A6A6A;--tx3:#999999;
  --bdr:#E0E0E0;--mag:#E20074;--ber:#861B54;
  --sh1:rgba(0,0,0,.06);--sh2:rgba(0,0,0,.1);
  --thov:rgba(226,0,116,.05);--tact:rgba(226,0,116,.08);
  --cbg:#F0F0F2;--dbg:#FAFAFE;--lbg:#FFFFFF;
  --glow:rgba(226,0,116,.25);--life:#D0D0D0;--dim:.13;
}
[data-theme="dark"]{
  --bg0:#0A0A0F;--bg1:#13131A;--bg2:#1A1A24;
  --tx0:#F0F0F5;--tx1:#C0C0D0;--tx2:#9A9AB0;--tx3:#6A6A80;
  --bdr:#2A2A3A;
  --sh1:rgba(0,0,0,.3);--sh2:rgba(0,0,0,.4);
  --thov:rgba(226,0,116,.1);--tact:rgba(226,0,116,.15);
  --cbg:#1A1A24;--dbg:#13131A;--lbg:#1A1A24;
  --glow:rgba(226,0,116,.4);--life:#2A2A3A;--dim:.08;
}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg0);color:var(--tx1);line-height:1.6;
  transition:background .3s,color .3s;
}
a{color:var(--mag);text-decoration:none}a:hover{text-decoration:underline}

/* ── Header ── */
.hdr{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,border-color .3s}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:36px;height:36px;background:var(--mag);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0}
.hdr-t{font-size:20px;font-weight:700;color:var(--tx0)}
.hdr-s{font-size:12px;color:var(--tx2);margin-top:1px}
.thm{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:background .2s,border-color .2s;color:var(--tx1);flex-shrink:0}
.thm:hover{border-color:var(--mag)}

/* ── Tab Bar ── */
.tabs{display:flex;border-bottom:2px solid var(--bdr);background:var(--bg1);overflow-x:auto;-webkit-overflow-scrolling:touch;transition:background .3s,border-color .3s}
.tabs::-webkit-scrollbar{height:3px}.tabs::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.tbtn{background:none;border:none;padding:12px 22px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:inherit}
.tbtn:hover{background:var(--thov);color:var(--tx1)}
.tbtn.on{color:var(--mag);border-bottom-color:var(--mag);background:var(--tact)}

/* ── Content ── */
.wrap{max-width:1400px;margin:0 auto;padding:24px}
.pane{display:none}.pane.on{display:block}

/* ── Overview ── */
.ocard{background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;padding:24px 28px;margin-bottom:24px;transition:background .3s,border-color .3s}
.badge{display:inline-block;background:rgba(226,0,116,.1);color:var(--mag);font-weight:700;font-size:12px;padding:4px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.otitle{font-size:22px;font-weight:700;color:var(--tx0);margin-bottom:14px}
.otxt{color:var(--tx1);font-size:14px;line-height:1.75}.otxt p{margin-bottom:12px}.otxt p:last-child{margin-bottom:0}
.echips{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--bdr)}
.echip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--tx1)}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Flow Selector ── */
.fsel{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.fbtn{background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--tx1);cursor:pointer;transition:all .2s;font-family:inherit}
.fbtn:hover{border-color:var(--mag);color:var(--mag)}
.fbtn.on{background:var(--mag);border-color:var(--mag);color:#fff}
.fsel-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.fsel-divider{width:1px;height:28px;background:var(--bdr);margin:0 6px}

/* ── Diagram ── */
.dbox{display:flex;flex-direction:column;background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;transition:background .3s,border-color .3s;max-height:80vh}
.dctrl{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--bdr);background:var(--bg2);flex-wrap:wrap}
.cbtn{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx1);transition:all .15s;font-family:inherit}
.cbtn:hover{border-color:var(--mag);color:var(--mag)}
.cbtn:focus-visible{outline:2px solid var(--mag);outline-offset:2px}
.cbtn.pri{background:var(--mag);border-color:var(--mag);color:#fff}.cbtn.pri:hover{background:#c40063}
.sind{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx2)}
.kbd-hints{font-size:11px;color:var(--tx3);margin-left:12px;font-weight:400;white-space:nowrap}
@media(max-width:900px){.kbd-hints{display:none}}
.kbd-bar{font-size:12px;color:var(--tx1);padding:10px 16px;margin-bottom:14px;background:var(--bg1);border-radius:8px;border:1px solid var(--mag);border-left:4px solid var(--mag)}
.kbd-bar b{color:var(--mag)}
.dscroll{flex:1 1 auto;overflow-y:auto;overflow-x:auto;min-height:200px}
.dinner{min-width:600px}

/* Node header */
.nhdr{display:flex;background:var(--bg1);border-bottom:1px solid var(--bdr);padding:14px 0;position:sticky;top:0;z-index:5}
.ncol{flex:1;text-align:center;min-width:140px;padding:0 8px}
.nbox{display:inline-block;border:1px solid var(--bdr);border-top:3px solid;border-radius:6px;padding:8px 14px;background:var(--bg2);min-width:105px}
.nname{font-size:13px;font-weight:700}.ndesc{font-size:10px;color:var(--tx3);margin-top:2px}

/* Message rows */
.marea{position:relative;padding:0 0 16px}
.mrow{position:relative;min-height:90px;transition:opacity .35s ease;padding:6px 0}
.mrow.dim{opacity:var(--dim)}.mrow.vis{opacity:1}
.mrow.cur .mlabel{box-shadow:0 0 0 2px var(--mag),0 0 14px var(--glow)}

/* Lifelines layer */
.mlife{display:flex;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.mlcol{flex:1;display:flex;justify-content:center;min-width:140px}
.mll{width:0;border-left:2px dashed var(--life)}

/* Arrow SVG layer */
.marrow{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}

/* Label layer */
.mlwrap{position:absolute;z-index:3;top:6px;transform:translateX(-50%);pointer-events:auto}
.mlabel{background:var(--lbg);border:1px solid var(--bdr);border-radius:6px;padding:6px 12px;text-align:center;max-width:290px;transition:box-shadow .3s}
.mlabel[data-fid]{cursor:pointer;transition:box-shadow .3s, transform .15s}
.mlabel[data-fid]:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.msn{font-size:12px;font-weight:700;color:var(--mag);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.msn.xref{color:var(--tx2);font-style:italic;font-weight:600}
.mattr{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;justify-content:center}
.matag{font-size:10px;background:var(--cbg);border-radius:3px;padding:1px 6px;color:var(--tx2);font-family:'SF Mono','Cascadia Code','Consolas',monospace;white-space:nowrap}

/* Detail panel */
.dpanel{flex:0 0 auto;max-height:35vh;overflow-y:auto;border-top:2px solid var(--mag);padding:20px 24px;background:var(--dbg);border-left:4px solid var(--mag);display:none}
.dpanel.vis{display:block}
.dmn{font-size:16px;font-weight:700;color:var(--tx0);margin-bottom:4px}
.ddir{font-size:13px;color:var(--tx2);margin-bottom:14px}
.ddir b{font-weight:600}
.dtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.dtbl th{text-align:left;padding:8px 12px;background:var(--bg2);border:1px solid var(--bdr);color:var(--tx0);font-weight:600;font-size:12px}
.dtbl td{padding:7px 12px;border:1px solid var(--bdr);vertical-align:top}
.dtbl td:first-child{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:12px;color:var(--mag);white-space:nowrap;min-width:180px}
.dnote{font-style:italic;color:var(--tx2);font-size:13px;line-height:1.6;padding:10px 14px;background:var(--bg2);border-radius:6px;border:1px solid var(--bdr)}

/* ── Appendix ── */
.asec{margin-bottom:32px}
.asec h2{font-size:18px;font-weight:700;color:var(--tx0);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--mag);display:inline-block}
.rtwrap{overflow-x:auto}
.rtbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg1);border:1px solid var(--bdr)}
.rtbl th{background:var(--bg2);padding:10px 14px;text-align:left;font-weight:700;color:var(--tx0);border-bottom:1px solid var(--bdr);font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.rtbl td{padding:9px 14px;border-bottom:1px solid var(--bdr);color:var(--tx1);vertical-align:top}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tr:hover td{background:var(--thov)}
.rtbl code{background:var(--cbg);padding:1px 6px;border-radius:3px;font-size:12px;font-family:'SF Mono','Cascadia Code','Consolas',monospace}

/* ── Troubleshooting Cards ── */
.ts-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:12px;transition:background .3s,border-color .3s;overflow:hidden}
.ts-card summary{padding:16px 20px;font-size:15px;font-weight:700;color:var(--tx0);cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px}
.ts-card summary::before{content:'\25B6';font-size:11px;color:var(--mag);transition:transform .2s;flex-shrink:0}
.ts-card[open] summary::before{transform:rotate(90deg)}
.ts-card summary::-webkit-details-marker{display:none}
.ts-body{padding:0 20px 20px}
.ts-section{margin-bottom:16px}
.ts-section:last-child{margin-bottom:0}
.ts-section h4{font-size:13px;font-weight:700;color:var(--mag);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.ts-section ol,.ts-section ul{padding-left:20px;font-size:13px;color:var(--tx1);line-height:1.8}
.ts-section p{font-size:13px;color:var(--tx1);line-height:1.6;padding:8px 12px;background:var(--bg2);border-radius:6px;border:1px solid var(--bdr)}

/* ── Quick Reference ── */
.qr-search{width:100%;padding:10px 16px;font-size:14px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg1);color:var(--tx1);margin-bottom:16px;font-family:inherit;transition:border-color .2s}
.qr-search:focus{outline:none;border-color:var(--mag)}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:32px}
.qr-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;padding:14px 18px;transition:border-color .2s}
.qr-card:hover{border-color:var(--mag)}
.qr-term{font-size:14px;font-weight:700;color:var(--mag);margin-bottom:6px}
.qr-def{font-size:13px;color:var(--tx1);line-height:1.6;margin-bottom:8px}
.qr-spec{font-size:11px;color:var(--tx3);font-weight:600}

/* ── AC Parser ── */
.ac-tool{background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;padding:20px;transition:background .3s,border-color .3s;margin-bottom:32px}
.ac-input-wrap{display:flex;gap:10px;margin-bottom:16px}
.ac-input{flex:1;padding:10px 14px;font-size:14px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg0);color:var(--tx1);font-family:'SF Mono','Cascadia Code','Consolas',monospace;transition:border-color .2s}
.ac-input:focus{outline:none;border-color:var(--mag)}
.ac-result{min-height:20px}
.ac-segments{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.ac-seg{border:2px solid;border-radius:8px;padding:8px 14px;text-align:center}
.ac-seg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.ac-seg-value{font-size:14px;font-weight:600;font-family:'SF Mono','Cascadia Code','Consolas',monospace;margin-top:2px;word-break:break-all}
.ac-delim{font-size:18px;font-weight:700;color:var(--tx3)}
.ac-descs{border-top:1px solid var(--bdr);padding-top:12px}
.ac-desc{font-size:13px;color:var(--tx1);margin-bottom:8px;line-height:1.5}
.ac-error{color:#DC2626;font-size:13px;font-weight:600;padding:10px;background:rgba(220,38,38,.08);border-radius:6px}

/* ── EID Analyzer (Decoder, Validator & SM-DS Pattern Match) ── */
.eid-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.eid-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 10px;background:var(--bg2);border-radius:4px;border:1px solid var(--bdr)}
.eid-row b{color:var(--tx0)}.eid-row span{color:var(--tx1)}
.eid-note{font-style:italic;color:var(--tx2);font-size:12px;line-height:1.6;padding:10px 14px;background:var(--bg2);border-radius:6px;border:1px solid var(--bdr)}
.eid-formatted{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:16px;font-weight:700;color:var(--tx0);letter-spacing:2px;padding:8px 14px;margin-bottom:12px;background:var(--bg2);border-radius:6px;border:1px solid var(--bdr);text-align:center}
.eid-warn{color:#D97706;font-size:13px;font-weight:600;padding:8px 12px;background:rgba(217,119,6,.08);border-radius:6px;margin-bottom:12px}
.eid-subfields{font-size:12px;color:var(--tx2);margin:8px 0 12px;padding:8px 12px;background:var(--bg2);border-radius:6px;border:1px solid var(--bdr)}

/* ── Spec Map ── */
.spec-map-note{font-style:italic;color:var(--tx2);font-size:12px;line-height:1.7;margin-top:10px}

/* ── Appendix Category Headers ── */
.rtbl .cat-hdr td{background:var(--bg2);font-weight:700;color:var(--mag);text-transform:uppercase;letter-spacing:.5px;font-size:11px;border-bottom:none;padding:10px 14px}
.rtbl tr.cat-hdr:hover td{background:var(--bg2)}

/* ── Architecture Diagram ── */
.arch-wrap{margin-bottom:24px;background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;padding:18px;overflow-x:auto}
.arch-toggle{display:flex;gap:6px;margin-bottom:14px}
.arch-wrap svg text{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

.btt{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--mag);color:#fff;border:none;font-size:20px;cursor:pointer;display:none;z-index:999;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:opacity .2s,transform .2s}
.btt:hover{transform:scale(1.1)}
.btt.show{display:flex;align-items:center;justify-content:center}

@media(max-width:768px){
  .hdr{padding:14px 16px}.hdr-t{font-size:16px}.wrap{padding:16px}
  .ocard{padding:18px}.tbtn{padding:10px 14px;font-size:12px}
  .qr-grid{grid-template-columns:1fr}
  .ac-input-wrap{flex-direction:column}
  .eid-info{grid-template-columns:1fr}
}
.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s,border-color .2s;color:var(--tx1);flex-shrink:0}
.hdr-btn:hover{border-color:var(--mag)}
.search-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,.2)}
.search-backdrop.open{display:block}
.search-overlay{display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;background:var(--bg0);border:1px solid var(--bdr);border-radius:12px;box-shadow:0 8px 32px var(--sh2);z-index:1000;max-height:480px;overflow:hidden}
.search-overlay.open{display:block}
.search-overlay input{width:100%;padding:14px 18px;font-size:15px;border:none;border-bottom:1px solid var(--bdr);background:transparent;color:var(--tx0);font-family:inherit;outline:none}
.search-results{max-height:400px;overflow-y:auto;padding:6px 0}
.search-item{padding:10px 18px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--thov)}
.search-item-label{font-size:11px;color:var(--mag);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.search-item-text{font-size:13px;color:var(--tx1);margin-top:2px}
.search-item mark{background:rgba(226,0,116,.15);color:var(--mag);border-radius:2px;padding:0 2px}
.tlv-tree{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.8}
.tlv-node{margin-left:20px}
.tlv-tag{color:var(--mag);font-weight:700;cursor:pointer}
.tlv-len{color:#2563EB}
.tlv-val{color:#0891B2}
.tlv-name{color:var(--tx2);font-style:italic;margin-left:4px}
.sm-detail{padding:14px 18px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;margin-top:12px;font-size:13px;color:var(--tx1);line-height:1.7;display:none}
.sm-detail.vis{display:block}
.sm-toggle{display:flex;gap:6px;margin-bottom:12px}
.ac-textarea{width:100%;padding:10px 14px;font-size:13px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg0);color:var(--tx1);font-family:'SF Mono','Cascadia Code','Consolas',monospace;transition:border-color .2s;resize:vertical;min-height:80px}
.ac-textarea:focus{outline:none;border-color:var(--mag)}
.cert-tbl{width:100%;font-size:13px;border-collapse:collapse}
.cert-tbl td{padding:6px 10px;border-bottom:1px solid var(--bdr)}
.cert-tbl td:first-child{font-weight:700;color:var(--mag);white-space:nowrap;width:160px}
@media print{
  .hdr,.tabs,.thm,.cbtn,.fbtn,.kbd-bar,.btt,.ac-input-wrap,.hdr-actions,.search-overlay,.search-backdrop{display:none!important}
  .pane{display:block!important}
  .pane:not(.on){display:none!important}
  .dbox{max-height:none!important;overflow:visible!important}
  .dscroll{max-height:none!important;overflow:visible!important}
  .mrow{opacity:1!important}
  .dpanel{display:block!important;max-height:none!important}
  .ts-card{break-inside:avoid}
  .ts-card[open] .ts-body{display:block!important}
  body{background:white;color:black}
  input[type="checkbox"]{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  input[type="checkbox"]:checked::after{content:"\2713";font-size:12px;font-weight:700;position:relative;left:2px;top:-1px}
  input[type="checkbox"]{-webkit-appearance:none;appearance:none;width:14px;height:14px;border:2px solid #333;border-radius:2px;position:relative}
  input[type="checkbox"]:checked::before{content:"\2713";position:absolute;top:-3px;left:1px;font-size:14px;font-weight:700;color:#333}
}
</style>
<!-- CDN dependencies: jsQR (~12KB) for QR scanning, qrcodejs (~15KB) for QR generation.
     If these fail to load, QR tools degrade gracefully (individual tools show their own error messages).
     To enable full offline: inline these scripts by fetching and embedding their contents here. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<header class="hdr">
  <div class="hdr-l">
    <div class="hdr-ico">T</div>
    <div><div class="hdr-t">eSIM Specification Explorer</div><div class="hdr-s">GSMA Remote SIM Provisioning &mdash; Interactive Flow Reference &middot; <span style="color:#E20074">Brought to you by Babak</span></div></div>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" id="search-btn" title="Search (Ctrl+K)" aria-label="Search">&#128269;</button>

m2m:{badge:'SGP.01 '+SPEC_VERSIONS['SGP.01']+' / SGP.02 '+SPEC_VERSIONS['SGP.02'],title:'M2M Remote Provisioning Architecture',
whatsNew:'v4.x added SM-SR swap (ES6), profile interoperability across SM-SR platforms, and MNO-SD support for operator-controlled security domains.',
overview:['SGP.01 and SGP.02 define the original GSMA architecture for Machine-to-Machine (M2M) Remote SIM Provisioning (RSP). This architecture was designed for devices where there is no end-user interaction \u2014 connected cars, smart meters, industrial IoT modules, and vending machines. The key principle is that an Operator or M2M Service Provider (M2M-SP) remotely manages profiles on an embedded UICC (eUICC) through backend platform-to-platform communication.','The architecture introduces two critical backend entities: the Subscription Manager \u2013 Data Preparation (SM-DP), which securely prepares and encrypts profile packages, and the Subscription Manager \u2013 Secure Routing (SM-SR), which manages the secure transport channel to the eUICC and handles the lifecycle of profiles on it. The SM-SR maintains a secure remote channel to each eUICC using SCP03t or SCP80/SCP81, and acts as a gatekeeper \u2014 no entity other than the SM-SR communicates directly with the eUICC.','A key design decision in the M2M architecture is the \u201cpush\u201d model: the SM-SR pushes commands to the eUICC via the remote channel, which is why no Local Profile Assistant (LPA) or end-user UI is required. Profile operations (download, enable, disable, delete) are all initiated from the network side. This makes M2M RSP suitable for unattended devices but introduces dependencies on the SM-SR having continuous connectivity to the eUICC.','The SM-DP and SM-SR can be operated by the same entity or different entities. In many deployments, the eUICC manufacturer (EUM) provides the initial SM-SR, and Operators can request SM-SR changes (\u201cSM-SR swap\u201d) to move eUICC management to their preferred platform. Inter-SM-SR handover is defined in the spec but is complex and not universally deployed.','<b>Operational Realities:</b> Standard M2M deployments rely on Binary SMS through the MNO\u2019s SMS-C (Short Message Service Center) for the remote channel \u2014 this is not full IP and creates operational fragility. Compared to Consumer (SGP.22) and IoT (SGP.32) architectures, SGP.02 deployments are more prone to errors and delays due to the Binary SMS transport, the multi-hop SM-SR relay chain, and the push-model dependency on continuous connectivity. Additionally, integrating additional MNO providers into an M2M deployment typically requires additional integrations (SM-SR onboarding, key exchange, EIS updates), making it significantly more complex than adding operators in SGP.22 or SGP.32 environments.','<b>Real-World Deployments:</b> Connected car modules (GM OnStar, BMW Connected Drive), smart meters (utility companies), vending machines, asset trackers. The SM-SR is typically operated by the eUICC manufacturer (Thales, G+D). Profile operations are initiated by the M2M Service Provider through the SM-SR backend \u2014 the device has no UI.','<b>ES4 vs No-ES4 Flows:</b> Flows below are grouped by whether the Operator uses the ES4 interface to interact with the SM-SR. <b>No-ES4 flows</b> represent deployments where profiles are preloaded on the eUICC (e.g., at the factory or by the EUM), and the SM-SR manages lifecycle operations without direct Operator commands via ES4. <b>ES4 flows</b> represent the full architecture where the Operator triggers profile operations through ES4 commands to the SM-SR.'],
entities:['Operator (M2M-SP)','SM-DP','SM-SR','eUICC'],
flows:{'m2m-download':'Download & Install (ES4)','m2m-enable':'Profile Enable (ES4)','m2m-disable':'Profile Disable (ES4)','m2m-delete':'Profile Delete (ES4)','m2m-download-noes4':'Download (No ES4 \u2014 Preloaded Profiles)','m2m-enable-noes4':'Enable (No ES4)','m2m-disable-noes4':'Disable (No ES4)','m2m-delete-noes4':'Delete (No ES4)'}},

consumer:{badge:'SGP.21 '+SPEC_VERSIONS['SGP.21']+' / SGP.22 '+SPEC_VERSIONS['SGP.22'],title:'Consumer RSP Architecture',
whatsNew:'v3.x introduced MEP (Multiple Enabled Profiles) \u2014 multiple profiles active simultaneously on different eSIM ports. Added ES10d interface for MEP port management. Enhanced profile metadata. Improved notification handling.',
overview:['SGP.21 and SGP.22 define the Consumer RSP architecture \u2014 the eSIM system used in smartphones, tablets, wearables, and laptops. Unlike M2M, the Consumer architecture introduces a \u201cpull\u201d model where the end-user (via a Local Profile Assistant \u2014 LPA) initiates the profile download. The LPA is a software component on the device that serves as the user interface and orchestration layer between the eUICC and the backend servers.','The architecture replaces the SM-SR with the SM-DP+ (SM-DP Enhanced), which combines both data preparation and secure delivery functions. The SM-DP+ prepares Bound Profile Packages (BPPs) that are cryptographically bound to a specific eUICC using a mutual authentication process. A separate optional entity, the SM-DS (Subscription Manager \u2013 Discovery Server), acts as a rendezvous point \u2014 it allows SM-DP+ servers to register \u201cevents\u201d that the LPA can discover.','Two primary download paths exist. The Activation Code path is the most common: the user receives an Activation Code (often as a QR code) containing the SM-DP+ address and a matching ID. The LPA contacts the SM-DP+ directly. The Discovery Server path uses the SM-DS: the SM-DP+ registers a pending download event, the LPA polls the SM-DS, discovers the event, and then contacts the SM-DP+ to complete download. Both paths end with the same mutual authentication and profile binding procedure defined in ES9+ and ES10x interfaces.','Profile preparation is a prerequisite: the Operator uses the ES2+ interface to order profile downloads on the SM-DP+, providing ICCID, IMSI, and other subscription data. The SM-DP+ generates the profile and waits for the eUICC to connect. SGP.22 v3.0+ introduced significant enhancements including eSIM on MEP (Multiple Enabled Profiles), profile metadata improvements, and enhanced notification mechanisms.','<b>Two-Stage Process:</b> A key architectural principle of SGP.22 is the separation of profile preparation and profile download as two independent flows. Profile preparation (ES2+) happens between the Operator and SM-DP+ \u2014 this is when the profile data is created and staged. Profile download happens between the device (LPA) and SM-DP+ \u2014 this is when the eUICC authenticates, receives the BPP, and installs it. These two stages are decoupled: a profile can be prepared days or weeks before the user initiates download.','<b>Three Spec-Defined Provisioning Paths:</b> In addition to the Activation Code and Discovery Server paths, SGP.22 also defines a <b>Default SM-DP+</b> as a third provisioning mechanism. The LPA can be configured with a default SM-DP+ address (e.g., by the device OEM or carrier) and periodically poll it for available profiles. This enables push-like provisioning without requiring the user to scan a QR code or manually enter an Activation Code.','<b>Beyond Spec:</b> Other provisioning mechanisms exist in practice \u2014 such as MDM (Mobile Device Management) managed provisioning and on-device carrier apps \u2014 but these are implementation-specific and beyond the current scope of GSMA specifications. MDM-based provisioning typically uses the Activation Code path under the hood, with the MDM server delivering the AC payload to the device.','<b>Real-World Deployments:</b> iPhone (iOS 12.1+), Samsung Galaxy, Google Pixel, Apple Watch, iPads, laptops. When you scan a QR code to add an eSIM plan, you are using the Activation Code path of SGP.22. Carrier apps that push eSIM profiles use the Discovery Server path. The SM-DP+ is operated by the carrier directly or through vendors like Thales, IDEMIA, or G+D.'],
entities:['Operator','SM-DP+','SM-DS','LPA (Device)','eUICC'],
flows:{'consumer-prep':'Profile Preparation (ES2+)','consumer-ac':'Download \u2014 Activation Code','consumer-ds':'Download \u2014 Discovery Server','consumer-enable':'Enable','consumer-disable':'Disable','consumer-delete':'Profile Delete','consumer-mep':'MEP \u2014 Multi-Port Enable (v3.x)'}},

iot:{badge:'SGP.31 '+SPEC_VERSIONS['SGP.31']+' / SGP.32 '+SPEC_VERSIONS['SGP.32'],title:'IoT eSIM Architecture',
whatsNew:'v1.1 added clarifications for IPAd/IPAe deployment models, eIM configuration bootstrapping, and CoAP transport binding. Refined ESeim message set.',
overview:['SGP.31 and SGP.32 define the IoT RSP architecture \u2014 the modern framework for eSIM profile management across <b>all IoT device categories</b>, from capable connected vehicles to constrained sensors. This architecture is the evolution beyond SGP.02\u2019s limitations, designed to address operational challenges with M2M deployments (Binary SMS dependency, SM-SR complexity, multi-hop latency) while supporting the full IoT device spectrum.','The architecture introduces the <b>eIM (eSIM IoT Remote Manager)</b> \u2014 a cloud-based management platform that acts on behalf of the device owner or IoT service provider. The eIM orchestrates profile lifecycle operations (download, enable, disable, delete) without requiring an LPA on the device. The device runs an <b>IPA (IoT Profile Assistant)</b> that handles local eUICC interaction. Two IPA variants exist: <b>IPAd</b> (IPA in Device) runs as software on the IoT device itself, and <b>IPAe</b> (IPA embedded in eUICC) is a software component within the eUICC that performs IPA functions internally for constrained devices.','<b>Direct Mode:</b> The eIM delivers pre-encrypted profiles directly to the IPA on the device via the ESeim interface. The SM-DP+ generates and encrypts the BPP bound to the target eUICC, then delivers it to the eIM. The eIM stores and delivers it to the IPA when the device is reachable. This mode is suitable for capable devices where the eIM has direct connectivity.','<b>Indirect Mode:</b> Originally introduced to handle constrained devices, but now broadly favored for practical reasons. The IPA connects to the SM-DP+ (similar to the Consumer model) with the eIM orchestrating the operation. The eIM triggers the IPA to download from the SM-DP+, and the IPA performs the authentication and BPP retrieval directly with the SM-DP+. IPAe (embedded IPA in the eUICC) implementations typically use Indirect Mode, allowing the eUICC itself to handle the download without requiring device-side software complexity.','The architecture supports both IP and non-IP transport, and operations can be performed over protocols like CoAP, MQTT, or SMS. This flexibility allows SGP.32 to serve devices across the connectivity spectrum \u2014 from NB-IoT modules to LTE-M gateways to Wi-Fi connected industrial equipment.','<b>Prerequisite \u2014 eIM Configuration:</b> Before any eIM-based flow works, the eUICC must be configured to trust the eIM. This is done via <code>ESeim.ConfigureEim</code>, typically during eUICC manufacturing or via an initial bootstrap process. The eUICC stores a list of authorized eIM identifiers and will reject commands from unrecognized eIMs. This trust bootstrap is a critical deployment step \u2014 without it, neither Direct nor Indirect mode operations will succeed.','<b>Real-World Deployments:</b> SGP.32 serves all IoT device categories as the modern successor to SGP.02. Use cases include connected vehicles, smart meters and utilities, industrial equipment, asset trackers, smart agriculture, consumer IoT devices, and constrained sensors. The choice between Direct and Indirect mode depends on deployment requirements, device capabilities, and connectivity patterns rather than device \u201cconstrainedness\u201d alone.'],
entities:['Operator','SM-DP+','SM-DS','eIM','IPAd','IPAe','eUICC (IoT)'],
flows:{'iot-direct-download':'Direct Mode \u2014 Download','iot-indirect-download':'Indirect Mode \u2014 Download','iot-enable':'Enable','iot-disable':'Disable','iot-delete':'Profile Delete'}},

ifpp:{badge:'SGP.41 '+SPEC_VERSIONS['SGP.41']+' / SGP.42 '+SPEC_VERSIONS['SGP.42'],title:'In-Factory Profile Provisioning (IFPP)',
whatsNew:'First release (Feb 2025). Defines architecture and requirements for in-factory provisioning. Technical specification (SGP.42) expected Q3 2026.',
overview:['SGP.41 and SGP.42 define the In-Factory Profile Provisioning (IFPP) framework \u2014 a standardized method for loading eSIM profiles onto eUICCs during device manufacturing, before the device ships to the end customer. SGP.41 (Architecture and Requirements) was published in February 2025; SGP.42 (Technical Specification) is expected to be finalized by Q3 2026.','IFPP addresses a critical gap in the eSIM ecosystem. With SGP.22 and SGP.32, profile provisioning requires an online connection to the SM-DP+ and multiple round-trip exchanges, which introduces delays and complexity on factory floors where production speed is paramount. IFPP allows a manufacturer to securely install Bound Profile Packages (BPPs) onto eUICCs during production \u2014 either at the eUICC manufacturing stage or during device assembly \u2014 without requiring a live connection to the SM-DP+ at the moment of installation.','The architecture introduces new entities and concepts. The Profile Provider (typically the SM-DP+) prepares BPPs in advance and delivers them to a Factory System. The Factory System \u2014 operating within a controlled, secure environment \u2014 loads these pre-prepared BPPs onto eUICCs using a local interface. The security model ensures that even though the BPP is pre-generated, it remains cryptographically bound to a specific eUICC, maintaining the same security guarantees as online provisioning.','Key use cases include smart meters (which may have no power or connectivity after deployment), automotive modules (where factory line speed is critical), and global IoT devices (where the target operator may depend on the shipping destination, determined at the last moment during configuration). IFPP can work alongside SGP.32 \u2014 a device can be provisioned with an initial profile via IFPP in the factory, and later managed remotely via SGP.32 eIM operations in the field.','Note: Since SGP.42 is not yet finalized, the flows below represent the architectural framework from SGP.41 v1.0. They will be updated as the technical specification matures.','<b>Real-World Deployments:</b> <b>Consumer devices are a prime use case</b> \u2014 specifically, installing provisioning (bootstrap) profiles outside the EUM manufacturing plant. This has been done for years and is one of the most practical applications of IFPP. Other use cases include: smart meters manufactured in bulk with a known target operator; automotive modules where factory line speed is critical \u2014 each eUICC gets its profile loaded in seconds via local interface, not minutes over the network; global IoT devices where the shipping destination determines the operator \u2014 Late Binding assigns the profile at the last moment during packaging/configuration.'],
entities:['Operator','SM-DP+ (Profile Provider)','Factory System','eUICC'],
flows:{'ifpp-prep':'Profile Preparation for Factory','ifpp-install':'Factory Installation','ifpp-late-binding':'Late Binding \u2014 Configuration-Time Provisioning'}}
};

{f:1,t:1,n:'Profile Ready (Preloaded)',a:[['Profile Package','Encrypted profile data (APDU scripts)'],['EID','Target eUICC'],['Key Establishment','ES3 keys via SM-SR tunnel']],d:'Profile data (IMSI, Ki, OPc, file system) is preloaded in the SM-DP via the Operator\u2019s provisioning process (out of scope). The profile is NOT yet encrypted at this stage \u2014 encryption occurs during the download sequence when the SM-SR triggers ES2/ES3 key establishment between the SM-DP and the target eUICC. The ES3 key exchange (tunneled through ES2\u2192SM-SR\u2192ES1\u2192eUICC) uses ECKA to establish session keys for profile binding.'},
{f:0,t:2,n:'ES4: DownloadProfile Request',a:[['EID','Target eUICC'],['SM-DP Address','Where to fetch the profile'],['Profile-ID','Which profile to download']],d:'Operator instructs SM-SR to initiate profile download to the target eUICC.'},
{f:2,t:1,n:'ES2: GetProfile',a:[['EID','Target eUICC identifier'],['SM-SR ID','Requesting SM-SR identity'],['Profile-ID','Requested profile reference']],d:'SM-SR requests the encrypted profile package from SM-DP.'},
{f:1,t:2,n:'ES2: GetProfile Response',a:[['Encrypted Profile Package','Protected profile data'],['Profile Metadata','Size, type, operator info']],d:'SM-DP delivers the encrypted profile package to SM-SR for onward delivery.'},
{f:2,t:3,n:'ES1: ProfileInstallation (SM-SR Push)',a:[['Encrypted Profile Package','Profile APDU commands'],['SCP03t / SCP80 / SCP81','Secure channel protocol'],['INSTALL [for install]','GlobalPlatform command']],d:'SM-SR pushes the profile to the eUICC via the secure remote channel. The eUICC decrypts and installs it.'},
{f:3,t:2,n:'ES1: InstallResult',a:[['Result Code','Success / failure'],['ICCID','Installed profile ICCID confirmation']],d:'eUICC reports installation result back to SM-SR.'},
{f:2,t:0,n:'ES4: Notification',a:[['EID','Target eUICC'],['Status','Profile installed successfully / failed'],['ICCID','Installed profile ID']],d:'SM-SR notifies the Operator of the installation result.'}
]},

'm2m-download-noes4':{nodes:['Operator (M2M-SP)|MNO / M2M-SP','SM-DP|Data Preparation','SM-SR (3rd Party)|Secure Routing','eUICC|Embedded SIM'],steps:[
{f:1,t:2,n:'ES2: Key Establishment Request',a:[['EID','Target eUICC'],['SM-DP Certificate','For mutual auth']],d:'With profiles preloaded, the SM-DP initiates key establishment with the target eUICC via the SM-SR. The Operator has no direct interface (no ES4 or ES5) \u2014 the SM-DP drives the entire flow.'},
{f:2,t:3,n:'ES1\u2192ES3: Key Exchange (SM-SR Relay)',a:[['SM-DP Certificate','For eUICC to verify'],['Key Agreement Data','ECKA parameters']],d:'SM-SR relays the key establishment to the eUICC via the remote channel. The eUICC verifies the SM-DP certificate and participates in key agreement. This is the ES3 logical interface tunneled through ES1.'},
{f:3,t:2,n:'ES1\u2192ES3: Key Exchange Response',a:[['eUICC Certificate','For SM-DP to verify'],['Key Agreement Response','eUICC\u2019s contribution']],d:'eUICC responds with its certificate and key material. SM-SR relays this back to the SM-DP.'},
{f:2,t:1,n:'ES2: Key Establishment Response',a:[['eUICC Certificate','Verified by SM-DP'],['Session Keys','Now established']],d:'SM-DP and eUICC now share session keys for profile encryption. The SM-SR facilitated this but does NOT have access to the keys.'},
{f:1,t:1,n:'Profile Encryption (Internal)',a:[['Profile Package','Encrypted with session keys'],['Bound to EID','Specific eUICC only']],d:'SM-DP encrypts the preloaded profile using the established session keys. Only the target eUICC can decrypt it.'},
{f:1,t:2,n:'ES2: ProfileDelivery',a:[['Encrypted Profile Package','For delivery to eUICC'],['EID','Target'],['Profile Metadata','Size, type']],d:'SM-DP sends the encrypted profile to the SM-SR for onward delivery via the remote channel.'},
{f:2,t:3,n:'ES1: ProfileInstallation (SM-SR Push)',a:[['Encrypted Profile Package','APDU commands'],['SCP03t / SCP80','Secure channel'],['INSTALL','GP command']],d:'SM-SR pushes the profile to the eUICC via the remote channel. The eUICC decrypts with the session keys and installs.'},
{f:3,t:2,n:'ES1: InstallResult',a:[['Result Code','Success / failure'],['ICCID','Installed profile']],d:'eUICC confirms installation to SM-SR.'},
{f:2,t:1,n:'ES2: InstallResult Relay',a:[['Result Code','Success / failure'],['ICCID','Installed'],['EID','Target']],d:'SM-SR relays the result back to SM-DP (since the Operator has no ES4 to the SM-SR).'},
{f:1,t:0,n:'Notification (out-of-band)',a:[['Status','Profile installed'],['EID / ICCID','Identifiers']],d:'SM-DP notifies the Operator. The notification mechanism depends on the SM-DP vendor implementation (API callback, portal, email) \u2014 there is no ES5 in this deployment model.'}
]},

'm2m-enable':{nodes:['Operator (M2M-SP)|MNO / M2M-SP','SM-SR|Secure Routing','eUICC|Embedded SIM'],steps:[

{f:2,t:1,n:'ES1: EnableResult',a:[['Result Code','Success / failure'],['ICCID','Now-active profile']],d:'eUICC reports the enable result to SM-SR.'},
{f:1,t:0,n:'ES4: Notification',a:[['Status','Profile enabled successfully'],['EID','Target eUICC']],d:'SM-SR notifies the Operator that the profile is now active.'}
]},

{f:3,t:3,n:'Profile Switch (Internal)',a:[['Active Profile','Switches to enabled ICCID'],['Previous Profile','Disabled automatically']],d:'eUICC performs the switch. REFRESH triggers modem re-attach.'},
{f:3,t:2,n:'ES1: EnableResult',a:[['Result Code','Success / failure'],['ICCID','Now-active profile']],d:'eUICC reports result.'},
{f:2,t:1,n:'ES2: EnableResult Relay',a:[['Result Code','Success / failure'],['ICCID','Enabled profile']],d:'SM-SR relays result to SM-DP.'},
{f:1,t:0,n:'Notification (out-of-band)',a:[['Status','Profile enabled'],['EID / ICCID','Identifiers']],d:'SM-DP notifies Operator via vendor-specific mechanism.'}
]},

{f:1,t:0,n:'Notification (out-of-band)',a:[['Status','Profile disabled'],['EID / ICCID','Identifiers']],d:'SM-DP notifies Operator.'}

/* ── Consumer Flows ── */
'consumer-prep':{nodes:['Operator|MNO / MVNO','SM-DP+|Data Preparation+','SM-DS|Discovery Server'],steps:[
{f:0,t:1,n:'ES2+.DownloadOrder',a:[['EID (optional)','Target eUICC, or omit for unbound'],['ICCID','Profile identifier'],['profileType','Profile template reference']],d:'Operator places a download order. If EID is provided, the profile will be bound to that specific eUICC.'},
{f:1,t:0,n:'ES2+.DownloadOrder Response',a:[['ICCID','Confirmed profile ID'],['matchingId','Activation Code token (if no EID)']],d:'SM-DP+ acknowledges the order. Returns a matchingId that becomes part of the Activation Code.'},
{f:0,t:1,n:'ES2+.ConfirmOrder',a:[['ICCID','Profile to confirm'],['releaseFlag','True = ready for download'],['IMSI / Ki / OPc / NAI','Subscription credentials']],d:'Operator confirms the order and provides the actual subscription credentials.'},
{f:1,t:0,n:'ES2+.ConfirmOrder Response',a:[['EID (if bound)','Bound eUICC'],['matchingId','Final Activation Code token'],['smdpAddress','SM-DP+ FQDN for the Activation Code']],d:'SM-DP+ confirms. The Operator can now generate the Activation Code: 1$<smdpAddress>$<matchingId>'},
{f:1,t:1,n:'Profile Generation (Internal)',a:[['Profile Package','APDU script with file system, apps, keys'],['Profile Metadata','Operator name, icon, profile class']],d:'SM-DP+ generates the profile package. Not yet encrypted for a specific eUICC \u2014 that happens during download.'},
{f:1,t:2,n:'ES12.RegisterEvent (Optional \u2014 SM-DS Path)',a:[['EID (hashed)','Target eUICC hash'],['RSP Server Address','SM-DP+ FQDN'],['eventId','Unique event identifier']],d:'If the profile will be downloaded via the SM-DS discovery path (rather than via a direct Activation Code), the SM-DP+ registers a pending download event at the SM-DS. This step is OPTIONAL \u2014 it is only performed when the Operator intends the LPA to discover the profile through SM-DS polling rather than receiving an Activation Code directly. The event remains pending at the SM-DS until the target eUICC\'s LPA queries via ES11.InitiateAuthentication (see the "Download \u2014 Discovery Server" flow).',optional:true},
{f:2,t:1,n:'ES12.RegisterEvent Response (Optional)',a:[['resultCode','Success / failure'],['eventId','Confirmed event identifier']],d:'SM-DS confirms the event registration. If successful, the event is now pending and discoverable by the target eUICC\'s LPA via ES11. This step only occurs if the optional ES12.RegisterEvent (step 6) was performed. If the Operator is using the Activation Code path instead of SM-DS discovery, neither step 6 nor step 7 apply.',optional:true}
]},

{f:0,t:2,n:'Activation Code Delivery',a:[['Activation Code','1$smdp.example.com$ABCD-EFGH'],['Format','QR code / manual entry / push']],d:'Operator delivers the Activation Code to the user via QR code, email, app push, or manual entry.'},
{f:2,t:3,n:'ES10a.GetEUICCInfo1',a:[['svn','Spec version supported'],['euiccCiPKIdListForVerification','CI public key IDs']],d:'LPA requests basic eUICC capabilities for compatibility check.'},
{f:3,t:2,n:'ES10a.GetEUICCInfo1 Response',a:[['svn','Supported spec version'],['euiccCiPKIdListForVerification','CI PKIDs the eUICC trusts for server cert verification'],['euiccCiPKIdListForSigning','CI PKIDs for eUICC signature']],d:'eUICC returns its capability information. The LPA uses this to populate the euiccInfo1 field in the next step (ES9+.InitiateAuthentication). This response determines which CI certificate chains the SM-DP+ must use.'},

{f:1,t:2,n:'ES9+.InitiateAuthentication Response',a:[['serverSigned1','Server-signed data incl. transactionId'],['serverSignature1','SM-DP+ digital signature'],['serverCertificate','SM-DP+ certificate chain'],['ctxParams1','matchingId / AC token']],d:'SM-DP+ responds with its signed challenge and certificate for the eUICC to verify.'},
{f:2,t:3,n:'ES10b.AuthenticateServer',a:[['serverSigned1','SM-DP+ signed data'],['serverSignature1','Signature to verify'],['serverCertificate','SM-DP+ cert chain'],['matchingId','From Activation Code']],d:'LPA passes SM-DP+ credentials to eUICC for server authentication.'},
{f:3,t:2,n:'ES10b.AuthenticateServer Response',a:[['euiccSigned1','eUICC signed data (euiccInfo2)'],['euiccSignature1','eUICC digital signature'],['euiccCertificate','eUICC certificate chain']],d:'eUICC authenticates the server and returns its own signed credentials. Mutual authentication step.'},
{f:2,t:1,n:'ES9+.AuthenticateClient',a:[['euiccSigned1','eUICC signed data'],['euiccSignature1','eUICC signature'],['euiccCertificate','eUICC cert chain']],d:'LPA forwards eUICC credentials to SM-DP+ for client authentication.'},
{f:1,t:2,n:'ES9+.AuthenticateClient Response',a:[['profileMetadata','Operator name, icon hash, profile class'],['smdpSigned2','Transaction binding data'],['smdpSignature2','Binding signature']],d:'SM-DP+ verifies the eUICC, confirms eligibility, and returns profile metadata.'},
{f:2,t:2,n:'User Consent (Internal)',a:[['Display','Operator name, profile class shown to user'],['Action','User confirms or cancels download'],['Confirmation Code (optional)','If AC included OID, user must enter code']],d:'LPA displays profile metadata to the user and requests consent. If the Activation Code contained a Confirmation Code (format: 1$address$matchingId$OID$confirmationCode), the user must also enter the correct confirmation code. This is an optional Operator-enforced security measure. Mandatory for Consumer RSP.'},
{f:2,t:3,n:'ES10b.PrepareDownload',a:[['smdpSigned2','SM-DP+ binding data'],['smdpSignature2','Binding signature']],d:'LPA sends binding data to eUICC. eUICC generates session keys for the BPP.'},

{f:2,t:1,n:'ES9+.GetBoundProfilePackage',a:[['euiccSigned2','eUICC preparation response'],['euiccSignature2','eUICC signature on session keys']],d:'LPA requests the BPP. SM-DP+ encrypts the profile using the agreed session keys.'},
{f:1,t:2,n:'ES9+.GetBoundProfilePackage Response',a:[['boundProfilePackage','Encrypted profile bound to eUICC']],d:'SM-DP+ returns the BPP \u2014 encrypted and bound to this specific eUICC.'},
{f:2,t:3,n:'ES10b.LoadBoundProfilePackage',a:[['boundProfilePackage','Encrypted BPP segments'],['Segmented delivery','Large profiles sent in chunks']],d:'LPA sends the BPP to the eUICC for decryption and installation.'},
{f:3,t:2,n:'ES10b.LoadBPP Result',a:[['profileInstallResult','Success / failure code'],['ICCID','Installed profile ICCID']],d:'eUICC decrypts, verifies integrity, and installs the profile.'},
{f:2,t:1,n:'ES9+.HandleNotification',a:[['notificationType','install / enable / delete'],['ICCID','Profile ICCID'],['resultCode','Success / failure']],d:'LPA sends installation notification to SM-DP+, forwarded to Operator via ES2+.HandleNotification.'}
]},

{f:3,t:2,n:'ES10b.AuthenticateServer Response',a:[['euiccSigned1','eUICC signed data'],['euiccSignature1','eUICC digital signature'],['euiccCertificate','eUICC certificate chain']],d:'eUICC authenticates the SM-DS and returns its own signed credentials for client authentication.'},
{f:2,t:1,n:'ES11.AuthenticateClient',a:[['euiccSigned1','eUICC signed response'],['euiccSignature1','eUICC signature']],d:'LPA sends eUICC credentials to SM-DS for mutual authentication.'},

'consumer-enable':{nodes:['LPA (Device)|Local Profile Asst.','eUICC|Embedded SIM','SM-DP+|Data Preparation+'],steps:[
{f:0,t:1,n:'ES10b.EnableProfile',a:[['ICCID or ISD-P AID','Target profile identifier'],['refreshFlag','Trigger REFRESH to modem']],d:'LPA sends enable command. The currently active profile will be automatically disabled.'},
{f:1,t:1,n:'Profile Switch (Internal)',a:[['Disable current','Active profile set to disabled'],['Enable target','Requested profile set to enabled'],['REFRESH','Proactive command to modem']],d:'eUICC performs the switch. Only one profile active at a time (pre-MEP). REFRESH notifies baseband.'},
{f:1,t:0,n:'ES10b.EnableProfile Result',a:[['resultCode','Success / error code']],d:'eUICC reports the result. Device re-attaches to network with the new profile.'},
{f:0,t:2,n:'ES9+.HandleNotification (enable)',a:[['Enable Notification','Sent to SM-DP+ of enabled profile'],['Disable Notification','Sent to SM-DP+ of previously active profile']],d:'LPA retrieves pending notifications (ES10b.RetrieveNotification) and sends them to the respective SM-DP+ servers. SM-DP+ forwards to Operators via ES2+.HandleNotification. Note: The symmetric Disable operation follows the same pattern in reverse \u2014 the LPA sends ES10b.DisableProfile, the eUICC switches profiles, and notifications are generated for both the disabled and newly enabled profiles.'}
]},
'consumer-disable':{nodes:['LPA (Device)|Local Profile Asst.','eUICC|Embedded SIM','SM-DP+|Data Preparation+'],steps:[
{f:0,t:1,n:'ES10b.DisableProfile',a:[['ICCID or ISD-P AID','Target profile identifier'],['refreshFlag','Trigger REFRESH to modem']],d:'LPA sends disable command for the currently enabled profile. If the profile\u2019s PPR includes pprDisableNotAllowed (bit 0), this operation will be rejected by the eUICC.'},
{f:1,t:1,n:'PPR Check & Profile Switch (Internal)',a:[['PPR validation','Check pprDisableNotAllowed flag'],['Disable target','Profile set to disabled state'],['REFRESH','Proactive command to modem']],d:'eUICC checks Profile Policy Rules. If pprDisableNotAllowed is set, the operation fails with an error. Otherwise, the profile is disabled and REFRESH notifies the baseband. The device loses network connectivity from this profile.'},
{f:1,t:0,n:'ES10b.DisableProfile Result',a:[['resultCode','Success / error code']],d:'eUICC reports the result. On success, the profile is now in the disabled state. On failure, check for PPR restrictions (subjectCode=8.8, reasonCode=3.4).'},
{f:0,t:2,n:'ES9+.HandleNotification (disable)',a:[['Disable Notification','Sent to SM-DP+ of disabled profile'],['seqNumber','Notification sequence number']],d:'LPA retrieves pending notifications and sends the disable notification to the SM-DP+. The SM-DP+ forwards to the Operator via ES2+.HandleNotification. The Operator can use ES2+.UpdatePolicyRules to change PPR flags if needed.'}
]},

'consumer-mep':{nodes:['LPA (Device)|Local Profile Asst.','eUICC (MEP)|Multi-Enabled Profiles','Baseband|Modem'],steps:[
{f:0,t:1,n:'ES10d.GetSIMSlotMapping',a:[['Request','Current port-to-profile mapping']],d:'LPA queries the current mapping of eSIM ports to installed profiles. MEP eUICCs have multiple logical ports (typically 2), each capable of having an enabled profile.'},
{f:1,t:0,n:'ES10d.GetSIMSlotMapping Response',a:[['slotMapping[]','Array of port-to-ICCID mappings'],['portCount','Number of available eSIM ports']],d:'eUICC returns the current slot mapping. Each entry maps a logical eSIM port number to the ICCID of the profile currently enabled on that port (or empty if no profile is enabled on that port).'},
{f:0,t:1,n:'ES10d.SetSIMSlotMapping',a:[['newMapping[]','Desired port-to-ICCID mapping'],['slotIndex','Target port number'],['ICCID','Profile to enable on this port']],d:'LPA instructs the eUICC to change the port mapping. This can enable a second profile on an unused port WITHOUT disabling the profile on the other port \u2014 the key difference from pre-MEP behavior.'},
{f:1,t:1,n:'Profile Enable on Port (Internal)',a:[['Port 1','Profile A remains enabled'],['Port 2','Profile B now enabled'],['Both active','Simultaneous network registration possible']],d:'eUICC enables the specified profile on the target port. Unlike pre-MEP, the existing profile on the other port is NOT automatically disabled. Both profiles can be active simultaneously.'},
{f:1,t:0,n:'ES10d.SetSIMSlotMapping Response',a:[['resultCode','Success / failure']],d:'eUICC confirms the mapping change.'},
{f:1,t:2,n:'REFRESH (with port context)',a:[['REFRESH command','Proactive command to modem'],['portIndex','Which port changed']],d:'eUICC sends a REFRESH proactive command to the baseband. The modem re-reads the profile on the affected port and initiates network registration. The other port\u2019s connection is unaffected.'},
{f:0,t:0,n:'Send Notifications',a:[['Enable notification','Sent to SM-DP+ of newly enabled profile'],['Via ES9+','HandleNotification']],d:'LPA sends the enable notification for the newly enabled profile. No disable notification is generated for the other port\u2019s profile since it remains enabled.'}
]},

/* ── IoT Flows ── */
'iot-direct-download':{nodes:['Operator|MNO / MVNO','SM-DP+|Data Preparation+','eIM|IoT Remote Manager','IPAd|IPA in Device','eUICC (IoT)|Embedded SIM (IoT)'],steps:[
{f:0,t:1,n:'ES2+.DownloadOrder',a:[['EID','Target eUICC'],['Profile Data','Subscription credentials'],['Service Config','APN, QoS, network slice']],d:'Operator orders a profile from the SM-DP+ for the target eUICC, providing the EID and subscription data.'},
{f:1,t:1,n:'BPP Generation (Internal)',a:[['boundProfilePackage','Encrypted BPP bound to target EID'],['Profile Metadata','Operator, profile class']],d:'SM-DP+ generates the Bound Profile Package (BPP), cryptographically bound to the target eUICC using the same mutual authentication and binding process as in Consumer RSP. The BPP can only be decrypted by the target eUICC.'},
{f:1,t:2,n:'BPP Delivery to eIM',a:[['Profile Package','Pre-encrypted BPP for target eUICC'],['EID','Target eUICC identifier'],['eIM Session Context','Delivery tracking']],d:'SM-DP+ delivers the pre-encrypted BPP to the eIM. The eIM\u2019s role is orchestration and secure delivery, not profile creation or encryption.'},
{f:2,t:3,n:'ESeim: DownloadProfile Command',a:[['Encrypted Profile Package','Bound to target eUICC'],['profileMetadata','Profile type, operator info'],['eimTransactionId','Session tracking']],d:'eIM sends the encrypted profile to IPA via ESeim (IP, CoAP, MQTT, or SMS).'},
{f:3,t:4,n:'Load Profile',a:[['Encrypted Profile Package','Forwarded to eUICC'],['INSTALL command','GlobalPlatform APDU']],d:'IPA forwards the encrypted profile to eUICC for installation.'},
{f:4,t:3,n:'Install Result',a:[['resultCode','Success / failure'],['ICCID','Installed profile']],d:'eUICC decrypts, verifies, installs, and reports the result.'},
{f:3,t:2,n:'ESeim: DownloadProfile Result',a:[['resultCode','Installation result'],['eimTransactionId','Matching transaction']],d:'IPA reports the installation result back to the eIM.'},
{f:2,t:0,n:'Notification (out-of-band)',a:[['Status','Profile installed successfully'],['EID / ICCID','Identifiers']],d:'eIM notifies the Operator that the profile is installed.'}
]},
'iot-indirect-download':{nodes:['Operator|MNO / MVNO','SM-DP+|Data Preparation+','eIM|IoT Remote Manager','IPAe (in eUICC)|Embedded IPA','eUICC (IoT)|Embedded SIM (IoT)'],steps:[
{f:0,t:1,n:'ES2+.DownloadOrder',a:[['EID','Target eUICC'],['ICCID','Profile identifier'],['profileType','Template reference']],d:'Operator orders a profile on SM-DP+ \u2014 same ES2+ interface as Consumer RSP.'},
{f:0,t:1,n:'ES2+.ConfirmOrder',a:[['ICCID','Confirm profile'],['IMSI / Ki / credentials','Subscription data']],d:'Operator confirms and provides subscription credentials.'},
{f:0,t:2,n:'Profile Ready Notification (ESop / out-of-band)',a:[['smdpAddress','SM-DP+ holding the profile'],['matchingId','Or EID for binding'],['ICCID','Profile identifier']],d:'Operator (or provisioning system) informs the eIM that a profile is ready on the SM-DP+ and provides the SM-DP+ address. This uses the ESop interface or an out-of-band mechanism. Without this, the eIM would not know which SM-DP+ to instruct the IPAe to contact.'},
{f:2,t:3,n:'ESeim: DownloadTrigger',a:[['smdpAddress','SM-DP+ to contact'],['activationCode','Or matchingId for binding']],d:'eIM instructs IPAe to download a profile from the specified SM-DP+.'},
{f:3,t:1,n:'ESipa: InitiateAuthentication',a:[['euiccChallenge','From eUICC'],['euiccInfo1','eUICC capabilities']],d:'IPAe (within the eUICC) contacts SM-DP+ and initiates mutual authentication via ESipa.'},
{f:1,t:3,n:'ESipa: Auth + BPP Delivery',a:[['boundProfilePackage','Encrypted profile'],['profileMetadata','Profile information']],d:'This step condenses a multi-message mutual authentication exchange identical to the Consumer ES9+ flow. The full protocol sequence is: ESipa.InitiateAuthentication \u2192 ESipa.AuthenticateClient \u2192 ESipa.GetBoundProfilePackage. For the detailed step-by-step breakdown, see the Consumer \u201cDownload \u2014 Activation Code\u201d flow (Steps 4\u201315). After successful authentication, SM-DP+ delivers the Bound Profile Package.',xref:true},
{f:3,t:4,n:'Load BPP',a:[['boundProfilePackage','Encrypted BPP']],d:'IPAe passes the BPP to the eUICC\u2019s profile installation function.'},
{f:4,t:3,n:'Install Result',a:[['resultCode','Success / failure'],['ICCID','Installed profile']],d:'eUICC installs the profile and reports the result to IPAe.'},
{f:3,t:2,n:'ESeim: Result Notification',a:[['resultCode','Installation status']],d:'IPAe reports back to the eIM, which can then notify the Operator.'}
]},
'iot-enable':{nodes:['eIM|IoT Remote Manager','IPA (IPAd or IPAe)|IoT Profile Assistant','eUICC (IoT)|Embedded SIM (IoT)'],steps:[
{f:0,t:1,n:'ESeim: EnableProfile',a:[['ICCID','Profile to enable'],['eimTransactionId','Transaction tracking']],d:'eIM sends an enable command to IPA. No end-user interaction needed.'},
{f:1,t:2,n:'EnableProfile APDU',a:[['ICCID','Target profile'],['refreshFlag','Trigger modem refresh']],d:'IPA forwards the enable command to the eUICC.'},
{f:2,t:1,n:'EnableResult',a:[['resultCode','Success / failure']],d:'eUICC enables the profile (disabling the current one) and reports the result.'},
{f:1,t:0,n:'ESeim: EnableProfile Result',a:[['resultCode','Result status'],['eimTransactionId','Matching transaction']],d:'IPA confirms the operation to the eIM.'}
]},
'iot-disable':{nodes:['eIM|IoT Remote Manager','IPA (IPAd or IPAe)|IoT Profile Assistant','eUICC (IoT)|Embedded SIM (IoT)'],steps:[
{f:0,t:1,n:'ESeim: DisableProfile',a:[['ICCID','Profile to disable'],['eimTransactionId','Transaction tracking']],d:'eIM sends a disable command to IPA. If the profile\u2019s PPR includes pprDisableNotAllowed (bit 0), the eUICC will reject the operation.'},
{f:1,t:2,n:'DisableProfile APDU',a:[['ICCID','Target profile'],['refreshFlag','Trigger modem refresh']],d:'IPA forwards the disable command to the eUICC.'},
{f:2,t:2,n:'PPR Check & Disable (Internal)',a:[['PPR validation','Check pprDisableNotAllowed flag'],['Profile state','Set to disabled if allowed']],d:'eUICC checks Profile Policy Rules. If pprDisableNotAllowed is set, the operation fails. Otherwise, the profile is disabled and the device loses network connectivity from this profile.'},
{f:2,t:1,n:'DisableResult',a:[['resultCode','Success / failure']],d:'eUICC reports the disable result. Failure may indicate a PPR restriction.'},
{f:1,t:0,n:'ESeim: DisableProfile Result',a:[['resultCode','Result status'],['eimTransactionId','Matching transaction']],d:'IPA confirms the operation to the eIM. The eIM can then notify the Operator. If the operation failed due to PPR, the Operator must update the PPR via ES2+.UpdatePolicyRules before retrying.'}
]},
'iot-delete':{nodes:['eIM|IoT Remote Manager','IPA (IPAd or IPAe)|IoT Profile Assistant','eUICC (IoT)|Embedded SIM (IoT)'],steps:[
{f:0,t:1,n:'ESeim: DeleteProfile',a:[['ICCID','Profile to delete'],['eimTransactionId','Transaction tracking']],d:'eIM commands profile deletion. Profile must be disabled first.'},
{f:1,t:2,n:'DeleteProfile APDU',a:[['ICCID','Target profile']],d:'IPA forwards the delete command.'},
{f:2,t:1,n:'DeleteResult',a:[['resultCode','Success / failure']],d:'eUICC permanently removes the profile and reclaims memory.'},
{f:1,t:0,n:'ESeim: DeleteProfile Result',a:[['resultCode','Result status']],d:'IPA confirms deletion to the eIM.'}
]},

/* ── IFPP Flows ── */
'ifpp-prep':{nodes:['Operator|MNO / MVNO','SM-DP+ (Profile Provider)|Data Preparation+','Factory System|Manufacturing'],steps:[
{f:0,t:1,n:'ES2+.DownloadOrder (IFPP)',a:[['EID','Target eUICC (known from EUM)'],['ICCID','Profile identifier'],['profileType','Profile template']],d:'Operator orders a profile for a specific eUICC whose EID is known from the eUICC manufacturer (EUM). The EID is typically known in advance because eUICCs are manufactured before device assembly.'},
{f:1,t:1,n:'BPP Pre-Generation',a:[['boundProfilePackage','Encrypted BPP bound to target EID'],['Profile Metadata','Operator, profile class']],d:'SM-DP+ generates the BPP in advance, cryptographically bound to the target eUICC. Unlike online provisioning, this happens before the eUICC is present \u2014 the binding uses the eUICC\u2019s public key from its certificate (obtained via the EUM or CI).'},
{f:1,t:2,n:'BPP Delivery (Secure Transfer)',a:[['boundProfilePackage','Pre-generated BPP'],['EID','Target eUICC'],['deliveryMetadata','Installation instructions']],d:'SM-DP+ securely delivers the pre-generated BPP to the Factory System. The transfer must use a secure channel. The Factory System stores it until the matching eUICC arrives on the production line.'}
]},

'ifpp-install':{nodes:['Factory System|Manufacturing','eUICC|Embedded SIM','SM-DP+ (Profile Provider)|Data Preparation+'],steps:[
{f:0,t:0,n:'EID Matching',a:[['EID','Read from eUICC on production line'],['BPP lookup','Find matching pre-generated BPP']],d:'Factory System reads the EID from the eUICC (via local interface) and matches it to a pre-generated BPP in its store. If no matching BPP exists, the eUICC is flagged for later online provisioning.'},
{f:0,t:1,n:'Load BPP (Local Interface)',a:[['boundProfilePackage','Pre-generated BPP'],['INSTALL','GlobalPlatform APDU']],d:'Factory System loads the BPP onto the eUICC via a local wired interface (not over-the-air). This is significantly faster than online provisioning \u2014 no network round-trips required.'},
{f:1,t:0,n:'Installation Result',a:[['resultCode','Success / failure'],['ICCID','Installed profile'],['EID','Confirmed eUICC']],d:'eUICC decrypts and installs the BPP. Reports the result to the Factory System. The profile is now installed but may be in disabled state until the device is deployed and activated. If installation fails (e.g., insufficient eUICC memory, BPP binding mismatch, or corrupt BPP data), the Factory System receives an error code.'},
{f:0,t:0,n:'Error Handling (if install failed)',a:[['errorCode','Specific failure reason'],['retryPolicy','Configurable retry logic'],['fallbackAction','Flag for online provisioning']],d:'If installation failed: (1) Insufficient memory \u2014 the eUICC may have residual profiles consuming space; the Factory System can attempt cleanup or flag the unit. (2) BPP binding mismatch \u2014 the BPP was bound to a different EID; verify the EID-to-BPP mapping. (3) Corrupt BPP \u2014 re-request from SM-DP+. (4) Retry logic \u2014 the Factory System may retry once before flagging the eUICC for manual review or deferred online provisioning. Production line throughput requirements typically limit retries to 1\u20132 attempts.',optional:true},
{f:0,t:2,n:'Installation Confirmation',a:[['EID','eUICC identifier'],['ICCID','Installed profile'],['resultCode','Success / failure']],d:'Factory System reports back to the SM-DP+ that the profile was successfully installed (or failed). This closes the loop and allows the SM-DP+ and Operator to update their records. On failure, the SM-DP+ can release the BPP for re-generation or reassignment.'}
]},

'ifpp-late-binding':{nodes:['Operator|MNO / MVNO','SM-DP+ (Profile Provider)|Data Preparation+','Factory System|Manufacturing','eUICC|Embedded SIM'],steps:[
{f:2,t:3,n:'Read EID',a:[['EID','Retrieved from eUICC']],d:'At device configuration time (which may be the end of the production line or a separate configuration station), the Factory System reads the EID. The target operator/profile may not have been known until this point \u2014 e.g., the shipping destination determines the operator.'},
{f:2,t:2,n:'\u2666 Configuration Decision (Late Binding)',a:[['Shipping Destination','Determines target operator/network'],['Configuration Rules','Business logic mapping destination to profile type'],['Operator ID','Selected based on rules']],d:'<b>DECISION POINT:</b> The Factory System (or upstream configuration system) determines which operator and profile type to assign. Selection logic examples: (1) <b>Geography-based</b> \u2014 US-bound devices get T-Mobile bootstrap, EU-bound get Deutsche Telekom. (2) <b>Customer order-based</b> \u2014 enterprise customer\u2019s order specifies the operator. (3) <b>Inventory-based</b> \u2014 available profile pool determines assignment. (4) <b>Hybrid</b> \u2014 combination of the above with fallback rules. This is the key advantage of late binding \u2014 the profile choice is deferred to the last possible moment, enabling a single manufacturing flow for global products.'},
{f:2,t:1,n:'Request BPP (Online)',a:[['EID','Target eUICC'],['profileType','Based on configuration rules'],['Operator ID','Determined by shipping destination']],d:'Factory System requests a BPP from the SM-DP+ at configuration time. This is a hybrid model \u2014 the BPP is generated on-demand but installed locally without the eUICC needing internet connectivity.'},
{f:1,t:2,n:'BPP Delivery',a:[['boundProfilePackage','Freshly generated BPP'],['ICCID','Assigned profile']],d:'SM-DP+ generates and delivers the BPP in near-real-time.'},
{f:2,t:3,n:'Load BPP (Local Interface)',a:[['boundProfilePackage','BPP'],['INSTALL','GlobalPlatform command']],d:'Factory System installs the BPP locally. Same fast local installation as the pre-generated path.'},
{f:3,t:2,n:'Installation Result',a:[['resultCode','Success / failure'],['ICCID','Installed profile']],d:'eUICC confirms installation.'},
{f:2,t:1,n:'Installation Confirmation',a:[['EID / ICCID','Installed profile details']],d:'Closes the loop with the SM-DP+.'}
]}
};

// ── 11. Glossary ──
// Format: {term:'Term', def:'Definition', spec:'Spec reference'}
const GLOSSARY=[
{term:'eUICC',def:'Embedded Universal Integrated Circuit Card \u2014 the physical eSIM chip soldered into the device. Unlike a removable SIM, it can be reprogrammed remotely.',spec:'All SGP specs'},
{term:'EID',def:'eUICC Identifier \u2014 a 32-digit globally unique identifier for a specific eUICC. Think of it as the serial number of the eSIM chip. Format: 89049032...',spec:'SGP.29 (current), SGP.02 Annex H (legacy)'},
{term:'ICCID',def:'Integrated Circuit Card Identifier \u2014 identifies a specific profile (subscription). This is the "SIM card number" equivalent. Typically 19\u201320 digits.',spec:'All SGP specs'},
{term:'IMSI',def:'International Mobile Subscriber Identity \u2014 the identity used by the network to identify the subscriber. Stored inside the profile.',spec:'All SGP specs'},
{term:'Profile',def:'A complete set of data (file system, applications, credentials, keys) equivalent to a physical SIM card, stored in an ISD-P on the eUICC.',spec:'All SGP specs'},
{term:'ISD-P',def:'Issuer Security Domain \u2013 Profile \u2014 a secure container (security domain) on the eUICC that holds one profile. Each profile gets its own ISD-P.',spec:'SGP.02, SGP.22'},
{term:'ISD-R',def:'Issuer Security Domain \u2013 Root \u2014 the root security domain on the eUICC that manages ISD-Ps (creates, deletes). Controlled by the eUICC OS.',spec:'SGP.02, SGP.22'},
{term:'BPP',def:'Bound Profile Package \u2014 an encrypted profile package cryptographically bound to a specific eUICC. Only the target eUICC can decrypt it.',spec:'SGP.22, SGP.32'},
{term:'SM-DP',def:'Subscription Manager \u2013 Data Preparation \u2014 M2M entity that prepares and encrypts profile packages.',spec:'SGP.02'},
{term:'SM-SR',def:'Subscription Manager \u2013 Secure Routing \u2014 M2M entity that manages the remote channel to the eUICC and routes profile operations.',spec:'SGP.02'},
{term:'SM-DP+',def:'Subscription Manager \u2013 Data Preparation Enhanced \u2014 Consumer/IoT entity that combines SM-DP and SM-SR functions. Handles both preparation and secure delivery.',spec:'SGP.22, SGP.32'},
{term:'SM-DS',def:'Subscription Manager \u2013 Discovery Server \u2014 acts as a rendezvous point where SM-DP+ servers register pending download events for LPAs to discover.',spec:'SGP.22'},
{term:'LPA',def:'Local Profile Assistant \u2014 software on the device that manages eUICC operations and provides the user interface. Has three sub-components: LPAd (in device), LPAe (in eUICC), LUIe (UI in eUICC).',spec:'SGP.22'},
{term:'eIM',def:'eSIM IoT Remote Manager \u2014 cloud-based management platform for IoT eUICC lifecycle operations. Replaces the need for an LPA on constrained devices.',spec:'SGP.32'},
{term:'IPA (IPAd / IPAe)',def:'IoT Profile Assistant \u2014 lightweight component that handles eUICC interaction in IoT RSP. IPAd runs on the IoT device itself. IPAe (IPA embedded in eUICC) is a software component within the eUICC itself that performs IPA functions internally — used for constrained devices that cannot host IPA as device-side software. Both variants perform the same functions.',spec:'SGP.32'},
{term:'IFPP',def:'In-Factory Profile Provisioning \u2014 loading eSIM profiles during device manufacturing, before deployment.',spec:'SGP.41/42'},
{term:'Activation Code',def:'A string containing the SM-DP+ address and matchingId, used to initiate profile download. Format: 1$<smdpAddress>$<matchingId> (optionally with OID and confirmation code). Often delivered as a QR code.',spec:'SGP.22'},
{term:'CI',def:'Certificate Issuer \u2014 the root of trust for the eSIM PKI. Issues certificates to SM-DP+, SM-DS, and eUICC. GSMA operates the primary CI.',spec:'SGP.22'},
{term:'PPR',def:'Profile Policy Rules \u2014 rules embedded in a profile that control what the user/LPA can do with it (e.g., disabling consent required, deletion not allowed).',spec:'SGP.22'},
{term:'SCP03t',def:'Secure Channel Protocol 03 (with T=0/1 transport) \u2014 the GlobalPlatform secure channel used for M2M remote communication between SM-SR and eUICC.',spec:'SGP.02'},
{term:'MEP',def:'Multiple Enabled Profiles \u2014 capability (SGP.22 v3.0+) allowing multiple profiles to be active simultaneously on different logical eSIM ports.',spec:'SGP.22 v3.x'},
{term:'ECASD',def:'eUICC Certificate Authority Security Domain \u2014 a security domain on the eUICC that holds the eUICC private key and certificates used for mutual authentication with SM-DP+ and SM-DS.',spec:'SGP.22, SGP.02'},
{term:'EIS',def:'eUICC Information Set \u2014 the data structure the SM-SR uses to manage an eUICC in M2M RSP. Contains the EID, ICCID of installed profiles, ISD-R key info, and eUICC capabilities.',spec:'SGP.02'},
{term:'RAT',def:'Rules Authorization Table \u2014 a table on the eUICC that controls which entity (SM-DP+, SM-DS, or Operator) is authorized to perform which operations on profiles.',spec:'SGP.22'},
{term:'SCP80/SCP81',def:'Secure Channel Protocol 80/81 \u2014 GlobalPlatform secure channel protocols used for M2M remote communication. SCP80 uses Binary SMS, SCP81 uses HTTPS/CAT_TP. Both establish encrypted channels between SM-SR and eUICC.',spec:'SGP.02'},
{term:'ES10d',def:'The LPA \u2194 eUICC interface for MEP (Multiple Enabled Profiles) port management, introduced in SGP.22 v3.x. Key operations: GetSIMSlotMapping (query current port-to-profile mapping) and SetSIMSlotMapping (change the mapping to enable profiles on specific eSIM ports).',spec:'SGP.22 v3.x'},
{term:'euiccInfo1',def:'A data structure retrieved via ES10a.GetEUICCInfo1 before mutual authentication begins. Contains basic eUICC capabilities: supported spec version (svn), CI PKIDs trusted for verification and signing. Used by the LPA to initiate authentication with the correct parameters.',spec:'SGP.22'},
{term:'euiccInfo2',def:'A data structure retrieved via ES10b during authentication (inside AuthenticateServer). Contains detailed eUICC information: free non-volatile memory, firmware version, installed profile count, PPR capabilities, extCardResource, and more. Richer than euiccInfo1 and only available after the authentication context is established.',spec:'SGP.22'},
{term:'Factory System',def:'A controlled manufacturing environment that receives pre-generated Bound Profile Packages (BPPs) from the SM-DP+ and installs them onto eUICCs via a local wired interface during device production. Operates within a secure facility with physical and logical access controls.',spec:'SGP.41/42'},
{term:'Profile Provider',def:'In the IFPP context, the entity (typically the SM-DP+) that prepares BPPs in advance and delivers them to the Factory System for local installation. The Profile Provider generates and cryptographically binds BPPs to target eUICCs before they are physically present on the production line.',spec:'SGP.41/42'},
{term:'Late Binding',def:'An IFPP provisioning model where the target operator and profile type are determined at the last possible moment during device manufacturing or configuration, rather than being predetermined. Enables a single manufacturing flow for global products where the shipping destination determines the operator.',spec:'SGP.41/42'}
];

function boot(){
  var mc=document.getElementById('mc');mc.innerHTML='';
  var allTabs=['esim101'].concat(Object.keys(SPEC),['troubleshoot','quickref','tools-id','tools-dbg','appendix']);
  allTabs.forEach(function(id){
    var d=document.createElement('div');
    d.className='pane'+(id===curTab?' on':'');d.id='p-'+id;
    d.setAttribute('role','tabpanel');d.setAttribute('aria-labelledby','tab-'+id);
    if(id==='esim101')d.innerHTML=esim101HTML();
    else if(id==='appendix')d.innerHTML=appxHTML();
    else if(id==='troubleshoot')d.innerHTML=tsHTML();
    else if(id==='quickref')d.innerHTML=qrHTML();
    else if(id==='tools-id')d.innerHTML=toolsIdHTML();
    else if(id==='tools-dbg')d.innerHTML=toolsDbgHTML();
    else d.innerHTML=specHTML(id);
    mc.appendChild(d);
  });
  bindUI();
  requestAnimationFrame(function(){drawArrows()});
  // Parse URL hash for deep linking
  if(window.location.hash){
    var parts=window.location.hash.substring(1).split('/');
    var tab=parts[0];
    if(tab){
      curTab=tab;
      document.querySelectorAll('.tbtn').forEach(function(t){
        t.classList.toggle('on',t.dataset.t===tab);
        t.setAttribute('aria-selected',String(t.dataset.t===tab));
      });
      document.querySelectorAll('.pane').forEach(function(p){
        p.classList.toggle('on',p.id==='p-'+tab);
      });
      if(parts[1]&&SPEC[tab]&&SPEC[tab].flows&&SPEC[tab].flows[parts[1]]){
        curFlow[tab]=parts[1];
        if(parts[2])curStep[parts[1]]=parseInt(parts[2],10);
      }
      refreshPane(tab);
      window.scrollTo(0,0);
    }
  }
}

/* ── Draw Arrows ── */
function drawArrows(){
  document.querySelectorAll('svg.marrow').forEach(function(svg){
    var fi=+svg.dataset.fi,ti=+svg.dataset.ti,nc=+svg.dataset.nc;
    var xref=svg.dataset.xref==='true';
    var isOptional=svg.dataset.optional==='true';
    var baseCol=svg.dataset.col;
    var col=isOptional?'#D97706':xref?getComputedStyle(document.documentElement).getPropertyValue('--tx3').trim():baseCol;
    var row=svg.parentElement;
    var w=row.offsetWidth,ht=row.offsetHeight;
    if(!w)return;
    svg.setAttribute('viewBox','0 0 '+w+' '+ht);
    svg.innerHTML='';
    var cw=w/nc;
    var self=fi===ti;
    var y=ht*0.72;

    if(self){
      var cx=(fi+.5)*cw;
      var r=22;
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M'+(cx-r)+' '+y+' C'+(cx-r)+' '+(y+r*2.5)+','+(cx+r)+' '+(y+r*2.5)+','+(cx+r)+' '+y);
      p.setAttribute('fill','none');p.setAttribute('stroke',col);p.setAttribute('stroke-width','2');
      if(xref||isOptional)p.setAttribute('stroke-dasharray','6,4');
      svg.appendChild(p);
      var a=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      a.setAttribute('points',(cx+r)+','+y+' '+(cx+r-4)+','+(y+8)+' '+(cx+r+4)+','+(y+8));
      a.setAttribute('fill',col);svg.appendChild(a);
    } else {
      var x1=(fi+.5)*cw,x2=(ti+.5)*cw;
      var l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y);l.setAttribute('x2',x2);l.setAttribute('y2',y);
      l.setAttribute('stroke',col);l.setAttribute('stroke-width','2');
      if(xref||isOptional)l.setAttribute('stroke-dasharray','6,4');
      svg.appendChild(l);
      var a=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      if(x2>x1) a.setAttribute('points',x2+','+y+' '+(x2-10)+','+(y-5)+' '+(x2-10)+','+(y+5));
      else a.setAttribute('points',x2+','+y+' '+(x2+10)+','+(y-5)+' '+(x2+10)+','+(y+5));
      a.setAttribute('fill',col);svg.appendChild(a);
    }
  });
}

function esim101HTML(){

  h+='<div class="ocard"><span class="badge">START HERE</span><h2 class="otitle">What Is eSIM?</h2>';
  h+='<div class="otxt">';
  h+='<p>A traditional SIM card is a small physical chip you insert into your phone. It contains your mobile subscription \u2014 your phone number, network credentials, and operator identity. If you switch carriers, you swap the card.</p>';
  h+='<p><b>eSIM (embedded SIM)</b> replaces the removable card with a chip soldered directly onto the device\'s circuit board during manufacturing. This chip \u2014 called an <b>eUICC (embedded Universal Integrated Circuit Card)</b> \u2014 can hold multiple downloadable <b>profiles</b>. Each profile is the digital equivalent of a physical SIM card: it contains the same subscription credentials (IMSI, Ki, OPc), network configuration (APN, PLMN), and applications.</p>';
  h+='<p>The key innovation: profiles can be <b>remotely downloaded, enabled, disabled, and deleted</b> over the air \u2014 no physical swap needed. This is called <b>Remote SIM Provisioning (RSP)</b>, and it\'s standardized by the GSMA.</p>';
