<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Implementation Pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Implementation Pipeline</text>
  <text class="sub" x="52" y="93">Production readiness from library to rollback</text>
  
  <path class="line" d="M135 370 H1040"/>
  <circle class="blue" cx="160" cy="370" r="52"/><text class="white small" x="160" y="364" text-anchor="middle">Library</text><text class="white tiny" x="160" y="384" text-anchor="middle">selection</text>
  <circle class="violet" cx="335" cy="370" r="52"/><text class="white small" x="335" y="364" text-anchor="middle">Test</text><text class="white tiny" x="335" y="384" text-anchor="middle">vectors</text>
  <circle class="blue" cx="510" cy="370" r="52"/><text class="white small" x="510" y="364" text-anchor="middle">Metadata</text><text class="white tiny" x="510" y="384" text-anchor="middle">schema</text>
  <circle class="violet" cx="685" cy="370" r="52"/><text class="white small" x="685" y="364" text-anchor="middle">HSM/KMS</text><text class="white tiny" x="685" y="384" text-anchor="middle">custody</text>
  <circle class="blue" cx="860" cy="370" r="52"/><text class="white small" x="860" y="364" text-anchor="middle">Telemetry</text><text class="white tiny" x="860" y="384" text-anchor="middle">alerts</text>
  <circle class="violet" cx="1035" cy="370" r="52"/><text class="white small" x="1035" y="364" text-anchor="middle">Rollback</text><text class="white tiny" x="1035" y="384" text-anchor="middle">control</text>
  <rect class="soft" x="175" y="170" width="850" height="92" rx="24"/><text class="label" x="600" y="207" text-anchor="middle">A strong algorithm still fails if integration is weak</text><text class="small" x="600" y="236" text-anchor="middle">Randomness, side channels, sizes, parsers, and error behavior must be tested.</text>
  <path class="dash" d="M600 262 V320"/>

</svg>