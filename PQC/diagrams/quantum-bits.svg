<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="A classical bit compared with a qubit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef6ff"/><stop offset="1" stop-color="#f6fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1657a0"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6244c5"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .t{font:900 34px Arial,Helvetica,sans-serif;fill:#0f172a}
      .s{font:600 18px Arial,Helvetica,sans-serif;fill:#4d5d74}
      .lab{font:800 22px Arial,Helvetica,sans-serif;fill:#0f172a}
      .w{fill:#fff}
      .cap{font:700 15px Arial,Helvetica,sans-serif;fill:#4d5d74}
    </style>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="150" fill="#0e766e" opacity=".10"/>
  <circle cx="90" cy="680" r="180" fill="#1657a0" opacity=".10"/>
  <text class="t" x="60" y="70">Classical bit vs qubit</text>
  <text class="s" x="60" y="102">A bit is one definite value. A qubit is a blend until measured.</text>

  <!-- Classical bit -->
  <rect x="90" y="170" width="440" height="470" rx="26" class="w" filter="url(#sh)"/>
  <text class="lab" x="310" y="220" text-anchor="middle">Classical bit</text>
  <text class="cap" x="310" y="248" text-anchor="middle">a coin lying flat: heads or tails</text>
  <circle cx="220" cy="400" r="70" fill="url(#blue)"/>
  <text class="w" x="220" y="415" text-anchor="middle" font-family="Arial" font-size="52" font-weight="900">0</text>
  <text class="cap" x="220" y="500" text-anchor="middle">or</text>
  <circle cx="400" cy="400" r="70" fill="url(#blue)"/>
  <text class="w" x="400" y="415" text-anchor="middle" font-family="Arial" font-size="52" font-weight="900">1</text>
  <text class="cap" x="310" y="600" text-anchor="middle">exactly one value at any moment</text>

  <!-- Qubit -->
  <rect x="670" y="170" width="440" height="470" rx="26" class="w" filter="url(#sh)"/>
  <text class="lab" x="890" y="220" text-anchor="middle">Qubit</text>
  <text class="cap" x="890" y="248" text-anchor="middle">a spinning coin: a mix of 0 and 1</text>
  <ellipse cx="890" cy="400" rx="120" ry="46" fill="none" stroke="#6244c5" stroke-width="4" opacity=".5"/>
  <ellipse cx="890" cy="400" rx="46" ry="120" fill="none" stroke="#0e7490" stroke-width="4" opacity=".5"/>
  <circle cx="890" cy="400" r="80" fill="url(#violet)"/>
  <text class="w" x="890" y="392" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900">0</text>
  <text class="w" x="890" y="392" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900" dx="0" dy="0"> </text>
  <text class="w" x="890" y="428" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900">+ 1</text>
  <text class="cap" x="890" y="600" text-anchor="middle">superposition until you measure it</text>

  <rect x="90" y="668" width="1020" height="4" rx="2" fill="url(#blue)" opacity=".4"/>
</svg>
