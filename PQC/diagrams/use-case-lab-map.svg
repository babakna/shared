<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Use-Case Lab Map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Use-Case Lab Map</text>
  <text class="sub" x="52" y="93">Apply the same PQC questions to different systems</text>
  
  <circle class="blue" cx="600" cy="350" r="98"/><text class="white label" x="600" y="342" text-anchor="middle">PQC</text><text class="white small" x="600" y="370" text-anchor="middle">decision lens</text>
  <g><rect class="box" x="95" y="150" width="230" height="95" rx="22"/><text class="label" x="210" y="190" text-anchor="middle">Web/API</text><text class="small" x="210" y="218" text-anchor="middle">hybrid TLS path</text></g>
  <g><rect class="box" x="485" y="120" width="230" height="95" rx="22"/><text class="label" x="600" y="160" text-anchor="middle">Cloud mesh</text><text class="small" x="600" y="188" text-anchor="middle">workload identity</text></g>
  <g><rect class="box" x="875" y="150" width="230" height="95" rx="22"/><text class="label" x="990" y="190" text-anchor="middle">Messaging</text><text class="small" x="990" y="218" text-anchor="middle">transport vs E2E</text></g>
  <g><rect class="box" x="95" y="490" width="230" height="95" rx="22"/><text class="label" x="210" y="530" text-anchor="middle">Data at rest</text><text class="small" x="210" y="558" text-anchor="middle">key wrapping</text></g>
  <g><rect class="box" x="485" y="535" width="230" height="95" rx="22"/><text class="label" x="600" y="575" text-anchor="middle">Firmware</text><text class="small" x="600" y="603" text-anchor="middle">long-lived verifier</text></g>
  <g><rect class="box" x="875" y="490" width="230" height="95" rx="22"/><text class="label" x="990" y="530" text-anchor="middle">Device fleet</text><text class="small" x="990" y="558" text-anchor="middle">model capability</text></g>
  <path class="line2" d="M320 245 L510 305"/><path class="line2" d="M600 215 V250"/><path class="line2" d="M880 245 L690 305"/><path class="line2" d="M320 500 L510 395"/><path class="line2" d="M600 535 V452"/><path class="line2" d="M880 500 L690 395"/>

</svg>