<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Cryptographic Building Blocks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Cryptographic Building Blocks</text>
  <text class="sub" x="52" y="93">Different primitives solve different jobs</text>
  
  <rect class="box" x="95" y="145" width="210" height="120" rx="24"/><text class="label" x="200" y="193" text-anchor="middle">Hash</text><path d="M155 222 h90" stroke="#174e86" stroke-width="8" stroke-linecap="round"/><text class="small" x="200" y="248" text-anchor="middle">fingerprint</text>
  <rect class="box" x="365" y="145" width="210" height="120" rx="24"/><text class="label" x="470" y="193" text-anchor="middle">MAC</text><path d="M430 220 l25 20 l55 -55" stroke="#0e766e" stroke-width="9" fill="none" stroke-linecap="round"/><text class="small" x="470" y="248" text-anchor="middle">shared-secret integrity</text>
  <rect class="box" x="635" y="145" width="210" height="120" rx="24"/><text class="label" x="740" y="193" text-anchor="middle">Signature</text><path d="M700 225 q40 -55 85 0" stroke="#5b4cc4" stroke-width="8" fill="none"/><text class="small" x="740" y="248" text-anchor="middle">public verification</text>
  <rect class="box" x="905" y="145" width="210" height="120" rx="24"/><text class="label" x="1010" y="193" text-anchor="middle">Certificate</text><rect x="967" y="212" width="86" height="32" rx="8" fill="#ecf3fb" stroke="#174e86"/><text class="small" x="1010" y="248" text-anchor="middle">identity binding</text>
  <path class="line" d="M205 330 H410"/><path class="line" d="M515 330 H720"/><path class="line" d="M825 330 H1010"/>
  <rect class="violet" x="150" y="390" width="300" height="130" rx="28"/><text class="white label" x="300" y="440" text-anchor="middle">Public-key layer</text><text class="white small" x="300" y="470" text-anchor="middle">key exchange + signatures</text>
  <rect class="blue" x="750" y="390" width="300" height="130" rx="28"/><text class="white label" x="900" y="440" text-anchor="middle">Symmetric layer</text><text class="white small" x="900" y="470" text-anchor="middle">bulk encryption after keys exist</text>
  <path class="line2" d="M455 455 H745"/>

</svg>