<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Research and Governance Loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Research and Governance Loop</text>
  <text class="sub" x="52" y="93">Standards updates and advisories feed back into architecture decisions</text>
  
  <path d="M600 160 C840 160 1010 300 1010 450 C1010 600 840 655 600 655 C360 655 190 600 190 450 C190 300 360 160 600 160" stroke="#174e86" stroke-width="7" fill="none" marker-end="url(#arrow)"/>
  <circle class="blue" cx="600" cy="155" r="60"/><text class="white small" x="600" y="148" text-anchor="middle">Research</text><text class="white tiny" x="600" y="168" text-anchor="middle">signals</text>
  <circle class="violet" cx="985" cy="425" r="60"/><text class="white small" x="985" y="418" text-anchor="middle">Impact</text><text class="white tiny" x="985" y="438" text-anchor="middle">assessment</text>
  <circle class="blue" cx="600" cy="650" r="60"/><text class="white small" x="600" y="643" text-anchor="middle">Roadmap</text><text class="white tiny" x="600" y="663" text-anchor="middle">update</text>
  <circle class="violet" cx="215" cy="425" r="60"/><text class="white small" x="215" y="418" text-anchor="middle">Govern</text><text class="white tiny" x="215" y="438" text-anchor="middle">exceptions</text>
  <rect class="box" x="410" y="300" width="380" height="160" rx="30"/><text class="label" x="600" y="350" text-anchor="middle">Architecture review</text><text class="small" x="600" y="382" text-anchor="middle">data flows, trust flows, key custody</text><text class="small" x="600" y="412" text-anchor="middle">owners, blockers, evidence, decisions</text>

</svg>