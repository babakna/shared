<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Quantum Threat Timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Quantum Threat Timeline</text>
  <text class="sub" x="52" y="93">Why migration starts before a cryptographically relevant quantum computer exists</text>
  
  <path class="line" d="M120 395 H1040"/>
  <circle class="blue" cx="150" cy="395" r="42"/><text class="white label" x="150" y="402" text-anchor="middle">Now</text>
  <circle class="violet" cx="420" cy="395" r="44"/><text class="white label" x="420" y="390" text-anchor="middle">Harvest</text><text class="white tiny" x="420" y="410" text-anchor="middle">ciphertext</text>
  <circle class="blue" cx="700" cy="395" r="44"/><text class="white label" x="700" y="390" text-anchor="middle">Migrate</text><text class="white tiny" x="700" y="410" text-anchor="middle">systems</text>
  <circle class="violet" cx="980" cy="395" r="44"/><text class="white label" x="980" y="390" text-anchor="middle">Q-day</text><text class="white tiny" x="980" y="410" text-anchor="middle">risk</text>
  <rect class="box" x="95" y="170" width="260" height="120" rx="24"/><text class="label" x="225" y="218" text-anchor="middle">Data lifetime</text><text class="small" x="225" y="250" text-anchor="middle">How long secrecy matters</text>
  <rect class="box" x="470" y="170" width="260" height="120" rx="24"/><text class="label" x="600" y="218" text-anchor="middle">Migration time</text><text class="small" x="600" y="250" text-anchor="middle">Years for hard systems</text>
  <rect class="box" x="845" y="170" width="260" height="120" rx="24"/><text class="label" x="975" y="218" text-anchor="middle">Risk window</text><text class="small" x="975" y="250" text-anchor="middle">Lifetime exceeds migration</text>
  <path class="dash" d="M225 292 C300 345 335 360 378 380"/><path class="dash" d="M600 292 C640 330 665 350 690 380"/><path class="dash" d="M975 292 V348"/>
  <rect class="soft" x="130" y="505" width="940" height="82" rx="20"/><text class="label" x="600" y="540" text-anchor="middle">Harvest-now-decrypt-later is a present-day capture problem</text><text class="small" x="600" y="568" text-anchor="middle">The impact appears later, but the exposure may already be happening today.</text>

</svg>