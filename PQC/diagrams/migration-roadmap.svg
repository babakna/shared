<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Enterprise Migration Roadmap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">Enterprise Migration Roadmap</text>
  <text class="sub" x="52" y="93">A staged program with evidence and feedback loops</text>
  
  <path class="line" d="M105 350 C260 210 395 490 545 350 S835 210 1045 350"/>
  <circle class="blue" cx="120" cy="350" r="45"/><text class="white tiny" x="120" y="346" text-anchor="middle">1</text><text class="white tiny" x="120" y="362" text-anchor="middle">Inventory</text>
  <circle class="violet" cx="300" cy="285" r="45"/><text class="white tiny" x="300" y="281" text-anchor="middle">2</text><text class="white tiny" x="300" y="297" text-anchor="middle">Risk</text>
  <circle class="blue" cx="480" cy="415" r="45"/><text class="white tiny" x="480" y="411" text-anchor="middle">3</text><text class="white tiny" x="480" y="427" text-anchor="middle">Vendors</text>
  <circle class="violet" cx="660" cy="285" r="45"/><text class="white tiny" x="660" y="281" text-anchor="middle">4</text><text class="white tiny" x="660" y="297" text-anchor="middle">Pilot</text>
  <circle class="blue" cx="840" cy="415" r="45"/><text class="white tiny" x="840" y="411" text-anchor="middle">5</text><text class="white tiny" x="840" y="427" text-anchor="middle">Rollout</text>
  <circle class="violet" cx="1040" cy="350" r="45"/><text class="white tiny" x="1040" y="346" text-anchor="middle">6</text><text class="white tiny" x="1040" y="362" text-anchor="middle">Monitor</text>
  <rect class="soft" x="180" y="535" width="840" height="78" rx="20"/><text class="label" x="600" y="568" text-anchor="middle">Exceptions are not ignored; they loop back into governance</text><text class="small" x="600" y="595" text-anchor="middle">Every exception needs owner, expiration, compensating control, and remediation path.</text>
  <path class="dash" d="M1015 520 C850 635 350 635 180 520"/>

</svg>