<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="5G/6G, SIM/eSIM, IoT Ecosystem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#174e86"/><stop offset="1" stop-color="#0e766e"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b4cc4"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#174e86"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/></filter>
    <style>
      .title{font:900 34px Arial,sans-serif;fill:#0f172a}
      .sub{font:600 18px Arial,sans-serif;fill:#526176}
      .label{font:800 18px Arial,sans-serif;fill:#0f172a}
      .small{font:600 14px Arial,sans-serif;fill:#526176}
      .tiny{font:700 12px Arial,sans-serif;fill:#526176}
      .white{fill:#fff}
      .line{stroke:#174e86;stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .line2{stroke:#0e766e;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-dasharray:10 9;marker-end:url(#arrow);stroke-linecap:round}
      .box{fill:#fff;stroke:#dbe6f4;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#ecf3fb;stroke:#dbe6f4;stroke-width:2}
      .blue{fill:url(#blue);filter:url(#shadow)}
      .violet{fill:url(#violet);filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="160" fill="#0e766e" opacity=".10"/>
  <circle cx="120" cy="625" r="185" fill="#174e86" opacity=".10"/>
  <text class="title" x="52" y="62">5G/6G, SIM/eSIM, IoT Ecosystem</text>
  <text class="sub" x="52" y="93">PQC touches many trust relationships beyond ordinary web TLS</text>
  
  <rect class="box" x="70" y="300" width="180" height="120" rx="24"/><text class="label" x="160" y="348" text-anchor="middle">Device</text><text class="small" x="160" y="378" text-anchor="middle">UE / IoT / gateway</text>
  <circle class="blue" cx="350" cy="360" r="70"/><text class="white label" x="350" y="350" text-anchor="middle">SIM</text><text class="white small" x="350" y="378" text-anchor="middle">eSIM profile</text>
  <rect class="box" x="520" y="135" width="230" height="110" rx="24"/><text class="label" x="635" y="180" text-anchor="middle">Provisioning</text><text class="small" x="635" y="210" text-anchor="middle">profile download + lifecycle</text>
  <rect class="box" x="520" y="310" width="230" height="110" rx="24"/><text class="label" x="635" y="355" text-anchor="middle">5G/6G Core</text><text class="small" x="635" y="385" text-anchor="middle">network functions + APIs</text>
  <rect class="box" x="520" y="485" width="230" height="110" rx="24"/><text class="label" x="635" y="530" text-anchor="middle">Firmware</text><text class="small" x="635" y="560" text-anchor="middle">signing + update trust</text>
  <rect class="box" x="900" y="200" width="220" height="115" rx="24"/><text class="label" x="1010" y="248" text-anchor="middle">Roaming</text><text class="small" x="1010" y="278" text-anchor="middle">partner trust</text>
  <rect class="box" x="900" y="430" width="220" height="115" rx="24"/><text class="label" x="1010" y="478" text-anchor="middle">Vendors</text><text class="small" x="1010" y="508" text-anchor="middle">equipment + roadmap</text>
  <path class="line" d="M250 360 H280"/><path class="line" d="M420 360 H515"/><path class="line2" d="M420 335 C470 250 510 205 520 195"/><path class="line2" d="M420 390 C470 475 510 535 520 540"/>
  <path class="line" d="M750 365 H895"/><path class="line2" d="M750 190 C820 180 865 210 900 250"/><path class="line2" d="M750 540 C820 555 870 520 900 490"/>

</svg>