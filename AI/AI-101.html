<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Essentials — Your Interactive Guide to Understanding AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563EB;--primary-light:#3B82F6;--primary-dark:#1D4ED8;
  --accent:#7C3AED;--accent-light:#8B5CF6;
  --secondary:#06B6D4;
  --success:#10B981;--warning:#F59E0B;--error:#EF4444;
  --bg-body:#F8FAFC;--bg-card:#FFFFFF;--bg-muted:#F1F5F9;--bg-highlight:#EFF6FF;
  --tx-primary:#0F172A;--tx-secondary:#475569;--tx-muted:#94A3B8;
  --border:#E2E8F0;--border-active:#2563EB;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --gradient-primary:linear-gradient(135deg,#2563EB,#7C3AED);
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',sans-serif;
  --font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-body);color:var(--tx-secondary);line-height:1.6;font-size:16px}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}

.hdr{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:38px;height:38px;background:var(--gradient-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ico svg{width:22px;height:22px;fill:#fff}
.hdr-t{font-size:20px;font-weight:700;color:var(--tx-primary)}
.hdr-s{font-size:12px;color:var(--tx-secondary);margin-top:1px}
.hdr-s .by{color:var(--accent);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--bg-muted);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--tx-secondary);flex-shrink:0}
.hdr-btn:hover{border-color:var(--primary);color:var(--primary)}
.hdr-btn svg{width:18px;height:18px}
.hdr.compact .hdr-s{display:none}

.trail-wrap{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:61px;z-index:99;display:none}
.trail-wrap.vis{display:block}
.trail{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:0;position:relative}
.trail-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--border);z-index:0;transform:translateY(-8px)}
.trail-stop{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;cursor:pointer;flex:1;min-width:0;padding:0 4px}
.trail-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);transition:all .3s;flex-shrink:0}
.trail-stop.done .trail-dot{background:var(--primary);border-color:var(--primary)}
.trail-stop.active .trail-dot{background:var(--accent);border-color:var(--accent);width:20px;height:20px;box-shadow:0 0 0 4px rgba(124,58,237,0.2);animation:pulse 2s infinite}
.trail-lbl{font-size:10px;color:var(--tx-muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;font-weight:600}
.trail-stop.done .trail-lbl,.trail-stop.active .trail-lbl{color:var(--tx-secondary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(124,58,237,0.2)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0.1)}}

.search-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.search-backdrop.open{display:block}
.search-overlay{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);width:92%;max-width:620px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:201;max-height:500px;overflow:hidden}
.search-overlay.open{display:block}
.search-overlay input{width:100%;padding:16px 20px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--tx-primary);font-family:var(--font-body);outline:none}
.search-results{max-height:420px;overflow-y:auto;padding:8px 0}
.search-item{padding:10px 20px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-highlight)}
.search-cat{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.search-txt{font-size:14px;color:var(--tx-primary);margin-top:2px}
.search-txt mark{background:rgba(37,99,235,0.15);color:var(--primary);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;color:var(--tx-muted);font-size:14px}

.main{max-width:960px;margin:0 auto;padding:24px}
.pane{display:none}.pane.on{display:block}

.hero{text-align:center;padding:80px 20px 60px}
.hero-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:12px;padding:6px 18px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}
.hero h1{font-size:42px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;line-height:1.2}
.hero p{font-size:18px;color:var(--tx-secondary);max-width:560px;margin:0 auto 32px;line-height:1.7}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:700px;margin:0 auto 40px}
.hero-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.hero-stat-n{font-size:28px;font-weight:800;color:var(--primary)}
.hero-stat-l{font-size:13px;color:var(--tx-muted);margin-top:4px}
.btn-start{display:inline-flex;align-items:center;gap:8px;background:var(--gradient-primary);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-md)}
.btn-start:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}

.mod-hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.mod-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ico svg{width:26px;height:26px;fill:#fff}
.mod-title{font-size:24px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mod-desc{font-size:14px;color:var(--tx-secondary);margin-top:4px}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;margin-bottom:20px}
.card:hover{box-shadow:var(--shadow-md)}
.card-title{font-size:17px;font-weight:600;color:var(--tx-primary);margin-bottom:8px}
.card-text{font-size:14px;color:var(--tx-secondary);line-height:1.7}

.sec-title{font-size:20px;font-weight:700;color:var(--tx-primary);margin:32px 0 16px;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';width:4px;height:24px;background:var(--gradient-primary);border-radius:2px;flex-shrink:0}

.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}

.flip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.flip-card{perspective:800px;height:240px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:20px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.flip-front{background:var(--bg-card)}
.flip-back{background:var(--bg-highlight);transform:rotateY(180deg);overflow-y:auto}
.flip-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.flip-front .flip-label{color:var(--error)}
.flip-back .flip-label{color:var(--success)}
.flip-txt{font-size:13px;color:var(--tx-primary);line-height:1.6}
.flip-hint{font-size:11px;color:var(--tx-muted);margin-top:auto;text-align:right}

.timeline-wrap{overflow-x:auto;padding:20px 0;margin-bottom:24px}
.timeline{display:flex;align-items:flex-start;gap:0;min-width:700px;position:relative;padding:0 20px}
.timeline::before{content:'';position:absolute;top:20px;left:20px;right:20px;height:3px;background:var(--gradient-primary);border-radius:2px}
.tl-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:90px}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--primary);border:3px solid var(--bg-card);box-shadow:0 0 0 2px var(--primary);margin-bottom:10px;position:relative;z-index:1}
.tl-year{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:4px}
.tl-text{font-size:11px;color:var(--tx-secondary);text-align:center;line-height:1.4;max-width:110px}

.quiz-section{margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.quiz-card{background:var(--bg-card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:0 12px 12px 0;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.quiz-card.correct{border-left-color:var(--success);background:rgba(16,185,129,0.03)}
.quiz-card.incorrect{border-left-color:var(--error);background:rgba(239,68,68,0.03)}
.quiz-q{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:12px}
.quiz-q .q-num{color:var(--accent);margin-right:6px}
.quiz-q .q-type{font-size:11px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;display:inline-block;background:var(--bg-muted);padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--tx-primary)}
.quiz-opt:hover{border-color:var(--primary-light);background:var(--bg-highlight)}
.quiz-opt.selected{border-color:var(--primary);background:var(--bg-highlight)}
.quiz-opt.right{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}
.quiz-opt.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:var(--error);text-decoration:line-through}
.quiz-opt .opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all .2s}
.quiz-opt.selected .opt-marker{border-color:var(--primary);background:var(--primary);color:#fff}
.quiz-opt.right .opt-marker{border-color:var(--success);background:var(--success);color:#fff}
.quiz-opt.wrong .opt-marker{border-color:var(--error);background:var(--error);color:#fff}
.quiz-fb{display:none;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;margin-top:8px}
.quiz-fb.vis{display:block}
.quiz-fb.correct{background:rgba(16,185,129,0.08);color:#065F46;border:1px solid rgba(16,185,129,0.2)}
.quiz-fb.incorrect{background:rgba(239,68,68,0.08);color:#991B1B;border:1px solid rgba(239,68,68,0.2)}
.quiz-check{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .2s}
.quiz-check:hover{background:var(--primary-dark)}
.quiz-check:disabled{background:var(--tx-muted);cursor:default}

.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:2px solid var(--border)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);border:none;transition:all .2s}
.nav-btn.primary{background:var(--primary);color:#fff}.nav-btn.primary:hover{background:var(--primary-dark)}
.nav-btn.secondary{background:var(--bg-card);color:var(--primary);border:1px solid var(--border)}.nav-btn.secondary:hover{border-color:var(--primary)}

.concept-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:default}
.concept-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.concept-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.concept-ico svg{width:24px;height:24px;fill:#fff}
.concept-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.concept-desc{font-size:13px;color:var(--tx-secondary);line-height:1.6}

.deeper{margin:16px 0;border-left:3px solid var(--accent-light);padding-left:16px}
.deeper summary{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px}
.deeper summary::before{content:'▶';font-size:10px;transition:transform .2s}
.deeper[open] summary::before{transform:rotate(90deg)}
.deeper summary::-webkit-details-marker{display:none}
.deeper-body{font-size:14px;color:var(--tx-secondary);line-height:1.7;padding:8px 0}

.case-study{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.case-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:11px;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.case-title{font-size:17px;font-weight:700;color:var(--tx-primary);margin-bottom:12px}
.case-body dt{font-size:13px;font-weight:700;color:var(--primary);margin-top:12px}
.case-body dd{font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-left:0;margin-top:4px}

.sim-area{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.sim-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sim-title svg{width:20px;height:20px}

.callout{background:var(--bg-highlight);border:1px solid rgba(37,99,235,0.2);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;color:var(--tx-secondary);line-height:1.7}
.callout.warning{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);border-left-color:var(--warning)}
.callout.success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);border-left-color:var(--success)}

.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.badge-ml{background:rgba(37,99,235,0.1);color:var(--primary)}
.badge-genai{background:rgba(124,58,237,0.1);color:var(--accent)}
.badge-prompt{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-infra{background:rgba(245,158,11,0.1);color:var(--warning)}
.badge-ethics{background:rgba(239,68,68,0.1);color:var(--error)}
.badge-workflow{background:rgba(16,185,129,0.1);color:var(--success)}
.badge-proto{background:rgba(79,70,229,0.1);color:#4F46E5}

.classifier{display:flex;flex-direction:column;gap:16px}
.ticket-pool{display:flex;flex-wrap:wrap;gap:8px;min-height:60px;padding:12px;background:var(--bg-muted);border-radius:10px;border:2px dashed var(--border)}
.ticket{padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--tx-primary);cursor:grab;transition:all .2s;user-select:none}
.ticket:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.ticket.dragging{opacity:.4}
.ticket.selected{border-color:var(--primary);background:var(--bg-highlight);box-shadow:0 0 0 2px var(--primary)}
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bucket{min-height:100px;padding:12px;background:var(--bg-muted);border-radius:10px;border:2px dashed var(--border);transition:all .2s}
.bucket.over{border-color:var(--primary);background:var(--bg-highlight)}
.bucket-label{font-size:12px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;text-align:center}
.bucket .ticket{cursor:default;font-size:12px}
.train-btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
.train-btn:disabled{background:var(--tx-muted);cursor:default}
.train-btn:not(:disabled):hover{background:var(--primary-dark)}
.prediction-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pred-text{font-size:13px;color:var(--tx-primary);flex:1}
.pred-result{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}

.token-input{width:100%;padding:12px 16px;font-size:15px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);color:var(--tx-primary);background:var(--bg-card);transition:border-color .2s}
.token-input:focus{outline:none;border-color:var(--primary)}
.token-display{display:flex;flex-wrap:wrap;gap:4px;margin:16px 0;min-height:40px}
.token-chip{padding:4px 8px;border-radius:4px;font-size:13px;font-family:var(--font-mono);font-weight:500}
.token-chip:nth-child(odd){background:rgba(37,99,235,0.1);color:var(--primary)}
.token-chip:nth-child(even){background:rgba(124,58,237,0.1);color:var(--accent)}
.ctx-bar{height:8px;background:var(--bg-muted);border-radius:4px;overflow:hidden;margin:8px 0}
.ctx-fill{height:100%;background:var(--gradient-primary);border-radius:4px;transition:width .3s}
.ctx-info{display:flex;justify-content:space-between;font-size:12px;color:var(--tx-muted)}
.ctx-select{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.ctx-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.ctx-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ctx-btn:hover:not(.active){border-color:var(--primary)}

.temp-slider{width:100%;margin:12px 0;accent-color:var(--primary);height:6px}
.temp-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--tx-muted);margin-bottom:8px}
.temp-output{background:var(--bg-muted);border-radius:8px;padding:16px;font-size:14px;color:var(--tx-primary);line-height:1.7;font-style:italic;min-height:60px;border-left:3px solid var(--accent)}
.temp-val{text-align:center;font-size:28px;font-weight:800;color:var(--primary);margin:8px 0}

.flow-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:24px 0}
.flow-ctrl{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg-muted);flex-wrap:wrap}
.flow-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx-secondary);transition:all .15s;font-family:var(--font-body)}
.flow-btn:hover{border-color:var(--primary);color:var(--primary)}
.flow-btn.pri{background:var(--primary);border-color:var(--primary);color:#fff}.flow-btn.pri:hover{background:var(--primary-dark)}
.flow-step-ind{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx-muted)}
.flow-scroll{overflow-x:auto;overflow-y:auto;max-height:500px}
.flow-inner{min-width:600px}
.flow-nodes{display:flex;border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:0;z-index:5;background:var(--bg-card)}
.flow-ncol{flex:1;text-align:center;min-width:110px;padding:0 6px}
.flow-nbox{display:inline-block;border:1px solid var(--border);border-top:3px solid;border-radius:6px;padding:6px 10px;background:var(--bg-muted);min-width:90px}
.flow-nname{font-size:12px;font-weight:700;color:var(--tx-primary)}.flow-ndesc{font-size:10px;color:var(--tx-muted);margin-top:2px}
.flow-msgs{position:relative;padding:0 0 16px}
.flow-mrow{position:relative;min-height:90px;transition:opacity .35s;padding:6px 0}
.flow-mrow.dim{opacity:.12}.flow-mrow.vis{opacity:1}
.flow-mrow.cur .flow-mlabel{box-shadow:0 0 0 2px var(--primary),0 0 14px rgba(37,99,235,0.25)}
.flow-lifelines{display:flex;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.flow-ll-col{flex:1;display:flex;justify-content:center;min-width:130px}
.flow-ll{width:0;border-left:2px dashed var(--border)}
.flow-arrow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
.flow-mlwrap{position:absolute;z-index:3;top:6px;transform:translateX(-50%);pointer-events:auto}
.flow-mlabel{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;text-align:center;max-width:260px;transition:box-shadow .3s}
.flow-msn{font-size:12px;font-weight:700;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.flow-mattr{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;justify-content:center}
.flow-matag{font-size:10px;background:var(--bg-muted);border-radius:3px;padding:1px 6px;color:var(--tx-muted);font-family:var(--font-mono);white-space:nowrap}
.flow-detail{border-top:2px solid var(--primary);padding:20px 24px;background:var(--bg-highlight);display:none}
.flow-detail.vis{display:block}
.flow-dmn{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.flow-ddir{font-size:13px;color:var(--tx-muted);margin-bottom:14px}
.flow-dtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.flow-dtbl th{text-align:left;padding:8px 12px;background:var(--bg-muted);border:1px solid var(--border);color:var(--tx-primary);font-weight:600;font-size:12px}
.flow-dtbl td{padding:7px 12px;border:1px solid var(--border);vertical-align:top}
.flow-dtbl td:first-child{font-family:var(--font-mono);font-size:12px;color:var(--primary);white-space:nowrap;min-width:140px}
.flow-dnote{font-style:italic;color:var(--tx-secondary);font-size:13px;line-height:1.7;padding:10px 14px;background:var(--bg-muted);border-radius:6px;border:1px solid var(--border)}

.prompt-block{border-radius:8px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.prompt-block:hover{transform:translateX(4px)}
.prompt-block .pb-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.prompt-block .pb-text{font-size:13px;color:var(--tx-primary);line-height:1.6}
.prompt-block .pb-expand{display:none;font-size:13px;color:var(--tx-secondary);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.2)}
.prompt-block.expanded .pb-expand{display:block}

.comparator{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.comp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.comp-header{padding:10px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.comp-body{padding:14px 16px;font-size:13px;color:var(--tx-primary);line-height:1.7;min-height:80px}
.comp-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.comp-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.comp-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.warn-card{background:var(--bg-card);border:1px solid rgba(245,158,11,0.3);border-left:4px solid var(--warning);border-radius:0 12px 12px 0;padding:16px 20px;margin-bottom:12px}
.warn-title{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.warn-text{font-size:13px;color:var(--tx-secondary);line-height:1.6}

.task-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:16px 0}
.task-card{perspective:800px;min-height:360px;cursor:pointer}
.task-inner{position:relative;width:100%;height:100%;min-height:360px;transition:transform .6s;transform-style:preserve-3d}
.task-card.flipped .task-inner{transform:rotateY(180deg)}
.task-front,.task-back{position:absolute;width:100%;backface-visibility:hidden;border-radius:12px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);top:0;left:0;right:0;min-height:360px}
.task-front{background:var(--bg-card);display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center}
.task-back{background:var(--bg-highlight);transform:rotateY(180deg);font-size:13px;color:var(--tx-secondary);line-height:1.6;overflow-y:auto}
.task-front .concept-ico{margin-bottom:12px}

.spectrum{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:16px 0}
.spectrum-item{padding:16px;border-radius:10px;border:2px solid}
.spectrum-item.ok{border-color:var(--success);background:rgba(16,185,129,0.04)}
.spectrum-item.warn{border-color:var(--warning);background:rgba(245,158,11,0.04)}
.spectrum-item.bad{border-color:var(--error);background:rgba(239,68,68,0.04)}
.spectrum-icon{font-size:18px;margin-bottom:8px}
.spectrum-text{font-size:13px;color:var(--tx-primary);line-height:1.6}

.spot-passage{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px}
.spot-sentence{cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .2s;border:2px solid transparent}
.spot-sentence:hover{background:rgba(239,68,68,0.06)}
.spot-sentence.flagged{background:rgba(239,68,68,0.1);border-color:var(--error)}
.spot-sentence.revealed-h{background:rgba(239,68,68,0.12);border-color:var(--error)}
.spot-sentence.revealed-ok{background:rgba(16,185,129,0.08);border-color:var(--success)}

.scenario-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.scenario-opts{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.scenario-opt{padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.scenario-opt:hover{border-color:var(--primary)}
.scenario-opt.selected{border-color:var(--primary);background:var(--bg-highlight);color:var(--primary)}
.scenario-opt.best{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}

.roadmap-tier{margin-bottom:32px}
.tier-header{padding:12px 20px;border-radius:10px;color:#fff;font-weight:700;font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.resource-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;transition:all .2s}
.resource-card:hover{box-shadow:var(--shadow-md)}
.resource-title{font-size:15px;font-weight:600;color:var(--tx-primary)}
.resource-provider{font-size:12px;color:var(--tx-muted);margin-top:2px}
.resource-meta{display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--tx-muted);flex-wrap:wrap}
.resource-why{font-size:13px;color:var(--tx-secondary);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.resource-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--primary);margin-top:8px}

.roadmap-section{margin-bottom:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.roadmap-section summary{padding:14px 20px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#fff;transition:background 0.2s}
.roadmap-section summary::-webkit-details-marker{display:none}
.roadmap-section summary::marker{display:none}
.roadmap-section summary::after{content:'▸';margin-left:auto;font-size:14px;transition:transform 0.2s}
.roadmap-section[open] summary::after{transform:rotate(90deg)}
.roadmap-section .roadmap-body{padding:16px 20px}

.course-nav{display:flex;align-items:center;gap:2px;padding:6px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.course-nav::-webkit-scrollbar{display:none}
.course-link{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--tx-muted);text-decoration:none;white-space:nowrap;transition:all .2s;font-family:var(--font-body)}
.course-link:hover{color:var(--primary);background:var(--bg-highlight);text-decoration:none}
.course-link.current{background:var(--gradient-primary);color:#fff;cursor:default;pointer-events:none}

.gloss-search{width:100%;padding:12px 18px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--tx-primary);font-family:var(--font-body);transition:border-color .2s;margin-bottom:16px}
.gloss-search:focus{outline:none;border-color:var(--primary)}
.gloss-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.gloss-filter{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.gloss-filter.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.gloss-filter:hover:not(.active){border-color:var(--primary)}
.alpha-bar{display:flex;gap:2px;margin-bottom:16px;flex-wrap:wrap}
.alpha-btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--tx-muted);font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--bg-highlight);color:var(--primary)}
.alpha-btn.active{background:var(--primary);color:#fff}
.gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}
.gloss-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;transition:all .2s}
.gloss-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.gloss-term{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--tx-secondary);line-height:1.6;margin:8px 0}
.gloss-why{font-size:12px;color:var(--accent);font-style:italic;line-height:1.5}
.gloss-related{margin-top:8px;font-size:12px;color:var(--tx-muted)}
.gloss-related a{color:var(--primary);font-weight:600;cursor:pointer}

.score-banner{padding:24px;border-radius:12px;text-align:center;margin-top:24px}
.score-banner.excellent{background:rgba(16,185,129,0.1);border:2px solid var(--success);color:#065F46}
.score-banner.good{background:var(--bg-highlight);border:2px solid var(--primary);color:var(--primary-dark)}
.score-banner.keep{background:rgba(245,158,11,0.1);border:2px solid var(--warning);color:#92400E}
.score-num{font-size:36px;font-weight:800;margin-bottom:8px}
.score-msg{font-size:16px;font-weight:600}

.taxonomy-svg{width:100%;max-width:620px;margin:0 auto;display:block}
.tax-ring{opacity:0;transition:opacity .7s ease}

.tx-step-visual{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:16px 0;margin:16px 0}
.tx-step{flex:1;min-width:100px;padding:12px 8px;text-align:center;border-right:2px solid var(--border);position:relative;opacity:.3;transition:all .4s}
.tx-step:last-child{border-right:none}
.tx-step.active{opacity:1;background:var(--bg-highlight);border-radius:8px}
.tx-step-ico{font-size:28px;margin-bottom:6px}
.tx-step-name{font-size:12px;font-weight:700;color:var(--tx-primary)}
.tx-step-desc{font-size:11px;color:var(--tx-secondary);margin-top:4px;line-height:1.4}

.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-md);z-index:90;transition:opacity .3s,transform .3s,background .2s}
.scroll-top:hover{background:var(--primary-dark);transform:translateY(-2px)}
.scroll-top.vis{display:flex}

.flow-btn:focus-visible,.quiz-opt:focus-visible,.comp-tab:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

.toc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:pointer}
.toc-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary-light)}
.toc-features{font-size:12px;color:var(--tx-muted);margin-top:12px;line-height:1.5}

/* ── Mobile flow step list — hidden on desktop, shown on phone ── */
.flow-step-list{display:none}
.flow-mob-step{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  transition:opacity 0.3s,background 0.3s;
}
.flow-mob-step:last-child{border-bottom:none}
.flow-mob-step.dim{opacity:0.2}
.flow-mob-step.cur{
  background:var(--bg-highlight);
  border-left:3px solid var(--primary);
  border-radius:0 8px 8px 0;
}
.flow-mob-num{
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--primary);
  color:#fff;
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}
.flow-mob-step.dim .flow-mob-num{background:var(--border)}
.flow-mob-name{font-size:13px;font-weight:600;color:var(--primary)}
.flow-mob-dir{font-size:11px;color:var(--tx-muted);margin-top:2px}

/* ── Ensure horizontal-scroll containers have scroll indicators ── */
.flow-scroll,.tx-step-visual,.timeline-wrap,.trail-wrap{
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.flow-scroll::-webkit-scrollbar,.tx-step-visual::-webkit-scrollbar,.timeline-wrap::-webkit-scrollbar,.trail-wrap::-webkit-scrollbar{
  height:4px;
}
.flow-scroll::-webkit-scrollbar-thumb,.tx-step-visual::-webkit-scrollbar-thumb,.timeline-wrap::-webkit-scrollbar-thumb,.trail-wrap::-webkit-scrollbar-thumb{
  background:var(--border);border-radius:4px;
}

.sim-focusable{outline:none;border-radius:12px;transition:box-shadow .2s}
.sim-focusable:focus{box-shadow:0 0 0 3px rgba(37,99,235,0.3)}
.sim-focusable:focus-visible{box-shadow:0 0 0 3px rgba(37,99,235,0.3)}
.kb-hint{font-size:12px;color:var(--tx-muted);text-align:center;margin-top:8px;opacity:0.7}
.kb-hint kbd{background:var(--bg-muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:var(--font-mono);font-size:11px}

@media print{
  .hdr,.trail-wrap,.search-overlay,.search-backdrop,.nav-btns,.flow-ctrl,.quiz-check,.train-btn,.hdr-btn,.scroll-top,.course-nav{display:none!important}
  .pane{display:block!important;page-break-after:always}
  .pane:not(.on){display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .card,.sim-area,.flow-box,.case-study,.quiz-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .flow-mrow{opacity:1!important}
  .flow-detail{display:block!important}
}

/* ── FIX 1: Mobile Navigation Drawer ── */
.mob-only{display:none}

.mob-drawer-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:300;backdrop-filter:blur(2px)}
.mob-drawer-backdrop.open{display:block}
.mob-drawer{position:fixed;top:0;right:-300px;width:280px;max-width:80vw;height:100%;background:var(--bg-card);z-index:301;transition:right 0.3s ease;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden}
.mob-drawer.open{right:0}
.mob-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mob-drawer-close{background:none;border:none;font-size:28px;color:var(--tx-secondary);cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.mob-drawer-close:hover{background:var(--bg-muted)}
.mob-drawer-list{flex:1;overflow-y:auto;padding:12px 0}
.mob-drawer-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent}
.mob-drawer-item:hover,.mob-drawer-item:active{background:var(--bg-highlight)}
.mob-drawer-item.active{background:var(--bg-highlight);border-left-color:var(--primary)}
.mob-drawer-item.done{border-left-color:var(--success)}
.mob-drawer-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mob-drawer-ico svg{width:16px;height:16px;fill:#fff}
.mob-drawer-name{font-size:14px;font-weight:600;color:var(--tx-primary)}
.mob-drawer-desc{font-size:11px;color:var(--tx-muted);margin-top:2px}
.mob-drawer-item .mob-check{display:none;color:var(--success);font-weight:700;margin-left:auto;font-size:14px}
.mob-drawer-item.done .mob-check{display:block}

.mob-drawer-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--tx-muted);text-align:center}

.mob-module-bar{display:none;background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 16px;font-size:13px;color:var(--tx-secondary);text-align:center}
.mob-module-bar strong{color:var(--tx-primary)}

/* ── FIX 3: Swipe hint ── */
.swipe-hint{
  display:none;
  position:absolute;
  top:50%;
  right:8px;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:#fff;
  font-size:11px;
  font-weight:600;
  padding:6px 12px;
  border-radius:20px;
  pointer-events:none;
  animation:swipeHintFade 3s forwards;
  z-index:10;
}
@keyframes swipeHintFade{
  0%,60%{opacity:1}
  100%{opacity:0;display:none}
}
.flow-box{position:relative}

/* ── FIX 4: Trail tablet visibility (769–1024px) ── */
@media(max-width:1024px) and (min-width:769px){
  .trail-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 16px}
  .trail{min-width:max-content}
  .trail-stop{flex:0 0 auto;padding:0 8px}
  .trail-lbl{font-size:10px;max-width:70px}
  .trail-dot{width:14px;height:14px}
  .trail-stop.active .trail-dot{width:18px;height:18px}
}

/* ── Mobile (768px and below) — ALL mobile rules consolidated ── */
@media(max-width:768px){
  /* Mobile navigation: show hamburger, hide trail, show module bar */
  .mob-only{display:flex}
  .trail-wrap{display:none!important}
  .mob-module-bar{display:block}
  .swipe-hint{display:block}

  /* Prevent body horizontal overflow */
  html,body{overflow-x:hidden;max-width:100vw}

  /* Header */
  .hdr{padding:10px 16px}
  .hdr-t{font-size:16px}
  .hdr-s{font-size:11px}
  .hdr-ico{width:32px;height:32px;border-radius:6px}
  .hdr-ico svg{width:18px;height:18px}

  /* Hamburger button — prominent blue */
  .mob-only.hdr-btn{
    width:44px;
    height:44px;
    background:var(--primary);
    color:#fff;
    border-color:var(--primary);
    border-radius:10px;
  }
  .mob-only.hdr-btn:hover{
    background:var(--primary-dark);
  }
  .mob-only.hdr-btn svg{
    stroke:#fff;
    width:20px;
    height:20px;
  }

  /* Main content */
  .main{padding:16px}

  /* Hero / Landing */
  .hero{padding:40px 16px 32px}
  .hero h1{font-size:28px}
  .hero p{font-size:15px}
  .hero-grid{grid-template-columns:repeat(3,1fr);gap:10px}
  .hero-stat{padding:14px 10px}
  .hero-stat-n{font-size:22px}
  .hero-stat-l{font-size:11px}

  /* Module headers */
  .mod-hdr{flex-direction:column;align-items:flex-start;gap:12px}
  .mod-ico{width:40px;height:40px;border-radius:10px}
  .mod-title{font-size:20px}
  .mod-desc{font-size:13px}
  .sec-title{font-size:18px;margin:24px 0 12px}

  /* Grids to single column */
  .grid-2,.grid-3,.flip-grid,.task-grid,.spectrum,.gloss-grid{grid-template-columns:1fr}
  .comparator{grid-template-columns:1fr}
  .buckets{grid-template-columns:1fr}

  /* Cards */
  .card{padding:16px}
  .card-title{font-size:15px}
  .card-text{font-size:13px}

  /* Flip cards — show/hide instead of 3D rotation */
  .flip-card{height:auto}
  .flip-inner{height:auto;min-height:160px}

function shuffleArray(arr) {
  const shuffled = arr.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function pickRandom(arr, count) {
  return shuffleArray(arr).slice(0, count);
}

let currentModule = -1;
let completedModules = new Set();
let quizStates = {};
const mainEl = document.getElementById('main-content');

function renderTrail(){
  const t = document.getElementById('trail');
  const homeCls = currentModule === -1 ? 'active' : '';
  t.innerHTML = '<div class="trail-line"></div>' +
    '<div class="trail-stop ' + homeCls + '" onclick="showLanding()" title="Home"><div class="trail-dot" style="' + (currentModule === -1 ? '' : 'background:var(--tx-muted);border-color:var(--tx-muted)') + '"></div><div class="trail-lbl">Home</div></div>' +
    MODULES.map((m,i) => {
      const cls = completedModules.has(i) ? 'done' : (i === currentModule ? 'active' : '');
      return '<div class="trail-stop ' + cls + '" onclick="goModule(' + i + ')" title="' + m.title + '"><div class="trail-dot"></div><div class="trail-lbl">' + m.short + '</div></div>';
    }).join('');
}

function goModule(idx){
  if(idx < 0){showLanding();return;}
  currentModule = idx;
  document.getElementById('trail-wrap').classList.add('vis');
  document.getElementById('hdr').classList.add('compact');
  renderTrail();
  renderModule(idx);
  const mobBar = document.getElementById('mob-module-bar');
  if(mobBar){
    if(idx >= 0 && idx < MODULES.length){
      mobBar.innerHTML = `<strong>${MODULES[idx].title}</strong> — Module ${idx+1} of ${MODULES.length}`;
      mobBar.style.display = '';
    } else {
      mobBar.innerHTML = '';
    }
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function showLanding(){
  currentModule = -1;
  document.getElementById('trail-wrap').classList.add('vis');
  document.getElementById('hdr').classList.remove('compact');
  renderTrail();
  renderLanding();
  const mobBar = document.getElementById('mob-module-bar');
  if(mobBar) mobBar.innerHTML = '';
}

  mainEl.innerHTML = `

function renderModule(idx){
  const m = MODULES[idx];
  const nav = `<div class="nav-btns">
    ${idx > 0 ? `<button class="nav-btn secondary" onclick="goModule(${idx-1})">\u2190 ${MODULES[idx-1].title}</button>` : '<div></div>'}
    ${idx < MODULES.length - 1 ? `<button class="nav-btn primary" onclick="completeAndNext(${idx})">Next: ${MODULES[idx+1].title} \u2192</button>` : `<button class="nav-btn primary" onclick="showFinalAssessment()">Final Assessment \u2192</button>`}
  </div>`;
  const hdr = `<div class="mod-hdr"><div class="mod-ico" style="background:${m.color}">${ICONS[m.icon]}</div><div><div class="mod-title">${m.title}</div><div class="mod-desc">${LANDING_DESCS[idx].desc}</div></div></div>`;
  const content = getModuleContent(idx);
  mainEl.innerHTML = hdr + content + nav;
  initModuleInteractions(idx);
}

function completeAndNext(idx){
  completedModules.add(idx);
  goModule(idx + 1);
}

function getModuleContent(idx){
  switch(idx){
    case 0: return mod1Content();
    case 1: return mod2Content();
    case 2: return mod3Content();
    case 3: return mod4Content();
    case 4: return mod5Content();
    case 5: return mod6Content();
    case 6: return mod7Content();
    case 7: return mod8Content();
    default: return '';
  }
}

/* ══ MODULE 2: HOW MACHINES LEARN ══ */
function mod2Content(){
  return `
  <div class="sec-title">Three Types of Learning</div>
  <div class="grid-3">
    <div class="concept-card"><div class="concept-ico" style="background:#2563EB"><svg viewBox="0 0 24 24" fill="#fff"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg></div>
    <div class="concept-title">Supervised Learning</div><div class="concept-desc">The model learns from labeled examples \u2014 input paired with the correct answer. Think of it like training a new team member by showing them 500 correctly tagged articles and saying \u201clearn the patterns.\u201d After enough examples, they can tag new articles on their own. This is the most common type of ML in content workflows: spam filters, content classifiers, sentiment analysis, and auto-tagging systems all use supervised learning. The quality of your labeled training data directly determines the quality of the model \u2014 garbage labels in, garbage predictions out.</div>
    <div style="margin-top:8px;font-size:12px;color:var(--tx-muted)">Examples: Spam detection, image classification, auto-tagging articles</div></div>
    <div class="concept-card"><div class="concept-ico" style="background:#7C3AED"><svg viewBox="0 0 24 24" fill="#fff"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><circle cx="16" cy="8" r="2"/><circle cx="8" cy="16" r="2"/></svg></div>
    <div class="concept-title">Unsupervised Learning</div><div class="concept-desc">The model finds hidden patterns and natural groupings in data without being told what to look for. Imagine dumping 10,000 unlabeled articles on a table and asking someone to organize them into logical groups \u2014 they\u2019d naturally cluster similar topics together without you defining the categories. This is how topic modeling works: the algorithm discovers that certain words frequently appear together and groups documents accordingly. For content teams, unsupervised learning is powerful for discovering content gaps, identifying duplicate or near-duplicate articles, and understanding how your content naturally clusters by theme.</div>
    <div style="margin-top:8px;font-size:12px;color:var(--tx-muted)">Examples: Customer segmentation, topic clustering in documents</div></div>
    <div class="concept-card"><div class="concept-ico" style="background:#06B6D4"><svg viewBox="0 0 24 24" fill="#fff"><path d="M21 6H3V3h18v3zm-9 4c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4zm0-2c1.66 0 3-1.34 3-3H9c0 1.66 1.34 3 3 3z"/></svg></div>
    <div class="concept-title">Reinforcement Learning</div><div class="concept-desc">The model learns through trial and error, receiving rewards for desired outcomes and penalties for undesired ones. Think of it like learning to write headlines for maximum engagement \u2014 you try different approaches, observe which ones get the most clicks, and adjust your strategy. Over thousands of iterations, you develop an intuition for what works. This is how RLHF (Reinforcement Learning from Human Feedback) works \u2014 the process used to make ChatGPT, Claude, and other LLMs helpful and conversational. Human evaluators rate thousands of AI responses, and the model adjusts its behavior to maximize positive ratings.</div>
    <div style="margin-top:8px;font-size:12px;color:var(--tx-muted)">Examples: Game-playing AI, robotics, RLHF for LLMs</div></div>
  </div>

  <div class="sec-title">Interactive: Train a Text Classifier</div>
  <div class="sim-area" id="classifier-sim">
    <p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Drag each support ticket into the correct category bucket, or tap a ticket then tap a bucket on touch devices. After labeling at least 6 tickets, click \u201cTrain Model\u201d to see how a classifier learns from your labels.</p>
    <div class="classifier">

      <div class="buckets" id="buckets">
        <div class="bucket" data-cat="billing"><div class="bucket-label">\uD83D\uDCB0 Billing Issue</div></div>
        <div class="bucket" data-cat="technical"><div class="bucket-label">\uD83D\uDD27 Technical Problem</div></div>
        <div class="bucket" data-cat="account"><div class="bucket-label">\uD83D\uDC64 Account Request</div></div>

      <div id="predictions" style="display:none;margin-top:16px">
        <div class="callout success">You just did supervised learning! You provided labeled examples, the model found patterns, and it can now classify new tickets \u2014 but it\u2019s not perfect.</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px" id="pred-results"></div>
      </div>
    </div>
  </div>

  <div class="sec-title">Training vs. Inference</div>
  <div class="grid-2">
    <div class="card" style="border-left:4px solid var(--accent)">
      <div class="card-title">\u2699\uFE0F Training</div>
      <div class="card-text">Data flows into the model, weights adjust. <strong>Learning from examples</strong> \u2014 happens once, takes a long time, requires lots of data and compute.</div>
    </div>
    <div class="card" style="border-left:4px solid var(--success)">
      <div class="card-title">\u26A1 Inference</div>
      <div class="card-text">A new input goes into the trained model, output comes out. <strong>Using what it learned</strong> \u2014 happens every time you use AI, fast, no new learning.</div>
    </div>
  </div>
  <div class="callout">The trained model is saved and deployed. Every time you send a prompt and get a response, that\u2019s inference \u2014 the model isn\u2019t learning anything new from your conversation.</div>

  <details class="deeper">
    <summary>Deeper Dive: Why Training Data Quality Determines Everything</summary>
    <div class="deeper-body">
      <p>The single most important factor in any ML system\u2019s performance isn\u2019t the algorithm \u2014 it\u2019s the training data. This has direct implications for content professionals.</p>
      <p style="margin-top:10px"><strong>Bias in, bias out:</strong> If a text classifier is trained primarily on support articles written in formal English, it will underperform on articles written in casual language, non-standard English, or articles with code snippets and technical jargon mixed in. The model hasn\u2019t learned those patterns because they weren\u2019t represented in the training data.</p>
      <p style="margin-top:10px"><strong>Label quality matters more than quantity:</strong> 1,000 carefully and consistently labeled articles will produce a better classifier than 10,000 articles labeled by different people with different interpretations of the categories. If your team labels \u201cHow do I reset my password?\u201d as \u201cAccount\u201d but someone else labels it as \u201cTechnical,\u201d the model learns conflicting signals.</p>
      <p style="margin-top:10px"><strong>The cold start problem:</strong> New products, new features, and new terminology create categories with little or no training data. The model can\u2019t classify what it hasn\u2019t seen. This is where generative AI fills the gap \u2014 it can reason about new categories using its broad language understanding, even without specific training examples.</p>
      <p style="margin-top:10px"><strong>Data drift:</strong> A model trained on 2023 support articles may misclassify 2025 articles because the product has changed, new features have been added, and customer language has evolved. Models need periodic retraining on fresh data to stay accurate. If your auto-tagger is getting worse over time, data drift is likely the cause.</p>
    </div>
  </details>

  <div class="case-study">

      <dt>Lessons for Content Teams</dt><dd>(1) Start small \u2014 you don\u2019t need 10,000 labeled examples to begin. Even 500 well-labeled articles can produce a useful first model. (2) Measure before and after \u2014 track classification accuracy so you can quantify the time saved. (3) Plan for human review \u2014 even at 89% accuracy, that\u2019s 1,100 misclassified articles. Build a human review step into the workflow for the model\u2019s low-confidence predictions. (4) Iterate \u2014 retrain the model quarterly with corrections and new content to prevent accuracy drift.</dd>
    </dl>
  </div>

  ${renderQuiz('mod2', pickRandom(MOD2_QUIZ_POOL, 5))}`;

    <div class="tx-step-visual" id="tx-steps"></div>
    <div id="tx-detail" class="callout" style="display:none"></div>
    <div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>

  <div class="sec-title">Token Visualizer</div>
  <div class="sim-area">
    <p style="font-size:14px;color:var(--tx-secondary);margin-bottom:12px">Type or paste text to see how it splits into tokens. Tokens \u2260 words \u2014 longer words get split into sub-parts.</p>
    <input type="text" class="token-input" id="token-input" value="The quick brown fox jumps over the lazy dog" oninput="tokenize()">
    <div class="token-display" id="token-display"></div>
    <div class="ctx-bar"><div class="ctx-fill" id="ctx-fill" style="width:0%"></div></div>
    <div class="ctx-info"><span id="ctx-count">0 tokens</span><span id="ctx-limit">/ 128,000 tokens</span></div>
    <div class="ctx-select" id="ctx-select"></div>
    <div class="callout" style="margin-top:16px">
      <strong>Why this matters for your work:</strong> Token counts determine three things: (1) <strong>Cost</strong> \u2014 API pricing is per-token, so a 10,000-token document costs 10\u00D7 more to process than a 1,000-token summary. (2) <strong>Context limits</strong> \u2014 if your document exceeds the model\u2019s context window, content is silently truncated. The model doesn\u2019t tell you it missed half your document. (3) <strong>Output quality</strong> \u2014 models tend to perform best when they\u2019re not pushed to the edges of their context window. Leaving headroom for the response improves quality.
      <br><br>
      <strong>Rule of thumb:</strong> 1 page \u2248 500\u2013800 tokens. A 50-page document \u2248 25,000\u201340,000 tokens. Check your model\u2019s context window before processing long documents.
    </div>
  </div>

  <div class="sec-title">Temperature: Creativity vs. Precision</div>
  <div class="sim-area">
    <p style="font-size:14px;color:var(--tx-secondary);margin-bottom:8px"><strong>Prompt:</strong> \u201cWrite a one-sentence description of a sunset.\u201d</p>
    <div class="temp-labels"><span>\uD83C\uDFAF Precise</span><span>\uD83C\uDFA8 Creative</span></div>
    <input type="range" class="temp-slider" id="temp-slider" min="0" max="100" value="0" oninput="updateTemp()">
    <div class="temp-val" id="temp-val">0.0</div>
    <div class="temp-output" id="temp-output"></div>

  </div>

  <details class="deeper">
    <summary>Deeper Dive: What \u201cContext Window\u201d Really Means for Long Documents</summary>
    <div class="deeper-body">
      <p>The context window is the model\u2019s entire working memory for a single interaction. It includes <em>everything</em>: the system prompt, conversation history, your current prompt, any documents you pasted in, AND the model\u2019s response. Input and output share the same window.</p>

      <p style="margin-top:10px"><strong>The \u201clost in the middle\u201d problem:</strong> Research has shown that LLMs pay the most attention to content at the beginning and end of the context window, with reduced attention to content in the middle. This means a crucial detail buried on page 25 of a 50-page document may be \u201cseen\u201d by the model (it\u2019s within the context window) but given less attention than content on pages 1\u20135 and pages 45\u201350. For content review tasks, consider processing long documents in sections rather than all at once.</p>
      <p style="margin-top:10px"><strong>Strategies for long documents:</strong> (1) Chunk and process \u2014 break the document into logical sections, process each separately, then synthesize. (2) Front-load important content \u2014 put the most critical context at the beginning of your prompt. (3) Use the model with the largest context window available for long-document tasks. (4) Ask the model to confirm what it processed \u2014 \u201cBefore summarizing, list the section headings you can see in this document\u201d quickly reveals if content was truncated.</p>

    <div class="case-title">Why the AI Truncated a 50-Page Document \u2014 Understanding Context Windows</div>

      <dt>Solution</dt><dd>Switched to a 128K context window model, and the full document was processed. Alternatively, break the document into chunks and summarize each separately.</dd>

  <details class="deeper">

      <p>Expert prompt engineers rarely get the perfect result on their first attempt. They treat prompting as an iterative process \u2014 similar to how a writer produces drafts.</p>
      <p style="margin-top:10px"><strong>Attempt 1 \u2014 Baseline:</strong> Start with a clear but simple prompt. Evaluate the output. Identify what\u2019s wrong: Is the format off? Is the tone wrong? Is it too long or too short? Is it missing key information? Each problem maps to a specific prompt component you can adjust.</p>

      <p style="margin-top:10px"><strong>Attempt 3 \u2014 Exemplify:</strong> If constraints alone aren\u2019t enough, add an example of the desired output (few-shot prompting). One good example is often worth more than a paragraph of instructions. Show the model a sample release note, and it will pattern-match the format, length, and tone.</p>

/* ══ MODULE 6: ETHICS & JUDGMENT ══ */
function mod6Content(){
  return `
  <div class="sec-title">Why Hallucinations Happen</div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-text" style="line-height:1.8">Hallucinations aren\u2019t bugs \u2014 they\u2019re a fundamental feature of how language models work. An LLM generates text by predicting the statistically most likely next token. It has no internal fact-checker, no database of verified truths, and no awareness of whether its output is correct. When the statistical patterns in its training data align with reality, you get accurate output. When they don\u2019t \u2014 or when the model is generating text about something underrepresented in its training data \u2014 you get hallucinations. The more specific and verifiable a claim is (names, dates, statistics, citations), the higher the hallucination risk.</div>
  </div>
  <div class="spectrum">
    <div class="spectrum-item ok"><div class="spectrum-icon">\u2705</div><div style="font-weight:700;color:var(--success);font-size:12px;margin-bottom:6px">FACTUALLY CORRECT</div><div class="spectrum-text">\u201cPython was created by Guido van Rossum.\u201d</div></div>
    <div class="spectrum-item warn"><div class="spectrum-icon">\u26A0\uFE0F</div><div style="font-weight:700;color:var(--warning);font-size:12px;margin-bottom:6px">PLAUSIBLE BUT WRONG</div><div class="spectrum-text">\u201cPython 3.12 introduced pattern matching.\u201d <em>(Actually introduced in 3.10)</em></div></div>
    <div class="spectrum-item bad"><div class="spectrum-icon">\u274C</div><div style="font-weight:700;color:var(--error);font-size:12px;margin-bottom:6px">COMPLETE FABRICATION</div><div class="spectrum-text">\u201cAccording to the 2024 IEEE study on documentation practices (Zhang et al.)...\u201d <em>(This study doesn\u2019t exist)</em></div></div>
  </div>

  <div class="sec-title">Interactive: Spot the Hallucination</div>
  <p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Click on sentences you think are hallucinated (fabricated or incorrect). Then check your answers.</p>
  <div id="spot-area"></div>
  <div style="text-align:center;margin:16px 0"><button class="flow-btn pri" id="spot-check-btn" onclick="checkSpot()">Check My Answers</button></div>
  <div id="spot-feedback" style="display:none"></div>

  <div class="sec-title">Sources of Bias in AI</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Training Data Bias</div>
      <div class="card-text">AI models learn from internet text, which reflects existing societal biases, historical imbalances, and cultural assumptions. If the training data contains predominantly Western, English-language perspectives, the model will default to those perspectives in its output. For content editors, this means AI-generated text may use culturally specific idioms, assume Western business norms, or handle non-English terminology inconsistently. When writing for global audiences, always review AI drafts for cultural assumptions that may not translate.</div>
    </div>
    <div class="card">
      <div class="card-title">Confirmation Bias in Prompting</div>
      <div class="card-text">If your prompt implies a certain answer, the AI will often agree rather than push back. Asking \u201cIsn\u2019t it true that our product is the best in the market?\u201d will almost certainly get a \u201cyes\u201d with supporting arguments, regardless of whether it\u2019s true. This is because LLMs are trained through RLHF to be helpful and agreeable. To get balanced output, frame questions neutrally: \u201cWhat are the arguments for and against X?\u201d or \u201cWhat are the strengths and weaknesses of this approach?\u201d Deliberately asking for counterarguments produces more reliable analysis.</div>
    </div>
    <div class="card">
      <div class="card-title">Cultural and Language Bias</div>
      <div class="card-text">Models trained primarily on English text handle other languages with less accuracy and nuance. Even within English, the model may default to American English spellings, date formats, and cultural references. For global content teams, this means AI-generated text may need localization review even when the output language is correct. Pay particular attention to measurements (metric vs. imperial), date formats (MM/DD vs. DD/MM), and cultural references that may not resonate with all audiences.</div>
    </div>
    <div class="card">
      <div class="card-title">Automation Bias</div>
      <div class="card-text">Automation bias is the most dangerous bias for content professionals because it\u2019s invisible. When an AI tool generates polished, well-formatted, grammatically perfect text, your brain interprets that polish as a signal of accuracy. But formatting quality and factual accuracy are completely independent \u2014 the AI is equally polished when it\u2019s right and when it\u2019s wrong. Studies show that people accept AI-generated claims without verification at significantly higher rates than claims from human sources, precisely because the output \u201clooks right.\u201d The antidote is a deliberate verification habit: treat every factual claim in AI output as unverified until you\u2019ve confirmed it against a source, regardless of how confident the text sounds.</div>
    </div>
  </div>

  <details class="deeper">
    <summary>Deeper Dive: Your Editorial Eye Is More Valuable Than Ever</summary>
    <div class="deeper-body">
      <p>There\u2019s a persistent narrative that AI will make content editors obsolete. The reality is the opposite \u2014 AI makes your skills more valuable, not less.</p>
      <p style="margin-top:10px">Here\u2019s why: AI has dramatically lowered the cost of producing first-draft content. Any organization can now generate volumes of text quickly and cheaply. But volume without quality is worse than useless \u2014 it\u2019s actively harmful. Inaccurate documentation erodes customer trust, incorrect knowledge base articles generate more support tickets than they resolve, and published hallucinations create liability.</p>
      <p style="margin-top:10px">The bottleneck has shifted from content creation to content verification. The person who can quickly read AI-generated text and assess whether it\u2019s accurate, appropriately toned, factually grounded, and audience-appropriate is now the most critical role in the content pipeline. That\u2019s you.</p>
      <p style="margin-top:10px">Consider building these specific review skills: (1) <strong>Source triangulation</strong> \u2014 can you verify a claim from at least two independent sources? (2) <strong>Plausibility testing</strong> \u2014 does this specific number, date, or name feel right, or is it suspiciously precise? (3) <strong>Consistency checking</strong> \u2014 does this paragraph contradict something said elsewhere in the document? (4) <strong>Audience calibration</strong> \u2014 would the target reader actually find this helpful, or does it just sound helpful to someone who already knows the topic?</p>
      <p style="margin-top:10px">These are judgment skills that AI fundamentally cannot replicate. Invest in them.</p>
    </div>
  </details>

  <div class="sec-title">Decision Scenarios: Would You Publish This?</div>
  <div id="scenarios-area"></div>

  ${renderQuiz('mod6', pickRandom(MOD6_QUIZ_POOL, 5))}`;
}

/* ══ QUIZ SYSTEM ══ */
function renderQuiz(id, questions){
  return `<div class="quiz-section"><div class="sec-title">Knowledge Check</div>
  ${questions.map((q,i)=>{
    const qid = `${id}-q${i}`;
    if(q.type === 'tf'){
      return `<div class="quiz-card" id="qc-${qid}">
        <div class="quiz-q"><span class="q-num">Q${i+1}.</span> ${q.q} <span class="q-type">True / False</span></div>
        <div class="quiz-opts">
          <div class="quiz-opt" data-qid="${qid}" data-val="true" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">T</div>True</div>
          <div class="quiz-opt" data-qid="${qid}" data-val="false" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">F</div>False</div>
        </div>
        <button class="quiz-check" id="btn-${qid}" onclick="checkQuiz('${qid}',${q.a},'${esc(q.exp)}')" disabled>Check Answer</button>
        <div class="quiz-fb" id="fb-${qid}"></div>
      </div>`;
    } else {
      return `<div class="quiz-card" id="qc-${qid}">
        <div class="quiz-q"><span class="q-num">Q${i+1}.</span> ${q.q} <span class="q-type">Multiple Choice</span></div>
        <div class="quiz-opts">
          ${q.opts.map((o,j)=>`<div class="quiz-opt" data-qid="${qid}" data-val="${j}" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">${String.fromCharCode(65+j)}</div>${o}</div>`).join('')}
        </div>
        <button class="quiz-check" id="btn-${qid}" onclick="checkQuiz('${qid}',${q.a},'${esc(q.exp)}')" disabled>Check Answer</button>
        <div class="quiz-fb" id="fb-${qid}"></div>
      </div>`;
    }
  }).join('')}</div>`;
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,"&quot;")}

function selectQuizOpt(el){
  const qid = el.dataset.qid;
  if(quizStates[qid]) return;
  el.parentElement.querySelectorAll('.quiz-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn-'+qid).disabled = false;
}

function checkQuiz(qid, correct, exp){
  if(quizStates[qid]) return;
  quizStates[qid] = true;
  const card = document.getElementById('qc-'+qid);
  const opts = card.querySelectorAll('.quiz-opt');
  let selectedVal = null;
  opts.forEach(o=>{if(o.classList.contains('selected')) selectedVal = o.dataset.val;});
  const isCorrect = String(selectedVal) === String(correct);
  opts.forEach(o=>{
    o.style.cursor = 'default';
    if(String(o.dataset.val) === String(correct)) o.classList.add('right');
    else if(o.classList.contains('selected') && !isCorrect) o.classList.add('wrong');
  });
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  const fb = document.getElementById('fb-'+qid);
  fb.className = `quiz-fb vis ${isCorrect?'correct':'incorrect'}`;
  fb.innerHTML = `<strong>${isCorrect?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${exp}`;
  document.getElementById('btn-'+qid).disabled = true;
}

let labeledCount = 0;
let selectedTicket = null;

function initMod2(){
  const pool = document.getElementById('ticket-pool');
  labeledCount = 0;
  selectedTicket = null;
  TICKETS.forEach((t,i)=>{
    const el = document.createElement('div');
    el.className = 'ticket';
    el.textContent = t.text;
    el.draggable = true;
    el.dataset.idx = i;
    el.ondragstart = e => { e.dataTransfer.setData('text/plain',i); el.classList.add('dragging'); };
    el.ondragend = () => el.classList.remove('dragging');
    el.addEventListener('click', function(){
      if(!this.draggable) return;
      document.querySelectorAll('.ticket.selected').forEach(t => t.classList.remove('selected'));
      this.classList.add('selected');
      selectedTicket = this;
    });
    pool.appendChild(el);
  });

  document.querySelectorAll('.bucket').forEach(b=>{
    b.ondragover = e => { e.preventDefault(); b.classList.add('over'); };
    b.ondragleave = () => b.classList.remove('over');
    b.ondrop = e => {
      e.preventDefault(); b.classList.remove('over');
      const idx = e.dataTransfer.getData('text/plain');
      const ticket = pool.querySelector(`.ticket[data-idx="${idx}"]`);
      if(!ticket) return;
      const clone = ticket.cloneNode(true);
      clone.draggable = false;
      clone.style.cursor = 'default';
      clone.classList.remove('selected');
      b.appendChild(clone);
      ticket.remove();
      labeledCount++;
      updateLabelCount();
    };
    b.addEventListener('click', function(){
      if(!selectedTicket) return;
      const clone = selectedTicket.cloneNode(true);
      clone.draggable = false;
      clone.style.cursor = 'default';
      clone.classList.remove('selected');
      this.appendChild(clone);
      selectedTicket.remove();
      selectedTicket = null;
      labeledCount++;
      updateLabelCount();
    });
  });
  updateLabelCount();

  document.getElementById('train-btn').onclick = () => {
    document.getElementById('train-btn').disabled = true;
    document.getElementById('train-btn').textContent = '\uD83D\uDD04 Training...';
    setTimeout(()=>{
      document.getElementById('train-btn').textContent = '\u2713 Model Trained!';
      document.getElementById('predictions').style.display = 'block';
      const pr = document.getElementById('pred-results');
      pr.innerHTML = PREDICTIONS.map(p=>`<div class="prediction-card"><div class="pred-text">"${p.text}"</div><div class="pred-result" style="background:rgba(37,99,235,0.1);color:var(--primary)">\u2192 ${p.cat} (${p.conf}%)</div></div>`).join('');
    }, 1500);
  };
}
function updateLabelCount(){
  const el = document.getElementById('label-count');
  if(el) el.textContent = `${labeledCount} / 6 tickets labeled`;
  const btn = document.getElementById('train-btn');
  if(btn) btn.disabled = labeledCount < 6;
}

let ctxSize = 128000;
function initTokenizer(){
  const ctxSizes = [{l:'4K',v:4000},{l:'8K',v:8000},{l:'32K',v:32000},{l:'128K',v:128000},{l:'200K',v:200000}];
  document.getElementById('ctx-select').innerHTML = ctxSizes.map(c=>`<button class="ctx-btn ${c.v===ctxSize?'active':''}" onclick="setCtx(${c.v},this)">${c.l}</button>`).join('');
  tokenize();
}
function setCtx(v,btn){
  ctxSize = v;
  document.querySelectorAll('.ctx-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  tokenize();
}
function tokenize(){
  const text = document.getElementById('token-input').value;
  const tokens = simpleTokenize(text);
  document.getElementById('token-display').innerHTML = tokens.map(t=>`<span class="token-chip">${t}</span>`).join('');
  const count = tokens.length;
  document.getElementById('ctx-count').textContent = `${count} tokens`;
  document.getElementById('ctx-limit').textContent = `/ ${ctxSize.toLocaleString()} tokens`;
  const pct = Math.min((count/ctxSize)*100,100);
  document.getElementById('ctx-fill').style.width = pct+'%';
}
function simpleTokenize(text){
  if(!text.trim()) return [];
  const words = text.split(/\s+/);
  const tokens = [];
  const splitWords = {understanding:['under','standing'],tokenization:['token','ization'],artificial:['art','ificial'],intelligence:['intelli','gence'],processing:['process','ing'],generation:['gener','ation'],learning:['learn','ing'],transformer:['trans','former'],embedding:['embed','ding'],attention:['atten','tion'],prediction:['pre','diction'],probability:['prob','ability'],architecture:['archi','tecture'],documentation:['document','ation'],engineering:['engineer','ing'],professional:['pro','fessional'],interactive:['inter','active'],information:['inform','ation']};
  words.forEach(w=>{
    const lower = w.toLowerCase().replace(/[^a-z]/g,'');
    if(splitWords[lower]){
      const parts = splitWords[lower];
      let remaining = w;
      parts.forEach((p,i)=>{
        if(i===0){
          const idx = remaining.toLowerCase().indexOf(p);
          if(idx >= 0){ tokens.push(remaining.substring(0,idx+p.length)); remaining = remaining.substring(idx+p.length); }
          else tokens.push(p);
        } else { tokens.push(remaining || p); remaining = ''; }
      });
    } else { tokens.push(w); }
  });
  return tokens;
}

/* ── FLOW SIMULATOR ── */
function initFlow(id){
  flowCur[id] = 0;
  renderFlow(id, FLOW_DATA[id]);
}
function renderFlow(id, data){
  const inner = document.getElementById('flow-inner-'+id);
  const nodeCount = data.nodes.length;
  const nodesHtml = `<div class="flow-nodes">${data.nodes.map((n,i)=>{
    const [name,desc] = n.split('|');
    const colors = ['#2563EB','#7C3AED','#06B6D4','#F59E0B','#10B981'];
    return `<div class="flow-ncol"><div class="flow-nbox" style="border-top-color:${colors[i%5]}"><div class="flow-nname">${name}</div><div class="flow-ndesc">${desc||''}</div></div></div>`;
  }).join('')}</div>`;

  let rowsHtml = '';
  const step = flowCur[id];
  const total = data.steps.length;

  data.steps.forEach((s,i)=>{
    const vis = step === 0 ? 'dim' : (i < step ? 'vis' : 'dim');
    const cur = (i === step - 1) ? 'cur' : '';
    const midCol = (s.f + s.t) / 2;
    const leftPct = ((midCol + 0.5) / nodeCount * 100);

    rowsHtml += `<div class="flow-mrow ${vis} ${cur}">
      <div class="flow-lifelines">${data.nodes.map(()=>'<div class="flow-ll-col"><div class="flow-ll"></div></div>').join('')}</div>
      <svg class="flow-arrow-svg" data-fi="${s.f}" data-ti="${s.t}" data-nc="${nodeCount}"></svg>
      <div class="flow-mlwrap" style="left:${leftPct}%">
        <div class="flow-mlabel"><div class="flow-msn">${s.n}</div>
        <div class="flow-mattr">${(s.a||[]).slice(0,2).map(a=>`<span class="flow-matag">${a[0]}</span>`).join('')}</div></div>
      </div>
    </div>`;
  });

  let mobileStepsHtml = '<div class="flow-step-list">';
  data.steps.forEach((s, i) => {
    const vis = step === 0 ? 'dim' : (i < step ? (i === step - 1 ? 'cur' : '') : 'dim');
    const fromName = data.nodes[s.f].split('|')[0];
    const toName = data.nodes[s.t].split('|')[0];
    mobileStepsHtml += `<div class="flow-mob-step ${vis}">
      <div class="flow-mob-num">${i + 1}</div>
      <div class="flow-mob-content">
        <div class="flow-mob-name">${s.n}</div>
        <div class="flow-mob-dir">${fromName} → ${toName}</div>
      </div>
    </div>`;
  });
  mobileStepsHtml += '</div>';

  inner.innerHTML = nodesHtml + `<div class="flow-msgs">${rowsHtml}</div>` + mobileStepsHtml;
  document.getElementById('flow-ind-'+id).textContent = `Step ${step} / ${total}`;

  const detail = document.getElementById('flow-detail-'+id);
  if(step > 0 && step <= total){
    const s = data.steps[step-1];
    const fromName = data.nodes[s.f].split('|')[0];
    const toName = data.nodes[s.t].split('|')[0];
    detail.className = 'flow-detail vis';
    detail.innerHTML = `<div class="flow-dmn">${s.n}</div>
      <div class="flow-ddir">${fromName} \u2192 ${toName}</div>
      <table class="flow-dtbl"><thead><tr><th>Attribute</th><th>Value</th></tr></thead><tbody>
      ${(s.a||[]).map(a=>`<tr><td>${a[0]}</td><td>${a[1]}</td></tr>`).join('')}</tbody></table>
      <div class="flow-dnote">${s.d}</div>`;
  } else { detail.className = 'flow-detail'; }

  requestAnimationFrame(() => drawFlowArrows(id));
}

function drawFlowArrows(id){
  const container = document.getElementById('flow-inner-'+id);
  if(!container) return;
  container.querySelectorAll('.flow-arrow-svg').forEach(svg => {
    const row = svg.parentElement;
    const fi = parseInt(svg.dataset.fi);
    const ti = parseInt(svg.dataset.ti);
    const nc = parseInt(svg.dataset.nc);
    const w = row.offsetWidth;
    const h = row.offsetHeight;
    if(!w) return;
    svg.setAttribute('viewBox', '0 0 '+w+' '+h);
    svg.innerHTML = '';
    const cw = w / nc;
    const y = h * 0.5;

    if(fi === ti){
      const cx = (fi + 0.5) * cw, r = 22;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M'+(cx-r)+' '+y+' C'+(cx-r)+' '+(y+r*2.2)+','+(cx+r)+' '+(y+r*2.2)+','+(cx+r)+' '+y);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','var(--accent)');
      path.setAttribute('stroke-width','2');
      svg.appendChild(path);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arrow.setAttribute('points',(cx+r)+','+y+' '+(cx+r-5)+','+(y+7)+' '+(cx+r+5)+','+(y+7));
      arrow.setAttribute('fill','var(--accent)');
      svg.appendChild(arrow);
    } else {
      const x1 = (fi + 0.5) * cw, x2 = (ti + 0.5) * cw;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1); line.setAttribute('y1',y);
      line.setAttribute('x2',x2); line.setAttribute('y2',y);
      line.setAttribute('stroke','var(--primary)');
      line.setAttribute('stroke-width','2');
      svg.appendChild(line);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      if(x2 > x1) arrow.setAttribute('points',x2+','+y+' '+(x2-8)+','+(y-4)+' '+(x2-8)+','+(y+4));
      else arrow.setAttribute('points',x2+','+y+' '+(x2+8)+','+(y-4)+' '+(x2+8)+','+(y+4));
      arrow.setAttribute('fill','var(--primary)');
      svg.appendChild(arrow);
    }
  });
}

let flowResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(flowResizeTimer);
  flowResizeTimer = setTimeout(() => {
    Object.keys(FLOW_DATA).forEach(id => drawFlowArrows(id));
  }, 200);
});

function flowStep(id, n){
  const total = FLOW_DATA[id].steps.length;
  flowCur[id] = Math.max(0, Math.min(n, total));
  renderFlow(id, FLOW_DATA[id]);
  requestAnimationFrame(() => {
    drawFlowArrows(id);
    const curRow = document.querySelector('#flow-inner-'+id+' .flow-mrow.cur');
    if(curRow) curRow.scrollIntoView({behavior:'smooth', block:'nearest'});
  });
}
