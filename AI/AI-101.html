  const antiPatterns = [
    {t:'The Vague Handwave',prob:'"Write something about our product."',fail:'No audience, no format, no specifics, no length, no tone. The AI has to guess every single parameter, and it will guess wrong. You\u2019ll get generic marketing copy when you needed a technical FAQ.',instead:'"Write a 200-word product overview for IT administrators evaluating our platform. Focus on security features and compliance certifications. Tone: professional and factual, not promotional."'},
    {t:'The Information Dump',prob:'Pasting 50 pages with "Summarize this."',fail:'No guidance on what matters, what to focus on, how long the summary should be, or who will read it. The AI doesn\u2019t know if you need a 3-bullet executive briefing or a 2-page detailed synopsis. It will produce something mediocre that serves no particular purpose well.',instead:'"Summarize this 50-page specification in 5 bullet points for a non-technical project manager. Focus on: what changed from the previous version, what decisions are needed, and what the timeline looks like."'},
    {t:'The One-Shot Marathon',prob:'Asking AI to do 10 different tasks in one prompt.',fail:'Output quality degrades when the model juggles too many tasks simultaneously. It will do a mediocre job on all 10 rather than an excellent job on any one. Each task competes for the model\u2019s attention within the context window, and later tasks in the list tend to get less thorough treatment.',instead:'Break the request into sequential focused prompts: first outline, then draft section 1, then draft section 2, etc. Each prompt builds on the previous output (prompt chaining).'},

let workshopIdx = 0;
let activeWorkshopScenarios = [];

function initWorkshop(){
  activeWorkshopScenarios = pickRandom(ALL_WORKSHOP_SCENARIOS, 3);
  document.getElementById('workshop-tabs').innerHTML = activeWorkshopScenarios.map((s,i) =>
    `<button class="comp-tab ${i===0?'active':''}" onclick="switchWorkshop(${i},this)">${s.name}</button>`
  ).join('');
  renderWorkshop(0);
}

function switchWorkshop(i, btn){
  document.querySelectorAll('#workshop-tabs .comp-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  workshopIdx = i;
  renderWorkshop(i);
}

function renderWorkshop(i){
  const s = activeWorkshopScenarios[i];
  document.getElementById('workshop-task').innerHTML = `<strong>Your task:</strong> ${s.task}`;
  document.getElementById('workshop-source').innerHTML = `<strong>Source material:</strong><br>${s.source}`;
  document.getElementById('workshop-input').value = '';
  document.getElementById('workshop-results').style.display = 'none';
}

function scoreWorkshop(){
  const input = document.getElementById('workshop-input').value.toLowerCase();
  if(input.trim().length < 10){
    alert('Please write a prompt first!');
    return;
  }
  const s = activeWorkshopScenarios[workshopIdx];
  const components = ['role','context','task','constraints','format','examples'];
  const labels = ['Role / Persona','Context / Audience','Specific Task','Constraints','Output Format','Examples'];
  const tips = [
    'Tell the AI what role to adopt \u2014 e.g., "You are a senior technical writer." This calibrates tone, vocabulary, and depth.',
    'Specify who the output is for \u2014 e.g., "for IT administrators" or "for non-technical end users." Without audience context, the AI guesses.',
    'Be specific about what you want done \u2014 "write," "convert," "summarize," "compare." Vague tasks get vague results.',
    'Set boundaries \u2014 word limits, reading level, what to avoid, what to focus on. Constraints prevent the AI from going off-track.',
    'Tell the AI HOW to structure the output \u2014 headings, bullets, paragraphs, table. Otherwise you spend time reformatting.',
    'Show the AI what good output looks like. One example is often worth more than a paragraph of instructions.'
  ];

  let score = 0;
  let scorecardHtml = '<div style="font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:12px">Prompt Scorecard</div>';
  scorecardHtml += '<div style="display:grid;gap:8px">';

  components.forEach((comp, ci) => {
    const keywords = s.checks[comp];
    const found = keywords.some(kw => input.includes(kw));
    if(found) score++;
    const icon = found ? '\u2713' : '\u2717';
    const color = found ? 'var(--success)' : 'var(--error)';
    const bgColor = found ? 'rgba(16,185,129,0.06)' : 'rgba(239,68,68,0.06)';
    scorecardHtml += `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;background:${bgColor};border:1px solid ${found ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)'}">
      <span style="font-size:16px;font-weight:700;color:${color};flex-shrink:0;width:20px">${icon}</span>
      <div><div style="font-size:13px;font-weight:600;color:var(--tx-primary)">${labels[ci]}</div>
      ${!found ? `<div style="font-size:12px;color:var(--tx-secondary);margin-top:4px">${tips[ci]}</div>` : ''}</div>
    </div>`;
  });
  scorecardHtml += '</div>';

  let level, levelColor, levelBg;
  if(score >= 5){ level = 'Excellent'; levelColor = 'var(--success)'; levelBg = 'rgba(16,185,129,0.08)'; }
  else if(score >= 3){ level = 'Good start \u2014 but can be stronger'; levelColor = 'var(--primary)'; levelBg = 'var(--bg-highlight)'; }
  else { level = 'Needs work \u2014 too vague for reliable results'; levelColor = 'var(--error)'; levelBg = 'rgba(239,68,68,0.06)'; }

  scorecardHtml = `<div style="text-align:center;padding:16px;border-radius:10px;background:${levelBg};border:1px solid;border-color:${levelColor};margin-bottom:16px">
    <div style="font-size:28px;font-weight:800;color:${levelColor}">${score} / 6</div>
    <div style="font-size:14px;font-weight:600;color:${levelColor}">${level}</div>
  </div>` + scorecardHtml;

  let outputKey;
  if(score >= 5) outputKey = 'high';
  else if(score >= 3) outputKey = 'mid';
  else outputKey = 'low';

  const outputHtml = `<div style="margin-top:20px">
    <div style="font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:12px">What This Prompt Would Produce</div>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px;font-size:14px;color:var(--tx-primary);line-height:1.7">${s.outputs[outputKey]}</div>
    ${score < 5 ? `<div class="callout" style="margin-top:12px"><strong>Try again:</strong> Add the missing components above, then re-score to see how the output improves.</div>` : `<div class="callout success" style="margin-top:12px"><strong>Well done!</strong> Your prompt includes the key components that produce high-quality AI output. Try the other scenarios to practice with different content types.</div>`}
  </div>`;

  document.getElementById('workshop-scorecard').innerHTML = scorecardHtml;
  document.getElementById('workshop-output').innerHTML = outputHtml;
  document.getElementById('workshop-results').style.display = 'block';
  document.getElementById('workshop-results').scrollIntoView({behavior:'smooth', block:'nearest'});
}

    {ico:'\u270F\uFE0F',title:'First-Draft Generation',desc:'Generate initial drafts from outlines, notes, or data',back:'<strong>When to use:</strong> When you have structured input (outlines, bullet points, data) and need to transform it into polished prose. Best for getting past the blank page and creating a solid starting point for editorial refinement.<br><br><strong>Prompt template:</strong><br>\u201cYou are a technical writer. Using the following outline and notes, write a first draft of a [content type] for [audience]. Tone: [professional/friendly]. Length: ~[X] words. Structure: [describe sections].\u201d<br><br><strong>Pro tip:</strong> The more structured your input (outlines, bullet points), the better the draft. Providing a rough outline with key points for each section produces significantly better output than a vague request. Include any specific terminology or phrases that must appear in the final version.<br><br><strong>Watch out for:</strong> AI drafts tend to be generic and safe. They\u2019ll lack your product\u2019s specific voice, miss internal terminology, and default to industry-standard phrasing. Plan to inject specificity during your editorial pass.'},
    {ico:'\u2705',title:'Editing & Consistency',desc:'AI as a second pair of eyes for tone, style, and consistency',back:'<strong>When to use:</strong> When reviewing long documents for consistency across sections \u2014 especially documents written by multiple authors or revised over many iterations where style drift naturally occurs.<br><br><strong>Prompt template:</strong><br>\u201cReview the following document for: (1) consistency with [style guide] \u2014 flag any deviations, (2) passive voice \u2014 convert to active where appropriate, (3) jargon to simplify for [audience], (4) claims that need verification \u2014 mark with [VERIFY]. Return the revised text with tracked changes noted.\u201d<br><br><strong>Pro tip:</strong> AI is excellent at catching terminology inconsistencies across long documents that human reviewers miss after reading the same content ten times. It can spot that you used \u201clog in\u201d on page 3 and \u201clogin\u201d on page 15.<br><br><strong>Watch out for:</strong> AI may \u201ccorrect\u201d intentional style choices. If your style guide permits something the AI flags, that\u2019s a false positive. Always review AI suggestions against your actual standards rather than accepting them blindly.'},
    {ico:'\uD83D\uDD04',title:'Content Transformation',desc:'Repurpose content across formats and audiences',back:'<strong>When to use:</strong> When you need to repurpose existing content for a different audience, format, or channel. This is one of the highest-ROI uses of AI \u2014 turning one piece of content into many without starting from scratch each time.<br><br><strong>Prompt template:</strong><br>\u201cTransform the following [source format] into a [target format] for [audience]. Maintain factual accuracy but adjust language to [reading level]. Emphasize [what matters to this audience]. Length: [target length].\u201d<br><br><strong>Pro tip:</strong> Great for turning engineering changelogs into customer release notes, internal specs into public documentation, or detailed guides into quick-reference cards. Always provide both the source content and a clear description of the target audience\u2019s technical level.<br><br><strong>Watch out for:</strong> When simplifying technical content for a non-technical audience, the AI may oversimplify to the point of inaccuracy. Verify that simplified explanations are still technically correct, even if less precise.'},
    {ico:'\uD83C\uDFF7\uFE0F',title:'Metadata & Taxonomy',desc:'Auto-generate tags, descriptions, SEO metadata',back:'<strong>When to use:</strong> When you need to generate metadata for many content items \u2014 meta descriptions, tags, categories, and summaries. Particularly valuable for batch processing a content library that\u2019s missing or has inconsistent metadata.<br><br><strong>Prompt template:</strong><br>\u201cFor this article, generate: (1) meta description (<160 chars), (2) 5 keywords, (3) category from [list of valid categories], (4) one-sentence summary, (5) related article suggestions from [list]. Article: [paste text]\u201d<br><br><strong>Pro tip:</strong> Use this for batch processing across a content set. Paste multiple articles in sequence with the same template and collect all metadata at once. Constrain categories to your existing taxonomy to prevent the AI from inventing new ones.<br><br><strong>Watch out for:</strong> AI may generate keywords that are semantically correct but don\u2019t match your SEO strategy. Cross-reference generated keywords against your target keyword list.'},
    {ico:'\uD83D\uDEE1\uFE0F',title:'Review & QA',desc:'Cross-check drafts against source documents',back:'<strong>When to use:</strong> When you need to verify that a draft accurately reflects its source material \u2014 especially useful for compliance documentation, legal reviews, or any content that must be verifiably accurate against a specification.<br><br><strong>Prompt template:</strong><br>\u201cCompare the following draft against the specification below. Identify: (1) claims in the draft that aren\u2019t supported by the spec, (2) information in the spec that\u2019s missing from the draft, (3) any contradictions between the two. Format as a numbered list with severity ratings (Critical / Important / Minor). Draft: [text] Specification: [text]\u201d<br><br><strong>Pro tip:</strong> AI excels at catching contradictions and omissions that a human reviewer might miss after reading the same documents repeatedly. Use it as a first-pass QA tool, then do your own focused review of the items it flags.<br><br><strong>Watch out for:</strong> The AI may flag stylistic differences as discrepancies. A draft that paraphrases the spec isn\u2019t necessarily inaccurate. Focus your review on the substantive flags \u2014 factual mismatches and missing information.'}
  ];

let spotRevealed = false;
let selectedPassages = [];

function initMod6(){
  spotRevealed = false;
  selectedPassages = pickRandom(ALL_SPOT_PASSAGES, 3);
  document.getElementById('spot-area').innerHTML = selectedPassages.map((p,pi)=>`
    <div class="spot-passage" data-pidx="${pi}">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">Passage ${pi+1}</div>
      ${p.sentences.map((s,si)=>`<span class="spot-sentence" data-pidx="${pi}" data-sidx="${si}" onclick="toggleSpotFlag(this)">${s.s} </span>`).join('')}
    </div>`).join('');
  document.getElementById('spot-feedback').style.display = 'none';
  document.getElementById('spot-check-btn').style.display = '';
  initScenarios();
}
function initScenarios(){
  const scenarios = pickRandom(ALL_DECISION_SCENARIOS, 3);
  document.getElementById('scenarios-area').innerHTML = scenarios.map((s,i)=>`
    <div class="scenario-card" id="sc-${i}">
      <div style="font-size:14px;color:var(--tx-primary);line-height:1.6;margin-bottom:12px"><strong>Scenario ${i+1}:</strong> ${s.ctx}</div>
      <div class="scenario-opts">${s.opts.map((o,j)=>`<button class="scenario-opt" onclick="checkScenario(${i},${j},${s.best},'${esc(s.exp)}')">${o}</button>`).join('')}</div>
      <div class="quiz-fb" id="sc-fb-${i}"></div>
    </div>`).join('');
}
function toggleSpotFlag(el){
  if(spotRevealed) return;
  el.classList.toggle('flagged');
}
function checkSpot(){
  spotRevealed = true;
  document.getElementById('spot-check-btn').style.display = 'none';
  let correct = 0, total = 0;
  selectedPassages.forEach((p,pi)=>{
    p.sentences.forEach((s,si)=>{
      const el = document.querySelector(`.spot-sentence[data-pidx="${pi}"][data-sidx="${si}"]`);
      if(s.h) total++;
      const flagged = el.classList.contains('flagged');
      if(s.h){
        el.classList.add('revealed-h');
        if(flagged) correct++;
        el.title = s.why || 'This is a hallucination';
      } else {
        el.classList.add('revealed-ok');
        el.classList.remove('flagged');
      }
    });
  });
  const fb = document.getElementById('spot-feedback');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="callout ${correct===total?'success':'warning'}">You correctly identified <strong>${correct} of ${total}</strong> hallucinated sentences. ${correct===total?'Excellent eye!':'Sentences highlighted in red contain fabricated or incorrect claims. Hover over them for explanations.'}</div>`;
}
window.checkScenario = function(si, sel, best, exp){
  const card = document.getElementById('sc-'+si);
  const opts = card.querySelectorAll('.scenario-opt');
  opts.forEach((o,j)=>{ o.style.cursor='default'; if(j===best) o.classList.add('best'); if(j===sel) o.classList.add('selected'); });
  const fb = document.getElementById('sc-fb-'+si);
  fb.className = `quiz-fb vis ${sel===best?'correct':'incorrect'}`;
  fb.innerHTML = `<strong>${sel===best?'\u2713 Correct!':'\u2717 Not quite.'}</strong> ${exp}`;
};

const GLOSSARY = [
  {term:'Artificial Intelligence (AI)',cat:'ML Fundamentals',def:'Computer systems that perform tasks typically requiring human intelligence, such as understanding language, recognizing patterns, and making decisions.',why:'The umbrella term for all the tools you use to augment your writing workflow.',rel:['Machine Learning','Deep Learning']},
  {term:'Machine Learning (ML)',cat:'ML Fundamentals',def:'A subset of AI where systems learn patterns from data instead of being explicitly programmed with rules.',why:'Understanding ML helps you grasp why AI tools improve over time and why they sometimes make unexpected mistakes.',rel:['Supervised Learning','Unsupervised Learning','Training Data']},
  {term:'Deep Learning',cat:'ML Fundamentals',def:'A type of machine learning that uses neural networks with many layers to learn complex patterns from large amounts of data.',why:'Deep learning powers the language models (like Claude and GPT) you use daily.',rel:['Neural Network','Machine Learning']},
  {term:'Supervised Learning',cat:'ML Fundamentals',def:'Training a model using labeled data \u2014 examples paired with correct answers.',why:'This is how text classifiers and auto-tagging systems are built \u2014 tools directly useful for organizing content.',rel:['Training Data','Classification']},
  {term:'Unsupervised Learning',cat:'ML Fundamentals',def:'Training a model to find patterns in data without labeled examples.',why:'Used for clustering documents by topic, discovering content gaps, and customer segmentation.',rel:['Clustering']},
  {term:'Reinforcement Learning',cat:'ML Fundamentals',def:'Training a model through trial and error, using rewards for good outcomes and penalties for bad ones.',why:'RLHF (Reinforcement Learning from Human Feedback) is how LLMs are fine-tuned to be helpful and safe.',rel:['RLHF']},
  {term:'Neural Network',cat:'ML Fundamentals',def:'A computing system inspired by the brain\'s structure, consisting of layers of interconnected nodes that process information.',why:'The building block of deep learning and every LLM you interact with.',rel:['Deep Learning','Weights']},
  {term:'Training',cat:'ML Fundamentals',def:'The process of teaching a model by showing it many examples so it can learn patterns.',why:'Understanding training helps you understand why models have knowledge cutoff dates and reflect biases.',rel:['Training Data','Inference','Fine-Tuning']},
  {term:'Inference',cat:'ML Fundamentals',def:'Using a trained model to process new inputs and generate outputs.',why:'Every time you send a prompt and get a response, that\'s inference.',rel:['Training','Latency']},
  {term:'Training Data',cat:'ML Fundamentals',def:'The dataset used to teach a model. Can include text, images, code, and other content.',why:'The quality and breadth of training data directly affects what the AI knows and what biases it might have.',rel:['Training','Bias']},
  {term:'Overfitting',cat:'ML Fundamentals',def:'When a model memorizes its training data instead of learning general patterns, performing poorly on new data.',why:'An overfitted model might handle examples it\'s seen but fail on your unique content.',rel:['Training']},
  {term:'Classification',cat:'ML Fundamentals',def:'The task of assigning a category or label to an input (e.g., "Is this email spam or not?").',why:'Directly applicable to content tagging, document categorization, and routing support tickets.',rel:['Supervised Learning']},
  {term:'Clustering',cat:'ML Fundamentals',def:'Grouping similar items together without predefined categories.',why:'Useful for discovering topic groups in a large content library.',rel:['Unsupervised Learning']},
  {term:'Weights',cat:'ML Fundamentals',def:'The numerical values inside a neural network adjusted during training. They determine how the model processes input.',why:'When people say "70 billion parameters," they mean 70 billion weights \u2014 a measure of model capacity.',rel:['Neural Network','Parameters']},
  {term:'Parameters',cat:'ML Fundamentals',def:'The total number of adjustable weights in a model. Used as a rough indicator of model size and capability.',why:'Larger parameter counts generally mean more capable models but also more compute and cost.',rel:['Weights','Model']},
  {term:'Activation Function',cat:'ML Fundamentals',def:'A mathematical function applied to each neuron\u2019s output that introduces non-linearity, enabling the network to learn complex patterns. Common examples include ReLU, sigmoid, and tanh.',why:'Without activation functions, a neural network could only learn simple linear relationships \u2014 no matter how many layers it has.',rel:['Neural Network','Weights']},
  {term:'Backpropagation',cat:'ML Fundamentals',def:'The algorithm that calculates how much each weight contributed to prediction errors, enabling the model to learn by adjusting weights in the right direction. It works by propagating the error signal backward from the output layer through all hidden layers.',why:'The mathematical engine of neural network learning. Without backpropagation, neural networks couldn\u2019t train effectively.',rel:['Gradient Descent','Loss Function','Weights']},
  {term:'Batch Size',cat:'ML Fundamentals',def:'The number of training examples processed together before updating model weights. Common sizes range from 32 to thousands depending on the model and available compute.',why:'Batch size affects training speed and quality \u2014 larger batches train faster but may miss subtle patterns that smaller batches catch.',rel:['Training','Epoch']},
  {term:'Data Augmentation',cat:'ML Fundamentals',def:'Creating modified copies of training data to increase dataset size and diversity. For images: rotating, flipping, cropping. For text: paraphrasing, synonym substitution, back-translation.',why:'Helps models generalize better, especially when training data is limited \u2014 a common situation for specialized content domains.',rel:['Training Data','Overfitting']},
  {term:'Epoch',cat:'ML Fundamentals',def:'One complete pass through the entire training dataset. Models typically train for many epochs, seeing each example multiple times.',why:'Too few epochs = the model hasn\u2019t learned enough (underfitting). Too many = the model memorizes training data (overfitting). Finding the right number is a key training decision.',rel:['Training','Batch Size','Overfitting']},
  {term:'Feature Engineering',cat:'ML Fundamentals',def:'The process of selecting, transforming, or creating input features to improve model performance. In traditional ML, this was the most time-consuming and impactful part of the workflow.',why:'Deep learning automates much of feature engineering, but understanding the concept helps you appreciate why data quality matters so much.',rel:['Machine Learning','Training Data']},
  {term:'Gradient Descent',cat:'ML Fundamentals',def:'An optimization algorithm that iteratively adjusts model weights in the direction that reduces error. Like walking downhill in a landscape of possible weight values to find the lowest point (minimum error).',why:'This is literally how models "learn" \u2014 they follow gradients toward better predictions. Every trained model you use was optimized by gradient descent.',rel:['Backpropagation','Learning Rate','Loss Function']},
  {term:'Learning Rate',cat:'ML Fundamentals',def:'A hyperparameter controlling how much to adjust weights at each training step. Too high = training is unstable and overshoots. Too low = training is extremely slow or gets stuck.',why:'One of the most critical settings in model training \u2014 it determines whether training converges successfully at all.',rel:['Gradient Descent','Training','Weights']},
  {term:'Loss Function',cat:'ML Fundamentals',def:'A mathematical formula measuring how wrong the model\u2019s predictions are compared to the actual correct answers. Training aims to minimize this value through gradient descent.',why:'The loss function is the model\u2019s report card \u2014 lower loss means better predictions. When people say a model is "training well," they mean the loss is decreasing.',rel:['Backpropagation','Gradient Descent','Training']},
  {term:'Transfer Learning',cat:'ML Fundamentals',def:'Taking a model trained on one task (like general language understanding) and adapting it for a different but related task (like classifying support tickets), leveraging previously learned patterns.',why:'This is why fine-tuning works \u2014 the model transfers its general knowledge to your specific domain rather than learning everything from scratch.',rel:['Fine-Tuning','Training']},
  {term:'Generative AI (GenAI)',cat:'GenAI',def:'AI systems that can create new content \u2014 text, images, audio, video, code \u2014 rather than just classifying or analyzing.',why:'The category of AI you interact with most directly. Every AI writing tool is GenAI.',rel:['LLM','Diffusion Model']},
  {term:'Large Language Model (LLM)',cat:'GenAI',def:'A generative AI model trained on massive text datasets to understand and generate human language. Examples: Claude, GPT, Gemini.',why:'The specific technology powering the AI writing and editing tools you use daily.',rel:['Generative AI','Transformer','Token']},
  {term:'Transformer',cat:'GenAI',def:'The neural network architecture introduced in 2017 that powers virtually all modern LLMs. Key innovation: the attention mechanism.',why:'Understanding transformers helps you understand LLM strengths and limitations.',rel:['Attention Mechanism','LLM']},
  {term:'Attention Mechanism',cat:'GenAI',def:'The core technique in Transformers that allows the model to weigh the importance of every word relative to every other word.',why:'This is why LLMs can understand context across long texts.',rel:['Transformer','Context Window']},
  {term:'Token',cat:'GenAI',def:'A sub-word unit that LLMs use to process text. Common words may be one token; longer words may be split into multiple tokens.',why:'Tokens determine cost, context limits, and how much text AI can process. 1 page \u2248 500\u2013800 tokens.',rel:['Tokenizer','Context Window']},
  {term:'Tokenizer',cat:'GenAI',def:'The component that converts text into tokens (for input) and tokens back into text (for output).',why:'Different models use different tokenizers, which is why token counts vary across models.',rel:['Token']},
  {term:'Context Window',cat:'GenAI',def:'The maximum number of tokens a model can process in a single interaction (input + output combined).',why:'This determines the longest document you can process in one prompt.',rel:['Token','Truncation']},
  {term:'Temperature',cat:'GenAI',def:'A parameter controlling output randomness. Low (0.0) = deterministic and predictable. High (1.0) = creative and varied.',why:'For technical docs, use lower temperature. For brainstorming, try higher values.',rel:['Top-p','Sampling']},
  {term:'Top-p (Nucleus Sampling)',cat:'GenAI',def:'A parameter that controls diversity by limiting the pool of tokens considered at each step.',why:'Like temperature, it affects output variability \u2014 another dial in advanced AI settings.',rel:['Temperature','Sampling']},
  {term:'System Prompt',cat:'GenAI',def:'Hidden instructions provided to the AI before your conversation that define its behavior, role, and constraints.',why:'Understanding system prompts helps you work with AI tools more effectively.',rel:['Prompt','Role Prompting']},
  {term:'Multi-modal',cat:'GenAI',def:'AI models that can process and generate multiple content types \u2014 text, images, audio, video.',why:'Multi-modal models can analyze images, generate diagrams, and process mixed-media content.',rel:['LLM','Generative AI']},
  {term:'Embedding',cat:'GenAI',def:'A numerical representation of text as a vector in high-dimensional space. Similar meanings have similar vectors.',why:'Embeddings power semantic search, document matching, and RAG systems.',rel:['Vector','RAG','Semantic Search']},
  {term:'Vector',cat:'GenAI',def:'A list of numbers that represents content in mathematical space. Used for similarity comparisons.',why:'When AI finds "related articles" or performs semantic search, it\'s comparing vectors.',rel:['Embedding','Vector Database']},
  {term:'Hallucination',cat:'GenAI',def:'When AI generates confident, plausible content that is factually incorrect, fabricated, or unsupported.',why:'The #1 risk for content editors. Always verify claims, citations, and specific facts.',rel:['Grounding']},
  {term:'Grounding',cat:'GenAI',def:'Techniques to connect AI output to verifiable source material, reducing hallucination.',why:'RAG is a grounding technique \u2014 it gives the AI actual documents to reference.',rel:['RAG','Hallucination']},
  {term:'Fine-Tuning',cat:'GenAI',def:'Further training a pre-trained model on a specific dataset to specialize its behavior.',why:'Some organizations fine-tune on their own docs. More expensive than prompt engineering.',rel:['Training','RLHF']},
  {term:'RLHF',cat:'GenAI',def:'Reinforcement Learning from Human Feedback \u2014 a technique where human ratings improve model behavior.',why:'RLHF is why modern AI tools are helpful, conversational, and generally safe.',rel:['Reinforcement Learning','Fine-Tuning','Alignment']},
  {term:'Knowledge Cutoff',cat:'GenAI',def:'The date beyond which a model has no training data. It doesn\'t know about events after this date.',why:'Verify time-sensitive information \u2014 the AI\'s knowledge may be outdated.',rel:['Training Data','Grounding']},
  {term:'Diffusion Model',cat:'GenAI',def:'A GenAI model for image generation (e.g., DALL-E, Midjourney). Works by learning to remove noise from random data.',why:'If you need AI-generated images, these are the models behind the tools.',rel:['Generative AI','Multi-modal']},

  {term:'Zero-Shot',cat:'Prompting',def:'Asking the AI to perform a task without providing any examples.',why:'Quick for simple tasks, but output quality may be less consistent without examples.',rel:['Few-Shot','Prompt']},

  {term:'Chain-of-Thought (CoT)',cat:'Prompting',def:'Prompting the AI to "think step by step" or show its reasoning before giving a final answer.',why:'Produces more accurate results for complex tasks. You can spot where reasoning went wrong.',rel:['Prompt Engineering']},

  {term:'Hybrid Search',cat:'Protocols',def:'Combining traditional keyword search with semantic vector search to get the best of both approaches. Keywords catch exact matches (product names, error codes); semantic search catches meaning matches.',why:'Hybrid search significantly improves RAG retrieval quality by catching results that either method alone would miss.',rel:['Semantic Search','RAG','Vector Database']},
  {term:'Reranking',cat:'Protocols',def:'Using a secondary, more precise model to re-score and reorder search results after initial retrieval, improving the relevance of the final set of documents sent to the LLM.',why:'Reranking is a key technique for improving RAG quality \u2014 the initial retrieval casts a wide net, and reranking narrows it to the most relevant results.',rel:['RAG','Hybrid Search','Vector Database']},
  {term:'Vector Similarity',cat:'Protocols',def:'A mathematical measure of how close two vectors are in embedding space, indicating how semantically similar two pieces of text are.',why:'The core mechanism behind semantic search and RAG retrieval \u2014 "find documents with similar meaning" is implemented as "find vectors that are close together."',rel:['Cosine Similarity','Embedding','Vector']},
  {term:'Agent (AI Agent)',cat:'Agents',def:'An AI system that autonomously plans, makes decisions, uses tools, and takes multi-step actions.',why:'Agents can complete entire workflows \u2014 monitoring repos, drafting updates, flagging reviews.',rel:['Tool Use','MCP','Planning']},

  {term:'Context Injection',cat:'Agents',def:'Inserting relevant information into the AI\'s context at request time.',why:'Every time you paste a document into AI chat, you\'re doing context injection.',rel:['RAG','Context Window','Prompt']},
  {term:'Agent Loop',cat:'Agents',def:'The iterative cycle agents follow: observe the current state, plan the next action, act by calling a tool or generating output, evaluate the result, and repeat until the goal is met.',why:'Understanding the agent loop helps you predict agent behavior and design better task descriptions.',rel:['Agent','Planning (in Agents)']},
  {term:'Human-in-the-Loop (Agents)',cat:'Agents',def:'A design pattern where AI agents request human approval before taking irreversible actions. The agent proposes, the human approves or corrects, then the agent continues.',why:'Essential for content workflows where accuracy matters more than speed. A well-designed agent knows when to stop and ask rather than act autonomously.',rel:['Agent','Responsible AI']},
  {term:'Multi-Agent Systems',cat:'Agents',def:'Architectures where multiple specialized agents collaborate on a task \u2014 one researches, one drafts, one reviews, one fact-checks. Each agent has a focused role and they coordinate through shared context.',why:'The future of complex AI workflows: specialized agents working together like a well-organized team, each contributing their strength.',rel:['Agent','Tool Orchestration']},

  {term:'Distillation',cat:'GenAI',def:'Training a smaller "student" model to mimic a larger "teacher" model, creating a compact model that retains much of the larger model\u2019s capability at a fraction of the size and cost.',why:'This is how smaller, faster, cheaper models are created from frontier models. When a vendor offers a "mini" or "lite" version, distillation is often how it was made.',rel:['Transfer Learning','Training','Parameters']},
  {term:'Instruction Tuning',cat:'GenAI',def:'Fine-tuning a model specifically on instruction-response pairs to improve its ability to follow directions. This is what turns a base model that predicts text into an assistant that follows your instructions.',why:'The difference between a model that can write text and one that actually follows your specific instructions. Every chat-based AI you use has been instruction-tuned.',rel:['Fine-Tuning','Supervised Learning','RLHF']},

const CAT_MAP = {'ML Fundamentals':'badge-ml','GenAI':'badge-genai','Prompting':'badge-prompt','Infrastructure':'badge-infra','Ethics':'badge-ethics','Workflow':'badge-workflow','Protocols':'badge-proto','Agents':'badge-proto'};
const ALL_CATS = ['All','ML Fundamentals','GenAI','Prompting','Infrastructure','Protocols','Agents','Ethics','Workflow'];
let glossFilter = 'All';
let glossAlpha = '';
let glossSearch = '';

function initMod8(){
  document.getElementById('gloss-filters').innerHTML = ALL_CATS.map(c=>`<button class="gloss-filter ${c==='All'?'active':''}" onclick="setGlossFilter('${c}',this)">${c}</button>`).join('');
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  document.getElementById('alpha-bar').innerHTML = letters.map(l=>`<button class="alpha-btn" onclick="setGlossAlpha('${l}',this)">${l}</button>`).join('');
  renderGlossary();
}
window.setGlossFilter = function(c,btn){
  glossFilter = c; glossAlpha = '';
  document.querySelectorAll('.gloss-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
  renderGlossary();
};
window.setGlossAlpha = function(l,btn){
  glossAlpha = (glossAlpha===l) ? '' : l;
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
  if(glossAlpha) btn.classList.add('active');
  renderGlossary();
};
window.filterGlossary = function(){
  glossSearch = document.getElementById('gloss-search').value.toLowerCase();
  renderGlossary();
};

function renderGlossary(){
  let items = GLOSSARY;
  if(glossFilter !== 'All') items = items.filter(g=>g.cat === glossFilter);
  if(glossAlpha) items = items.filter(g=>g.term[0].toUpperCase() === glossAlpha);
  if(glossSearch) items = items.filter(g=>g.term.toLowerCase().includes(glossSearch) || g.def.toLowerCase().includes(glossSearch));
  document.getElementById('gloss-grid').innerHTML = items.length ? items.map(g=>`
    <div class="gloss-card" id="g-${g.term.replace(/[^a-zA-Z]/g,'')}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="gloss-term">${g.term}</div><span class="badge ${CAT_MAP[g.cat]||'badge-ml'}">${g.cat}</span></div>
      <div class="gloss-def">${g.def}</div>
      <div class="gloss-why">Why it matters: ${g.why}</div>
      ${g.rel.length ? `<div class="gloss-related">Related: ${g.rel.map(r=>`<a onclick="jumpToGloss('${r}')">${r}</a>`).join(', ')}</div>` : ''}
    </div>`).join('') : '<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss = function(term){
  glossSearch = ''; glossFilter = 'All'; glossAlpha = '';
  document.getElementById('gloss-search').value = '';
  document.querySelectorAll('.gloss-filter').forEach(b=>b.classList.remove('active'));
  document.querySelector('.gloss-filter').classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
  renderGlossary();
  const id = 'g-' + term.replace(/[^a-zA-Z]/g,'');
  const el = document.getElementById(id);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.boxShadow='0 0 0 3px var(--primary)'; setTimeout(()=>el.style.boxShadow='',2000); }
};

function scoreFinal(){
  let total = 15;
  let firstUnanswered = null;
  for(let i = 0; i < total; i++){
    const qid = `final-q${i}`;
    if(!quizStates[qid]){
      const card = document.getElementById('qc-' + qid);
      const selected = card ? card.querySelector('.quiz-opt.selected') : null;
      if(!selected){
        if(!firstUnanswered) firstUnanswered = card;
      }
    }
  }
  if(firstUnanswered){
    firstUnanswered.scrollIntoView({behavior:'smooth', block:'center'});
    firstUnanswered.style.boxShadow = '0 0 0 3px var(--warning)';
    setTimeout(() => firstUnanswered.style.boxShadow = '', 2000);
    alert('Please answer all 15 questions before calculating your score. Scroll through to find any you missed.');
    return;
  }
  for(let i = 0; i < total; i++){
    const qid = `final-q${i}`;
    if(!quizStates[qid]){
      const btn = document.getElementById('btn-' + qid);
      if(btn && !btn.disabled) btn.click();
    }
  }
  setTimeout(() => {
    let correct = 0;
    for(let i = 0; i < total; i++){
      const card = document.getElementById('qc-final-q' + i);
      if(card && card.classList.contains('correct')) correct++;
    }
    const el = document.getElementById('final-score');
    let cls, msg;
    if(correct >= 12){ cls = 'excellent'; msg = "Excellent! You've built a strong AI foundation."; }
    else if(correct >= 8){ cls = 'good'; msg = 'Good progress! Review the modules where you missed questions.'; }
    else { cls = 'keep'; msg = 'Keep learning! Revisit the modules and try again.'; }
    el.innerHTML = `<div class="score-banner ${cls}"><div class="score-num">${correct} / ${total}</div><div class="score-msg">${msg}</div></div>`;
    el.scrollIntoView({behavior:'smooth'});
  }, 200);
}

let searchIndex = [];
function buildSearchIndex(){
  searchIndex = [];
  MODULES.forEach((m,i)=>{
    searchIndex.push({type:'Module',text:m.title,desc:LANDING_DESCS[i].desc.substring(0,100)+'\u2026',action:()=>goModule(i)});
  });
  GLOSSARY.forEach(g=>{
    searchIndex.push({type:'Glossary',text:g.term,desc:g.def.substring(0,100)+'\u2026',action:()=>{goModule(7);setTimeout(()=>{document.getElementById('gloss-search').value=g.term;filterGlossary();},100);}});
  });
  const resources = [
    {t:'AI for Everyone',d:'DeepLearning.AI / Coursera \u2014 beginner course'},
    {t:'Generative AI for Everyone',d:'Andrew Ng\u2019s GenAI course'},
    {t:'Google AI Essentials',d:'Hands-on AI tools course'},
    {t:'3Blue1Brown Neural Networks',d:'Visual neural network explanations'},
    {t:'Prompt Engineering Overview',d:'Anthropic official guide'},
    {t:'What is MCP?',d:'Model Context Protocol introduction'}
  ];
  resources.forEach(r=>searchIndex.push({type:'Resource',text:r.t,desc:r.d,action:()=>goModule(6)}));
  searchIndex.push({type:'Assessment',text:'Final Assessment',desc:'15 comprehensive questions',action:()=>showFinalAssessment()});
}

function performSearch(query){
  if(!query.trim()) return [];
  const q = query.toLowerCase();
  return searchIndex.filter(item=>item.text.toLowerCase().includes(q)||item.desc.toLowerCase().includes(q)).slice(0,12);
}

function renderSearchResults(query){
  const results = performSearch(query);
  const container = document.getElementById('search-results');
  if(!query.trim()){ container.innerHTML = '<div class="search-empty">Start typing to search\u2026</div>'; return; }
  if(!results.length){ container.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
  container.innerHTML = results.map(r=>{
    const hl = r.text.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
    return `<div class="search-item" data-idx="${searchIndex.indexOf(r)}"><div class="search-cat">${r.type}</div><div class="search-txt">${hl}</div></div>`;
  }).join('');
  container.querySelectorAll('.search-item').forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.dataset.idx);
      searchIndex[idx].action();
      closeSearch();
    };
  });
}

function openSearch(){
  document.getElementById('search-backdrop').classList.add('open');
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
  renderSearchResults('');
}
function closeSearch(){
  document.getElementById('search-backdrop').classList.remove('open');
  document.getElementById('search-overlay').classList.remove('open');
}

document.getElementById('search-btn').onclick = openSearch;
document.getElementById('search-backdrop').onclick = closeSearch;

/* ══ KEYBOARD NAVIGATION (focus-based) ══ */
let taxCur = 0;
function taxStep(dir){
  const rings = document.querySelectorAll('.tax-ring');
  if(!rings.length) return;
  taxCur = Math.max(0, Math.min(taxCur + dir, rings.length));
  rings.forEach((r,i) => {
    r.style.opacity = i < taxCur ? '1' : '0';
    r.style.transition = 'opacity 0.5s ease';
  });
}

document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if((e.ctrlKey||e.metaKey) && e.key === 'k'){ e.preventDefault(); openSearch(); return; }
  if(e.key === 'Escape'){ closeSearch(); return; }

  const focused = document.activeElement;
  if(!focused) return;
  const sim = focused.closest('.sim-focusable') || (focused.classList.contains('sim-focusable') ? focused : null);
  if(!sim) return;

  const simType = sim.dataset.sim;
  if(!simType) return;

  if(e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
    e.preventDefault();
    const dir = e.key === 'ArrowRight' ? 1 : -1;

    if(simType === 'tx'){
      txStep(txCur + dir);
    } else if(simType.startsWith('flow-')){
      const flowId = simType.replace('flow-','');
      flowStep(flowId, flowCur[flowId] + dir);
    } else if(simType === 'tax'){
      taxStep(dir);
    }
  }
});

  }).join('');
}

    </div>`;
  }).join('') + `<div class="mob-drawer-item" onclick="showFinalAssessment();closeMobDrawer()">
    <div class="mob-drawer-ico" style="background:var(--gradient-primary)"><svg viewBox="0 0 24 24" fill="#fff" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
    <div><div class="mob-drawer-name">Final Assessment</div></div>
  </div>` + `<div class="mob-drawer-footer">Brought to you by Babak</div>`;
}

function openMobDrawer(){
  renderMobDrawer();
  document.getElementById('mob-drawer-backdrop').classList.add('open');
  document.getElementById('mob-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMobDrawer(){
  document.getElementById('mob-drawer-backdrop').classList.remove('open');
  document.getElementById('mob-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('mob-menu-btn').addEventListener('click', openMobDrawer);
document.getElementById('mob-drawer-backdrop').addEventListener('click', closeMobDrawer);
document.getElementById('mob-drawer-close').addEventListener('click', closeMobDrawer);
</script>
</body>
</html>
