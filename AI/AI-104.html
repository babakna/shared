var isInject=p.dataset.inject==='true';
var s=p.querySelector('.spot-sentence');
s.classList.remove('flagged');
s.className='spot-sentence '+(isInject?'revealed-h':'revealed-ok');
});
document.getElementById('inject-result').innerHTML='<div class="callout success">Items 2 and 3 contain injection attempts. Item 2 tries to extract the system prompt. Item 3 hides an injection inside a "product review."</div>';
};

/* ══ GLOSSARY ══ */
var GLOSSARY=[
{term:'API (Application Programming Interface)',cat:'Implementation',def:'A set of protocols and tools that allows software components to communicate. In AI, APIs let your code send prompts and receive model responses over HTTP.',why:'Every AI integration starts with an API call. Understanding API mechanics is fundamental to building with AI.',rel:['SDK (Software Development Kit)','REST (Representational State Transfer)']},
{term:'SDK (Software Development Kit)',cat:'Implementation',def:'A library that wraps API calls in convenient, language-specific functions. E.g., the Anthropic Python SDK.',why:'SDKs handle auth, retry logic, and streaming, letting you focus on your application logic.',rel:['API (Application Programming Interface)']},
{term:'REST (Representational State Transfer)',cat:'Implementation',def:'An architectural style for web APIs using HTTP methods (GET, POST, PUT, DELETE) to operate on resources.',why:'Most AI APIs follow REST conventions. Understanding REST helps you debug API issues.',rel:['API (Application Programming Interface)']},
{term:'Streaming',cat:'Implementation',def:'Delivering the AI response token by token as generated, using Server-Sent Events (SSE), rather than waiting for the complete response.',why:'Streaming dramatically improves perceived latency. Users see the first token in milliseconds instead of waiting seconds.',rel:['SSE (Server-Sent Events)','Latency','Token']},
{term:'SSE (Server-Sent Events)',cat:'Implementation',def:'A protocol for servers to push data to clients over a single HTTP connection. Used by AI APIs for streaming responses.',why:'Understanding SSE helps you implement streaming correctly and handle connection drops.',rel:['Streaming']},
{term:'Webhook',cat:'Implementation',def:'A callback URL that receives notifications when events occur. Used in async AI workflows.',why:'Webhooks enable event-driven AI pipelines that respond to triggers automatically.',rel:['API (Application Programming Interface)','Async (Asynchronous)']},
{term:'Rate Limiting',cat:'Implementation',def:'API-enforced limits on requests per minute/hour to prevent abuse and ensure fair usage.',why:'Hitting rate limits is a common production issue. Exponential backoff and request queuing solve it.',rel:['API (Application Programming Interface)']},
{term:'Exponential Backoff',cat:'Implementation',def:'A retry strategy that doubles the wait time between retries (1s, 2s, 4s, 8s...) to reduce load on recovering services.',why:'Essential for production reliability. Without it, retries during outages create "retry storms."',rel:['Rate Limiting','Retry Logic']},
{term:'Context Window',cat:'GenAI',def:'The maximum number of tokens a model can process in a single request, including both input and output.',why:'Exceeding the context window causes errors or truncation. Managing it is a core engineering concern.',rel:['Token','Truncation']},
{term:'Token',cat:'GenAI',def:'The basic unit of text processing for LLMs. Roughly 0.75 words or 4 characters in English.',why:'Tokens determine API costs and context window usage. Counting tokens accurately is essential for production systems.',rel:['Tokenizer','Context Window']},
{term:'Tokenizer',cat:'GenAI',def:'The component that converts text into tokens. Different models use different tokenizers (BPE, SentencePiece).',why:'The same text produces different token counts across models, affecting cost estimates.',rel:['Token','BPE (Byte Pair Encoding)']},
{term:'System Prompt',cat:'Prompting',def:'Instructions provided to the model before user input, defining behavior, role, constraints, and output format.',why:'A well-engineered system prompt is the single highest-leverage optimization in AI applications.',rel:['Prompt Engineering','Guardrails']},
{term:'Prompt Engineering',cat:'Prompting',def:'The practice of designing inputs to AI models to elicit desired outputs, including techniques like few-shot, CoT, and structured formatting.',why:'The quality of your prompt directly determines the quality of AI output.',rel:['System Prompt','Few-Shot Prompting','Chain-of-Thought (CoT)']},
{term:'Few-Shot Prompting',cat:'Prompting',def:'Including 2-5 example input/output pairs in the prompt so the model pattern-matches format and style.',why:'Few-shot prompting is the most reliable way to get consistent output formatting.',rel:['Prompt Engineering','Zero-Shot']},
{term:'Zero-Shot',cat:'Prompting',def:'Asking the model to perform a task with no examples, relying on its training knowledge.',why:'Simpler than few-shot but less consistent. Good for tasks the model has seen extensively in training.',rel:['Few-Shot Prompting']},
{term:'Chain-of-Thought (CoT)',cat:'Prompting',def:'A prompting technique that instructs the model to show its reasoning step by step before reaching a conclusion.',why:'CoT improves accuracy by 10-25% on reasoning tasks by forcing intermediate computation.',rel:['Prompt Engineering','ReAct']},
{term:'Prompt Injection',cat:'Security',def:'An attack where malicious instructions are inserted into model input to override system prompt behavior.',why:'The #1 security concern in AI applications. Every production system needs injection defenses.',rel:['System Prompt','Guardrails']},
{term:'Guardrails',cat:'Security',def:'Constraints placed on AI behavior through system prompts, input/output filters, and model training.',why:'Guardrails prevent the model from producing harmful, incorrect, or out-of-scope responses.',rel:['System Prompt','Safety Filter']},
{term:'Embedding',cat:'RAG & Infrastructure',def:'A dense numerical vector representation of text (or images/audio) that captures semantic meaning in mathematical space.',why:'Embeddings enable semantic search, clustering, and similarity comparison — the foundation of RAG.',rel:['Vector Database','Cosine Similarity']},
{term:'Vector Database',cat:'RAG & Infrastructure',def:'A database optimized for storing and searching high-dimensional vectors. Examples: Pinecone, Chroma, pgvector, Weaviate.',why:'Vector databases power the retrieval step in RAG, finding semantically similar content in milliseconds.',rel:['Embedding','HNSW','RAG (Retrieval-Augmented Generation)']},
{term:'RAG (Retrieval-Augmented Generation)',cat:'RAG & Infrastructure',def:'An architecture that retrieves relevant documents from a knowledge base and includes them in the prompt context to ground LLM responses.',why:'RAG is the primary pattern for connecting AI to your organization\'s specific data and reducing hallucination.',rel:['Vector Database','Embedding','Chunking']},
{term:'Chunking',cat:'RAG & Infrastructure',def:'Breaking documents into smaller pieces for embedding and retrieval. Chunk size significantly affects retrieval quality.',why:'Too large: irrelevant content dilutes results. Too small: context is lost. Finding the right size is critical.',rel:['RAG (Retrieval-Augmented Generation)','Embedding','Overlap (Chunking)']},
{term:'Reranker',cat:'RAG & Infrastructure',def:'A model that re-scores retrieved documents for relevance using cross-encoder architecture, applied after initial vector search.',why:'Rerankers significantly improve retrieval quality by jointly processing query+document pairs.',rel:['RAG (Retrieval-Augmented Generation)','Cross-Encoder']},
{term:'HNSW',cat:'RAG & Infrastructure',def:'Hierarchical Navigable Small World — an approximate nearest neighbor algorithm used by vector databases for fast search.',why:'HNSW enables sub-millisecond search over millions of vectors with minimal accuracy loss.',rel:['Vector Database']},
{term:'Cosine Similarity',cat:'RAG & Infrastructure',def:'A metric measuring the angle between two vectors. Values range from -1 (opposite) to 1 (identical direction).',why:'The standard similarity metric for comparing embeddings. Higher scores mean more semantically similar.',rel:['Embedding','Vector Database']},
{term:'MCP (Model Context Protocol)',cat:'Protocols',def:'An open standard by Anthropic for connecting AI clients to external tools and data sources through a standardized JSON-RPC layer.',why:'MCP solves the N\u00D7M integration problem: N clients + M servers instead of N\u00D7M custom integrations.',rel:['JSON-RPC','Tool Use','Function Calling']},
{term:'JSON-RPC',cat:'Protocols',def:'A remote procedure call protocol encoded in JSON. The transport layer for MCP communication.',why:'Understanding JSON-RPC helps you debug MCP interactions and build custom servers.',rel:['MCP (Model Context Protocol)','API (Application Programming Interface)']},
{term:'Function Calling',cat:'Protocols',def:'A model capability where the LLM outputs structured JSON describing which function to call and with what parameters.',why:'Function calling is how AI models take actions beyond text generation — searching, creating, updating.',rel:['Tool Use','MCP (Model Context Protocol)']},
{term:'Tool Use',cat:'Protocols',def:'The broader concept of AI models invoking external tools (APIs, databases, file systems) to accomplish tasks.',why:'Tool use transforms AI from a text generator into an agent that can interact with the world.',rel:['Function Calling','MCP (Model Context Protocol)','Agent (AI Agent)']},
{term:'Mixture of Experts (MoE)',cat:'GenAI',def:'An architecture with multiple specialized sub-networks (experts) and a router that activates only 2 per token.',why:'MoE enables very large models to run efficiently — 1T params but only 100B active per request.',rel:['Router (MoE)','Parameters','Transformer']},
{term:'Knowledge Distillation',cat:'GenAI',def:'Training a smaller student model to mimic a larger teacher model using soft probability distributions.',why:'This is how "mini" and "lite" models are created — retaining 90%+ of teacher quality at a fraction of the cost.',rel:['Soft Labels']},
{term:'Quantization',cat:'GenAI',def:'Reducing weight precision (FP32 \u2192 FP16 \u2192 INT8 \u2192 INT4) to shrink model size and increase inference speed.',why:'Quantization enables running large models on consumer hardware. A 70B model at INT4 fits in 35GB.',rel:['GPTQ','GGUF']},
{term:'Transformer',cat:'ML Fundamentals',def:'The neural network architecture behind modern LLMs, introduced in 2017. Uses self-attention to process all tokens simultaneously.',why:'Every modern LLM (GPT, Claude, Gemini, Llama) is based on the Transformer architecture.',rel:['Attention Mechanism']},
{term:'Attention Mechanism',cat:'ML Fundamentals',def:'A mechanism that allows each token to directly attend to every other token simultaneously, capturing long-range dependencies.',why:'Attention is what makes Transformers so powerful — it enables understanding relationships across an entire document.',rel:['Transformer']},
{term:'Parameters',cat:'ML Fundamentals',def:'The learned numerical values (weights and biases) in a neural network. Model size is measured in parameters.',why:'Parameter count correlates roughly with capability. But architecture and training quality matter more.',rel:['Weights']},
{term:'Inference',cat:'ML Fundamentals',def:'Running a trained model to generate predictions or responses. The compute-intensive step in API calls.',why:'Inference cost drives API pricing. Optimizing inference (batching, caching, quantization) reduces costs.',rel:['Latency','Token','GPU']},
{term:'Fine-Tuning',cat:'ML Fundamentals',def:'Further training a pre-trained model on task-specific data to specialize its behavior.',why:'Fine-tuning customizes a general model for specific domains or tasks, often outperforming prompting alone.',rel:['Pre-Training','LoRA (Low-Rank Adaptation)']},
{term:'RLHF',cat:'ML Fundamentals',def:'Reinforcement Learning from Human Feedback — optimizing models using human preference rankings.',why:'RLHF is what makes AI assistants helpful, harmless, and honest rather than just text predictors.',rel:['Alignment','Reward Model','DPO (Direct Preference Optimization)']},
{term:'Alignment',cat:'Ethics',def:'The process of ensuring AI systems behave in accordance with human values and intentions.',why:'Alignment determines whether AI is helpful or harmful. It is the central challenge of AI safety.',rel:['RLHF','Constitutional AI']},
{term:'Constitutional AI',cat:'Ethics',def:'Anthropic\'s technique where the model self-critiques against principles (helpful, harmless, honest).',why:'This is why Claude tends to be more nuanced and cautious — it evaluates its own output before you see it.',rel:['Alignment','RLHF']},
{term:'Red-Teaming',cat:'Security',def:'Deliberately probing AI systems for failures, biases, safety issues, and vulnerabilities.',why:'Red-teaming finds problems before users do. Essential for any production AI deployment.',rel:[]},
{term:'PII (Personally Identifiable Information)',cat:'Security',def:'Data that can identify an individual: names, emails, SSNs, phone numbers, addresses.',why:'Accidentally sending PII to AI APIs or leaking it in responses is a major compliance risk.',rel:['Data Privacy','GDPR']},
{term:'Canary Token',cat:'Security',def:'A unique hidden string in the system prompt that triggers alerts if it appears in model output.',why:'Canary tokens detect system prompt leakage — an early warning that defenses have been bypassed.',rel:['Prompt Injection']},
{term:'Hallucination',cat:'GenAI',def:'When an AI model generates plausible-sounding but factually incorrect information.',why:'Hallucination is the primary reliability concern. RAG, citations, and evaluation pipelines mitigate it.',rel:['RAG (Retrieval-Augmented Generation)','Grounding']},
{term:'Grounding',cat:'GenAI',def:'Connecting AI responses to factual sources (documents, databases) to reduce hallucination.',why:'Grounded responses include citations and evidence, making them verifiable and trustworthy.',rel:['RAG (Retrieval-Augmented Generation)','Hallucination']},
{term:'Latency',cat:'Implementation',def:'The time between sending a request and receiving the first (or complete) response.',why:'Latency directly impacts user experience. Streaming, caching, and model routing reduce it.',rel:['Streaming','TTFT (Time to First Token)']},
{term:'TTFT (Time to First Token)',cat:'Implementation',def:'The time from request submission to receiving the first token of the response.',why:'TTFT matters more than total latency for perceived responsiveness. Streaming optimizes TTFT.',rel:['Latency','Streaming']},
{term:'Batch Processing',cat:'Implementation',def:'Sending multiple requests together for processing, typically at reduced cost with higher latency.',why:'Batch APIs offer ~50% cost savings. Ideal for non-real-time tasks like nightly evaluations.',rel:['API (Application Programming Interface)','Cost Optimization']},
{term:'Model Routing',cat:'Evaluation',def:'Classifying request complexity and routing to appropriate models: cheap for simple, expensive for complex.',why:'Model routing can reduce costs 50-70% while maintaining quality on complex tasks.',rel:['Cost Optimization','Classifier']},
{term:'LLM-as-Judge',cat:'Evaluation',def:'Using one LLM to evaluate the quality of another LLM\'s output against defined criteria.',why:'Scalable quality evaluation without human reviewers. Correlation with human judgment: ~80-90%.',rel:['Golden Dataset']},
{term:'Golden Dataset',cat:'Evaluation',def:'A curated set of input/output pairs representing expected quality. Used for regression testing.',why:'Golden datasets catch quality degradation when prompts or models change.',rel:['Regression Testing']},
{term:'RAGAS',cat:'Evaluation',def:'A framework for evaluating RAG pipelines across metrics like faithfulness, relevancy, and context recall.',why:'RAGAS provides standardized RAG evaluation, identifying whether problems are in retrieval or generation.',rel:['RAG (Retrieval-Augmented Generation)']},
{term:'ReAct',cat:'Agents',def:'A prompting pattern that interleaves Reasoning (Thought), Acting (tool calls), and Observing results.',why:'ReAct enables AI to solve problems requiring external data or actions, not just internal knowledge.',rel:['Agent (AI Agent)','Chain-of-Thought (CoT)','Tool Use']},
{term:'Agent (AI Agent)',cat:'Agents',def:'An AI system that can plan multi-step tasks, use tools, and make decisions autonomously.',why:'Agents represent the next evolution beyond chatbots — from answering questions to completing tasks.',rel:['ReAct','Tool Use','Planning (in Agents)']},
{term:'Reflexion',cat:'Agents',def:'A technique where the AI evaluates its own output, identifies weaknesses, and generates an improved version.',why:'Self-correction improves quality by 10-20% on tasks where the model can identify its own errors.',rel:['Agent (AI Agent)']},
{term:'Prompt Chaining',cat:'Workflow',def:'Breaking a complex task into a sequence of focused prompts, where each step\'s output feeds the next step.',why:'Chains produce dramatically better results for complex tasks than single monolithic prompts.',rel:['Agentic Workflow','Pipeline']},
{term:'Self-Consistency',cat:'Prompting',def:'Running the same CoT prompt multiple times and selecting the most common answer via majority vote.',why:'Reduces variance and improves reliability on ambiguous problems at the cost of 3-5x API calls.',rel:['Chain-of-Thought (CoT)','Ensemble']},
{term:'Tree-of-Thought',cat:'Prompting',def:'Exploring multiple reasoning branches in parallel, evaluating each, and pruning dead ends.',why:'Solves complex planning problems where a single reasoning path might lead to a dead end.',rel:['Chain-of-Thought (CoT)']},
{term:'Temperature',cat:'GenAI',def:'A parameter controlling output randomness. 0 = deterministic, 1 = creative, >1 = chaotic.',why:'Temperature choice affects reproducibility. Use 0 for code/facts, 0.7 for creative tasks.',rel:['Sampling','Top-p (Nucleus Sampling)']},
{term:'Top-p (Nucleus Sampling)',cat:'GenAI',def:'A sampling method that considers tokens comprising the top p% of probability mass.',why:'Top-p provides more natural diversity than temperature alone. Common default: 0.9.',rel:['Temperature','Sampling']},
{term:'LoRA (Low-Rank Adaptation)',cat:'ML Fundamentals',def:'An efficient fine-tuning method that trains small adapter matrices instead of modifying all model weights.',why:'LoRA enables fine-tuning large models on consumer hardware. A 70B model can be fine-tuned with 8GB VRAM.',rel:['Fine-Tuning','Parameters']},
{term:'GPTQ',cat:'Implementation',def:'A post-training quantization method that compresses models with minimal quality loss.',why:'GPTQ is the standard quantization format for running large models locally.',rel:['Quantization','GGUF']},
{term:'GGUF',cat:'Implementation',def:'A file format for quantized models, used by llama.cpp and Ollama for efficient local inference.',why:'GGUF models run on CPUs without GPU requirements, democratizing access to large models.',rel:['Quantization','Ollama']},
{term:'Ollama',cat:'Implementation',def:'An open-source tool for running quantized LLMs locally with a simple CLI interface.',why:'Ollama makes local model deployment trivially easy: one command to download and run any supported model.',rel:['GGUF','Quantization']},
{term:'BPE (Byte Pair Encoding)',cat:'GenAI',def:'A tokenization algorithm that iteratively merges the most frequent character pairs into tokens.',why:'BPE is used by most modern LLMs. Understanding it explains why token counts vary by language.',rel:['Tokenizer','Token']},
{term:'Cross-Encoder',cat:'RAG & Infrastructure',def:'A model that processes a query-document pair jointly, producing a relevance score. Used for reranking.',why:'Cross-encoders are more accurate than bi-encoders for relevance scoring but slower.',rel:['Reranker','Bi-Encoder']},
{term:'Bi-Encoder',cat:'RAG & Infrastructure',def:'A model that independently embeds queries and documents, enabling fast similarity search.',why:'Bi-encoders enable real-time search over millions of documents. Used for initial retrieval in RAG.',rel:['Embedding','Vector Database']},
{term:'Agentic RAG',cat:'RAG & Infrastructure',def:'A RAG architecture with self-assessment: the LLM evaluates retrieval quality and can retry with refined queries.',why:'Agentic RAG improves accuracy from ~70% to ~90% by iterating when initial retrieval is insufficient.',rel:['RAG (Retrieval-Augmented Generation)','Agent (AI Agent)']},
{term:'Graph RAG',cat:'RAG & Infrastructure',def:'RAG using a knowledge graph instead of or alongside vector search, leveraging entity relationships.',why:'Graph RAG excels for questions requiring multi-hop reasoning: "Who manages the team that built feature X?"',rel:['RAG (Retrieval-Augmented Generation)','Knowledge Graph']},
{term:'DPO (Direct Preference Optimization)',cat:'ML Fundamentals',def:'A simpler alternative to RLHF that directly optimizes on preference pairs without a separate reward model.',why:'DPO is gaining adoption for alignment because it is simpler and more stable than RLHF.',rel:['RLHF','Alignment']},
{term:'Speculative Decoding',cat:'GenAI',def:'An acceleration technique: a small model drafts tokens, a large model verifies them in parallel.',why:'Speculative decoding speeds up inference 2-3x without quality loss.',rel:['Inference','Latency']},
{term:'Reward Model',cat:'ML Fundamentals',def:'A model trained on human preference data to score AI outputs, used to guide RLHF training.',why:'The reward model is the bridge between human judgment and scalable optimization.',rel:['RLHF','Alignment']},
{term:'Safety Filter',cat:'Security',def:'A system that screens AI inputs and outputs for harmful, dangerous, or policy-violating content.',why:'Safety filters explain why AI tools sometimes refuse legitimate requests — false positives from pattern matching.',rel:['Guardrails','Content Moderation']},
{term:'Structured Output',cat:'Prompting',def:'Instructing the model to return data in a specific format (JSON, XML, CSV) rather than free text.',why:'Structured output enables automation: downstream systems can parse and process AI responses programmatically.',rel:['JSON Mode','Function Calling']},
{term:'JSON Mode',cat:'Implementation',def:'An API parameter that constrains the model to output valid JSON, preventing format errors.',why:'JSON mode eliminates parsing failures from malformed output — essential for production pipelines.',rel:['Structured Output','API (Application Programming Interface)']},
{term:'Soft Labels',cat:'ML Fundamentals',def:'Probability distributions over classes (e.g., [0.7, 0.2, 0.1]) vs hard labels ([1, 0, 0]). Used in distillation.',why:'Soft labels from a teacher model carry richer information than binary correct/incorrect labels.',rel:['Distillation','Temperature']},
{term:'Router (MoE)',cat:'GenAI',def:'The gating network in MoE that decides which experts process each token based on learned weights.',why:'Router quality determines MoE efficiency. Poor routing leads to expert imbalance and wasted capacity.',rel:['Mixture of Experts (MoE)']},
{term:'Overlap (Chunking)',cat:'RAG & Infrastructure',def:'The number of tokens shared between adjacent chunks to prevent information loss at boundaries.',why:'50-100 token overlap ensures sentences spanning chunk boundaries are captured in at least one chunk.',rel:['Chunking','RAG (Retrieval-Augmented Generation)']},
{term:'Regression Testing',cat:'Evaluation',def:'Running a fixed test suite after changes to verify that existing functionality still works correctly.',why:'AI systems are non-deterministic. Regression tests with golden datasets catch quality degradation.',rel:['Golden Dataset','CI/CD for AI']},
{term:'Content Moderation',cat:'Security',def:'Automated or human review of AI inputs/outputs for harmful, inappropriate, or policy-violating content.',why:'Required for any user-facing AI application. Combine automated filters with human escalation.',rel:['Safety Filter','Guardrails']},
{term:'Weights',cat:'ML Fundamentals',def:'The learned numerical parameters in a neural network that determine how inputs are transformed to outputs.',why:'Weights are what models "learn" during training. Model size is measured by weight count (parameters).',rel:['Parameters']},
{term:'Pre-Training',cat:'ML Fundamentals',def:'The initial training phase where the model learns language patterns from trillions of tokens of text.',why:'Pre-training creates the foundation capabilities. It is the most expensive phase, costing tens of millions of dollars.',rel:['Fine-Tuning']},
{term:'Transfer Learning',cat:'ML Fundamentals',def:'Applying knowledge learned from one task to a different but related task.',why:'Transfer learning is why fine-tuning works — the pre-trained model already understands language.',rel:['Pre-Training','Fine-Tuning']},
{term:'GPU',cat:'Implementation',def:'Graphics Processing Unit — specialized hardware that accelerates the parallel computations required for AI inference and training.',why:'GPU availability and cost directly impact what models you can run and at what speed.',rel:['Inference','VRAM']},
{term:'VRAM',cat:'Implementation',def:'Video RAM on a GPU, used to hold model weights during inference. Model size in memory determines GPU requirements.',why:'A model needs approximately 2 bytes per parameter at FP16 in VRAM to run.',rel:['GPU','Quantization','Parameters']},
{term:'Supervised Learning',cat:'ML Fundamentals',def:'Training a model on labeled examples (input-output pairs) to learn the mapping between them.',why:'SFT (Supervised Fine-Tuning) is a key step in creating AI assistants from base models.',rel:['Fine-Tuning']},
{term:'Unsupervised Learning',cat:'ML Fundamentals',def:'Training on data without explicit labels, finding patterns and structure autonomously.',why:'Pre-training is unsupervised — the model learns language structure from raw text without labels.',rel:['Pre-Training']},
{term:'Bias (in AI)',cat:'Ethics',def:'Systematic errors in AI outputs that reflect prejudices in training data or design choices.',why:'AI bias can harm people and organizations. Awareness and testing for bias is an engineering responsibility.',rel:['Red-Teaming']},
{term:'Compliance',cat:'Security',def:'Adherence to legal and regulatory requirements (GDPR, HIPAA, SOC2) when using AI systems.',why:'Non-compliance can result in fines and legal liability. Know what data you can send to which AI service.',rel:['PII (Personally Identifiable Information)','Data Privacy','GDPR']},
{term:'Idempotency',cat:'Implementation',def:'A property where repeating the same operation produces the same result, important for retry-safe API design.',why:'Idempotent APIs are safe to retry on failure without causing duplicate actions.',rel:['API (Application Programming Interface)','Retry Logic']},
{term:'Semantic Search',cat:'RAG & Infrastructure',def:'Search based on meaning rather than exact keyword matching, powered by embeddings and vector similarity.',why:'Semantic search finds relevant results even when queries use different words than the documents.',rel:['Embedding','Vector Database','Cosine Similarity']},
{term:'Hybrid Search',cat:'RAG & Infrastructure',def:'Combining keyword search (BM25) with vector search to leverage both exact matching and semantic understanding.',why:'Hybrid search often outperforms pure vector search, especially for queries with specific technical terms.',rel:['Semantic Search','BM25','RAG (Retrieval-Augmented Generation)']},
{term:'BM25',cat:'RAG & Infrastructure',def:'Best Match 25 — a probabilistic ranking function for keyword-based document retrieval.',why:'BM25 excels at finding exact term matches. Combined with vector search, it handles both precise and semantic queries.',rel:['Hybrid Search']},
{term:'Metadata Filtering',cat:'RAG & Infrastructure',def:'Filtering vector search results by metadata attributes (date, author, category) before or after similarity search.',why:'Metadata filters dramatically improve relevance: "Find similar documents from the last 30 days only."',rel:['Vector Database','RAG (Retrieval-Augmented Generation)']},
{term:'Knowledge Graph',cat:'RAG & Infrastructure',def:'A graph structure representing entities and their relationships, used in Graph RAG for multi-hop reasoning.',why:'Knowledge graphs capture relationships (reports-to, contains, depends-on) that flat vector search misses.',rel:['Graph RAG']},
{term:'Prompt Template',cat:'Prompting',def:'A reusable prompt structure with variable placeholders that get filled at runtime.',why:'Templates ensure consistency across team members and enable automated prompt generation.',rel:['Prompt Engineering','System Prompt']},
{term:'Orchestration',cat:'Workflow',def:'Managing the flow of data and control between multiple AI calls, tools, and services.',why:'Production AI systems require orchestration to handle branching, error recovery, and parallel execution.',rel:['Agent (AI Agent)','Pipeline','Prompt Chaining']},
{term:'Pipeline',cat:'Workflow',def:'A sequence of processing steps applied to data, often including AI inference as one or more steps.',why:'Pipelines structure AI workflows into repeatable, testable, and monitorable sequences.',rel:['Orchestration','Prompt Chaining']},
{term:'Caching',cat:'Implementation',def:'Storing AI responses for identical or similar requests to reduce cost and latency.',why:'Semantic caching can reduce API costs by 30-60% for applications with repetitive queries.',rel:['Cost Optimization','Latency']},
{term:'Retry Logic',cat:'Implementation',def:'Automatic re-sending of failed requests with strategies like exponential backoff.',why:'Robust retry logic is essential for production reliability. APIs fail transiently — retries handle it gracefully.',rel:['Exponential Backoff','Rate Limiting']},
{term:'Concurrency',cat:'Implementation',def:'Processing multiple AI requests simultaneously to maximize throughput.',why:'Concurrent requests can process batches 10-50x faster than sequential processing.',rel:['Async (Asynchronous)','Throughput']},
{term:'Async (Asynchronous)',cat:'Implementation',def:'Non-blocking execution where you send a request and continue working while waiting for the response.',why:'Async patterns prevent your application from freezing while waiting for AI API responses.',rel:['Concurrency','Streaming']},
{term:'Throughput',cat:'Implementation',def:'The number of requests or tokens processed per second/minute.',why:'Throughput determines how many users your AI application can serve simultaneously.',rel:['Concurrency','Latency','Rate Limiting']},
{term:'Load Testing',cat:'Evaluation',def:'Sending high volumes of requests to measure system performance under stress.',why:'Load testing reveals bottlenecks before real users hit them.',rel:['Throughput']},
{term:'A/B Testing',cat:'Evaluation',def:'Comparing two prompt or model variants by randomly assigning users and measuring outcomes.',why:'A/B testing provides statistical evidence for which approach works better in production.',rel:[]},
{term:'Prompt Versioning',cat:'Workflow',def:'Tracking changes to prompts over time, similar to code version control.',why:'Without versioning, you can\'t reproduce results, debug regressions, or roll back bad changes.',rel:['Regression Testing','Prompt Template']},
{term:'Observability',cat:'Implementation',def:'The ability to understand system behavior through logs, metrics, and traces.',why:'You can\'t improve what you can\'t measure. Observability reveals cost, quality, and latency patterns.',rel:['Monitoring']},
{term:'Monitoring',cat:'Implementation',def:'Continuous tracking of AI system health: response quality, latency, cost, and error rates.',why:'Monitoring catches quality degradation, cost spikes, and new attack patterns in real time.',rel:['Observability']},
{term:'Fallback Strategy',cat:'Implementation',def:'An alternative action when the primary AI model or service is unavailable.',why:'Fallbacks (cached responses, simpler models, human routing) prevent total system failure.',rel:[]},
{term:'Edge Inference',cat:'Implementation',def:'Running AI models on edge devices (phones, laptops, IoT) rather than cloud servers.',why:'Edge inference enables offline operation, lower latency, and data privacy.',rel:['Quantization','Ollama']},
{term:'Model Card',cat:'Ethics',def:'A standardized document describing a model\'s capabilities, limitations, training data, and intended use.',why:'Model cards help you evaluate whether a model is appropriate for your use case.',rel:[]},
{term:'Data Privacy',cat:'Ethics',def:'Protecting personal and sensitive data from unauthorized access or unintended exposure.',why:'Sending sensitive data to AI APIs creates privacy risks. Know your data classification requirements.',rel:['PII (Personally Identifiable Information)','GDPR','Compliance']},
{term:'GDPR',cat:'Ethics',def:'General Data Protection Regulation — EU regulation governing personal data processing.',why:'GDPR affects how you can use AI with data of EU residents, including AI-generated content about individuals.',rel:['Data Privacy','Compliance','PII (Personally Identifiable Information)']},
{term:'Explainability',cat:'Ethics',def:'The ability to understand and communicate how an AI system reaches its outputs.',why:'Stakeholders need to understand AI decisions. "The AI said so" is not sufficient justification.',rel:['Model Card']},
{term:'Human-in-the-Loop',cat:'Workflow',def:'Requiring human review or approval at critical points in an AI workflow.',why:'Humans catch errors that AI misses. Critical for high-stakes decisions and irreversible actions.',rel:['Agent (AI Agent)','Safety Filter']},
{term:'Classifier',cat:'ML Fundamentals',def:'A model that assigns inputs to predefined categories (spam/not-spam, topic A/B/C).',why:'Classifiers are used in model routing, content moderation, and intent detection.',rel:['Model Routing','Content Moderation']},
{term:'Ensemble',cat:'ML Fundamentals',def:'Combining predictions from multiple models to improve accuracy and reliability.',why:'Ensembles reduce individual model errors. Self-consistency is an ensemble technique for LLMs.',rel:['Self-Consistency']},
{term:'Benchmark',cat:'Evaluation',def:'A standardized test suite for measuring and comparing AI model performance.',why:'Benchmarks (MMLU, HumanEval, MT-Bench) help you choose models, but real-world performance may differ.',rel:[]},
{term:'Perplexity',cat:'ML Fundamentals',def:'A measure of how well a language model predicts a sample. Lower perplexity = better prediction.',why:'Perplexity is a common evaluation metric for language models, though it doesn\'t directly measure usefulness.',rel:[]},
{term:'Embedding Model',cat:'RAG & Infrastructure',def:'A specialized model that converts text into dense vector representations (embeddings).',why:'The choice of embedding model significantly impacts retrieval quality. Domain-specific models often outperform general ones.',rel:['Embedding','Vector Database']},
{term:'Multimodal',cat:'GenAI',def:'AI models that process multiple types of input: text, images, audio, video.',why:'Multimodal models enable applications that work with diverse content types simultaneously.',rel:['Transformer','Vision Model']},
{term:'Vision Model',cat:'GenAI',def:'AI models that can process and understand images, including OCR, object detection, and visual reasoning.',why:'Vision capabilities let AI analyze screenshots, diagrams, documents, and photos.',rel:['Multimodal']},
{term:'Context Length',cat:'GenAI',def:'Synonym for context window — the maximum tokens a model can handle in one request.',why:'Context length determines how much reference material you can include in a single prompt.',rel:['Context Window','Token']},
{term:'Prompt Caching',cat:'Implementation',def:'Reusing previously processed prompt prefixes to reduce cost and latency on subsequent calls.',why:'Prompt caching can reduce costs by 90% for conversations with long system prompts.',rel:['Caching','Cost Optimization','Latency']},
{term:'Tool Schema',cat:'Protocols',def:'A JSON schema defining a tool\'s name, description, and parameter types for function calling or MCP.',why:'Well-defined schemas help the model understand when and how to use each tool correctly.',rel:['Function Calling','MCP (Model Context Protocol)','JSON Schema']},
{term:'JSON Schema',cat:'Implementation',def:'A vocabulary for annotating and validating JSON documents, used in AI tool definitions and structured output.',why:'JSON Schema defines the contract between your code and the AI model\'s structured outputs.',rel:['Structured Output','Tool Schema']},
{term:'Semantic Similarity',cat:'RAG & Infrastructure',def:'A measure of how similar two pieces of text are in meaning, computed via embedding distance.',why:'Semantic similarity powers search, deduplication, clustering, and recommendation systems.',rel:['Cosine Similarity','Embedding']},
{term:'Top-K Retrieval',cat:'RAG & Infrastructure',def:'Returning the K most similar documents from a vector search.',why:'Choosing K (typically 3-10) balances between providing enough context and not overwhelming the model.',rel:['RAG (Retrieval-Augmented Generation)','Vector Database']},
{term:'Truncation',cat:'GenAI',def:'When input exceeding the context window is cut off. The model doesn\'t see the removed content.',why:'If AI output ignores part of a long document, truncation is likely the cause.',rel:['Context Window','Token']},
{term:'Sampling',cat:'GenAI',def:'The process by which the model selects the next token from the probability distribution.',why:'Explains why the same prompt can produce different outputs each time.',rel:['Temperature','Top-p (Nucleus Sampling)']},
{term:'Tokenization',cat:'GenAI',def:'The process of converting text into tokens. Different for each model family.',why:'Understanding tokenization helps you estimate costs and context window usage.',rel:['Token','Tokenizer','BPE (Byte Pair Encoding)']},
{term:'Instruction Tuning',cat:'GenAI',def:'Fine-tuning a model on instruction-response pairs to improve its ability to follow directions.',why:'The difference between a model that can write text and one that follows your specific instructions.',rel:['Fine-Tuning','RLHF','Supervised Learning']},
{term:'Distillation',cat:'GenAI',def:'Training a smaller model to mimic a larger one, creating compact models that retain most capability.',why:'This is how mini/lite model variants are created from frontier models.',rel:['Knowledge Distillation']},
{term:'Benchmark Contamination',cat:'Evaluation',def:'When a model\'s training data includes benchmark test questions, inflating its scores.',why:'Contamination makes benchmarks unreliable. Always validate with your own domain-specific tests.',rel:['Benchmark']},
{term:'Agentic Workflow',cat:'Agents',def:'A workflow where an AI agent plans, executes, and adapts multi-step tasks with tool use.',why:'Agentic workflows handle complex tasks that require decisions, tool calls, and iterative refinement.',rel:['Agent (AI Agent)','Orchestration','Tool Use']},

{term:'Multi-Agent',cat:'Agents',def:'Systems where multiple AI agents collaborate, each specializing in different aspects of a task.',why:'Multi-agent systems can solve complex problems by dividing work among specialized agents.',rel:['Agent (AI Agent)','Orchestration']},
{term:'Context Stuffing',cat:'Prompting',def:'Including as much relevant context as possible in the prompt to ground the model\'s response.',why:'More context generally improves accuracy, but be mindful of context window limits and costs.',rel:['Context Window','RAG (Retrieval-Augmented Generation)','Grounding']},
{term:'Output Parsing',cat:'Implementation',def:'Extracting structured data from AI model responses, handling edge cases and malformed output.',why:'Robust parsing handles the reality that models don\'t always produce perfectly formatted output.',rel:['Structured Output','JSON Mode']},

{term:'Cost Optimization',cat:'Implementation',def:'Strategies to reduce AI API spending: caching, routing, batching, prompt optimization.',why:'AI costs scale linearly with usage. Optimization strategies can reduce costs 50-80%.',rel:['Model Routing','Caching','Batch Processing']},

{term:'Defense-in-Depth',cat:'Security',def:'A security strategy using multiple overlapping layers of protection.',why:'If one layer fails, others catch the attack. Essential for production AI security.',rel:['Guardrail Framework']},
{term:'Incident Response',cat:'Security',def:'A structured process for handling AI system failures: detect, assess, contain, fix, post-mortem.',why:'Having a plan before incidents occur reduces response time and prevents escalation.',rel:['Monitoring']},
{term:'CI/CD for AI',cat:'Workflow',def:'Continuous Integration/Deployment pipelines adapted for AI systems: prompt testing, model evaluation, deployment.',why:'CI/CD catches quality regressions before they reach production.',rel:['Regression Testing','Pipeline']}

var CAT_MAP={'ML Fundamentals':'badge-ml','GenAI':'badge-genai','Prompting':'badge-prompt','Ethics':'badge-ethics','Workflow':'badge-workflow','Protocols':'badge-proto','Agents':'badge-proto','Implementation':'badge-impl','Security':'badge-security','Evaluation':'badge-eval','RAG & Infrastructure':'badge-rag'};
var ALL_CATS=['All','ML Fundamentals','GenAI','Prompting','Implementation','RAG & Infrastructure','Protocols','Agents','Evaluation','Security','Ethics','Workflow'];
var glossFilter='All',glossAlpha='',glossSearch='';

function initGlossary(){
document.getElementById('gloss-filters').innerHTML=ALL_CATS.map(function(c){return '<button class="gloss-filter '+(c==='All'?'active':'')+'" onclick="setGlossFilter(\''+c+'\',this)">'+c+'</button>'}).join('');
document.getElementById('alpha-bar').innerHTML='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(function(l){return '<button class="alpha-btn" onclick="setGlossAlpha(\''+l+'\',this)">'+l+'</button>'}).join('');
renderGlossary();
}
window.setGlossFilter=function(c,btn){glossFilter=c;glossAlpha='';document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});renderGlossary()};
window.setGlossAlpha=function(l,btn){glossAlpha=(glossAlpha===l)?'':l;document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});if(glossAlpha)btn.classList.add('active');renderGlossary()};
window.filterGlossary=function(){glossSearch=document.getElementById('gloss-search').value.toLowerCase();renderGlossary()};

function renderGlossary(){
var items=GLOSSARY;
if(glossFilter!=='All')items=items.filter(function(g){return g.cat===glossFilter});
if(glossAlpha)items=items.filter(function(g){return g.term[0].toUpperCase()===glossAlpha});
if(glossSearch)items=items.filter(function(g){return g.term.toLowerCase().includes(glossSearch)||g.def.toLowerCase().includes(glossSearch)});
document.getElementById('gloss-grid').innerHTML=items.length?items.map(function(g){
return '<div class="gloss-card" id="g-'+g.term.replace(/[^a-zA-Z]/g,'')+'"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="gloss-term">'+g.term+'</div><span class="badge '+(CAT_MAP[g.cat]||'badge-ml')+'">'+g.cat+'</span></div><div class="gloss-def">'+g.def+'</div><div class="gloss-why">Why it matters: '+g.why+'</div>'+(g.rel.length?'<div class="gloss-related">Related: '+g.rel.map(function(r){return '<a onclick="jumpToGloss(\''+r+'\')">'+r+'</a>'}).join(', ')+'</div>':'')+'</div>';
}).join(''):'<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss=function(term){
glossSearch='';glossFilter='All';glossAlpha='';
var si=document.getElementById('gloss-search');if(si)si.value='';
document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
var first=document.querySelector('.gloss-filter');if(first)first.classList.add('active');
document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
renderGlossary();
var id='g-'+term.replace(/[^a-zA-Z]/g,'');
var el=document.getElementById(id);
if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px var(--primary)';setTimeout(function(){el.style.boxShadow=''},2000)}
};

/* ══ SEARCH ══ */
var searchIndex=[];
function buildSearchIndex(){
searchIndex=[];
MODULES.forEach(function(m,i){searchIndex.push({type:'Module',text:m.title,desc:LANDING_DESCS[i].desc.substring(0,100)+'\u2026',action:function(){goModule(i)}})});
GLOSSARY.forEach(function(g){searchIndex.push({type:'Glossary',text:g.term,desc:g.def.substring(0,80)+'\u2026',action:function(){goModule(10);setTimeout(function(){var si=document.getElementById('gloss-search');if(si){si.value=g.term;filterGlossary()}},100)}})});
searchIndex.push({type:'Resources',text:'Learning Resources',desc:'63 curated resources for continued learning',action:function(){goModule(9)}});
}
function performSearch(q){if(!q.trim())return[];var ql=q.toLowerCase();return searchIndex.filter(function(item){return item.text.toLowerCase().includes(ql)||item.desc.toLowerCase().includes(ql)}).slice(0,12)}
function renderSearchResults(query){
var results=performSearch(query);
var container=document.getElementById('search-results');
if(!query.trim()){container.innerHTML='<div class="search-empty">Start typing to search\u2026</div>';return}
if(!results.length){container.innerHTML='<div class="search-empty">No results found.</div>';return}
container.innerHTML=results.map(function(r){
var hl=r.text.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
return '<div class="search-item" data-idx="'+searchIndex.indexOf(r)+'"><div class="search-cat">'+r.type+'</div><div class="search-txt">'+hl+'</div></div>';
}).join('');
container.querySelectorAll('.search-item').forEach(function(el){
el.onclick=function(){searchIndex[parseInt(el.dataset.idx)].action();closeSearch()};
});
}
function openSearch(){document.getElementById('search-backdrop').classList.add('open');document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').value='';document.getElementById('search-input').focus();renderSearchResults('')}
function closeSearch(){document.getElementById('search-backdrop').classList.remove('open');document.getElementById('search-overlay').classList.remove('open')}
document.getElementById('search-btn').onclick=openSearch;
document.getElementById('search-backdrop').onclick=closeSearch;
document.getElementById('search-input').oninput=function(){renderSearchResults(this.value)};

/* ══ KEYBOARD SHORTCUTS ══ */
document.addEventListener('keydown',function(e){
if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();return}
if(e.key==='Escape'){closeSearch();closeMobDrawer();return}
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
var focused=document.activeElement;
if(!focused)return;
var sim=focused.closest('.sim-focusable')||(focused.classList.contains('sim-focusable')?focused:null);
if(!sim)return;
var simType=sim.dataset.sim;
if(!simType)return;
if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
e.preventDefault();
var dir=e.key==='ArrowRight'?1:-1;
var flowId=simType.replace('flow-','');
if(flowCur[flowId]!==undefined)flowStep(flowId,flowCur[flowId]+dir);
}
});

function renderCourseNav(){
var nav=document.getElementById('course-nav');
if(!nav)return;
nav.innerHTML=COURSES.map(function(c){
if(c.id===THIS_COURSE)return '<span class="course-link current">'+c.label+'</span>';
return '<a class="course-link" href="'+c.file+'">'+c.label+'</a>';
}).join('');
}

/* ══ MOBILE DRAWER ══ */
function renderMobDrawer(){
var list=document.getElementById('mob-drawer-list');
if(!list)return;
list.innerHTML='<div class="mob-drawer-item" onclick="showLanding();closeMobDrawer()" style="border-bottom:2px solid var(--border);margin-bottom:4px"><div class="mob-drawer-ico" style="background:var(--tx-secondary)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="16" height="16"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-4h4v4h3a1 1 0 001-1V10"/></svg></div><div><div class="mob-drawer-name">Home</div></div></div>'+
MODULES.map(function(m,i){
var cls=(i===currentModule?'active':'')+(completedModules.has(i)?' done':'');
return '<div class="mob-drawer-item '+cls+'" onclick="goModule('+i+');closeMobDrawer()"><div class="mob-drawer-ico" style="background:'+m.color+'">'+ICONS[m.icon]+'</div><div><div class="mob-drawer-name">'+m.title+'</div></div><span class="mob-check">\u2713</span></div>';
}).join('')+
'<div class="mob-drawer-footer">Brought to you by Babak</div>';
}
function openMobDrawer(){renderMobDrawer();document.getElementById('mob-drawer-backdrop').classList.add('open');document.getElementById('mob-drawer').classList.add('open');document.body.style.overflow='hidden'}
function closeMobDrawer(){document.getElementById('mob-drawer-backdrop').classList.remove('open');document.getElementById('mob-drawer').classList.remove('open');document.body.style.overflow=''}
document.getElementById('mob-menu-btn').addEventListener('click',openMobDrawer);
document.getElementById('mob-drawer-backdrop').addEventListener('click',closeMobDrawer);
document.getElementById('mob-drawer-close').addEventListener('click',closeMobDrawer);

/* ══ SCROLL-TO-TOP ══ */
var scrollBtn=document.getElementById('scroll-top-btn');
window.addEventListener('scroll',function(){scrollBtn.classList.toggle('vis',window.scrollY>300)});
scrollBtn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});

/* ══ INIT ══ */
buildSearchIndex();
renderCourseNav();
showLanding();
</script>
