'</svg>'+
'<div class="callout warning"><strong>Embeddings are not magic \u2014 they reflect training data.</strong> A general-purpose embedding model trained on internet text may not capture domain-specific terminology well. "ECU" could mean "engine control unit" (automotive) or "European Currency Unit" (finance). If your retrieval quality is poor despite good chunking, the embedding model may not understand your domain vocabulary. Options: try a different embedding model, add keyword search alongside semantic search (hybrid search), or fine-tune embeddings on your domain data.</div>'+
'<div class="sec-title">Similarity Calculator</div>'+
'<div class="sim-area" id="sim-calc"><p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Select two sentences to see their similarity score (pre-computed).</p>'+
'<select id="sim-a" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);margin-bottom:8px" onchange="calcSim()"><option>How do I reset my password?</option><option>What is the return policy?</option><option>Tell me about your pricing plans</option><option>I need help with my account login</option></select>'+
'<select id="sim-b" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);margin-bottom:16px" onchange="calcSim()"><option>I forgot my login credentials</option><option>Can I get a refund?</option><option>How much does the pro plan cost?</option><option>My password is not working</option></select>'+
'<div id="sim-result" style="text-align:center;font-size:36px;font-weight:800;color:var(--primary)">0.91</div>'+
'<div id="sim-bar" style="height:12px;background:var(--bg-muted);border-radius:6px;overflow:hidden;margin:8px 0"><div style="height:100%;width:91%;background:var(--gradient-primary);border-radius:6px;transition:width 0.3s" id="sim-fill"></div></div>'+
'<div style="text-align:center;font-size:12px;color:var(--tx-muted)">Cosine similarity (0.0 = unrelated, 1.0 = identical meaning)</div></div>'+
'<div class="sec-title">Chunking Strategies: Real Tradeoffs</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>Chunking \u2014 how you split documents into pieces for embedding \u2014 is one of the most impactful decisions in any RAG pipeline. Get it wrong, and your retrieval quality suffers regardless of how good your embedding model is. Here are the major strategies and their real tradeoffs:</p>'+
'<p style="margin-top:10px"><strong>Fixed-size chunking</strong> splits text every N tokens (e.g., 512). It\u2019s simple and predictable, but it can split mid-sentence or mid-paragraph. An answer that spans two chunks gets split, and neither chunk alone is sufficient to answer the question. This is the most common approach but also the most likely to cause retrieval failures on content with complex explanations.</p>'+
'<p style="margin-top:10px"><strong>Sentence-based chunking</strong> respects sentence boundaries, grouping sentences until a token limit is reached. This avoids splitting mid-thought, but produces variable-length chunks. Some chunks may be very short (a single sentence) while others are dense, which can create uneven embedding quality.</p>'+
'<p style="margin-top:10px"><strong>Semantic chunking</strong> groups semantically related sentences together by computing embeddings for each sentence first, then merging adjacent sentences with high similarity. This produces the highest-quality chunks but is the most expensive approach \u2014 you must embed every sentence individually before chunking, which can double your embedding costs on large corpora.</p>'+
'<p style="margin-top:10px"><strong>Recursive character splitting</strong> (LangChain\u2019s default) is a practical compromise: it tries to split by paragraph first, then by sentence, then by word, then by character \u2014 respecting natural boundaries while staying within size limits. Configurable overlap (typically 10\u201315% of chunk size) ensures information at boundaries isn\u2019t lost.</p>'+
'<p style="margin-top:10px"><strong>Practical guidance:</strong> For FAQ content, use small chunks (256\u2013512 tokens) because answers are self-contained and compact. For long-form documentation, use larger chunks (512\u20131,024 tokens) with 10\u201315% overlap to preserve context. For code, chunk by function or class definition, not by character count \u2014 a function split across two chunks is useless for retrieval.</p>'+
'</div></div>'+
'<div class="sec-title">Vector Database Comparison</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Database</th><th>Type</th><th>Hosting</th><th>Best For</th><th>Pricing Model</th></tr></thead><tbody>'+
'<tr><td>Chroma</td><td>Open-source</td><td>Self-hosted / embedded</td><td>Prototyping, small-medium datasets</td><td>Free (self-hosted)</td></tr>'+
'<tr><td>Pinecone</td><td>Managed</td><td>Cloud (serverless)</td><td>Production, zero-ops teams</td><td>Pay-per-query + storage</td></tr>'+
'<tr><td>Weaviate</td><td>Open-source / Managed</td><td>Self-hosted or cloud</td><td>Hybrid search, multi-modal</td><td>Free (self-hosted) / usage-based</td></tr>'+
'<tr><td>Qdrant</td><td>Open-source / Managed</td><td>Self-hosted or cloud</td><td>High performance, filtering</td><td>Free (self-hosted) / usage-based</td></tr>'+
'<tr><td>pgvector</td><td>Extension</td><td>Any PostgreSQL host</td><td>Teams already using PostgreSQL</td><td>Free (extension)</td></tr>'+
'<tr><td>FAISS</td><td>Library</td><td>In-process (no server)</td><td>Research, high-throughput batch</td><td>Free (library)</td></tr>'+
'</tbody></table></div>'+
'<div class="callout"><strong>Choosing a vector database:</strong> If you\u2019re prototyping, start with Chroma (embedded, zero setup). If you already use PostgreSQL, add pgvector. If you need managed production infrastructure with zero ops, use Pinecone. If you want open-source with advanced features (hybrid search, filtering, multi-tenancy), evaluate Weaviate or Qdrant. FAISS is best for research and offline batch processing where you need maximum throughput without a server.</div>'+
'<div class="sec-title">Code: Embedding Pipeline</div>'+
'<div class="code-block"><span class="lang-label">Python</span><pre><code><span class="kw">import</span> chromadb\n\nclient = chromadb.Client()\ncollection = client.create_collection(<span class="str">"docs"</span>)\n\n<span class="cm"># Add documents (Chroma auto-embeds)</span>\ncollection.add(\n    documents=[<span class="str">"AI uses neural networks"</span>, <span class="str">"Machine learning trains on data"</span>],\n    ids=[<span class="str">"doc1"</span>, <span class="str">"doc2"</span>]\n)\n\n<span class="cm"># Semantic search</span>\nresults = collection.query(\n    query_texts=[<span class="str">"How does AI learn?"</span>],\n    n_results=<span class="num">2</span>\n)</code></pre></div>'+
'<details class="deeper"><summary>Deeper Dive: When Embeddings Fail and How to Diagnose It</summary><div class="deeper-body">'+
'<p><strong>Domain mismatch</strong> is the most common reason embeddings underperform. General-purpose embedding models (like <code>text-embedding-3-small</code>) are trained on broad internet text, which means they understand everyday language well but may not capture domain-specific terminology accurately. The word \u201CECU\u201D means \u201Cengine control unit\u201D in automotive but \u201CEuropean Currency Unit\u201D in finance. The embedding model doesn\u2019t know your domain, so it may place these meanings close together or far apart based on its training distribution, not your use case. Industry jargon, internal acronyms, and specialized terminology can all produce poor embeddings.</p>'+
'<p style="margin-top:10px">When you detect domain mismatch, you have two paths. <strong>Fine-tuned embeddings</strong> involve training a custom embedding model on your domain data \u2014 pairs of queries and relevant documents from your corpus. This produces embeddings that understand your terminology but requires significant effort (collecting training pairs, running training, evaluating quality). The alternative is <strong>hybrid search</strong>: combine semantic search (embeddings) with keyword search (BM25). Keyword search excels at exact term matching \u2014 if someone searches \u201CECU firmware update,\u201D keyword search finds documents containing those exact terms, even if the embedding model doesn\u2019t understand what an ECU is. Many production systems use hybrid search as the default because it\u2019s simpler than fine-tuning and catches both semantic and lexical matches.</p>'+
'<p style="margin-top:10px">To <strong>test embedding quality</strong> systematically, create a test set of 50 query-document pairs: for each query, identify the 1\u20133 documents in your corpus that correctly answer it. Then run your embedding pipeline, retrieve the top-5 results for each query, and measure <strong>precision@5</strong> (what fraction of retrieved documents are actually relevant). If precision@5 is below 80%, your embeddings or chunking need work. Below 60%, you likely have a fundamental mismatch between your embedding model and your domain. Also check specific failure cases \u2014 look at queries where the correct document wasn\u2019t retrieved at all. These failures often cluster around specific terminology or content types, giving you a focused target for improvement.</p>'+
'<p style="margin-top:10px">The <strong>cold start problem</strong> is another failure mode: new products, new features, and newly coined terms have no representation in the embedding model\u2019s training data. If your company launches a product called \u201CQuantumSync\u201D next week, no embedding model has ever seen that term. Queries about QuantumSync will match poorly against documents that describe it. The mitigation is to ensure your chunking includes enough surrounding context that the embedding captures the description, not just the name. A chunk that says \u201CQuantumSync is our real-time data synchronization platform for distributed teams\u201D embeds much better than one that just says \u201CQuantumSync features\u201D because the description provides semantic anchors the model can use.</p>'+
'</div></details>'+
'<div class="case-study"><div class="case-badge">CASE STUDY</div><div class="case-title">Choosing Chunk Size: How 512 Tokens Outperformed 1024 for FAQ Retrieval</div><dl class="case-body">'+
'<dt>Situation</dt><dd>A support chatbot using RAG was answering user questions about a SaaS product with a knowledge base of 2,000 FAQ articles. Users reported that the bot often gave \u201Clong, rambly answers that didn\u2019t address my specific question\u201D \u2014 it was retrieving relevant-ish content but burying the actual answer in irrelevant context.</dd>'+
'<dt>Context</dt><dd>The initial pipeline used 1,024-token chunks with no overlap. Each FAQ article was typically 150\u2013400 tokens, but the 1,024-token chunking meant 2\u20134 FAQ answers were being combined into a single chunk. When a user asked \u201CHow do I reset my password?\u201D, the retrieved chunk contained the password reset answer plus unrelated answers about account deletion and billing changes. The LLM then produced a response that touched on all three topics instead of focusing on the actual question.</dd>'+
'<dt>Approach</dt><dd>The team created a retrieval test suite: 75 real user questions with manually identified correct source articles. They tested three configurations: (1) 1,024 tokens, no overlap (baseline), (2) 512 tokens with 50-token overlap, (3) Paragraph-based chunking respecting FAQ article boundaries. They measured precision@3 (were the top 3 retrieved chunks relevant?) and answer accuracy (did the LLM\u2019s response actually answer the question correctly?).</dd>'+
'<dt>Results</dt><dd>The 1,024-token baseline achieved 68% precision@3 and 71% answer accuracy. The 512-token with overlap achieved 89% precision@3 and 87% answer accuracy. The paragraph-based approach, which respected FAQ article boundaries and kept each FAQ as its own chunk, achieved 93% precision@3 and 91% answer accuracy. The paragraph-based approach won because it aligned chunk boundaries with content boundaries \u2014 each chunk was a self-contained answer to a specific question.</dd>'+
'<dt>Lessons Learned</dt><dd><strong>1.</strong> Chunk size should be driven by content structure, not arbitrary token counts. <strong>2.</strong> For FAQ-style content, one answer per chunk dramatically outperforms larger chunks that mix topics. <strong>3.</strong> Overlap helps fixed-size chunking but doesn\u2019t solve the fundamental problem of splitting across content boundaries. <strong>4.</strong> Always test multiple chunking strategies with quantitative retrieval metrics before deploying. <strong>5.</strong> Retrieval quality directly determines answer quality \u2014 if you retrieve the wrong chunks, the LLM can\u2019t compensate.</dd>'+
'<dt>What They\u2019d Do Differently</dt><dd>They would start with content-aware chunking from the beginning instead of defaulting to fixed-size chunks. They would also add metadata (FAQ category, last-updated date) to each chunk to enable filtered retrieval.</dd>'+
'</dl></div>'+
'<div class="callout success"><strong>The chunking rule of thumb:</strong> Align chunk boundaries with content boundaries. FAQs \u2192 one answer per chunk. Documentation \u2192 one section per chunk. Legal contracts \u2192 one clause per chunk. When in doubt, smaller chunks with 10-15% overlap outperform larger chunks for most retrieval tasks. Test with 50 real queries before deploying.</div>'+
'';}


/* ══ MODULE 4: RAG Implementation ══ */
function mod4Content(){
return '<div class="sec-title">What RAG Actually Solves</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>LLMs know a lot \u2014 but they don\u2019t know <em>your</em> content. They can\u2019t answer questions about your internal documentation, your product specifications, last week\u2019s meeting notes, or the HR policy that was updated yesterday. Their knowledge is frozen at their training cutoff date and limited to what was in their training corpus. RAG (Retrieval-Augmented Generation) bridges this gap by <strong>retrieving relevant documents at query time and injecting them into the prompt as context</strong>. The model\u2019s job shifts from \u201Cknow the answer from memory\u201D to \u201Cfind the answer in these provided documents.\u201D</p>'+
'<p style="margin-top:10px">The fundamental insight behind RAG is elegant: instead of training the model on your data (which is expensive, slow, loses general capability, and becomes outdated immediately), you <strong>retrieve the right documents on every query</strong> and give them to the model as context. Training says \u201Clearn everything.\u201D RAG says \u201Chere\u2019s what you need to know right now.\u201D This means your content can be updated in real-time \u2014 add a new document to your knowledge base, and the next query can find it. No retraining, no fine-tuning, no waiting weeks for model updates.</p>'+
'<p style="margin-top:10px">The progression from naive to production RAG is where most teams stumble. Naive RAG (embed \u2192 retrieve \u2192 generate) works beautifully for demos and simple factual questions, but it fails in production because retrieval quality is inconsistent \u2014 the top-5 results aren\u2019t always relevant, single-pass retrieval misses nuances in complex queries, and the model can\u2019t assess whether it has enough information to answer confidently. Understanding this progression from naive to advanced to agentic RAG is what separates demo-quality from production-quality implementations.</p>'+
'</div></div>'+
'<div class="sec-title">RAG Architecture Progression</div>'+
'<div class="card"><div class="card-text">RAG has evolved from simple retrieve-and-generate to sophisticated agentic loops that assess their own retrieval quality and iterate until they have sufficient context.</div></div>'+
'<div class="grid-2">'+
'<div class="card"><div class="card-title" style="color:var(--primary)">1. Naive RAG</div><svg viewBox="0 0 280 50" style="width:100%"><defs><marker id="ah4" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#2563EB"/></marker></defs><rect x="0" y="10" width="55" height="30" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563EB"/><text x="27" y="30" text-anchor="middle" font-size="9" fill="#2563EB">Query</text><line x1="57" y1="25" x2="68" y2="25" stroke="#2563EB" marker-end="url(#ah4)"/><rect x="70" y="10" width="55" height="30" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563EB"/><text x="97" y="30" text-anchor="middle" font-size="9" fill="#2563EB">Embed</text><line x1="127" y1="25" x2="138" y2="25" stroke="#2563EB" marker-end="url(#ah4)"/><rect x="140" y="10" width="55" height="30" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563EB"/><text x="167" y="30" text-anchor="middle" font-size="9" fill="#2563EB">Retrieve</text><line x1="197" y1="25" x2="208" y2="25" stroke="#2563EB" marker-end="url(#ah4)"/><rect x="210" y="10" width="65" height="30" rx="6" fill="rgba(16,185,129,0.1)" stroke="#10B981"/><text x="242" y="30" text-anchor="middle" font-size="9" fill="#10B981">Generate</text></svg></div>'+
'<div class="card"><div class="card-title" style="color:var(--accent)">2. Advanced RAG</div><svg viewBox="0 0 350 50" style="width:100%"><rect x="0" y="10" width="50" height="30" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7C3AED"/><text x="25" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Query</text><line x1="52" y1="25" x2="60" y2="25" stroke="#7C3AED" marker-end="url(#ah4)"/><rect x="62" y="10" width="50" height="30" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7C3AED"/><text x="87" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Rewrite</text><line x1="114" y1="25" x2="122" y2="25" stroke="#7C3AED" marker-end="url(#ah4)"/><rect x="124" y="10" width="50" height="30" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7C3AED"/><text x="149" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Embed</text><line x1="176" y1="25" x2="184" y2="25" stroke="#7C3AED" marker-end="url(#ah4)"/><rect x="186" y="10" width="50" height="30" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7C3AED"/><text x="211" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Retrieve</text><line x1="238" y1="25" x2="246" y2="25" stroke="#7C3AED" marker-end="url(#ah4)"/><rect x="248" y="10" width="50" height="30" rx="6" fill="rgba(245,158,11,0.1)" stroke="#F59E0B"/><text x="273" y="30" text-anchor="middle" font-size="8" fill="#92400E">Rerank</text><line x1="300" y1="25" x2="308" y2="25" stroke="#10B981" marker-end="url(#ah4)"/><rect x="300" y="10" width="50" height="30" rx="6" fill="rgba(16,185,129,0.1)" stroke="#10B981"/><text x="325" y="30" text-anchor="middle" font-size="8" fill="#10B981">Generate</text></svg></div>'+
'</div>'+
'<div class="callout warning"><strong>The #1 RAG failure mode:</strong> When a RAG system gives wrong answers, the problem is almost always retrieval, not generation. The LLM faithfully generates answers based on whatever documents were retrieved. If the wrong documents came back \u2014 because of poor chunking, weak embeddings, or a query that doesn\u2019t match the document vocabulary \u2014 the LLM produces a confident, well-written, completely wrong answer grounded in irrelevant context. Always diagnose retrieval quality first: check what documents are actually being retrieved before blaming the LLM.</div>'+
'<div class="sec-title">Agentic RAG Flow Simulator</div>'+
'<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-rag" id="flow-box-rag">'+
'<div class="flow-ctrl"><button class="flow-btn" onclick="flowStep(\'rag\',0)">\u23EE Reset</button><button class="flow-btn" onclick="flowStep(\'rag\',Math.max(0,flowCur.rag-1))">\u25C0 Prev</button><button class="flow-btn pri" onclick="flowStep(\'rag\',flowCur.rag+1)">Next \u25B6</button><span class="flow-step-ind" id="flow-ind-rag">Step 0 / 8</span></div>'+
'<div class="flow-step-list" id="flow-mob-rag"></div>'+
'<div class="flow-detail" id="flow-detail-rag"></div>'+
'<div class="kb-hint">Use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys</div></div>'+
'<div class="sec-title">Understanding Each RAG Tier</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p><strong>Naive RAG</strong> follows a simple pipeline: embed the user\u2019s query \u2192 vector search for the top-K most similar chunks \u2192 pass those chunks to the LLM as context \u2192 generate an answer. This works well for straightforward factual questions like \u201CWhat is our return policy?\u201D where the answer exists in a single chunk and the query closely matches the document\u2019s language. It fails when the query is ambiguous (the user\u2019s words don\u2019t match the document\u2019s terminology), when the answer spans multiple documents (no single chunk is sufficient), or when the most relevant chunk happens to rank 6th or 7th and falls outside the top-K window.</p>'+
'<p style="margin-top:10px"><strong>Advanced RAG</strong> adds three critical improvements. <em>Query rewriting</em> reformulates the user\u2019s query before embedding \u2014 expanding abbreviations, rephrasing ambiguous questions, and sometimes generating multiple query variants. A query like \u201CHow do I fix the auth error?\u201D might be rewritten to \u201CHow to resolve authentication error 401 unauthorized API\u201D for better retrieval. <em>Cross-encoder reranking</em> takes the top-20 results from initial vector search and re-scores them using a model that processes each query-document pair together. This catches relevant results that vector search ranked too low. <em>Hybrid search</em> combines keyword matching (BM25) with semantic search, ensuring results that match exact terms are included even if their embeddings are slightly off.</p>'+
'<p style="margin-top:10px"><strong>Agentic RAG</strong> adds a self-assessment loop: after retrieving documents, the LLM evaluates whether the retrieved context is sufficient to answer the question with confidence. If confidence is low (typically below 0.7 on a self-assessed scale), it reformulates the query and retrieves again, potentially from different sources or with different search parameters. This catches the cases where the first retrieval pass returns plausible but insufficient results. The self-assessment loop typically triggers on 15\u201325% of queries, adding 2\u20134 seconds of latency but dramatically improving quality for complex or multi-faceted questions.</p>'+
'</div></div>'+
'<div class="sec-title">RAG Approach Comparison</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Approach</th><th>Complexity</th><th>Accuracy</th><th>Latency</th><th>Best For</th></tr></thead><tbody>'+
'<tr><td>Naive RAG</td><td>Low</td><td>60-70%</td><td>Fast</td><td>Simple Q&A, prototyping</td></tr>'+
'<tr><td>Advanced RAG</td><td>Medium</td><td>75-85%</td><td>Medium</td><td>Production search, documentation</td></tr>'+
'<tr><td>Agentic RAG</td><td>High</td><td>85-95%</td><td>Slow</td><td>Complex research, multi-hop questions</td></tr>'+
'<tr><td>Graph RAG</td><td>Very High</td><td>85-95%</td><td>Slow</td><td>Entity-rich domains, knowledge graphs</td></tr>'+
'</tbody></table></div>'+
'<div class="callout"><strong>When to upgrade from naive to advanced RAG:</strong> If your naive RAG system answers correctly less than 80% of the time on a test set of 50 representative questions, don\u2019t fine-tune the LLM \u2014 fix the retrieval. Add query rewriting (expand abbreviations, rephrase ambiguous queries), implement a cross-encoder reranker (re-scores the top-20 results for true relevance), and consider hybrid search (keyword matching for exact terms + semantic search for meaning). Each of these independently improves retrieval by 5-15%.</div>'+
'<details class="deeper"><summary>Deeper Dive: The Retrieval Quality Problem</summary><div class="deeper-body">'+
'<p>Retrieval is the single biggest failure point in RAG. If you retrieve the wrong documents, the LLM will confidently generate wrong answers based on irrelevant context \u2014 and the response will sound perfectly authoritative because the model is skilled at synthesizing whatever context you provide. Users can\u2019t distinguish between an answer grounded in the right documents and one grounded in the wrong ones. This makes retrieval quality the most critical metric in any RAG system, more important than the choice of generation model.</p>'+
'<p style="margin-top:10px">To measure retrieval quality, you need three metrics. <strong>Precision@K</strong> asks: of the K documents you retrieved, what fraction are actually relevant? If you retrieve 5 documents and 3 are relevant, precision@5 is 60%. <strong>Recall</strong> asks: of all the relevant documents in your corpus, what fraction did you find? If there are 4 relevant documents and you found 3, recall is 75%. <strong>MRR (Mean Reciprocal Rank)</strong> asks: how high is the first relevant result? If the best result is ranked 1st, the reciprocal rank is 1.0. If it\u2019s ranked 3rd, it\u2019s 0.33. MRR tells you whether your system puts the best answer at the top or buries it in the results.</p>'+
'<p style="margin-top:10px">Common retrieval failures fall into identifiable patterns, each with a specific fix. <strong>Query/document vocabulary mismatch</strong>: the user asks about \u201Cauth errors\u201D but your docs say \u201Cauthentication failures.\u201D Fix: query expansion or rewriting that generates synonyms and related terms. <strong>Important context split across chunks</strong>: the answer requires information from two chunks that were processed independently. Fix: larger chunks with overlap, or a multi-pass retrieval that assembles context from multiple sources. <strong>Metadata filtering not used</strong>: retrieving outdated or irrelevant documents because you\u2019re searching the entire corpus. Fix: add metadata (date, source, category) and filter before searching \u2014 \u201Conly search docs from the last 6 months in the API documentation category.\u201D</p>'+
'<p style="margin-top:10px">When to add a <strong>reranker</strong>: if your top-5 results include irrelevant documents but your top-20 includes the right answer, a cross-encoder reranker will fix the ordering. Cross-encoders process each query-document pair together (rather than independently, as bi-encoders do), which produces much more accurate relevance scores. The tradeoff is speed: a cross-encoder scoring 20 candidates takes ~100\u2013200ms, which is acceptable for most applications but adds up at high query volumes. The practical pattern is: use fast vector search to get top-20 candidates, then use a cross-encoder to re-score and reorder them, then pass the top-3 to the LLM for generation.</p>'+
'</div></details>'+
'<div class="case-study"><div class="case-badge">CASE STUDY</div><div class="case-title">From 62% to 91% Answer Accuracy: Naive to Agentic RAG Migration</div><dl class="case-body">'+
'<dt>Situation</dt><dd>An internal knowledge base chatbot for a 500-person engineering organization answered correctly only 62% of the time. It had access to 8,000 documents covering architecture decisions, onboarding guides, runbooks, and API docs. Users quickly lost trust, with usage dropping 40% in the first month as engineers reverted to manually searching Confluence.</dd>'+
'<dt>Context</dt><dd>The initial implementation was textbook naive RAG: embed the query, retrieve top-5 chunks from Pinecone, pass them to GPT-4 with a simple prompt. The team assumed the 62% accuracy was a generation problem (\u201Cthe model isn\u2019t good enough\u201D) and spent two weeks trying different models and prompts with minimal improvement.</dd>'+
'<dt>Approach</dt><dd>A systematic diagnosis revealed the real problem was retrieval, not generation. They analyzed the 38% of failing queries and found three distinct failure patterns: <strong>Pattern 1 (15% of failures)</strong>: Query/document vocabulary mismatch. Engineers asked about \u201Cthe deployment pipeline\u201D but the docs used \u201CCI/CD workflow.\u201D Vector search ranked the correct document 8th\u201312th, outside the top-5 retrieval window. <strong>Pattern 2 (12% of failures)</strong>: Answers spanning multiple documents. \u201CHow do I set up local development?\u201D required information from three different runbooks (environment setup, database seeding, and service configuration). No single chunk contained the complete answer. <strong>Pattern 3 (11% of failures)</strong>: Outdated documents outranking current ones. A 2023 architecture doc was still being retrieved for questions about the 2025 system.</dd>'+
'<dd style="margin-top:8px">They implemented three corresponding changes: <strong>Change 1: Query rewriting</strong>. Before embedding, a fast model (Haiku) rewrites the query with expanded terminology. \u201CDeployment pipeline\u201D becomes \u201Cdeployment pipeline CI/CD workflow continuous integration delivery GitHub Actions.\u201D This improved vocabulary overlap. <strong>Change 2: Cross-encoder reranking</strong>. Expanded retrieval to top-20 with a cross-encoder reranker re-scoring the results. This surfaced documents that vector search had ranked 8th\u201315th, catching vocabulary mismatch cases. <strong>Change 3: Self-assessment loop</strong>. After retrieval, the LLM rates its confidence (0\u20131) in answering the question from the provided context. If confidence < 0.7, it reformulates the query (often splitting a complex question into sub-questions) and retrieves again. On the second pass, it also searches with different filters (more recent documents, different categories).</dd>'+
'<dt>Results</dt><dd>Answer accuracy jumped from 62% to 91% over a 4-week implementation. The breakdown: query rewriting alone brought accuracy to 74% (+12%). Adding the reranker brought it to 83% (+9%). The self-assessment loop brought it to 91% (+8%). The loop triggers on approximately 20% of queries, adding 2\u20133 seconds of latency. User adoption recovered to 85% of the engineering team actively using the tool within two months.</dd>'+
'<dt>Lessons Learned</dt><dd><strong>1.</strong> When RAG accuracy is low, diagnose retrieval before blaming generation \u2014 80% of RAG failures are retrieval failures. <strong>2.</strong> Analyze failing queries in clusters; they usually fall into a small number of fixable patterns. <strong>3.</strong> Each improvement layer has diminishing returns; stack them strategically. <strong>4.</strong> The self-assessment loop is the highest-impact single change for complex queries. <strong>5.</strong> Add metadata (dates, categories) to chunks from the beginning \u2014 retrofitting metadata is painful.</dd>'+
'<dt>What They\u2019d Do Differently</dt><dd>Build the evaluation framework (test queries + ground truth answers) before building the RAG pipeline. Having quantitative baselines from day one would have prevented the two wasted weeks of trying to fix the wrong component.</dd>'+
'</dl></div>'+
'';}


/* ══ MODULE 5: MCP Implementation ══ */
function mod5Content(){
return '<div class="sec-title">What MCP Solves</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>Before MCP, connecting an AI assistant to external services (Jira, Slack, Google Drive, databases) required custom code for every combination of AI provider and service. If you had 3 AI providers and 5 services, you needed 3\u00D75 = 15 custom integrations. Each one with its own authentication handling, data formatting, error management, and maintenance burden. Every time a service updated its API, you had to update multiple integrations. MCP reduces this from N\u00D7M to N+M: each AI provider implements one MCP client, and each service implements one MCP server. Three clients plus five servers equals 8 components instead of 15 \u2014 and each component is independent and reusable.</p>'+
'<p style="margin-top:10px">MCP works as a <strong>protocol</strong>, not a library or framework. The AI client and MCP server communicate via JSON-RPC 2.0 over stdio (for local servers) or HTTP with Server-Sent Events (for remote servers). The server exposes \u201Ctools\u201D \u2014 functions the AI can call \u2014 with typed schemas that describe their parameters. When a user makes a request, the AI client <strong>discovers</strong> what tools are available, <strong>decides</strong> which tool to call based on the user\u2019s intent, sends a <strong>structured call</strong> with the right parameters, and receives <strong>structured results</strong>. The AI never directly accesses the external service \u2014 the MCP server translates between the protocol and the service\u2019s native API.</p>'+
'<p style="margin-top:10px">Why does this matter for content professionals and non-engineers? MCP is the reason Claude can now search your Google Drive, query your Jira board, read your Confluence pages, and send Slack messages \u2014 all without you copy-pasting content back and forth. Each of these capabilities is an MCP server that exposes tools to Claude. When someone says \u201CClaude can access my files,\u201D what they mean is \u201Can MCP server for Google Drive exposes search and read tools that Claude\u2019s client can call.\u201D Understanding this architecture helps you evaluate which MCP servers to enable, what data they can access, and what security implications that carries.</p>'+
'</div></div>'+
'<div class="sec-title">MCP Architecture</div>'+
'<div class="card"><div class="card-text">The Model Context Protocol (MCP) is an open standard that connects AI clients to external services through a standardized JSON-RPC layer, solving the N\u00D7M integration problem.</div></div>'+
'<svg viewBox="0 0 700 200" style="width:100%;max-width:700px;display:block;margin:16px auto">'+
'<rect x="20" y="60" width="120" height="80" rx="10" fill="rgba(37,99,235,0.1)" stroke="#2563EB" stroke-width="2"/><text x="80" y="95" text-anchor="middle" font-size="12" fill="#2563EB" font-weight="700">AI Client</text><text x="80" y="115" text-anchor="middle" font-size="9" fill="var(--tx-muted)">(Claude, etc.)</text>'+
'<rect x="240" y="40" width="180" height="120" rx="10" fill="rgba(124,58,237,0.08)" stroke="#7C3AED" stroke-width="2"/><text x="330" y="70" text-anchor="middle" font-size="12" fill="#7C3AED" font-weight="700">MCP Protocol</text><text x="330" y="90" text-anchor="middle" font-size="10" fill="var(--tx-muted)">JSON-RPC 2.0</text><text x="330" y="110" text-anchor="middle" font-size="9" fill="var(--tx-muted)">Tool Discovery</text><text x="330" y="126" text-anchor="middle" font-size="9" fill="var(--tx-muted)">Schema Validation</text><text x="330" y="142" text-anchor="middle" font-size="9" fill="var(--tx-muted)">Auth &amp; Transport</text>'+
'<line x1="142" y1="100" x2="238" y2="100" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,3"/>'+
'<rect x="520" y="20" width="160" height="40" rx="6" fill="rgba(16,185,129,0.08)" stroke="#10B981"/><text x="600" y="45" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">GitHub API</text>'+
'<rect x="520" y="75" width="160" height="40" rx="6" fill="rgba(245,158,11,0.08)" stroke="#F59E0B"/><text x="600" y="100" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600">Jira / PM Tools</text>'+
'<rect x="520" y="130" width="160" height="40" rx="6" fill="rgba(239,68,68,0.08)" stroke="#EF4444"/><text x="600" y="155" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">Database</text>'+
'<line x1="422" y1="80" x2="518" y2="40" stroke="#10B981" stroke-width="1.5"/><line x1="422" y1="100" x2="518" y2="95" stroke="#F59E0B" stroke-width="1.5"/><line x1="422" y1="120" x2="518" y2="150" stroke="#EF4444" stroke-width="1.5"/>'+
'</svg>'+
'<div class="card"><div class="card-text" style="line-height:1.8"><p>The key insight behind MCP is the <strong>N+M advantage</strong>. Without MCP, connecting 5 AI providers to 10 services requires 50 custom integrations (5 \u00D7 10). Each integration is bespoke code that breaks when either side changes. With MCP, each AI provider implements one MCP client and each service implements one MCP server \u2014 total: 15 integrations (5 + 10). More importantly, a new service only needs one MCP server implementation to work with ALL AI providers simultaneously.</p><p style="margin-top:10px">This is why MCP adoption has been explosive \u2014 with tens of millions of SDK installations by early 2026. Building one MCP server for your internal documentation unlocks that documentation for Claude, ChatGPT, Cursor, and every other MCP-compatible tool, present and future. The investment is made once and compounds with every new AI tool that supports the protocol.</p></div></div>'+
'<div class="sec-title">MCP Tool Call Lifecycle</div>'+
'<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-mcp" id="flow-box-mcp">'+
'<div class="flow-ctrl"><button class="flow-btn" onclick="flowStep(\'mcp\',0)">\u23EE Reset</button><button class="flow-btn" onclick="flowStep(\'mcp\',Math.max(0,flowCur.mcp-1))">\u25C0 Prev</button><button class="flow-btn pri" onclick="flowStep(\'mcp\',flowCur.mcp+1)">Next \u25B6</button><span class="flow-step-ind" id="flow-ind-mcp">Step 0 / 8</span></div>'+
'<div class="flow-step-list" id="flow-mob-mcp"></div>'+
'<div class="flow-detail" id="flow-detail-mcp"></div>'+
'<div class="kb-hint">Use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys</div></div>'+
'<details class="deeper"><summary>Deeper Dive: Building an MCP Server \u2014 What Actually Happens</summary><div class="deeper-body">'+
'<p>The <strong>server lifecycle</strong> follows a predictable pattern: initialization, tool registration, connection, and then a loop of tool discovery, execution, and response. When the MCP server starts, it registers its available tools with typed schemas \u2014 each tool has a name, a description (which the AI reads to decide when to use it), input parameters defined as JSON Schema, and a handler function that executes the actual logic. The server then establishes a connection with the AI client, either via stdio (standard input/output, common for local servers) or HTTP+SSE (for remote/cloud servers). Once connected, the client can query the server\u2019s capabilities at any time.</p>'+
'<p style="margin-top:10px">A <strong>tool schema</strong> is what the AI reads to understand what a tool does and how to call it. For example, a \u201Csearch_docs\u201D tool might have the schema: name <code>search_docs</code>, description \u201CSearch the internal documentation knowledge base. Returns the top 5 most relevant results for the given query.\u201D, input parameters <code>{query: {type: "string", description: "The search query"}, limit: {type: "number", description: "Max results to return", default: 5}}</code>. The description is critical \u2014 it\u2019s how the AI decides whether to use this tool. A vague description like \u201Csearch stuff\u201D will cause the AI to misuse or ignore the tool. A specific description leads to precise tool selection.</p>'+
'<p style="margin-top:10px"><strong>Error handling</strong> in MCP servers must account for multiple failure modes. The external service might be down (return a clear error message, not a stack trace). Authentication might fail (the OAuth token expired \u2014 return a message telling the user to re-authenticate). The tool might return unexpected data (a field is missing or null \u2014 handle gracefully with defaults or clear error messages). The AI client expects structured responses, so every error should be returned as a formatted message the AI can relay to the user, not as a raw exception.</p>'+
'<p style="margin-top:10px"><strong>Multi-server orchestration</strong> is where MCP becomes truly powerful. A single AI client can connect to multiple MCP servers simultaneously. When Claude has access to both a Jira MCP server and a Confluence MCP server, it can search for a bug in Jira, find the related documentation in Confluence, and synthesize a response that references both \u2014 all in a single conversation turn. The AI client maintains the context across tool calls, understanding that the Jira issue and the Confluence page are related because the user asked about them together.</p>'+
'<p style="margin-top:10px"><strong>Security considerations</strong> are paramount. MCP servers have access to your systems, and the server developer controls what data flows through. OAuth scoping limits what the AI can do \u2014 a read-only scope means the AI can search and read but never create, update, or delete. This distinction matters enormously: giving an AI read access to your Jira board is very different from giving it write access. Always start with the minimum required permissions (principle of least privilege), and audit what data your MCP servers expose. A documentation search tool that inadvertently exposes internal security audit results is a data leakage risk.</p>'+
'</div></details>'+
'<div class="sec-title">Code: MCP Server (TypeScript)</div>'+
'<div class="code-block"><span class="lang-label">TypeScript</span><pre><code><span class="kw">import</span> { McpServer } <span class="kw">from</span> <span class="str">"@modelcontextprotocol/sdk/server"</span>;\n\n<span class="kw">const</span> server = <span class="kw">new</span> McpServer({ name: <span class="str">"docs-server"</span> });\n\nserver.tool(<span class="str">"search_docs"</span>,\n  { query: { type: <span class="str">"string"</span>, description: <span class="str">"Search query"</span> } },\n  <span class="kw">async</span> ({ query }) =&gt; {\n    <span class="kw">const</span> results = <span class="kw">await</span> searchIndex(query);\n    <span class="kw">return</span> { content: [{ type: <span class="str">"text"</span>, text: JSON.stringify(results) }] };\n  }\n);\n\nserver.tool(<span class="str">"get_doc"</span>,\n  { id: { type: <span class="str">"string"</span> } },\n  <span class="kw">async</span> ({ id }) =&gt; {\n    <span class="kw">const</span> doc = <span class="kw">await</span> fetchDocument(id);\n    <span class="kw">return</span> { content: [{ type: <span class="str">"text"</span>, text: doc.content }] };\n  }\n);</code></pre></div>'+
'<div class="sec-title">Before vs After MCP</div>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(239,68,68,0.1);color:var(--error)">Before MCP (N\u00D7M)</div><div class="comp-body">Each AI client needs a custom integration for each service. 3 clients \u00D7 5 services = 15 custom connectors to build and maintain.</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.1);color:var(--success)">After MCP (N+M)</div><div class="comp-body">Each client implements MCP once. Each service has one MCP server. 3 clients + 5 servers = 8 components. Standardized, reusable, composable.</div></div></div>'+
'<div class="callout"><strong>MCP vs. function calling:</strong> Function calling is model-specific \u2014 Claude\u2019s tool use and GPT\u2019s function calling have different schemas and behaviors. MCP is protocol-level \u2014 build one MCP server for Jira, and it works with any MCP-compatible client. Think of function calling as teaching one AI to use a tool. Think of MCP as building a universal adapter that any AI can plug into. For production systems, MCP is almost always the better investment.</div>'+
'<div class="case-study"><div class="case-badge">CASE STUDY</div><div class="case-title">Building an MCP Server for Internal Docs Search in 200 Lines</div><dl class="case-body">'+
'<dt>Situation</dt><dd>A platform engineering team needed Claude to search their internal wiki containing 5,000+ pages of architecture docs, runbooks, and onboarding guides. Engineers were spending 10\u201315 minutes per question manually searching Confluence, finding the right page, and then copy-pasting the relevant content into Claude for analysis. With 50+ engineers asking 3\u20135 such questions daily, this represented 25\u201350 hours per week of pure search-and-paste overhead.</dd>'+
'<dt>Context</dt><dd>The team evaluated three approaches: (1) Build a custom RAG pipeline with Pinecone, (2) use an existing Confluence integration, (3) build a lightweight MCP server. They chose MCP because it required no separate infrastructure (no vector database to manage), leveraged Claude\u2019s native MCP client support, and could be built in a day rather than weeks.</dd>'+
'<dt>Approach</dt><dd>The MCP server defined three tools with clear schemas. <strong><code>search_docs</code></strong>: takes a query string and an optional space filter, calls the Confluence REST API\u2019s search endpoint, and returns the top 5 results with titles, excerpts, and page IDs. The description reads: \u201CSearch internal documentation. Returns titles and excerpts. Use this when you need to find information about a topic.\u201D <strong><code>get_page</code></strong>: takes a page ID, fetches the full page content, strips HTML to clean text, and returns it. Description: \u201CRetrieve the full content of a specific documentation page by ID. Use this after search to read the complete document.\u201D <strong><code>list_recent</code></strong>: returns the 10 most recently modified pages. Description: \u201CList recently updated documentation pages. Use this when the user asks about recent changes.\u201D</dd>'+
'<dd style="margin-top:8px">The actual discovery flow works like this: when Claude Desktop connects to the server, it queries <code>tools/list</code> and receives the three tool definitions with their schemas and descriptions. When a user asks \u201CHow do I set up the staging environment?\u201D, Claude reads the tool descriptions, decides <code>search_docs</code> is appropriate, calls it with <code>{query: "staging environment setup"}</code>, reads the results, decides the second result looks most relevant, calls <code>get_page</code> with that page\u2019s ID, reads the full content, and synthesizes a response with specific steps cited from the actual documentation.</dd>'+
'<dt>Results</dt><dd>Average query resolution time dropped from 12 minutes (manual search + copy-paste) to 45 seconds (ask Claude, which searches and reads the docs automatically). The server handles approximately 200 tool calls per day with an average response time of 800ms per call. Adoption reached 80% of the engineering team within the first week. The total implementation was 187 lines of TypeScript including error handling, authentication, and all three tool handlers.</dd>'+
'<dt>Lessons Learned</dt><dd><strong>1.</strong> Tool descriptions are the most important part of the schema \u2014 they determine whether the AI uses the tool correctly. <strong>2.</strong> Two-step search (search \u2192 get full page) works better than returning full content in search results because it lets the AI choose which results to read in detail. <strong>3.</strong> Read-only permissions are sufficient for most knowledge base use cases \u2014 don\u2019t grant write access unless necessary. <strong>4.</strong> Error messages should be human-readable because the AI will relay them to the user verbatim. <strong>5.</strong> Logging every tool call with the query and response time makes it easy to identify slow queries and popular topics.</dd>'+
'<dt>What They\u2019d Do Differently</dt><dd>Add a fourth tool for page metadata (last modified date, author) so the AI can assess content freshness. They would also implement response caching for frequently accessed pages to reduce Confluence API load.</dd>'+
'</dl></div>'+
'<div class="callout warning"><strong>Security consideration:</strong> MCP servers have access to your systems. An MCP server connected to your internal wiki can read everything in that wiki. OAuth scoping controls what the AI can do \u2014 read-only vs. read-write permissions matter enormously. Always start with the minimum necessary permissions and expand only when specific use cases require it. A read-only MCP server for your documentation is low-risk. A read-write MCP server for your production database is high-risk and needs careful access controls.</div>'+
'';}


/* ══ MODULE 6: MoE, Distillation & Quantization ══ */
function mod6Content(){
return '<div class="sec-title">Understanding Mixture of Experts</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>The fundamental challenge in AI is the tension between capability and cost. You want a model that knows everything \u2014 a massive parameter count trained on diverse data \u2014 but you don\u2019t want to pay for all those parameters on every single request. Mixture of Experts (MoE) resolves this tension by having many specialist sub-networks (called \u201Cexperts\u201D) but only activating a small subset for each input. The model has the total knowledge of a giant, but the per-request compute cost of a mid-size model. This is how models like Mixtral and Grok achieve frontier-level performance at a fraction of the expected inference cost.</p>'+
'<p style="margin-top:10px">The <strong>router</strong> (also called the gating network) is a small neural network that makes the routing decision for each token. For every token in the input, the router produces a probability distribution over all experts and selects the top-2 (typically). The selected experts process the token independently, their outputs are weighted by the router\u2019s probabilities, and the weighted outputs are combined to produce the final representation. Crucially, different tokens in the same sentence may activate different expert combinations \u2014 the word \u201Cfunction\u201D in a code context might activate code-specialist experts, while \u201Cfunction\u201D in a math context might activate reasoning-specialist experts.</p>'+
'<p style="margin-top:10px">In practice, <strong>expert specialization emerges naturally</strong> during training \u2014 it\u2019s not manually assigned. Some experts become better at code, some at multilingual text, some at mathematical reasoning, some at factual recall. Researchers have observed this specialization by analyzing which experts activate for different types of input. This emergent specialization is what makes MoE so effective: each expert develops deep competence in its niche, producing better results than a dense model that must be a generalist everywhere.</p>'+
'<p style="margin-top:10px">The engineering challenges are significant. <strong>Load balancing</strong>: if all tokens go to the same 2 experts, the other experts are wasted. Auxiliary losses during training encourage balanced routing by penalizing extreme load imbalance. <strong>Communication overhead</strong>: in distributed training and inference, experts may live on different GPUs, requiring cross-device communication for every token. <strong>Inference complexity</strong>: the routing step adds latency, and memory requirements are still large (you need all experts loaded in memory even though only 2 are active per token) \u2014 this is why MoE models have high memory requirements relative to their active parameter count.</p>'+
'</div></div>'+
'<div class="sec-title">Mixture of Experts (MoE)</div>'+
'<svg viewBox="0 0 650 250" style="width:100%;max-width:650px;display:block;margin:16px auto">'+
'<rect x="20" y="100" width="80" height="50" rx="8" fill="rgba(37,99,235,0.1)" stroke="#2563EB" stroke-width="1.5"/><text x="60" y="130" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="600">Input</text>'+
'<rect x="150" y="80" width="100" height="70" rx="8" fill="rgba(124,58,237,0.1)" stroke="#7C3AED" stroke-width="2"/><text x="200" y="110" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="700">Router</text><text x="200" y="128" text-anchor="middle" font-size="9" fill="var(--tx-muted)">(Gating Network)</text>'+
'<line x1="102" y1="125" x2="148" y2="115" stroke="#7C3AED" stroke-width="1.5"/>'+
'<rect x="300" y="10" width="90" height="40" rx="6" fill="rgba(37,99,235,0.15)" stroke="#2563EB" stroke-width="2"/><text x="345" y="25" text-anchor="middle" font-size="9" fill="#2563EB" font-weight="700">Expert 1</text><text x="345" y="40" text-anchor="middle" font-size="8" fill="#2563EB">w=0.7</text>'+
'<rect x="300" y="60" width="90" height="40" rx="6" fill="rgba(148,163,184,0.1)" stroke="var(--border)"/><text x="345" y="75" text-anchor="middle" font-size="9" fill="var(--tx-muted)">Expert 2</text><text x="345" y="90" text-anchor="middle" font-size="8" fill="var(--tx-muted)">w=0.0</text>'+
'<rect x="300" y="110" width="90" height="40" rx="6" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="2"/><text x="345" y="125" text-anchor="middle" font-size="9" fill="#10B981" font-weight="700">Expert 3</text><text x="345" y="140" text-anchor="middle" font-size="8" fill="#10B981">w=0.3</text>'+
'<rect x="300" y="160" width="90" height="40" rx="6" fill="rgba(148,163,184,0.1)" stroke="var(--border)"/><text x="345" y="175" text-anchor="middle" font-size="9" fill="var(--tx-muted)">Expert 4</text><text x="345" y="190" text-anchor="middle" font-size="8" fill="var(--tx-muted)">w=0.0</text>'+
'<line x1="252" y1="100" x2="298" y2="30" stroke="#2563EB" stroke-width="2"/><line x1="252" y1="115" x2="298" y2="130" stroke="#10B981" stroke-width="2"/>'+
'<line x1="252" y1="105" x2="298" y2="80" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/><line x1="252" y1="120" x2="298" y2="180" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>'+
'<rect x="450" y="60" width="100" height="50" rx="8" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1.5"/><text x="500" y="82" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600">Weighted</text><text x="500" y="98" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600">Combine</text>'+
'<line x1="392" y1="30" x2="448" y2="75" stroke="#2563EB" stroke-width="1.5"/><line x1="392" y1="130" x2="448" y2="95" stroke="#10B981" stroke-width="1.5"/>'+
'<rect x="580" y="60" width="60" height="50" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5"/><text x="610" y="90" text-anchor="middle" font-size="11" fill="#10B981" font-weight="600">Output</text>'+
'<line x1="552" y1="85" x2="578" y2="85" stroke="#10B981" stroke-width="1.5"/>'+
'<text x="325" y="235" text-anchor="middle" font-size="11" fill="var(--tx-muted)">8 experts total, 2 active per token \u2014 full capability, 25% compute</text>'+
'</svg>'+
'<div class="callout"><strong>Why MoE matters to you:</strong> MoE is the reason some very large models run surprisingly fast. When someone says "this model has 1.8 trillion parameters but responds in 2 seconds," MoE is the answer \u2014 only a fraction of those parameters activate per query. This also means the same model can behave differently on different types of input, because different experts activate. If a model seems inconsistent across topics, expert routing may be why.</div>'+
'<div class="sec-title">Knowledge Distillation</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>Knowledge distillation follows the <strong>teacher-student paradigm</strong>: a large, capable \u201Cteacher\u201D model produces \u201Csoft labels\u201D \u2014 full probability distributions over all possible outputs for each training example. Instead of just saying \u201Cthis image is a cat\u201D (hard label: [1, 0, 0]), the teacher says \u201Cthis is 85% cat, 12% dog, 3% fox\u201D (soft label). A smaller \u201Cstudent\u201D model then trains to match these distributions, learning nuanced knowledge about inter-class relationships. The student learns that cats and dogs are similar (12% probability) but cats and cars are not (0.01% probability) \u2014 information that hard labels completely discard.</p>'+
'<p style="margin-top:10px">Why does distillation work better than training the small model from scratch? Because the teacher\u2019s probability distributions contain <strong>far more information per training example</strong> than hard labels. A single training example teaches the student about ALL possible outputs simultaneously, not just the correct one. The soft probabilities encode the teacher\u2019s uncertainty, its understanding of similarity between categories, and subtle patterns it has learned. This is called \u201Cdark knowledge\u201D \u2014 information present in the soft labels that is invisible in the hard labels. Temperature scaling during distillation (typically T=2\u20134) further softens the distributions, amplifying this dark knowledge.</p>'+
'<p style="margin-top:10px">The practical implications are enormous: distillation is the technique behind models like <strong>GPT-4o mini and Gemini Flash</strong>, and likely other compact model variants from major providers. These small, fast, cheap models retain 85\u201395% of the teacher\u2019s quality at 5\u201315% of the cost. This quality/cost tradeoff is what makes AI affordable at scale. Without distillation, every API call would need to run the full frontier model, and most commercial AI applications would be economically unviable.</p>'+
'</div></div>'+
'<div class="sec-title">Quantization Precision Ladder</div>'+
'<div class="sim-area"><div style="display:flex;flex-direction:column;gap:12px">'+
'<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:rgba(37,99,235,0.05);border:1px solid var(--border);border-radius:8px"><div style="width:60px;font-weight:700;color:var(--primary)">FP32</div><div style="flex:1"><div style="height:8px;background:var(--bg-muted);border-radius:4px"><div style="width:100%;height:100%;background:#2563EB;border-radius:4px"></div></div></div><div style="min-width:160px;font-size:12px;color:var(--tx-secondary)">4 bytes \u2022 Baseline \u2022 70B=280GB</div></div>'+
'<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:rgba(124,58,237,0.05);border:1px solid var(--border);border-radius:8px"><div style="width:60px;font-weight:700;color:var(--accent)">FP16</div><div style="flex:1"><div style="height:8px;background:var(--bg-muted);border-radius:4px"><div style="width:50%;height:100%;background:#7C3AED;border-radius:4px"></div></div></div><div style="min-width:160px;font-size:12px;color:var(--tx-secondary)">2 bytes \u2022 ~No loss \u2022 70B=140GB</div></div>'+
'<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:rgba(245,158,11,0.05);border:1px solid var(--border);border-radius:8px"><div style="width:60px;font-weight:700;color:var(--warning)">INT8</div><div style="flex:1"><div style="height:8px;background:var(--bg-muted);border-radius:4px"><div style="width:25%;height:100%;background:#F59E0B;border-radius:4px"></div></div></div><div style="min-width:160px;font-size:12px;color:var(--tx-secondary)">1 byte \u2022 Minimal loss \u2022 70B=70GB</div></div>'+
'<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:rgba(239,68,68,0.05);border:1px solid var(--border);border-radius:8px"><div style="width:60px;font-weight:700;color:var(--error)">INT4</div><div style="flex:1"><div style="height:8px;background:var(--bg-muted);border-radius:4px"><div style="width:12.5%;height:100%;background:#EF4444;border-radius:4px"></div></div></div><div style="min-width:160px;font-size:12px;color:var(--tx-secondary)">0.5 bytes \u2022 Some loss \u2022 70B=35GB</div></div>'+
'</div></div>'+
'<div class="callout warning"><strong>When NOT to quantize:</strong> INT4 quantization is remarkable for most tasks, but it degrades specific capabilities. Rare knowledge (uncommon facts, niche terminology), long-range coherence (maintaining consistency across very long outputs), and precise numerical reasoning are affected first. For content teams: if your workflow involves specialized domain terminology, medical/legal accuracy, or compliance-sensitive content, test the quantized model on YOUR specific tasks before deploying. A 5% quality drop on benchmarks may translate to a 15% quality drop on your niche use case.</div>'+
'<details class="deeper"><summary>Deeper Dive: When Quantization Degrades Quality and How to Know</summary><div class="deeper-body">'+
'<p>Quantization compresses model weights from high precision (32-bit floating point) to low precision (4-bit integers). Most weights in a neural network cluster in narrow ranges, so the rounding error from quantization is small for those values. But <strong>outlier weights</strong> \u2014 rare values that encode specialized knowledge \u2014 get rounded more aggressively, and this is where quality loss concentrates. Think of it like compressing an image: solid colors survive compression perfectly, but fine details and subtle gradients get blurred. In models, the \u201Cfine details\u201D are rare knowledge, edge cases, and nuanced distinctions.</p>'+
'<p style="margin-top:10px">What degrades first is predictable: <strong>rare knowledge</strong> (uncommon facts, specialized terminology), <strong>edge cases</strong> (unusual input formats, rare language constructions), <strong>nuanced reasoning</strong> (distinguishing between closely related concepts), and <strong>long-range coherence</strong> (maintaining consistency across very long outputs). A quantized model might get common facts right but hallucinate on uncommon ones. It might follow instructions well for typical requests but misinterpret unusual edge cases. The degradation is subtle and task-dependent, which is why blanket statements like \u201C4-bit is fine\u201D are unreliable.</p>'+
'<p style="margin-top:10px">The only reliable way to assess quantization impact is to <strong>test with your specific use case</strong>. Run 50 representative inputs through both the FP16 (full precision) and INT4 (quantized) versions of the same model. Compare outputs side by side. Score them on your task-specific criteria (accuracy, completeness, tone, format adherence). If the INT4 outputs are indistinguishable for your task, the quality loss is acceptable and you gain enormous efficiency. If you notice degradation on even 10% of test cases, you need to decide whether that degradation is tolerable for your use case or whether you need the higher-precision model.</p>'+
'<p style="margin-top:10px">When <strong>NOT</strong> to quantize: <strong>medical, legal, or compliance content</strong> where accuracy on edge cases is critical and a subtle error could have real consequences. <strong>Tasks requiring rare terminology</strong> \u2014 if your domain uses specialized vocabulary that the model encounters infrequently, quantization may degrade exactly the knowledge you need most. <strong>Multilingual tasks</strong> \u2014 lower-resource languages are often the first casualty of quantization because they have fewer training examples and their representations are more fragile. For these use cases, use the API (full-precision model) even if it costs more.</p>'+
'</div></details>'+
'<div class="sec-title">Code: Run Quantized Model Locally</div>'+
'<div class="code-block"><span class="lang-label">bash</span><pre><code><span class="cm"># Install Ollama and run a quantized model</span>\ncurl -fsSL https://ollama.com/install.sh | sh\n\n<span class="cm"># Pull a quantized model (check ollama.com for current models)</span>\nollama pull llama4:70b-q4_0\n\n<span class="cm"># Run it locally</span>\nollama run llama4:70b-q4_0 <span class="str">"Explain MoE architecture"</span></code></pre></div>'+
'<div class="case-study"><div class="case-badge">CASE STUDY</div><div class="case-title">Running Llama 3 70B on a MacBook Pro for Data-Sensitive Tasks</div><dl class="case-body">'+
'<dt>Situation</dt><dd>A security consulting firm needed to analyze client contracts and security audit reports using AI. Sending these documents to external APIs (OpenAI, Anthropic) violated their client agreements, which required all data to remain on-premises. They needed a capable model running locally.</dd>'+
'<dt>Context</dt><dd>The team evaluated three options: (1) a private cloud deployment of an API-based model (expensive, complex), (2) a fine-tuned small model (insufficient quality for complex analysis), (3) running a quantized large model on local hardware. They had MacBook Pro M3 Max laptops with 64GB unified memory and wanted to avoid infrastructure management.</dd>'+
'<dt>Approach</dt><dd>They tested Llama 3 70B at three quantization levels on a representative set of 40 tasks: contract clause identification, security vulnerability summarization, and compliance checklist generation. <strong>FP16 (140GB)</strong>: Could not fit in memory. <strong>INT8 (70GB)</strong>: Fit with tight margins, ~4 tokens/second, quality nearly identical to API-hosted model. <strong>INT4/Q4_0 (~35GB)</strong>: Comfortable memory headroom, ~8 tokens/second, measurable quality differences on 3 of the 40 tasks.</dd>'+
'<dd style="margin-top:8px">The three tasks that showed degradation at INT4 were all rare-terminology-heavy: identifying obscure regulatory provisions (NIST SP 800-53 sub-controls), distinguishing between similar-sounding compliance frameworks (SOC 2 Type I vs. Type II specifics), and multilingual contract clauses (German legal terminology). For the other 37 tasks, INT4 output was indistinguishable from the API-hosted model.</dd>'+
'<dt>Results</dt><dd>The team adopted a hybrid approach: INT4 locally for 90% of tasks (standard contract review, summarization, checklist generation) and INT8 for the 10% requiring rare-knowledge precision. Generation speed at INT4 was ~8 tokens/second \u2014 acceptable for review tasks where the analyst reads and annotates the output, but too slow for real-time chat interactions. Total cost savings: $3,200/month in API fees eliminated, with a one-time $800 investment in Ollama setup and testing.</dd>'+
'<dt>Lessons Learned</dt><dd><strong>1.</strong> Test quantization on YOUR tasks, not general benchmarks \u2014 domain-specific degradation patterns differ from average benchmark scores. <strong>2.</strong> INT4 is sufficient for the majority of tasks; keep a higher-precision fallback for edge cases. <strong>3.</strong> Local inference speed (8 tok/s) is 10\u201320x slower than API (100+ tok/s); factor this into workflow design. <strong>4.</strong> Unified memory architecture (Apple Silicon) makes local inference more practical than discrete-GPU laptops for models in the 30\u201370GB range. <strong>5.</strong> The quality difference between INT4 and INT8 matters most for rare knowledge; common tasks are largely unaffected.</dd>'+
'<dt>What They\u2019d Do Differently</dt><dd>Build an automated routing classifier that scores task complexity and routes to INT4 or INT8 automatically, rather than relying on the analyst\u2019s judgment about which tasks need higher precision.</dd>'+
'</dl></div>'+
'<div class="callout"><strong>Note on model versions:</strong> This case study used Llama 3 70B, which was the leading open-source model at the time of implementation. The current equivalent is Llama 4, which offers improved quality at similar quantization levels. The principles \u2014 choosing quantization level based on your specific task accuracy requirements, testing on YOUR tasks rather than generic benchmarks, and using hybrid INT4/INT8 routing \u2014 remain identical regardless of model version.</div>'+
'';}


/* ══ MODULE 7: Chain-of-Thought & Reasoning ══ */
function mod7Content(){
return '<div class="sec-title">Why Reasoning Strategies Exist</div>'+
'<div class="card"><div class="card-text" style="line-height:1.8">'+
'<p>LLMs generate text by predicting the next likely token. For simple tasks \u2014 summarize this paragraph, translate this sentence, reformat this data \u2014 pattern matching works well. But for complex tasks \u2014 analyze this contract for inconsistencies, debug this code, evaluate whether these two documents contradict each other \u2014 the model needs to <strong>reason</strong>, and it can\u2019t do that in a single token-prediction step. Without explicit reasoning, the model jumps from question to answer by pattern matching, which produces confident-sounding but often incorrect responses on anything requiring multi-step logic.</p>'+
'<p style="margin-top:10px"><strong>Chain-of-Thought (CoT)</strong> is the foundational technique: instead of jumping straight to an answer, CoT asks the model to show its work. \u201CThink step by step\u201D forces the model to decompose the problem, process each part sequentially, and build toward a conclusion. The intermediate steps consume tokens (and cost money) but dramatically improve accuracy because each step can reference the previous steps. It\u2019s the difference between mental arithmetic and showing your work on paper \u2014 the extra effort prevents errors that happen when you try to hold everything in your head at once.</p>'+
'<p style="margin-top:10px">Why does this matter for content professionals? When you ask AI to review a technical document for accuracy, a direct prompt might return \u201CLooks good!\u201D \u2014 useless and likely wrong. A CoT prompt that says \u201CFor each factual claim, identify the claim, state what source would verify it, assess whether the claim is supported, then give your overall assessment\u201D will catch errors the direct prompt misses. The same principle applies to any analytical task: content comparison, competitive analysis, quality assessment, editorial review. CoT turns AI from a surface-level responder into a methodical analyst.</p>'+
'</div></div>'+
'<div class="sec-title">Reasoning Strategy Comparison</div>'+
'<svg viewBox="0 0 700 220" style="width:100%;max-width:700px;display:block;margin:16px auto">'+

'<rect x="280" y="130" width="140" height="35" rx="6" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="2"/><text x="350" y="152" text-anchor="middle" font-size="11" fill="#10B981" font-weight="700">\u2705 391</text>'+
