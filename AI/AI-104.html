<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building with AI — Implementation &amp; Engineering for the AI Practitioner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563EB;--primary-light:#3B82F6;--primary-dark:#1D4ED8;
  --accent:#7C3AED;--accent-light:#8B5CF6;
  --secondary:#06B6D4;
  --success:#10B981;--warning:#F59E0B;--error:#EF4444;
  --bg-body:#F8FAFC;--bg-card:#FFFFFF;--bg-muted:#F1F5F9;--bg-highlight:#EFF6FF;
  --tx-primary:#0F172A;--tx-secondary:#475569;--tx-muted:#94A3B8;
  --border:#E2E8F0;--border-active:#2563EB;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --gradient-primary:linear-gradient(135deg,#2563EB,#7C3AED);
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',sans-serif;
  --font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-body);color:var(--tx-secondary);line-height:1.6;font-size:16px}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:38px;height:38px;background:var(--gradient-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ico svg{width:22px;height:22px;fill:#fff}
.hdr-t{font-size:20px;font-weight:700;color:var(--tx-primary)}
.hdr-s{font-size:12px;color:var(--tx-secondary);margin-top:1px}
.hdr-s .by{color:var(--accent);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--bg-muted);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--tx-secondary);flex-shrink:0}
.hdr-btn:hover{border-color:var(--primary);color:var(--primary)}
.hdr-btn svg{width:18px;height:18px}
.hdr.compact .hdr-s{display:none}
.course-nav{display:flex;align-items:center;gap:2px;padding:6px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.course-nav::-webkit-scrollbar{display:none}
.course-link{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--tx-muted);text-decoration:none;white-space:nowrap;transition:all .2s;font-family:var(--font-body)}
.course-link:hover{color:var(--primary);background:var(--bg-highlight);text-decoration:none}
.course-link.current{background:var(--gradient-primary);color:#fff;cursor:default;pointer-events:none}
.trail-wrap{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:61px;z-index:99;display:none}
.trail-wrap.vis{display:block}
.trail{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:0;position:relative}
.trail-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--border);z-index:0;transform:translateY(-8px)}
.trail-stop{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;cursor:pointer;flex:1;min-width:0;padding:0 4px}
.trail-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);transition:all .3s;flex-shrink:0}
.trail-stop.done .trail-dot{background:var(--primary);border-color:var(--primary)}
.trail-stop.active .trail-dot{background:var(--accent);border-color:var(--accent);width:20px;height:20px;box-shadow:0 0 0 4px rgba(124,58,237,0.2);animation:pulse 2s infinite}
.trail-lbl{font-size:10px;color:var(--tx-muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;font-weight:600}
.trail-stop.done .trail-lbl,.trail-stop.active .trail-lbl{color:var(--tx-secondary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(124,58,237,0.2)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0.1)}}
.search-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.search-backdrop.open{display:block}
.search-overlay{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);width:92%;max-width:620px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:201;max-height:500px;overflow:hidden}
.search-overlay.open{display:block}
.search-overlay input{width:100%;padding:16px 20px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--tx-primary);font-family:var(--font-body);outline:none}
.search-results{max-height:420px;overflow-y:auto;padding:8px 0}
.search-item{padding:10px 20px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-highlight)}
.search-cat{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.search-txt{font-size:14px;color:var(--tx-primary);margin-top:2px}
.search-txt mark{background:rgba(37,99,235,0.15);color:var(--primary);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;color:var(--tx-muted);font-size:14px}
.main{max-width:960px;margin:0 auto;padding:24px}
.pane{display:none}.pane.on{display:block}
.hero{text-align:center;padding:80px 20px 60px}
.hero-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:12px;padding:6px 18px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}
.hero h1{font-size:42px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;line-height:1.2}
.hero p{font-size:18px;color:var(--tx-secondary);max-width:560px;margin:0 auto 32px;line-height:1.7}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:700px;margin:0 auto 40px}
.hero-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.hero-stat-n{font-size:28px;font-weight:800;color:var(--primary)}
.hero-stat-l{font-size:13px;color:var(--tx-muted);margin-top:4px}
.btn-start{display:inline-flex;align-items:center;gap:8px;background:var(--gradient-primary);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-md)}
.btn-start:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.mod-hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.mod-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ico svg{width:26px;height:26px;fill:#fff}
.mod-title{font-size:24px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mod-desc{font-size:14px;color:var(--tx-secondary);margin-top:4px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;margin-bottom:20px}
.card:hover{box-shadow:var(--shadow-md)}
.card-title{font-size:17px;font-weight:600;color:var(--tx-primary);margin-bottom:8px}
.card-text{font-size:14px;color:var(--tx-secondary);line-height:1.7}
.sec-title{font-size:20px;font-weight:700;color:var(--tx-primary);margin:32px 0 16px;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';width:4px;height:24px;background:var(--gradient-primary);border-radius:2px;flex-shrink:0}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.sim-area{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.sim-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.callout{background:var(--bg-highlight);border:1px solid rgba(37,99,235,0.2);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;color:var(--tx-secondary);line-height:1.7}
.callout.warning{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);border-left-color:var(--warning)}
.callout.success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);border-left-color:var(--success)}
.deeper{margin:16px 0;border-left:3px solid var(--accent-light);padding-left:16px}
.deeper summary{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px}
.deeper summary::before{content:'\25B6';font-size:10px;transition:transform .2s}
.deeper[open] summary::before{transform:rotate(90deg)}
.deeper summary::-webkit-details-marker{display:none}
.deeper-body{font-size:14px;color:var(--tx-secondary);line-height:1.7;padding:8px 0}
.case-study{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.case-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:11px;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.case-title{font-size:17px;font-weight:700;color:var(--tx-primary);margin-bottom:12px}
.case-body dt{font-size:13px;font-weight:700;color:var(--primary);margin-top:12px}
.case-body dd{font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-left:0;margin-top:4px}
.concept-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:default}
.concept-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.concept-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.concept-ico svg{width:24px;height:24px;fill:#fff}
.concept-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.concept-desc{font-size:13px;color:var(--tx-secondary);line-height:1.6}
.quiz-section{margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.quiz-card{background:var(--bg-card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:0 12px 12px 0;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.quiz-card.correct{border-left-color:var(--success);background:rgba(16,185,129,0.03)}
.quiz-card.incorrect{border-left-color:var(--error);background:rgba(239,68,68,0.03)}
.quiz-q{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:12px}
.quiz-q .q-num{color:var(--accent);margin-right:6px}
.quiz-q .q-type{font-size:11px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;display:inline-block;background:var(--bg-muted);padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--tx-primary)}
.quiz-opt:hover{border-color:var(--primary-light);background:var(--bg-highlight)}
.quiz-opt.selected{border-color:var(--primary);background:var(--bg-highlight)}
.quiz-opt.right{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}
.quiz-opt.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:var(--error);text-decoration:line-through}
.quiz-opt .opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all .2s}
.quiz-opt.selected .opt-marker{border-color:var(--primary);background:var(--primary);color:#fff}
.quiz-opt.right .opt-marker{border-color:var(--success);background:var(--success);color:#fff}
.quiz-opt.wrong .opt-marker{border-color:var(--error);background:var(--error);color:#fff}
.quiz-fb{display:none;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;margin-top:8px}
.quiz-fb.vis{display:block}
.quiz-fb.correct{background:rgba(16,185,129,0.08);color:#065F46;border:1px solid rgba(16,185,129,0.2)}
.quiz-fb.incorrect{background:rgba(239,68,68,0.08);color:#991B1B;border:1px solid rgba(239,68,68,0.2)}
.quiz-check{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .2s}
.quiz-check:hover{background:var(--primary-dark)}
.quiz-check:disabled{background:var(--tx-muted);cursor:default}
.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:2px solid var(--border)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);border:none;transition:all .2s}
.nav-btn.primary{background:var(--primary);color:#fff}.nav-btn.primary:hover{background:var(--primary-dark)}
.nav-btn.secondary{background:var(--bg-card);color:var(--primary);border:1px solid var(--border)}.nav-btn.secondary:hover{border-color:var(--primary)}
.comparator{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.comp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.comp-header{padding:10px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.comp-body{padding:14px 16px;font-size:13px;color:var(--tx-primary);line-height:1.7;min-height:80px}
.flow-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:24px 0;position:relative}
.flow-ctrl{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg-muted);flex-wrap:wrap}
.flow-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx-secondary);transition:all .15s;font-family:var(--font-body)}
.flow-btn:hover{border-color:var(--primary);color:var(--primary)}
.flow-btn.pri{background:var(--primary);border-color:var(--primary);color:#fff}.flow-btn.pri:hover{background:var(--primary-dark)}
.flow-step-ind{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx-muted)}
.flow-nodes{display:flex;border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:0;z-index:5;background:var(--bg-card)}
.flow-ncol{flex:1;text-align:center;min-width:110px;padding:0 6px}
.flow-nbox{display:inline-block;border:1px solid var(--border);border-top:3px solid;border-radius:6px;padding:6px 10px;background:var(--bg-muted);min-width:90px}
.flow-nname{font-size:12px;font-weight:700;color:var(--tx-primary)}.flow-ndesc{font-size:10px;color:var(--tx-muted);margin-top:2px}
.flow-detail{border-top:2px solid var(--primary);padding:20px 24px;background:var(--bg-highlight);display:none}
.flow-detail.vis{display:block}
.flow-dmn{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.flow-ddir{font-size:13px;color:var(--tx-muted);margin-bottom:14px}
.flow-dtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.flow-dtbl th{text-align:left;padding:8px 12px;background:var(--bg-muted);border:1px solid var(--border);color:var(--tx-primary);font-weight:600;font-size:12px}
.flow-dtbl td{padding:7px 12px;border:1px solid var(--border);vertical-align:top}
.flow-dtbl td:first-child{font-family:var(--font-mono);font-size:12px;color:var(--primary);white-space:nowrap;min-width:140px}
.flow-dnote{font-style:italic;color:var(--tx-secondary);font-size:13px;line-height:1.7;padding:10px 14px;background:var(--bg-muted);border-radius:6px;border:1px solid var(--border)}
.flow-step-list{display:none}
.flow-mob-step{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);transition:opacity 0.3s,background 0.3s}
.flow-mob-step:last-child{border-bottom:none}
.flow-mob-step.dim{opacity:0.2}
.flow-mob-step.cur{background:var(--bg-highlight);border-left:3px solid var(--primary);border-radius:0 8px 8px 0}
.flow-mob-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.flow-mob-step.dim .flow-mob-num{background:var(--border)}
.flow-mob-name{font-size:13px;font-weight:600;color:var(--primary)}
.flow-mob-dir{font-size:11px;color:var(--tx-muted);margin-top:2px}
.warn-card{background:var(--bg-card);border:1px solid rgba(245,158,11,0.3);border-left:4px solid var(--warning);border-radius:0 12px 12px 0;padding:16px 20px;margin-bottom:12px}
.warn-title{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.warn-text{font-size:13px;color:var(--tx-secondary);line-height:1.6}
.code-block{position:relative;margin:16px 0}
.code-block .lang-label{position:absolute;top:8px;right:12px;font-size:11px;color:#94A3B8;font-weight:600;text-transform:uppercase}
.code-block pre{background:#1E293B;color:#E2E8F0;border-radius:10px;padding:16px;overflow-x:auto;font-family:var(--font-mono);font-size:13px;line-height:1.6;margin:0}
.code-block .kw{color:#7DD3FC}.code-block .str{color:#86EFAC}.code-block .cm{color:#64748B}.code-block .fn{color:#C4B5FD}.code-block .num{color:#FCD34D}
.toc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:pointer}
.toc-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary-light)}
.toc-features{font-size:12px;color:var(--tx-muted);margin-top:12px;line-height:1.5}
.matrix-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.matrix-table th{padding:10px 12px;background:var(--bg-muted);border:1px solid var(--border);font-weight:700;color:var(--tx-primary);text-align:left;font-size:12px;position:sticky;top:0}
.matrix-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:top;color:var(--tx-secondary)}
.matrix-table tr:hover td{background:var(--bg-highlight)}
.matrix-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid var(--border)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.badge-ml{background:rgba(37,99,235,0.1);color:var(--primary)}
.badge-genai{background:rgba(124,58,237,0.1);color:var(--accent)}
.badge-prompt{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-infra{background:rgba(245,158,11,0.1);color:var(--warning)}
.badge-ethics{background:rgba(239,68,68,0.1);color:var(--error)}
.badge-workflow{background:rgba(16,185,129,0.1);color:var(--success)}
.badge-proto{background:rgba(79,70,229,0.1);color:#4F46E5}
.badge-impl{background:rgba(37,99,235,0.1);color:var(--primary)}
.badge-security{background:rgba(239,68,68,0.1);color:var(--error)}
.badge-eval{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-rag{background:rgba(245,158,11,0.1);color:var(--warning)}
.gloss-search{width:100%;padding:12px 18px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--tx-primary);font-family:var(--font-body);transition:border-color .2s;margin-bottom:16px}
.gloss-search:focus{outline:none;border-color:var(--primary)}
.gloss-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}

function renderQuiz(prefix,questions){
return '<div class="quiz-section"><div class="sec-title">Knowledge Check</div>'+questions.map(function(q,i){
var qid=prefix+'-q'+i;
var opts;
if(q.type==='tf'){opts=[{text:'True',val:true},{text:'False',val:false}]}
else{opts=q.opts.map(function(o,j){return {text:o,val:j}})}
return '<div class="quiz-card" id="qc-'+qid+'"><div class="quiz-q"><span class="q-num">Q'+(i+1)+'</span>'+q.q+'<span class="q-type">'+q.type+'</span></div><div class="quiz-opts">'+opts.map(function(o,j){return '<div class="quiz-opt" data-val="'+o.val+'" onclick="selectOpt(\''+qid+'\',this)"><div class="opt-marker">'+String.fromCharCode(65+j)+'</div><span>'+o.text+'</span></div>'}).join('')+'</div><button class="quiz-check" id="btn-'+qid+'" onclick="checkQuiz(\''+qid+'\','+JSON.stringify(q.a)+',\''+q.exp.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\')">Check Answer</button><div class="quiz-fb" id="fb-'+qid+'"></div></div>'
}).join('')+'</div>';
}
window.selectOpt=function(qid,el){
if(quizStates[qid])return;
el.parentElement.querySelectorAll('.quiz-opt').forEach(function(o){o.classList.remove('selected')});
el.classList.add('selected');
};
window.checkQuiz=function(qid,correct,exp){
if(quizStates[qid])return;quizStates[qid]=true;
var card=document.getElementById('qc-'+qid);
var sel=card.querySelector('.quiz-opt.selected');
if(!sel)return;
var val=sel.dataset.val;
var isCorrect;
if(typeof correct==='boolean'){isCorrect=(val==='true')===correct}
else{isCorrect=parseInt(val)===correct}
card.querySelectorAll('.quiz-opt').forEach(function(o){
var ov=o.dataset.val;
var oCorrect;
if(typeof correct==='boolean'){oCorrect=(ov==='true')===correct}
else{oCorrect=parseInt(ov)===correct}
if(oCorrect)o.classList.add('right');
else if(o.classList.contains('selected'))o.classList.add('wrong');
o.style.cursor='default';
});
card.classList.add(isCorrect?'correct':'incorrect');
var fb=document.getElementById('fb-'+qid);
fb.className='quiz-fb vis '+(isCorrect?'correct':'incorrect');
fb.innerHTML=(isCorrect?'\u2705 Correct! ':'\u274C Incorrect. ')+exp;
document.getElementById('btn-'+qid).disabled=true;
};

/* ══ FLOW SIMULATOR ══ */
var flowData={},flowCur={};
function initFlow(id,data){
flowData[id]=data;flowCur[id]=0;
renderFlowState(id);
}
function flowStep(id,step){
var d=flowData[id];if(!d)return;
step=Math.max(0,Math.min(step,d.steps.length));
flowCur[id]=step;
renderFlowState(id);
}
function renderFlowState(id){
var d=flowData[id],cur=flowCur[id];
var ind=document.getElementById('flow-ind-'+id);
if(ind)ind.textContent='Step '+cur+' / '+d.steps.length;
var mobList=document.getElementById('flow-mob-'+id);
if(mobList){
mobList.innerHTML=d.steps.map(function(s,i){
var cls=i<cur?'vis':(i===cur?'cur':'dim');
return '<div class="flow-mob-step '+cls+'"><div class="flow-mob-num">'+(i+1)+'</div><div><div class="flow-mob-name">'+s.name+'</div><div class="flow-mob-dir">'+s.from+' \u2192 '+s.to+'</div></div></div>';
}).join('');
}
var detail=document.getElementById('flow-detail-'+id);
if(detail){
if(cur>0&&cur<=d.steps.length){
var s=d.steps[cur-1];
detail.className='flow-detail vis';
detail.innerHTML='<div class="flow-dmn">'+s.name+'</div><div class="flow-ddir">'+s.from+' \u2192 '+s.to+'</div>'+(s.detail?'<div class="flow-dnote">'+s.detail+'</div>':'');
}else{detail.className='flow-detail'}
}
}

var streamTimer=null;
function runStreamDemo(){
clearInterval(streamTimer);
var text='Artificial intelligence APIs work by accepting HTTP requests containing your prompt, processing them through a neural network, and returning generated text. The model breaks your input into tokens, processes them through attention layers, and produces output tokens one at a time.';
var words=text.split(' ');
document.getElementById('non-stream-out').textContent='';
document.getElementById('stream-out').textContent='';
document.getElementById('non-stream-out').style.color='var(--tx-muted)';
document.getElementById('non-stream-out').textContent='Waiting for complete response...';

streamTimer=setInterval(function(){

document.getElementById('stream-out').style.color='var(--tx-primary)';
document.getElementById('stream-out').textContent+=words[si]+' ';
si++;
}else{
clearInterval(streamTimer);
document.getElementById('non-stream-out').style.color='var(--tx-primary)';
document.getElementById('non-stream-out').textContent=text;
}
},80);
}

var checks=document.querySelectorAll('.pb-check');

checks.forEach(function(c){if(c.checked)parts.push(PB_PARTS[c.dataset.key])});

var a=document.getElementById('sim-a');var b=document.getElementById('sim-b');

var score=SIM_MATRIX[a.selectedIndex][b.selectedIndex];

function calcROI(){
var tasks=parseFloat(document.getElementById('roi-tasks').value)||1;
var manual=parseFloat(document.getElementById('roi-manual').value)||1;
var ai=parseFloat(document.getElementById('roi-ai').value)||1;
var cost=parseFloat(document.getElementById('roi-cost').value)||0;
var savedMin=(manual-ai)*tasks;
var savedHrs=(savedMin/60).toFixed(1);
var monthlyCost=(cost*tasks*22).toFixed(0);
var monthlyHrs=(savedHrs*22).toFixed(0);
var el=document.getElementById('roi-output');
if(!el)return;
el.innerHTML='<div style="font-size:32px;font-weight:800;color:var(--primary)">'+savedHrs+' hrs/day</div><div style="font-size:14px;color:var(--tx-secondary);margin:8px 0">Time saved daily</div>'+
'<div style="border-top:1px solid var(--border);margin:16px 0;padding-top:16px"><div style="font-size:20px;font-weight:700;color:var(--success)">'+monthlyHrs+' hrs/month saved</div>'+
'<div style="font-size:14px;color:var(--tx-muted);margin-top:4px">API cost: $'+monthlyCost+'/month</div></div>';
}

{term:'Context Window',cat:'GenAI',def:'The maximum number of tokens a model can process in a single request, including both input and output.',why:'Exceeding the context window causes errors or truncation. Managing it is a core engineering concern.',rel:['Token','Truncation']},
{term:'Token',cat:'GenAI',def:'The basic unit of text processing for LLMs. Roughly 0.75 words or 4 characters in English.',why:'Tokens determine API costs and context window usage. Counting tokens accurately is essential for production systems.',rel:['Tokenizer','Context Window']},
{term:'Tokenizer',cat:'GenAI',def:'The component that converts text into tokens. Different models use different tokenizers (BPE, SentencePiece).',why:'The same text produces different token counts across models, affecting cost estimates.',rel:['Token','BPE']},
{term:'System Prompt',cat:'Prompting',def:'Instructions provided to the model before user input, defining behavior, role, constraints, and output format.',why:'A well-engineered system prompt is the single highest-leverage optimization in AI applications.',rel:['Prompt Engineering','Guardrails']},
{term:'Prompt Engineering',cat:'Prompting',def:'The practice of designing inputs to AI models to elicit desired outputs, including techniques like few-shot, CoT, and structured formatting.',why:'The quality of your prompt directly determines the quality of AI output.',rel:['System Prompt','Few-Shot','Chain-of-Thought']},
{term:'Few-Shot Prompting',cat:'Prompting',def:'Including 2-5 example input/output pairs in the prompt so the model pattern-matches format and style.',why:'Few-shot prompting is the most reliable way to get consistent output formatting.',rel:['Prompt Engineering','Zero-Shot']},
{term:'Zero-Shot',cat:'Prompting',def:'Asking the model to perform a task with no examples, relying on its training knowledge.',why:'Simpler than few-shot but less consistent. Good for tasks the model has seen extensively in training.',rel:['Few-Shot']},
{term:'Chain-of-Thought (CoT)',cat:'Prompting',def:'A prompting technique that instructs the model to show its reasoning step by step before reaching a conclusion.',why:'CoT improves accuracy by 10-25% on reasoning tasks by forcing intermediate computation.',rel:['Prompt Engineering','ReAct']},
{term:'Prompt Injection',cat:'Security',def:'An attack where malicious instructions are inserted into model input to override system prompt behavior.',why:'The #1 security concern in AI applications. Every production system needs injection defenses.',rel:['System Prompt','Guardrails','Security']},
{term:'Guardrails',cat:'Security',def:'Constraints placed on AI behavior through system prompts, input/output filters, and model training.',why:'Guardrails prevent the model from producing harmful, incorrect, or out-of-scope responses.',rel:['System Prompt','Safety Filter']},
{term:'Embedding',cat:'RAG & Infrastructure',def:'A dense numerical vector representation of text (or images/audio) that captures semantic meaning in mathematical space.',why:'Embeddings enable semantic search, clustering, and similarity comparison — the foundation of RAG.',rel:['Vector Database','Cosine Similarity']},
{term:'Vector Database',cat:'RAG & Infrastructure',def:'A database optimized for storing and searching high-dimensional vectors. Examples: Pinecone, Chroma, pgvector, Weaviate.',why:'Vector databases power the retrieval step in RAG, finding semantically similar content in milliseconds.',rel:['Embedding','HNSW','RAG']},
{term:'RAG (Retrieval-Augmented Generation)',cat:'RAG & Infrastructure',def:'An architecture that retrieves relevant documents from a knowledge base and includes them in the prompt context to ground LLM responses.',why:'RAG is the primary pattern for connecting AI to your organization\'s specific data and reducing hallucination.',rel:['Vector Database','Embedding','Chunking']},
{term:'Chunking',cat:'RAG & Infrastructure',def:'Breaking documents into smaller pieces for embedding and retrieval. Chunk size significantly affects retrieval quality.',why:'Too large: irrelevant content dilutes results. Too small: context is lost. Finding the right size is critical.',rel:['RAG','Embedding','Overlap']},
{term:'Reranker',cat:'RAG & Infrastructure',def:'A model that re-scores retrieved documents for relevance using cross-encoder architecture, applied after initial vector search.',why:'Rerankers significantly improve retrieval quality by jointly processing query+document pairs.',rel:['RAG','Cross-Encoder']},
{term:'HNSW',cat:'RAG & Infrastructure',def:'Hierarchical Navigable Small World — an approximate nearest neighbor algorithm used by vector databases for fast search.',why:'HNSW enables sub-millisecond search over millions of vectors with minimal accuracy loss.',rel:['Vector Database','ANN']},
{term:'Cosine Similarity',cat:'RAG & Infrastructure',def:'A metric measuring the angle between two vectors. Values range from -1 (opposite) to 1 (identical direction).',why:'The standard similarity metric for comparing embeddings. Higher scores mean more semantically similar.',rel:['Embedding','Vector Database']},
{term:'MCP (Model Context Protocol)',cat:'Protocols',def:'An open standard by Anthropic for connecting AI clients to external tools and data sources through a standardized JSON-RPC layer.',why:'MCP solves the N\u00D7M integration problem: N clients + M servers instead of N\u00D7M custom integrations.',rel:['JSON-RPC','Tool Use','Function Calling']},
{term:'JSON-RPC',cat:'Protocols',def:'A remote procedure call protocol encoded in JSON. The transport layer for MCP communication.',why:'Understanding JSON-RPC helps you debug MCP interactions and build custom servers.',rel:['MCP','API']},
{term:'Function Calling',cat:'Protocols',def:'A model capability where the LLM outputs structured JSON describing which function to call and with what parameters.',why:'Function calling is how AI models take actions beyond text generation — searching, creating, updating.',rel:['Tool Use','MCP']},
{term:'Tool Use',cat:'Protocols',def:'The broader concept of AI models invoking external tools (APIs, databases, file systems) to accomplish tasks.',why:'Tool use transforms AI from a text generator into an agent that can interact with the world.',rel:['Function Calling','MCP','Agent']},
{term:'Mixture of Experts (MoE)',cat:'GenAI',def:'An architecture with multiple specialized sub-networks (experts) and a router that activates only 2 per token.',why:'MoE enables very large models to run efficiently — 1T params but only 100B active per request.',rel:['Router','Parameters','Transformer']},
{term:'Knowledge Distillation',cat:'GenAI',def:'Training a smaller student model to mimic a larger teacher model using soft probability distributions.',why:'This is how "mini" and "lite" models are created — retaining 90%+ of teacher quality at a fraction of the cost.',rel:['Teacher-Student','Soft Labels']},
{term:'Quantization',cat:'GenAI',def:'Reducing weight precision (FP32 \u2192 FP16 \u2192 INT8 \u2192 INT4) to shrink model size and increase inference speed.',why:'Quantization enables running large models on consumer hardware. A 70B model at INT4 fits in 35GB.',rel:['GPTQ','GGUF','Precision']},
{term:'Transformer',cat:'ML Fundamentals',def:'The neural network architecture behind modern LLMs, introduced in 2017. Uses self-attention to process all tokens simultaneously.',why:'Every modern LLM (GPT, Claude, Gemini, Llama) is based on the Transformer architecture.',rel:['Attention','Self-Attention']},
{term:'Attention Mechanism',cat:'ML Fundamentals',def:'A mechanism that allows each token to directly attend to every other token simultaneously, capturing long-range dependencies.',why:'Attention is what makes Transformers so powerful — it enables understanding relationships across an entire document.',rel:['Transformer','Self-Attention']},
{term:'Parameters',cat:'ML Fundamentals',def:'The learned numerical values (weights and biases) in a neural network. Model size is measured in parameters.',why:'Parameter count correlates roughly with capability. But architecture and training quality matter more.',rel:['Weights','Training']},
{term:'Inference',cat:'ML Fundamentals',def:'Running a trained model to generate predictions or responses. The compute-intensive step in API calls.',why:'Inference cost drives API pricing. Optimizing inference (batching, caching, quantization) reduces costs.',rel:['Latency','Token','GPU']},
{term:'Fine-Tuning',cat:'ML Fundamentals',def:'Further training a pre-trained model on task-specific data to specialize its behavior.',why:'Fine-tuning customizes a general model for specific domains or tasks, often outperforming prompting alone.',rel:['Pre-Training','LoRA','Training']},
{term:'RLHF',cat:'ML Fundamentals',def:'Reinforcement Learning from Human Feedback — optimizing models using human preference rankings.',why:'RLHF is what makes AI assistants helpful, harmless, and honest rather than just text predictors.',rel:['Alignment','Reward Model','DPO']},
{term:'Alignment',cat:'Ethics',def:'The process of ensuring AI systems behave in accordance with human values and intentions.',why:'Alignment determines whether AI is helpful or harmful. It is the central challenge of AI safety.',rel:['RLHF','Constitutional AI']},
{term:'Constitutional AI',cat:'Ethics',def:'Anthropic\'s technique where the model self-critiques against principles (helpful, harmless, honest).',why:'This is why Claude tends to be more nuanced and cautious — it evaluates its own output before you see it.',rel:['Alignment','RLHF']},
{term:'Red-Teaming',cat:'Security',def:'Deliberately probing AI systems for failures, biases, safety issues, and vulnerabilities.',why:'Red-teaming finds problems before users do. Essential for any production AI deployment.',rel:['Security','Testing']},
{term:'PII (Personally Identifiable Information)',cat:'Security',def:'Data that can identify an individual: names, emails, SSNs, phone numbers, addresses.',why:'Accidentally sending PII to AI APIs or leaking it in responses is a major compliance risk.',rel:['Data Privacy','GDPR']},
{term:'Canary Token',cat:'Security',def:'A unique hidden string in the system prompt that triggers alerts if it appears in model output.',why:'Canary tokens detect system prompt leakage — an early warning that defenses have been bypassed.',rel:['Prompt Injection','Security']},
{term:'Hallucination',cat:'GenAI',def:'When an AI model generates plausible-sounding but factually incorrect information.',why:'Hallucination is the primary reliability concern. RAG, citations, and evaluation pipelines mitigate it.',rel:['RAG','Grounding','Evaluation']},
{term:'Grounding',cat:'GenAI',def:'Connecting AI responses to factual sources (documents, databases) to reduce hallucination.',why:'Grounded responses include citations and evidence, making them verifiable and trustworthy.',rel:['RAG','Hallucination']},
{term:'Latency',cat:'Implementation',def:'The time between sending a request and receiving the first (or complete) response.',why:'Latency directly impacts user experience. Streaming, caching, and model routing reduce it.',rel:['Streaming','TTFT']},
{term:'TTFT (Time to First Token)',cat:'Implementation',def:'The time from request submission to receiving the first token of the response.',why:'TTFT matters more than total latency for perceived responsiveness. Streaming optimizes TTFT.',rel:['Latency','Streaming']},
{term:'Batch Processing',cat:'Implementation',def:'Sending multiple requests together for processing, typically at reduced cost with higher latency.',why:'Batch APIs offer ~50% cost savings. Ideal for non-real-time tasks like nightly evaluations.',rel:['API','Cost Optimization']},
{term:'Model Routing',cat:'Evaluation',def:'Classifying request complexity and routing to appropriate models: cheap for simple, expensive for complex.',why:'Model routing can reduce costs 50-70% while maintaining quality on complex tasks.',rel:['Cost Optimization','Classifier']},
{term:'LLM-as-Judge',cat:'Evaluation',def:'Using one LLM to evaluate the quality of another LLM\'s output against defined criteria.',why:'Scalable quality evaluation without human reviewers. Correlation with human judgment: ~80-90%.',rel:['Evaluation','Golden Dataset']},
{term:'Golden Dataset',cat:'Evaluation',def:'A curated set of input/output pairs representing expected quality. Used for regression testing.',why:'Golden datasets catch quality degradation when prompts or models change.',rel:['Evaluation','Regression Testing']},
{term:'RAGAS',cat:'Evaluation',def:'A framework for evaluating RAG pipelines across metrics like faithfulness, relevancy, and context recall.',why:'RAGAS provides standardized RAG evaluation, identifying whether problems are in retrieval or generation.',rel:['RAG','Evaluation']},
{term:'ReAct',cat:'Agents',def:'A prompting pattern that interleaves Reasoning (Thought), Acting (tool calls), and Observing results.',why:'ReAct enables AI to solve problems requiring external data or actions, not just internal knowledge.',rel:['Agent','Chain-of-Thought','Tool Use']},
{term:'Agent',cat:'Agents',def:'An AI system that can plan multi-step tasks, use tools, and make decisions autonomously.',why:'Agents represent the next evolution beyond chatbots — from answering questions to completing tasks.',rel:['ReAct','Tool Use','Planning']},
{term:'Reflexion',cat:'Agents',def:'A technique where the AI evaluates its own output, identifies weaknesses, and generates an improved version.',why:'Self-correction improves quality by 10-20% on tasks where the model can identify its own errors.',rel:['Agent','Self-Improvement']},
{term:'Prompt Chaining',cat:'Workflow',def:'Breaking a complex task into a sequence of focused prompts, where each step\'s output feeds the next step.',why:'Chains produce dramatically better results for complex tasks than single monolithic prompts.',rel:['Workflow','Pipeline']},
{term:'Self-Consistency',cat:'Prompting',def:'Running the same CoT prompt multiple times and selecting the most common answer via majority vote.',why:'Reduces variance and improves reliability on ambiguous problems at the cost of 3-5x API calls.',rel:['Chain-of-Thought','Ensemble']},
{term:'Tree-of-Thought',cat:'Prompting',def:'Exploring multiple reasoning branches in parallel, evaluating each, and pruning dead ends.',why:'Solves complex planning problems where a single reasoning path might lead to a dead end.',rel:['Chain-of-Thought','Search']},
{term:'Temperature',cat:'GenAI',def:'A parameter controlling output randomness. 0 = deterministic, 1 = creative, >1 = chaotic.',why:'Temperature choice affects reproducibility. Use 0 for code/facts, 0.7 for creative tasks.',rel:['Sampling','Top-p']},
{term:'Top-p (Nucleus Sampling)',cat:'GenAI',def:'A sampling method that considers tokens comprising the top p% of probability mass.',why:'Top-p provides more natural diversity than temperature alone. Common default: 0.9.',rel:['Temperature','Sampling']},
{term:'LoRA (Low-Rank Adaptation)',cat:'ML Fundamentals',def:'An efficient fine-tuning method that trains small adapter matrices instead of modifying all model weights.',why:'LoRA enables fine-tuning large models on consumer hardware. A 70B model can be fine-tuned with 8GB VRAM.',rel:['Fine-Tuning','Parameters']},
{term:'GPTQ',cat:'Implementation',def:'A post-training quantization method that compresses models with minimal quality loss.',why:'GPTQ is the standard quantization format for running large models locally.',rel:['Quantization','GGUF']},
{term:'GGUF',cat:'Implementation',def:'A file format for quantized models, used by llama.cpp and Ollama for efficient local inference.',why:'GGUF models run on CPUs without GPU requirements, democratizing access to large models.',rel:['Quantization','Ollama']},
{term:'Ollama',cat:'Implementation',def:'An open-source tool for running quantized LLMs locally with a simple CLI interface.',why:'Ollama makes local model deployment trivially easy: one command to download and run any supported model.',rel:['GGUF','Quantization','Local AI']},
{term:'BPE (Byte Pair Encoding)',cat:'GenAI',def:'A tokenization algorithm that iteratively merges the most frequent character pairs into tokens.',why:'BPE is used by most modern LLMs. Understanding it explains why token counts vary by language.',rel:['Tokenizer','Token']},
{term:'Cross-Encoder',cat:'RAG & Infrastructure',def:'A model that processes a query-document pair jointly, producing a relevance score. Used for reranking.',why:'Cross-encoders are more accurate than bi-encoders for relevance scoring but slower.',rel:['Reranker','Bi-Encoder']},
{term:'Bi-Encoder',cat:'RAG & Infrastructure',def:'A model that independently embeds queries and documents, enabling fast similarity search.',why:'Bi-encoders enable real-time search over millions of documents. Used for initial retrieval in RAG.',rel:['Embedding','Vector Database']},
{term:'Agentic RAG',cat:'RAG & Infrastructure',def:'A RAG architecture with self-assessment: the LLM evaluates retrieval quality and can retry with refined queries.',why:'Agentic RAG improves accuracy from ~70% to ~90% by iterating when initial retrieval is insufficient.',rel:['RAG','Agent']},
{term:'Graph RAG',cat:'RAG & Infrastructure',def:'RAG using a knowledge graph instead of or alongside vector search, leveraging entity relationships.',why:'Graph RAG excels for questions requiring multi-hop reasoning: "Who manages the team that built feature X?"',rel:['RAG','Knowledge Graph']},
{term:'DPO (Direct Preference Optimization)',cat:'ML Fundamentals',def:'A simpler alternative to RLHF that directly optimizes on preference pairs without a separate reward model.',why:'DPO is gaining adoption for alignment because it is simpler and more stable than RLHF.',rel:['RLHF','Alignment']},
{term:'Speculative Decoding',cat:'GenAI',def:'An acceleration technique: a small model drafts tokens, a large model verifies them in parallel.',why:'Speculative decoding speeds up inference 2-3x without quality loss.',rel:['Inference','Latency']},
{term:'Reward Model',cat:'ML Fundamentals',def:'A model trained on human preference data to score AI outputs, used to guide RLHF training.',why:'The reward model is the bridge between human judgment and scalable optimization.',rel:['RLHF','Alignment']},
{term:'Safety Filter',cat:'Security',def:'A system that screens AI inputs and outputs for harmful, dangerous, or policy-violating content.',why:'Safety filters explain why AI tools sometimes refuse legitimate requests — false positives from pattern matching.',rel:['Guardrails','Content Moderation']},
{term:'Structured Output',cat:'Prompting',def:'Instructing the model to return data in a specific format (JSON, XML, CSV) rather than free text.',why:'Structured output enables automation: downstream systems can parse and process AI responses programmatically.',rel:['JSON Mode','Function Calling']},
{term:'JSON Mode',cat:'Implementation',def:'An API parameter that constrains the model to output valid JSON, preventing format errors.',why:'JSON mode eliminates parsing failures from malformed output — essential for production pipelines.',rel:['Structured Output','API']},
{term:'Soft Labels',cat:'ML Fundamentals',def:'Probability distributions over classes (e.g., [0.7, 0.2, 0.1]) vs hard labels ([1, 0, 0]). Used in distillation.',why:'Soft labels from a teacher model carry richer information than binary correct/incorrect labels.',rel:['Distillation','Temperature']},
{term:'Router (MoE)',cat:'GenAI',def:'The gating network in MoE that decides which experts process each token based on learned weights.',why:'Router quality determines MoE efficiency. Poor routing leads to expert imbalance and wasted capacity.',rel:['MoE','Expert']},
{term:'Overlap (Chunking)',cat:'RAG & Infrastructure',def:'The number of tokens shared between adjacent chunks to prevent information loss at boundaries.',why:'50-100 token overlap ensures sentences spanning chunk boundaries are captured in at least one chunk.',rel:['Chunking','RAG']},
{term:'Regression Testing',cat:'Evaluation',def:'Running a fixed test suite after changes to verify that existing functionality still works correctly.',why:'AI systems are non-deterministic. Regression tests with golden datasets catch quality degradation.',rel:['Golden Dataset','CI/CD']},
{term:'Content Moderation',cat:'Security',def:'Automated or human review of AI inputs/outputs for harmful, inappropriate, or policy-violating content.',why:'Required for any user-facing AI application. Combine automated filters with human escalation.',rel:['Safety Filter','Guardrails']},
{term:'Weights',cat:'ML Fundamentals',def:'The learned numerical parameters in a neural network that determine how inputs are transformed to outputs.',why:'Weights are what models "learn" during training. Model size is measured by weight count (parameters).',rel:['Parameters','Training']},
{term:'Pre-Training',cat:'ML Fundamentals',def:'The initial training phase where the model learns language patterns from trillions of tokens of text.',why:'Pre-training creates the foundation capabilities. It is the most expensive phase, costing tens of millions of dollars.',rel:['Training','Fine-Tuning']},
{term:'Transfer Learning',cat:'ML Fundamentals',def:'Applying knowledge learned from one task to a different but related task.',why:'Transfer learning is why fine-tuning works — the pre-trained model already understands language.',rel:['Pre-Training','Fine-Tuning']},
{term:'GPU',cat:'Infrastructure',def:'Graphics Processing Unit — specialized hardware that accelerates the parallel computations required for AI inference and training.',why:'GPU availability and cost directly impact what models you can run and at what speed.',rel:['Inference','Training','VRAM']},
{term:'VRAM',cat:'Infrastructure',def:'Video RAM on a GPU, used to hold model weights during inference. Model size in memory determines GPU requirements.',why:'A model needs approximately 2 bytes per parameter at FP16 in VRAM to run.',rel:['GPU','Quantization','Parameters']},
{term:'Supervised Learning',cat:'ML Fundamentals',def:'Training a model on labeled examples (input-output pairs) to learn the mapping between them.',why:'SFT (Supervised Fine-Tuning) is a key step in creating AI assistants from base models.',rel:['Training','Fine-Tuning','Labels']},
{term:'Unsupervised Learning',cat:'ML Fundamentals',def:'Training on data without explicit labels, finding patterns and structure autonomously.',why:'Pre-training is unsupervised — the model learns language structure from raw text without labels.',rel:['Pre-Training','Clustering']},
{term:'Bias (in AI)',cat:'Ethics',def:'Systematic errors in AI outputs that reflect prejudices in training data or design choices.',why:'AI bias can harm people and organizations. Awareness and testing for bias is an engineering responsibility.',rel:['Fairness','Red-Teaming']},
{term:'Compliance',cat:'Security',def:'Adherence to legal and regulatory requirements (GDPR, HIPAA, SOC2) when using AI systems.',why:'Non-compliance can result in fines and legal liability. Know what data you can send to which AI service.',rel:['PII','Data Privacy','GDPR']},
{term:'Idempotency',cat:'Implementation',def:'A property where repeating the same operation produces the same result, important for retry-safe API design.',why:'Idempotent APIs are safe to retry on failure without causing duplicate actions.',rel:['API','Retry','Reliability']},
{term:'Semantic Search',cat:'RAG & Infrastructure',def:'Search based on meaning rather than exact keyword matching, powered by embeddings and vector similarity.',why:'Semantic search finds relevant results even when queries use different words than the documents.',rel:['Embedding','Vector Database','Cosine Similarity']},
{term:'Hybrid Search',cat:'RAG & Infrastructure',def:'Combining keyword search (BM25) with vector search to leverage both exact matching and semantic understanding.',why:'Hybrid search often outperforms pure vector search, especially for queries with specific technical terms.',rel:['Semantic Search','BM25','RAG']},
{term:'BM25',cat:'RAG & Infrastructure',def:'Best Match 25 — a probabilistic ranking function for keyword-based document retrieval.',why:'BM25 excels at finding exact term matches. Combined with vector search, it handles both precise and semantic queries.',rel:['Hybrid Search','TF-IDF']},
{term:'Metadata Filtering',cat:'RAG & Infrastructure',def:'Filtering vector search results by metadata attributes (date, author, category) before or after similarity search.',why:'Metadata filters dramatically improve relevance: "Find similar documents from the last 30 days only."',rel:['Vector Database','RAG']},
{term:'Knowledge Graph',cat:'RAG & Infrastructure',def:'A graph structure representing entities and their relationships, used in Graph RAG for multi-hop reasoning.',why:'Knowledge graphs capture relationships (reports-to, contains, depends-on) that flat vector search misses.',rel:['Graph RAG','Entity Extraction']},
{term:'Prompt Template',cat:'Prompting',def:'A reusable prompt structure with variable placeholders that get filled at runtime.',why:'Templates ensure consistency across team members and enable automated prompt generation.',rel:['Prompt Engineering','System Prompt']},
{term:'Prompt Chaining',cat:'Workflow',def:'Connecting multiple prompts in sequence where each step\'s output feeds the next step\'s input.',why:'Chains produce dramatically better results for complex tasks than single monolithic prompts.',rel:['Workflow','Pipeline','Orchestration']},
{term:'Orchestration',cat:'Workflow',def:'Managing the flow of data and control between multiple AI calls, tools, and services.',why:'Production AI systems require orchestration to handle branching, error recovery, and parallel execution.',rel:['Agent','Pipeline','Prompt Chaining']},
{term:'Pipeline',cat:'Workflow',def:'A sequence of processing steps applied to data, often including AI inference as one or more steps.',why:'Pipelines structure AI workflows into repeatable, testable, and monitorable sequences.',rel:['Orchestration','Prompt Chaining']},
{term:'Caching',cat:'Implementation',def:'Storing AI responses for identical or similar requests to reduce cost and latency.',why:'Semantic caching can reduce API costs by 30-60% for applications with repetitive queries.',rel:['Cost Optimization','Latency']},
{term:'Retry Logic',cat:'Implementation',def:'Automatic re-sending of failed requests with strategies like exponential backoff.',why:'Robust retry logic is essential for production reliability. APIs fail transiently — retries handle it gracefully.',rel:['Exponential Backoff','Rate Limiting']},
{term:'Concurrency',cat:'Implementation',def:'Processing multiple AI requests simultaneously to maximize throughput.',why:'Concurrent requests can process batches 10-50x faster than sequential processing.',rel:['Async','Throughput']},
{term:'Async (Asynchronous)',cat:'Implementation',def:'Non-blocking execution where you send a request and continue working while waiting for the response.',why:'Async patterns prevent your application from freezing while waiting for AI API responses.',rel:['Concurrency','Streaming']},
{term:'Throughput',cat:'Implementation',def:'The number of requests or tokens processed per second/minute.',why:'Throughput determines how many users your AI application can serve simultaneously.',rel:['Concurrency','Latency','Rate Limiting']},
{term:'Load Testing',cat:'Evaluation',def:'Sending high volumes of requests to measure system performance under stress.',why:'Load testing reveals bottlenecks before real users hit them.',rel:['Throughput','Scalability']},
{term:'A/B Testing',cat:'Evaluation',def:'Comparing two prompt or model variants by randomly assigning users and measuring outcomes.',why:'A/B testing provides statistical evidence for which approach works better in production.',rel:['Evaluation','Metrics']},
{term:'Prompt Versioning',cat:'Workflow',def:'Tracking changes to prompts over time, similar to code version control.',why:'Without versioning, you can\'t reproduce results, debug regressions, or roll back bad changes.',rel:['Regression Testing','Prompt Template']},
{term:'Observability',cat:'Implementation',def:'The ability to understand system behavior through logs, metrics, and traces.',why:'You can\'t improve what you can\'t measure. Observability reveals cost, quality, and latency patterns.',rel:['Logging','Monitoring','Metrics']},
{term:'Monitoring',cat:'Implementation',def:'Continuous tracking of AI system health: response quality, latency, cost, and error rates.',why:'Monitoring catches quality degradation, cost spikes, and new attack patterns in real time.',rel:['Observability','Alerting']},
{term:'Fallback Strategy',cat:'Implementation',def:'An alternative action when the primary AI model or service is unavailable.',why:'Fallbacks (cached responses, simpler models, human routing) prevent total system failure.',rel:['Reliability','Error Handling']},
{term:'Edge Inference',cat:'Infrastructure',def:'Running AI models on edge devices (phones, laptops, IoT) rather than cloud servers.',why:'Edge inference enables offline operation, lower latency, and data privacy.',rel:['Quantization','Ollama','Local AI']},
{term:'Model Card',cat:'Ethics',def:'A standardized document describing a model\'s capabilities, limitations, training data, and intended use.',why:'Model cards help you evaluate whether a model is appropriate for your use case.',rel:['Documentation','Transparency']},
{term:'Data Privacy',cat:'Ethics',def:'Protecting personal and sensitive data from unauthorized access or unintended exposure.',why:'Sending sensitive data to AI APIs creates privacy risks. Know your data classification requirements.',rel:['PII','GDPR','Compliance']},
{term:'GDPR',cat:'Ethics',def:'General Data Protection Regulation — EU regulation governing personal data processing.',why:'GDPR affects how you can use AI with data of EU residents, including AI-generated content about individuals.',rel:['Data Privacy','Compliance','PII']},
{term:'Explainability',cat:'Ethics',def:'The ability to understand and communicate how an AI system reaches its outputs.',why:'Stakeholders need to understand AI decisions. "The AI said so" is not sufficient justification.',rel:['Transparency','Model Card']},
{term:'Human-in-the-Loop',cat:'Workflow',def:'Requiring human review or approval at critical points in an AI workflow.',why:'Humans catch errors that AI misses. Critical for high-stakes decisions and irreversible actions.',rel:['Agent','Safety']},
{term:'Classifier',cat:'ML Fundamentals',def:'A model that assigns inputs to predefined categories (spam/not-spam, topic A/B/C).',why:'Classifiers are used in model routing, content moderation, and intent detection.',rel:['Model Routing','Content Moderation']},
{term:'Ensemble',cat:'ML Fundamentals',def:'Combining predictions from multiple models to improve accuracy and reliability.',why:'Ensembles reduce individual model errors. Self-consistency is an ensemble technique for LLMs.',rel:['Self-Consistency','Voting']},
{term:'Benchmark',cat:'Evaluation',def:'A standardized test suite for measuring and comparing AI model performance.',why:'Benchmarks (MMLU, HumanEval, MT-Bench) help you choose models, but real-world performance may differ.',rel:['Evaluation','Metrics']},
{term:'Perplexity',cat:'ML Fundamentals',def:'A measure of how well a language model predicts a sample. Lower perplexity = better prediction.',why:'Perplexity is a common evaluation metric for language models, though it doesn\'t directly measure usefulness.',rel:['Evaluation','Metrics']},
{term:'Embedding Model',cat:'RAG & Infrastructure',def:'A specialized model that converts text into dense vector representations (embeddings).',why:'The choice of embedding model significantly impacts retrieval quality. Domain-specific models often outperform general ones.',rel:['Embedding','Vector Database']},
{term:'Multimodal',cat:'GenAI',def:'AI models that process multiple types of input: text, images, audio, video.',why:'Multimodal models enable applications that work with diverse content types simultaneously.',rel:['Transformer','Vision']},
{term:'Vision Model',cat:'GenAI',def:'AI models that can process and understand images, including OCR, object detection, and visual reasoning.',why:'Vision capabilities let AI analyze screenshots, diagrams, documents, and photos.',rel:['Multimodal','OCR']},
{term:'Context Length',cat:'GenAI',def:'Synonym for context window — the maximum tokens a model can handle in one request.',why:'Context length determines how much reference material you can include in a single prompt.',rel:['Context Window','Token']},
{term:'Prompt Caching',cat:'Implementation',def:'Reusing previously processed prompt prefixes to reduce cost and latency on subsequent calls.',why:'Prompt caching can reduce costs by 90% for conversations with long system prompts.',rel:['Caching','Cost Optimization','Latency']},
{term:'Tool Schema',cat:'Protocols',def:'A JSON schema defining a tool\'s name, description, and parameter types for function calling or MCP.',why:'Well-defined schemas help the model understand when and how to use each tool correctly.',rel:['Function Calling','MCP','JSON Schema']},
{term:'JSON Schema',cat:'Implementation',def:'A vocabulary for annotating and validating JSON documents, used in AI tool definitions and structured output.',why:'JSON Schema defines the contract between your code and the AI model\'s structured outputs.',rel:['Structured Output','Tool Schema']},
{term:'Semantic Similarity',cat:'RAG & Infrastructure',def:'A measure of how similar two pieces of text are in meaning, computed via embedding distance.',why:'Semantic similarity powers search, deduplication, clustering, and recommendation systems.',rel:['Cosine Similarity','Embedding']},
{term:'Top-K Retrieval',cat:'RAG & Infrastructure',def:'Returning the K most similar documents from a vector search.',why:'Choosing K (typically 3-10) balances between providing enough context and not overwhelming the model.',rel:['RAG','Vector Database']},

var glossFilter='All',glossAlpha='',glossSearch='';

function initGlossary(){
document.getElementById('gloss-filters').innerHTML=ALL_CATS.map(function(c){return '<button class="gloss-filter '+(c==='All'?'active':'')+'" onclick="setGlossFilter(\''+c+'\',this)">'+c+'</button>'}).join('');
document.getElementById('alpha-bar').innerHTML='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(function(l){return '<button class="alpha-btn" onclick="setGlossAlpha(\''+l+'\',this)">'+l+'</button>'}).join('');
renderGlossary();
}
window.setGlossFilter=function(c,btn){glossFilter=c;glossAlpha='';document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});renderGlossary()};
window.setGlossAlpha=function(l,btn){glossAlpha=(glossAlpha===l)?'':l;document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});if(glossAlpha)btn.classList.add('active');renderGlossary()};
window.filterGlossary=function(){glossSearch=document.getElementById('gloss-search').value.toLowerCase();renderGlossary()};

function renderGlossary(){
var items=GLOSSARY;
if(glossFilter!=='All')items=items.filter(function(g){return g.cat===glossFilter});
if(glossAlpha)items=items.filter(function(g){return g.term[0].toUpperCase()===glossAlpha});
if(glossSearch)items=items.filter(function(g){return g.term.toLowerCase().includes(glossSearch)||g.def.toLowerCase().includes(glossSearch)});
document.getElementById('gloss-grid').innerHTML=items.length?items.map(function(g){
return '<div class="gloss-card" id="g-'+g.term.replace(/[^a-zA-Z]/g,'')+'"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="gloss-term">'+g.term+'</div><span class="badge '+(CAT_MAP[g.cat]||'badge-ml')+'">'+g.cat+'</span></div><div class="gloss-def">'+g.def+'</div><div class="gloss-why">Why it matters: '+g.why+'</div>'+(g.rel.length?'<div class="gloss-related">Related: '+g.rel.map(function(r){return '<a onclick="jumpToGloss(\''+r+'\')">'+r+'</a>'}).join(', ')+'</div>':'')+'</div>';
}).join(''):'<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss=function(term){
glossSearch='';glossFilter='All';glossAlpha='';
var si=document.getElementById('gloss-search');if(si)si.value='';
document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
var first=document.querySelector('.gloss-filter');if(first)first.classList.add('active');
document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
renderGlossary();
var id='g-'+term.replace(/[^a-zA-Z]/g,'');
var el=document.getElementById(id);
if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px var(--primary)';setTimeout(function(){el.style.boxShadow=''},2000)}
};

function scoreFinal(){

var results=performSearch(query);
var container=document.getElementById('search-results');
if(!query.trim()){container.innerHTML='<div class="search-empty">Start typing to search\u2026</div>';return}
if(!results.length){container.innerHTML='<div class="search-empty">No results found.</div>';return}
container.innerHTML=results.map(function(r){
var hl=r.text.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
return '<div class="search-item" data-idx="'+searchIndex.indexOf(r)+'"><div class="search-cat">'+r.type+'</div><div class="search-txt">'+hl+'</div></div>';
}).join('');
container.querySelectorAll('.search-item').forEach(function(el){
el.onclick=function(){searchIndex[parseInt(el.dataset.idx)].action();closeSearch()};
});
}
function openSearch(){document.getElementById('search-backdrop').classList.add('open');document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').value='';document.getElementById('search-input').focus();renderSearchResults('')}
function closeSearch(){document.getElementById('search-backdrop').classList.remove('open');document.getElementById('search-overlay').classList.remove('open')}
document.getElementById('search-btn').onclick=openSearch;
document.getElementById('search-backdrop').onclick=closeSearch;
document.getElementById('search-input').oninput=function(){renderSearchResults(this.value)};

/* ══ KEYBOARD SHORTCUTS ══ */
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();return}
if(e.key==='Escape'){closeSearch();return}
var focused=document.activeElement;
if(!focused)return;
var sim=focused.closest('.sim-focusable')||(focused.classList.contains('sim-focusable')?focused:null);
if(!sim)return;
var simType=sim.dataset.sim;
if(!simType)return;
if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
e.preventDefault();
var dir=e.key==='ArrowRight'?1:-1;
var flowId=simType.replace('flow-','');
if(flowCur[flowId]!==undefined)flowStep(flowId,flowCur[flowId]+dir);
}
});

/* ══ COURSE NAV ══ */
function renderCourseNav(){
var nav=document.getElementById('course-nav');
if(!nav)return;
nav.innerHTML=COURSES.map(function(c){
if(c.id===THIS_COURSE)return '<span class="course-link current">'+c.label+'</span>';
return '<a class="course-link" href="'+c.file+'">'+c.label+'</a>';
}).join('');
}

/* ══ MOBILE DRAWER ══ */
function renderMobDrawer(){
var list=document.getElementById('mob-drawer-list');
if(!list)return;
list.innerHTML='<div class="mob-drawer-item" onclick="showLanding();closeMobDrawer()" style="border-bottom:2px solid var(--border);margin-bottom:4px"><div class="mob-drawer-ico" style="background:var(--tx-secondary)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="16" height="16"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-4h4v4h3a1 1 0 001-1V10"/></svg></div><div><div class="mob-drawer-name">Home</div></div></div>'+
MODULES.map(function(m,i){
var cls=(i===currentModule?'active':'')+(completedModules.has(i)?' done':'');
return '<div class="mob-drawer-item '+cls+'" onclick="goModule('+i+');closeMobDrawer()"><div class="mob-drawer-ico" style="background:'+m.color+'">'+ICONS[m.icon]+'</div><div><div class="mob-drawer-name">'+m.title+'</div></div><span class="mob-check">\u2713</span></div>';
}).join('')+
'<div class="mob-drawer-item" onclick="showFinalAssessment();closeMobDrawer()"><div class="mob-drawer-ico" style="background:var(--gradient-primary)"><svg viewBox="0 0 24 24" fill="#fff" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div><div class="mob-drawer-name">Final Assessment</div></div></div>'+
'<div class="mob-drawer-footer">Brought to you by Babak</div>';
}
function openMobDrawer(){renderMobDrawer();document.getElementById('mob-drawer-backdrop').classList.add('open');document.getElementById('mob-drawer').classList.add('open');document.body.style.overflow='hidden'}
function closeMobDrawer(){document.getElementById('mob-drawer-backdrop').classList.remove('open');document.getElementById('mob-drawer').classList.remove('open');document.body.style.overflow=''}
document.getElementById('mob-menu-btn').addEventListener('click',openMobDrawer);
document.getElementById('mob-drawer-backdrop').addEventListener('click',closeMobDrawer);
document.getElementById('mob-drawer-close').addEventListener('click',closeMobDrawer);

/* ══ SCROLL-TO-TOP ══ */
var scrollBtn=document.getElementById('scroll-top-btn');
window.addEventListener('scroll',function(){scrollBtn.classList.toggle('vis',window.scrollY>300)});
scrollBtn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});

/* ══ INIT ══ */
buildSearchIndex();
renderCourseNav();
showLanding();
</script>
</body>
