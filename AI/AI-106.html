function mod1(){return '<div class="sec">Why An Operating Model Matters</div><div class="card"><p>AI programs often fail at scale when ownership is unclear. A team launches a chatbot, another team buys a copiloting tool, a third team fine-tunes a model, and nobody owns data risk, evaluation, cost, user training, or incident response. The operating model is the set of roles, forums, controls, and decision rights that turns isolated experiments into managed capability.</p><p>The goal is not bureaucracy. The goal is speed with accountability. Strong AI operating models create a clear path from idea to pilot to production, with risk checks that match the consequence of the use case.</p></div><div class="sec">Operating Model Layers</div>'+table(['Layer','Purpose','Typical Owner'],[['Executive sponsor','Sets business outcomes, funding appetite, and acceptable risk.','C-suite or business unit leader'],['AI council','Prioritizes portfolio, resolves policy tradeoffs, and reviews high-risk systems.','Cross-functional leadership'],['AI platform team','Provides approved models, tooling, observability, security patterns, and reusable components.','Technology / platform org'],['Product owner','Owns value, user experience, adoption, and production outcomes for each use case.','Business or product team'],['Risk partners','Review legal, privacy, security, model risk, and compliance needs.','Legal, security, privacy, compliance'],['Practitioner community','Shares prompts, patterns, evaluations, lessons learned, and reusable artifacts.','Champions and domain experts']])+'<div class="callout ok"><strong>Operating principle:</strong> Centralize standards and shared infrastructure. Decentralize use-case discovery and domain ownership. Escalate only when risk, cost, or user impact justifies it.</div>'+scenario('op')}
function mod2(){return '<div class="sec">Use-Case Portfolio Thinking</div><div class="card"><p>A strong AI portfolio balances quick wins, strategic bets, and foundational capabilities. Quick wins build trust and fluency. Strategic bets create differentiated business value. Foundational work, such as data readiness and evaluation infrastructure, makes later delivery faster and safer.</p><p>Do not prioritize use cases only by excitement. Prioritize by value, feasibility, risk, data readiness, adoption path, and measurability.</p></div><div class="sec">Use-Case Scorecard</div><div class="card"><div class="score"><label>Business value<input id="uc-value" type="number" min="1" max="5" value="4" aria-label="Business value score" oninput="calcUseCase()"></label><label>Data readiness<input id="uc-data" type="number" min="1" max="5" value="3" aria-label="Data readiness score" oninput="calcUseCase()"></label><label>Feasibility<input id="uc-feas" type="number" min="1" max="5" value="4" aria-label="Feasibility score" oninput="calcUseCase()"></label><label>Risk<input id="uc-risk" type="number" min="1" max="5" value="2" aria-label="Risk score" oninput="calcUseCase()"></label></div><div class="score-out" id="uc-out"></div></div>'+table(['Portfolio bucket','Good examples','Avoid'],[['Quick wins','Summarization, internal search, draft assistance, structured extraction with review.','High-risk automation disguised as a pilot.'],['Strategic bets','Customer support copilot, claims review, sales intelligence, developer productivity.','Projects without measurable adoption or clear owner.'],['Foundational enablers','AI inventory, data classification, evaluation harness, approved model gateway.','Platform work with no user path.'],['Research options','New agent workflows, open-weight pilots, synthetic data trials.','Treating unproven research as production commitment.']])+'<details class="details"><summary>Deep Dive: Portfolio Hygiene</summary><p>Every AI portfolio needs a retirement rule. Some pilots should stop because users do not adopt them, data quality is not good enough, evaluation fails, cost is too high, or risk controls would make the workflow unusable. Killing weak pilots is a sign of a healthy portfolio, not a failure.</p></details>'}
function mod3(){return '<div class="sec">Governance Without Theater</div><div class="card"><p>Governance should answer five practical questions: What AI systems exist? Who owns each one? What data do they process? What risks do they create? How do we know they still work?</p><p>NIST AI RMF, the NIST Generative AI Profile, ISO/IEC 42001, and the EU AI Act are useful because they provide vocabulary, management-system structure, and risk-based obligations. As of July 2026, EU AI Act prohibited-practice rules and GPAI obligations are already phased in. Transparency rules and many remaining obligations take effect in August 2026, while some high-risk-product timelines continue later for selected systems. NIST has also published GenAI profile material and related AI RMF resources. These frameworks do not replace local judgment. Your operating model should translate them into inventory fields, approval gates, testing evidence, and review cadence.</p></div>'+table(['Current reference','What It Adds','Operating Impact'],[['NIST AI RMF 1.0 and revision work','Map, Measure, Manage, Govern vocabulary plus evolving profile guidance.','Use it as the backbone for risk workflow and evidence records.'],['NIST Generative AI Profile','GenAI-specific risks such as hallucination, misuse, privacy, content provenance, and security.','Add GenAI-specific controls to model cards, red-team plans, and user disclosures.'],['ISO/IEC 42001','Management-system structure for AI policy, roles, controls, audits, and continual improvement.','Use it to make governance repeatable, not person-dependent.'],['EU AI Act','Risk-based legal obligations with phased applicability from 2025 onward; August 2026 is a major applicability milestone.','Classify use cases early; do not discover high-risk obligations after launch.']]) + table(['Artifact','What It Contains','Why It Matters'],[['AI inventory','Use case, owner, model/provider, data classes, users, risk tier, status.','Creates visibility and prevents shadow AI.'],['Risk register','Failure modes, controls, residual risk, decision owner, review date.','Makes risk explicit and auditable.'],['Model/vendor approval','Provider, model family, data terms, retention, security posture, compliance fit.','Avoids accidental use of unsuitable services.'],['Model or system card','Intended use, known limits, evaluation summary, data considerations, human oversight, and change history.','Gives reviewers and users a concise evidence record.'],['Policy stack','Acceptable use, data handling, tool permissions, human review, incident response.','Turns principles into repeatable rules.'],['Evidence pack','Evaluation results, red-team notes, privacy impact review, security review, rollout plan.','Supports production approval.']])+'<div class="callout warn"><strong>Keep labels simple:</strong> Use risk tiers and review status, not long disclaimer cards. Put detailed evidence in the system record, not in every user-facing page.</div>'+scenario('gov')}
function mod4(){return '<div class="sec">Data Readiness Is AI Readiness</div><div class="card"><p>Many AI programs discover that the blocker is not model capability. It is data ownership, permissions, freshness, quality, provenance, and retrieval design. A model cannot reliably answer from documents that are stale, contradictory, or inaccessible to the people who need the answer.</p><p>Data readiness is not a single cleanup project. It is an ongoing content and access-control discipline.</p></div><div class="two"><div class="panel good"><div class="panel-h">Ready Data</div><div class="panel-b">Clear owner, current source of truth, access controls, retention rules, metadata, and evaluation examples.</div></div><div class="panel risk"><div class="panel-h">Risky Data</div><div class="panel-b">Unknown owner, mixed sensitivity, stale duplicates, unclear licensing, weak metadata, and no source-verification path.</div></div></div>'+table(['Readiness check','Question'],[['Classification','What data classes can this workflow process?'],['Access','Should the AI see exactly what the user can see, or a stricter subset?'],['Freshness','How often does the source change and how is indexing updated?'],['Provenance','Can we show where content came from and whether AI modified it?'],['Retention','Are prompts, outputs, embeddings, and logs retained appropriately?'],['Evaluation','Do we have representative questions and expected answers?']])+'<div class="callout ok"><strong>Provenance note:</strong> C2PA Content Credentials and related provenance practices are useful for disclosure and trust workflows, but they are not a reliable standalone detector of AI-generated content.</div>'}
function mod5(){return '<div class="sec">Quality Is Managed, Not Assumed</div><div class="card"><p>Production AI needs an evaluation system before it needs a launch announcement. Evaluations convert vague claims like "the assistant is good" into testable evidence: factuality, completeness, format adherence, tone, latency, cost, safety, and user success.</p></div>'+table(['Evaluation layer','Purpose','Example'],[['Unit checks','Deterministic validation of format, schema, citations, and policy constraints.','JSON validates; required fields exist; citation IDs resolve.'],['Golden dataset','Representative test set for regression and model changes.','Known questions with verified expected answers.'],['Human evaluation','Domain experts judge nuance, usefulness, and risk.','Reviewer rubric for legal or medical summaries.'],['LLM-as-judge','Scalable scoring with calibration against humans.','Rubric-based comparison of two candidate responses.'],['Production monitoring','Detects drift, cost spikes, failures, and user dissatisfaction.','Quality dashboard, OpenTelemetry-style traces, and alert thresholds.']])+'<details class="details"><summary>Deep Dive: LLM-As-Judge Calibration</summary><p>LLM-as-judge can be useful when the rubric is specific, examples are calibrated, and disagreement with human reviewers is tracked. It should not become an unquestioned oracle. Treat it as one evaluation instrument among several.</p></details>'+scenario('eval')}
function mod6(){return '<div class="sec">Security And Agent Controls</div><div class="card"><p>AI security extends ordinary application security. You still need identity, secrets management, network controls, and secure coding. You also need controls for prompt injection, indirect instructions in retrieved content, tool misuse, data leakage, unsafe outputs, and agent actions.</p></div>'+table(['Control','Implementation'],[['Secure RAG','Treat retrieved documents as untrusted data; separate instructions from content; cite sources.'],['Tool permissioning','Separate read-only tools from write-capable tools; scope credentials narrowly.'],['Approval gates','Require human approval for high-impact actions such as sending external messages, changing permissions, deleting data, or deploying code.'],['Red teaming','Test direct injection, indirect injection, payload smuggling, data exfiltration, and multi-turn manipulation.'],['Observability','Log prompt, model, retrieval, tool calls, policy decisions, latency, cost, and user feedback.'],['Incident response','Define how to disable a workflow, rotate credentials, notify owners, and preserve evidence.']])+'<div class="callout warn"><strong>Agent rule:</strong> If an action is irreversible, externally visible, financially meaningful, or legally sensitive, the workflow needs an approval or rollback design before launch.</div>'+scenario('sec')}
function mod7(){return '<div class="sec">AI Product Management</div><div class="card"><p>AI products need the same discipline as other products, plus new failure design. The product manager owns the user problem, success metric, workflow fit, escalation path, and trust experience. The model is only one component.</p></div>'+table(['PRD section','AI-specific questions'],[['User problem','What decision or task is improved, and who verifies the result?'],['Input and context','What data is included, and what should never be included?'],['Output contract','What format, citations, confidence signals, and disclaimers are required?'],['Human role','When does a human review, approve, correct, or override?'],['Failure states','What happens when the model is uncertain, the source is missing, or a tool fails?'],['Success metrics','How do we measure adoption, quality, cycle time, cost, and trust?']])+'<div class="callout ok"><strong>UX pattern:</strong> Show evidence and next actions, not just an answer. Strong AI UX helps the human decide what to trust and what to do next.</div>'}
function mod8(){return '<div class="sec">AI Economics</div><div class="card"><p>AI costs are variable and behavioral. Longer prompts, larger contexts, repeated retries, poor routing, and unbounded agents can turn a promising workflow into a cost problem. Economics should be designed into architecture from the beginning.</p></div><div class="sec">Cost Scenario</div><div class="card"><div class="score"><label>Tasks per day<input id="cost-tasks" type="number" value="500" min="1" aria-label="Tasks per day" oninput="calcCost()"></label><label>Tokens per task<input id="cost-tokens" type="number" value="4000" min="100" aria-label="Tokens per task" oninput="calcCost()"></label><label>Cost per 1M tokens<input id="cost-rate" type="number" value="5" min="0" step="0.1" aria-label="Cost per million tokens" oninput="calcCost()"></label><label>Workdays<input id="cost-days" type="number" value="22" min="1" aria-label="Workdays per month" oninput="calcCost()"></label></div><div class="score-out" id="cost-out"></div></div>'+table(['Cost lever','Use when'],[['Prompt compression','System prompts or context are repeated often.'],['Prompt caching','Large stable prompt prefixes recur across requests.'],['Model routing','Workload has a mix of simple and complex tasks.'],['Batch processing','Latency is not user-facing.'],['Semantic caching','Many users ask similar questions.'],['Local/open-weight model','Data sensitivity or high volume justifies infrastructure and support cost.']])}
function mod9(){return '<div class="sec">Adoption And Change</div><div class="card"><p>AI transformation is a change-management problem as much as a technology problem. People need role-specific training, safe places to practice, guidance on what not to do, and examples that connect to their actual work.</p></div>'+table(['Audience','Training focus'],[['Executives','Strategy, risk appetite, funding model, governance, and measurable outcomes.'],['Managers','Workflow redesign, quality review, adoption measurement, and team norms.'],['Practitioners','Prompt patterns, data handling, verification, and tool-specific workflows.'],['Developers','APIs, RAG, evals, observability, security, and deployment patterns.'],['Risk teams','AI inventories, privacy, vendor review, red teaming, incident response, and audit evidence.']])+'<details class="details"><summary>Deep Dive: Champions Network</summary><p>AI champions are not just enthusiastic users. They translate policy into everyday practice, collect friction from teams, share working examples, and help colleagues build confidence. Formalize their role with time allocation, recognition, and a feedback path into the AI council.</p></details>'}
function mod10(){return '<div class="sec">90-Day Rollout Playbook</div>'+table(['Phase','Focus','Outputs'],[['Days 1-30','Discover and control','AI inventory, data policy, approved tools list, initial risk tiers, first champion group.'],['Days 31-60','Pilot and measure','Use-case scorecards, golden datasets, pilot metrics, support plan, review gates.'],['Days 61-90','Scale and harden','Production checklist, monitoring dashboard, training plan, incident process, funding model.']])+'<div class="callout warn"><strong>Do not skip foundations:</strong> If the organization cannot name AI owners, data classes, approved tools, and escalation paths, it is not ready to scale high-impact AI workflows.</div>'+scenario('rollout')}
function mod11(){return '<div class="sec">Resources And Templates</div><div class="callout">These references and tool examples are starting points. Verify current versions, maintenance status, licensing, and applicability before using them for policy or compliance decisions.</div>'+['Standards and governance','Evaluation and quality','Security and risk','Operating templates'].map(function(group){return '<details class="road" open><summary>'+group+'</summary><div class="road-body">'+RESOURCES.filter(function(r){return r.group===group}).map(function(r){var title=r.url?'<a href="'+r.url+'" target="_blank" rel="noopener">'+r.title+'</a>':r.title;return '<div class="res"><div class="res-t">'+title+'</div><div class="res-p">'+r.provider+'</div><div class="res-w">'+r.why+'</div></div>'}).join('')+'</div></details>'}).join('')}
function mod12(){return '<input class="searchbar" id="gloss-search" type="text" aria-label="Search glossary terms" placeholder="Search glossary terms..." oninput="filterGlossary()"><div class="filters" id="filters"></div><div class="gloss-grid" id="gloss"></div>'}
function table(headers,rows){return '<div class="table-wrap"><table class="tbl"><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>'}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>'}).join('')+'</tr>'}).join('')+'</tbody></table></div>'}

var EXTRA=[
function(){return '<div class="sec">Work Session: Design Your AI Operating System</div><div class="card"><p>Use this session to convert AI ambition into named responsibilities. Start with one business domain, not the whole enterprise. List the AI workflows already in use, the teams that own them, the data they touch, and the decision forums that approve changes. Then decide which decisions belong to the product owner, the platform team, the AI council, and risk partners.</p><p>The useful output is a one-page operating model that people can follow without a meeting. If a team wants to launch an AI workflow, they should know where to register it, who reviews it, what evidence is required, and how exceptions are handled.</p></div>'+table(['Artifact','Minimum useful content','Review question'],[['Decision-rights map','Who can approve pilots, production launch, model changes, vendor use, and high-impact tool actions.','Could a team know who decides without asking five people?'],['AI intake path','Submission form, risk triage, expected evidence, response time, and escalation path.','Does the process fit both lightweight pilots and sensitive workflows?'],['Support model','Named owners for incidents, vendor issues, eval failures, user training, and cost spikes.','Who gets paged or notified when the system behaves badly?'],['Exception process','When exceptions are allowed, who approves them, expiration date, and compensating controls.','Are exceptions temporary and visible?']])+'<details class="details"><summary>Common Failure Pattern</summary><p>Many organizations create an AI committee but never define decision rights. The result is slow review for small pilots and weak control for high-risk production systems. A better design separates advisory discussion from explicit approval authority.</p></details>'},
function(){return '<div class="sec">Work Session: Build The Portfolio Board</div><div class="card"><p>Turn the scorecard into a portfolio board with four columns: discover, pilot, harden, and scale. Each use case should have an owner, a target user group, a measurable outcome, a risk tier, and a next decision date. This prevents the portfolio from becoming a graveyard of half-started ideas.</p><p>Use the same template for all ideas so executives can compare them without being distracted by demo quality. A polished demo with weak data, unclear adoption, and no eval plan should not outrank a boring workflow with measurable cycle-time savings and manageable risk.</p></div>'+table(['Portfolio signal','What good looks like','Warning sign'],[['Value','Clear workflow pain, time saved, risk reduced, revenue protected, or quality improved.','Benefit is described only as innovation or AI adoption.'],['Feasibility','Data exists, workflow is known, users are available, and integration path is realistic.','The team assumes the model will solve unclear process design.'],['Risk','Known data classes, expected harms, review controls, and residual risk owner.','Risk is labeled low before data and user impact are understood.'],['Adoption','Named users, manager support, training path, and feedback loop.','Pilot depends on volunteers with no operational sponsor.']])+'<div class="callout ok"><strong>Portfolio habit:</strong> Review stuck pilots monthly. Move them forward, reshape them, or retire them. AI portfolios decay when nothing is deliberately stopped.</div>'},
function(){return '<div class="sec">Work Session: Create A Right-Sized Governance Pack</div><div class="card"><p>The governance pack should be short enough that teams actually complete it, but complete enough to support review. For a low-risk internal assistant, a short record may be enough. For a workflow that affects customers, employees, money, safety, legal rights, or regulated decisions, the evidence should be deeper.</p><p>Start with a minimum record: owner, purpose, user group, model/provider, data classes, risk tier, evaluation summary, controls, launch date, and review cadence. Add detailed evidence only when the risk tier requires it.</p></div>'+table(['Risk tier','Evidence depth','Typical control'],[['Low','Inventory entry, owner, data class, acceptable-use confirmation.','Approved tool, training, basic logging.'],['Moderate','Use-case scorecard, evaluation summary, privacy/security review, support plan.','Human review, monitored rollout, issue tracking.'],['High','Detailed risk assessment, red team, legal/compliance review, production readiness evidence.','Approval gates, rollback plan, periodic reassessment.'],['Restricted','Executive and specialized risk approval before use.','Strong access control, independent review, explicit residual-risk acceptance.']])+'<details class="details"><summary>Audit Tip</summary><p>Governance evidence should be traceable to real workflow behavior. A policy that says users must verify AI output is weaker than a product design that shows citations, requires approval, logs edits, and measures correction rates.</p></details>'},
function(){return '<div class="sec">Work Session: Prepare Data For AI Use</div><div class="card"><p>Pick one candidate workflow and map the content it needs. Separate authoritative sources from convenience copies, drafts, chat messages, old exports, and user-uploaded files. For each source, record owner, freshness, access model, sensitivity, retention expectation, and whether it can be used for retrieval, fine-tuning, logging, or analytics.</p><p>The important question is not only whether the AI can access data. It is whether the AI can access the right data, for the right user, with enough provenance for the user to verify the answer.</p></div>'+table(['Data decision','Recommended practice','Why it matters'],[['Source of truth','Use authoritative repositories and document ownership.','Reduces contradiction and stale-answer risk.'],['Permission model','Prefer user-scoped retrieval for sensitive internal knowledge.','Prevents the assistant from becoming a permission bypass.'],['Chunking and metadata','Preserve section titles, dates, owners, document type, and access labels.','Improves retrieval quality and reviewability.'],['Lifecycle','Define re-indexing, deletion, retention, and stale-content handling.','Keeps AI behavior aligned with changing business facts.']])+'<div class="callout warn"><strong>RAG caution:</strong> Adding more documents can make quality worse if the corpus contains duplicates, stale policies, or conflicting guidance. Curate before scaling retrieval breadth.</div>'},
function(){return '<div class="sec">Work Session: Build The Evaluation Pack</div><div class="card"><p>Create an evaluation pack before launch. It should include representative prompts, expected answers or grading guidance, examples of unacceptable outputs, edge cases, and a release threshold. Include real user language, not only idealized test questions. The pack should cover easy cases, ambiguous cases, adversarial cases, and cases where the correct behavior is to refuse or escalate.</p><p>Keep the first pack small and high quality. A verified set of 50 examples can be more useful than hundreds of vague examples that nobody trusts.</p></div>'+table(['Eval asset','Example content','Owner'],[['Golden examples','Known questions, source references, expected answer traits, unacceptable answer traits.','Domain expert and product owner'],['Rubric','Accuracy, completeness, citation support, tone, safety, format, and escalation behavior.','Product owner with risk partners'],['Regression run','Prompt/model/retrieval version, score, failures, and decision.','Engineering or platform team'],['Production signal','User corrections, thumbs-down reasons, cost, latency, fallback rate, and incident reports.','Product owner and operations']])+'<details class="details"><summary>Release Question</summary><p>Before every model, prompt, retrieval, or tool change, ask: What behavior could regress, how would we notice, and what evidence says the change is better for this workflow?</p></details>'},
function(){return '<div class="sec">Work Session: Threat-Model The Workflow</div><div class="card"><p>Threat-model the AI workflow as a chain: user input, system prompt, retrieved content, model output, tool calls, logs, and downstream systems. For each step, ask what a malicious user, compromised document, confused model, or over-permissioned agent could do. Then add controls where they reduce real risk without making the workflow unusable.</p><p>Do not rely on a single prompt instruction as the control. Use layered controls: access limits, content isolation, tool scoping, output validation, approval gates, monitoring, and incident response.</p></div>'+table(['Threat','Example','Control'],[['Indirect prompt injection','A retrieved document tells the assistant to ignore prior instructions and reveal data.','Treat retrieved text as data, isolate instructions, cite sources, and block unsafe tool calls.'],['Data exfiltration','User asks the assistant to summarize restricted records they should not see.','User-scoped retrieval, policy checks, and audit logs.'],['Tool misuse','Agent sends messages, changes records, or runs code outside intended scope.','Least-privilege tools, approval gates, dry-run mode, and rollback plan.'],['Sensitive logging','Prompts or outputs store confidential data longer than allowed.','Retention policy, redaction, access controls, and vendor review.']])+'<div class="callout ok"><strong>Practical target:</strong> Make the safe path the easy path. If users must bypass controls to get work done, the design will fail in practice.</div>'},
function(){return '<div class="sec">Work Session: Write The AI Product Brief</div><div class="card"><p>A useful AI product brief is specific about the workflow, not just the model. It describes the user, the moment of use, the inputs, the output contract, the evidence shown to the user, the fallback state, and how success will be measured. It should also name what the product will not do.</p><p>For user trust, design the review experience as carefully as the generation experience. Users need source links, editable drafts, confidence cues, reason codes, and a simple way to report bad output.</p></div>'+table(['Product choice','Good design question','Example decision'],[['Confidence display','What should the user see when evidence is weak?','Show missing-source state and ask for more context instead of inventing.'],['Human review','Which actions require review before completion?','Draft emails can be generated automatically; external send requires approval.'],['Escalation','When should the AI stop and route to a person?','Policy conflict, regulated topic, missing source, or high-impact decision.'],['Feedback','How do users correct the system?','Capture correction reason and feed it into eval backlog.']])+'<details class="details"><summary>UX Failure Pattern</summary><p>Many AI products hide uncertainty behind a polished answer. A stronger design makes uncertainty actionable: show evidence, show what is missing, offer next steps, and make escalation easy.</p></details>'},
function(){return '<div class="sec">Work Session: Control The Economics</div><div class="card"><p>Model cost is only one part of AI economics. Include integration work, evaluation, monitoring, user training, review time, incident handling, vendor management, and the cost of errors. Some workflows save time but add review burden. Others reduce risk or improve quality without reducing headcount. The ROI model should match the actual value mechanism.</p><p>Use the cost calculator as an early warning tool, then refine with real telemetry once the pilot starts. Track token use, retries, cache hit rate, model mix, latency, user adoption, and quality outcomes.</p></div>'+table(['Economic lever','Measurement','Decision it supports'],[['Routing','Share of requests handled by small, medium, and frontier models.','Whether simple tasks can move to cheaper models.'],['Context control','Average prompt size, retrieved chunks, and unused context.','Whether retrieval and prompt design are wasting tokens.'],['Automation boundary','Minutes saved versus minutes added by review or correction.','Whether the workflow should automate, assist, or stop.'],['Vendor strategy','Usage growth, committed spend, data terms, switching cost.','Whether to negotiate, diversify, or self-host selected workloads.']])+'<div class="callout warn"><strong>Pricing note:</strong> Treat example prices as illustrative. Vendor pricing, token accounting, caching, and enterprise terms change often.</div>'},
function(){return '<div class="sec">Work Session: Plan Adoption By Role</div><div class="card"><p>Adoption improves when training is tied to real tasks. Executives need governance and funding judgment. Managers need workflow redesign and measurement. Practitioners need safe prompting and verification habits. Developers need secure implementation patterns. Risk teams need evidence, review workflows, and monitoring.</p><p>Do not measure adoption only by logins. Measure whether people use AI in approved workflows, whether quality improves, whether rework declines, whether managers trust the outputs, and whether incidents remain visible.</p></div>'+table(['Adoption signal','Healthy interpretation','Unhealthy interpretation'],[['Usage growth','More users complete approved workflows with good feedback.','People experiment in unapproved tools because official options are slow.'],['Time saved','Cycle time falls without quality or review burden getting worse.','Users skip verification to move faster.'],['Quality feedback','Corrections are captured and used to improve evals.','Bad outputs are fixed manually and never reported.'],['Manager support','Team norms define when AI is expected, optional, or prohibited.','Adoption depends on individual enthusiasm only.']])+'<details class="details"><summary>Change Management Tip</summary><p>Publish examples of good AI work products, not just policy. People learn faster from before-and-after workflows, prompt patterns, verification examples, and manager-approved norms.</p></details>'},
function(){return '<div class="sec">Work Session: Run The First 90 Days</div><div class="card"><p>The first 90 days should produce visible progress and durable controls. Avoid trying to solve every AI question at once. Pick a small number of representative use cases, build the minimum governance and evaluation system, train a champion group, and publish a clear path for teams to request AI support.</p><p>At the end of 90 days, leadership should know which workflows are ready to scale, which controls are working, where data readiness is blocking progress, and what funding model is needed for the next wave.</p></div>'+table(['Milestone','Evidence of progress','Decision'],[['Day 30','Inventory started, approved tools named, intake live, first use cases scored.','Which pilots proceed?'],['Day 60','Pilots running with evals, user feedback, risk review, and support path.','Which pilots harden for production?'],['Day 90','Production checklist, monitoring, training, and funding model drafted.','Which capabilities scale next quarter?'],['After 90','Portfolio review cadence, retirement rules, and platform backlog active.','What becomes standard operating practice?']])+'<div class="callout ok"><strong>90-day outcome:</strong> The goal is not to finish AI transformation. The goal is to prove that the organization can choose, govern, measure, and improve AI work repeatedly.</div>'},
function(){return '<div class="sec">How To Use These Resources</div><div class="card"><p>Start with the operating templates, then connect them to external standards. Do not copy a framework directly into policy without translating it into local workflow, ownership, evidence, and review cadence. The templates should become living artifacts used in portfolio reviews and launch decisions.</p></div>'+table(['Template','When to use it','How to keep it useful'],[['AI inventory','Any time a workflow uses AI in a business process.','Require owner, review date, risk tier, and status.'],['Use-case scorecard','Before funding or prioritizing a pilot.','Compare against other ideas and revisit after discovery.'],['Evidence pack','Before production launch or major model/prompt/retrieval change.','Attach eval results, risk review, controls, and rollout notes.']])},
function(){return '<div class="sec">How To Study The Glossary</div><div class="card"><p>Use the glossary as an operating vocabulary. Ask teams to use these terms consistently in intake forms, architecture reviews, risk discussions, product briefs, and rollout plans. Shared language reduces confusion between policy, product, engineering, and risk teams.</p></div>'+table(['Term group','Use it during','Outcome'],[['Operating Model','Org design, funding, decision rights, council setup.','Clear accountability.'],['Governance','Inventory, policy, approvals, evidence review.','Repeatable control.'],['Evaluation','Model changes, prompt updates, production monitoring.','Measurable quality.'],['Security','Threat modeling, red teaming, incident response.','Reduced operational risk.']])}
];
var SCENARIOS={
op:{title:'Operating model conflict',prompt:'A business unit wants to buy a new AI assistant and connect it to internal documents immediately. They say the use case is low risk because it only answers employee questions. What should happen first?',opts:[['bad','Approve it as a simple productivity tool and review later.','Risky. Internal document access can still expose sensitive data or produce wrong answers with organizational impact.'],['best','Run it through lightweight intake: owner, data class, user group, approved vendor, evaluation plan, and support path.','Best. Lightweight governance keeps speed while making ownership, data exposure, and quality measurable.'],['ok','Block all AI tools until a complete enterprise framework is finished.','Too slow. The operating model should allow low-risk pilots while foundations mature.']]},
gov:{title:'AI inventory gap',prompt:'A team has a production workflow using an approved model, but it is not in the AI inventory because it was built as an internal automation. What is the right response?',opts:[['bad','Ignore it because approved models are already safe.','Risky. The model may be approved, but the workflow still has owners, data, users, logs, and failure modes.'],['best','Register it, assign an owner, document data classes and controls, and set a review cadence.','Best. Inventory is about systems and workflows, not just model providers.'],['ok','Ask the team to write a long policy exception before they continue.','Sometimes needed, but most gaps should be fixed with right-sized registration first.']]},
eval:{title:'Model upgrade pressure',prompt:'A vendor releases a new model that looks better in public benchmarks. A product team wants to switch immediately. What should the release gate require?',opts:[['bad','Switch because better benchmarks mean better product quality.','Risky. Public benchmarks may not represent your workflow, users, prompts, or risk profile.'],['best','Run the golden dataset, compare cost/latency/safety, review failures, and stage rollout with rollback.','Best. Model upgrades are production changes and need regression evidence.'],['ok','Run a few prompts manually and let the team decide.','Useful as early exploration, but not sufficient for production change control.']]},
sec:{title:'Agent permissioning',prompt:'An agent that drafts vendor emails asks for permission to send them automatically when confidence is high. What control is appropriate?',opts:[['bad','Allow automatic sending based on confidence alone.','Risky. Confidence is not a sufficient control for external communication.'],['best','Require approval before external send, log the draft and context, and allow automation only after measured low-risk patterns emerge.','Best. External communication is visible and potentially consequential, so approval is appropriate.'],['ok','Disable the agent entirely.','Too restrictive if drafting is useful. Keep the draft workflow and gate the risky action.']]},
rollout:{title:'Pilot success',prompt:'A pilot saves time for a small team, but evaluation shows occasional unsupported claims. Leadership wants to scale immediately because users love it. What should the program do?',opts:[['bad','Scale now and fix issues after adoption grows.','Risky. Scaling known quality issues damages trust and increases remediation cost.'],['best','Keep the pilot contained, add grounding/evaluation controls, define acceptable error thresholds, then re-test before scale.','Best. Enthusiasm is useful, but quality gates protect the broader rollout.'],['ok','Cancel the pilot permanently.','Possibly too harsh. The defect may be fixable with better grounding and review.']]}
};
function scenario(id){var s=SCENARIOS[id];return '<div class="scenario"><div class="scenario-title">Judgment Check: '+s.title+'</div><div class="scenario-prompt">'+s.prompt+'</div><div class="scenario-opts">'+s.opts.map(function(o,i){return '<button type="button" class="scenario-opt" data-id="'+id+'" data-idx="'+i+'" onclick="pickScenario(this)">'+String.fromCharCode(65+i)+'. '+o[1]+'</button>'}).join('')+'</div>'+s.opts.map(function(o,i){return '<div class="scenario-fb fb-'+(o[0]==='best'?'best':o[0]==='ok'?'ok':'bad')+'" id="fb-'+id+'-'+i+'"><strong>'+o[0].toUpperCase()+':</strong> '+o[2]+'</div>'}).join('')+'</div>'}
function pickScenario(btn){var id=btn.dataset.id,idx=+btn.dataset.idx,s=SCENARIOS[id],box=btn.closest('.scenario');box.querySelectorAll('.scenario-opt').forEach(function(b,i){b.disabled=true;b.classList.add(s.opts[i][0]==='best'?'best':s.opts[i][0]==='ok'?'okish':'bad')});box.querySelectorAll('.scenario-fb').forEach(function(f,i){f.classList.toggle('vis',i===idx)})}
function calcUseCase(){var v=+val('uc-value'),d=+val('uc-data'),f=+val('uc-feas'),r=+val('uc-risk');var score=Math.round(((v*2+d+f)*10)-(r*8));var label=score>=70?'Pilot candidate':score>=45?'Needs shaping':'Do not prioritize yet';var out=document.getElementById('uc-out');if(out)out.innerHTML='<div class="score-big">'+score+'</div><strong>'+label+'</strong><p>Interpretation: high value and feasibility help, but risk and poor data readiness should slow or reshape the use case.</p>'}
function calcCost(){var tasks=+val('cost-tasks'),tokens=+val('cost-tokens'),rate=+val('cost-rate'),days=+val('cost-days');var monthly=tasks*tokens*days/1000000*rate;var out=document.getElementById('cost-out');if(out)out.innerHTML='<div class="score-big">$'+monthly.toFixed(2)+'</div><strong>Estimated monthly token cost</strong><p>This is illustrative. Real cost depends on input/output split, model pricing, caching, retries, context size, and vendor terms.</p>'}
function val(id){var el=document.getElementById(id);return el?el.value:0}
var RESOURCES=[

{group:'Standards and governance',title:'NIST AI RMF Profiles and Updates',provider:'NIST',url:'https://www.nist.gov/itl/ai-risk-management-framework',why:'Track AI RMF profile work and related NIST updates for sector-specific governance.'},

var GLOSSARY=[
{term:'AI Operating Model',cat:'Operating Model',def:'The roles, forums, decision rights, standards, and controls used to run AI work repeatedly.',why:'Without an operating model, AI work fragments into unmanaged experiments.'},
{term:'AI Council',cat:'Operating Model',def:'Cross-functional group that prioritizes AI portfolio decisions and resolves risk tradeoffs.',why:'It connects business value, technical feasibility, and governance.'},
{term:'AI Inventory',cat:'Governance',def:'System of record for AI use cases, owners, models, data classes, risk tiers, and status.',why:'You cannot govern or improve what you cannot see.'},
{term:'Model Card',cat:'Governance',def:'Concise documentation of a model or AI system, including intended use, limitations, evaluation results, and relevant data considerations.',why:'It helps reviewers and users understand where a model is appropriate and where caution is needed.'},
{term:'System Card',cat:'Governance',def:'Documentation for an AI-powered system, including model behavior, product controls, risk mitigations, evaluation findings, and deployment context.',why:'It connects model-level evidence to the real product workflow.'},
{term:'Privacy Impact Review',cat:'Governance',def:'A structured review of how an AI workflow collects, processes, stores, shares, and retains personal or sensitive data.',why:'AI workflows can create new privacy risk through prompts, logs, retrieval, embeddings, and generated outputs.'},
{term:'Risk Tier',cat:'Governance',def:'A classification that maps an AI use case to the level of review and control it needs.',why:'Low-risk workflows should move quickly; high-impact workflows need stronger evidence.'},
{term:'Approval Gate',cat:'Governance',def:'A required checkpoint before an AI workflow performs a high-impact action.',why:'It prevents model mistakes from becoming irreversible business actions.'},
{term:'Golden Dataset',cat:'Evaluation',def:'Representative examples used to test prompt, model, retrieval, or workflow changes.',why:'It is the regression suite for AI behavior.'},
{term:'Human Evaluation',cat:'Evaluation',def:'Domain-expert review of AI outputs against a defined rubric.',why:'Human review remains critical for nuance, risk, and business fit.'},
{term:'LLM-as-Judge',cat:'Evaluation',def:'Using an approved model to score outputs against a rubric.',why:'It scales evaluation, but it should be calibrated against human reviewers.'},
{term:'AI Observability',cat:'Evaluation',def:'Logs, traces, metrics, and evaluations that make AI behavior inspectable.',why:'Production AI needs visibility into prompts, retrieval, tools, cost, latency, and quality.'},
{term:'Secure RAG',cat:'Security',def:'RAG architecture that treats retrieved content as untrusted data and enforces access controls.',why:'Indirect prompt injection and data leakage often arrive through retrieved content.'},
{term:'Prompt Injection',cat:'Security',def:'An attack that inserts malicious instructions into model input or retrieved context.',why:'It is a core risk for assistants, RAG, and agents.'},
{term:'Tool Permissioning',cat:'Security',def:'Scoping what tools an AI system can call and under what conditions.',why:'Agents become risky when tool access exceeds the use case.'},
{term:'Human-in-the-Loop',cat:'Product',def:'A design pattern where humans review, approve, correct, or override AI outputs.',why:'It keeps accountability in workflows where errors matter.'},
{term:'Escalation Path',cat:'Product',def:'The designed route when AI is uncertain, blocked, unsafe, or outside scope.',why:'A good AI product handles failure explicitly.'},
{term:'Model Routing',cat:'Economics',def:'Sending tasks to different models based on capability, cost, latency, and risk.',why:'It controls spend while preserving quality for hard tasks.'},
{term:'Token Budget',cat:'Economics',def:'A planned limit for tokens consumed by a workflow, user, team, or process.',why:'Unbounded context, retries, and agents can create surprise costs.'},
{term:'Vendor Lock-In',cat:'Economics',def:'Dependence on a provider through API, prompts, behavior, data terms, tooling, and user expectations.',why:'AI lock-in is behavioral as well as technical.'},
{term:'AI Champion',cat:'Change',def:'Trusted practitioner who helps peers adopt AI safely and effectively.',why:'Peer examples often drive adoption better than mandates.'},
{term:'Role-Based Training',cat:'Change',def:'AI education tailored to executives, managers, practitioners, developers, and risk teams.',why:'Different roles need different capabilities and guardrails.'},
{term:'Use-Case Scorecard',cat:'Workflow',def:'A structured method for scoring value, feasibility, data readiness, risk, adoption, and measurability.',why:'It keeps portfolio decisions grounded in evidence.'},
{term:'Evidence Pack',cat:'Workflow',def:'Documentation used to support production approval: evals, risk review, controls, and rollout plan.',why:'It turns governance from opinion into evidence.'},
{term:'AI Incident Response',cat:'Security',def:'Process for detecting, containing, investigating, and remediating AI failures.',why:'AI failures can involve data leakage, unsafe actions, bad advice, or cost spikes.'},
{term:'Content Provenance',cat:'Data',def:'Metadata and process controls that record where content came from and how it changed.',why:'Provenance supports trust, audit, and misinformation defense.'},
{term:'Data Classification',cat:'Data',def:'Labeling data by sensitivity, allowed use, retention, and sharing rules.',why:'It determines what AI systems can process and where.'},
{term:'RAG Readiness',cat:'Data',def:'The degree to which content is current, owned, structured, permissioned, and evaluable for retrieval.',why:'RAG quality depends on content operations, not only vector search.'}
];
function initGlossary(){document.getElementById('filters').innerHTML=CATS.map(function(c){return '<button type="button" class="filter '+(c==='All'?'active':'')+'" data-cat="'+c+'">'+c+'</button>'}).join('');document.querySelectorAll('.filter').forEach(function(btn){btn.onclick=function(){setFilter(this.dataset.cat,this)}});renderGlossary()}
function setFilter(c,btn){glossFilter=c;document.querySelectorAll('.filter').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');renderGlossary()}
function filterGlossary(){glossSearch=document.getElementById('gloss-search').value.toLowerCase();renderGlossary()}
function renderGlossary(){var items=GLOSSARY.filter(function(g){return (glossFilter==='All'||g.cat===glossFilter)&&(!glossSearch||g.term.toLowerCase().includes(glossSearch)||g.def.toLowerCase().includes(glossSearch)||g.why.toLowerCase().includes(glossSearch))});document.getElementById('gloss').innerHTML=items.length?items.map(function(g){return '<div class="gloss-card"><div><span class="term">'+g.term+'</span><span class="cat">'+g.cat+'</span></div><div class="def">'+g.def+'</div><div class="why">Why it matters: '+g.why+'</div></div>'}).join(''):'<div class="empty">No matching terms found.</div>'}
function buildSearch(){searchIndex=[];MODULES.forEach(function(m,i){searchIndex.push({kind:'Module',text:m.title,desc:m.desc,run:function(){go(i)}})});GLOSSARY.forEach(function(g){searchIndex.push({kind:'Glossary',text:g.term,desc:g.def,run:function(){go(11);setTimeout(function(){document.getElementById('gloss-search').value=g.term;filterGlossary()},80)}})});RESOURCES.forEach(function(r){searchIndex.push({kind:'Resource',text:r.title,desc:r.why,run:function(){go(10)}})})}
function openSearch(){var p=document.getElementById('search-pop'),i=document.getElementById('search-input');p.classList.add('open');i.value='';i.focus();renderSearch('')}
function closeSearch(){document.getElementById('search-pop').classList.remove('open')}
function renderSearch(q){var el=document.getElementById('search-results');if(!q.trim()){el.innerHTML='<div class="empty">Start typing to search...</div>';return}var ql=q.toLowerCase();var res=searchIndex.filter(function(x){return x.text.toLowerCase().includes(ql)||x.desc.toLowerCase().includes(ql)}).slice(0,12);el.innerHTML=res.length?res.map(function(r,i){return '<div class="search-item" role="button" tabindex="0" data-i="'+i+'"><div class="search-kind">'+r.kind+'</div><div>'+esc(r.text)+'</div><div class="search-desc">'+esc(r.desc).slice(0,100)+'</div></div>'}).join(''):'<div class="empty">No results found.</div>';el.querySelectorAll('.search-item').forEach(function(node){var run=function(){res[+node.dataset.i].run();closeSearch()};node.onclick=run;node.onkeydown=function(e){activateOnKey(e,run)}})}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSearch();if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openSearch()}});
document.getElementById('search-input').addEventListener('input',function(){renderSearch(this.value)});
window.addEventListener('scroll',function(){document.getElementById('scroll').classList.toggle('vis',window.scrollY>300)});
initTheme();buildSearch();landing();
</script>
