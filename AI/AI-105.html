<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI-105: The AI Frontier</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--primary:#2563EB;--primary-light:#3B82F6;--primary-dark:#1D4ED8;
--accent:#7C3AED;--accent-light:#8B5CF6;
--secondary:#06B6D4;
--success:#10B981;--warning:#F59E0B;--error:#EF4444;
--bg-body:#F8FAFC;--bg-card:#FFFFFF;--bg-muted:#F1F5F9;--bg-highlight:#EFF6FF;
--tx-primary:#0F172A;--tx-secondary:#475569;--tx-muted:#94A3B8;
--border:#E2E8F0;--border-active:#2563EB;
--shadow-sm:0 1px 2px rgba(0,0,0,0.05);
--shadow-md:0 4px 12px rgba(0,0,0,0.08);
--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
--gradient-primary:linear-gradient(135deg,#2563EB,#7C3AED);
--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',sans-serif;
--font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace;
}
body{font-family:var(--font-body);background:var(--bg-body);color:var(--tx-primary);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:38px;height:38px;background:var(--gradient-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ico svg{width:22px;height:22px;fill:#fff}
.hdr-t{font-size:20px;font-weight:700;color:var(--tx-primary)}
.hdr-s{font-size:12px;color:var(--tx-secondary);margin-top:1px}
.hdr-s .by{color:var(--accent);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--bg-muted);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--tx-secondary);flex-shrink:0}
.hdr-btn:hover{border-color:var(--primary);color:var(--primary)}
.hdr-btn svg{width:18px;height:18px}
.hdr.compact .hdr-s{display:none}
.course-nav{display:flex;align-items:center;gap:2px;padding:6px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.course-nav::-webkit-scrollbar{display:none}
.course-link{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--tx-muted);text-decoration:none;white-space:nowrap;transition:all .2s;font-family:var(--font-body)}
.course-link:hover{color:var(--primary);background:var(--bg-highlight);text-decoration:none}
.course-link.current{background:var(--gradient-primary);color:#fff;cursor:default;pointer-events:none}
.trail-wrap{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:61px;z-index:99;display:none}
.trail-wrap.vis{display:block}
.trail{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:0;position:relative}
.trail-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--border);z-index:0;transform:translateY(-8px)}
.trail-stop{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;cursor:pointer;flex:1;min-width:0;padding:0 4px}
.trail-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);transition:all .3s;flex-shrink:0}
.trail-stop.done .trail-dot{background:var(--primary);border-color:var(--primary)}
.trail-stop.active .trail-dot{background:var(--accent);border-color:var(--accent);width:20px;height:20px;box-shadow:0 0 0 4px rgba(124,58,237,0.2);animation:pulse 2s infinite}
.trail-lbl{font-size:10px;color:var(--tx-muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;font-weight:600}
.trail-stop.done .trail-lbl,.trail-stop.active .trail-lbl{color:var(--tx-secondary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(124,58,237,0.2)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0.1)}}
.main{max-width:960px;margin:0 auto;padding:24px}
.hero{text-align:center;padding:80px 20px 60px}
.hero-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:12px;padding:6px 18px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}
.hero h1{font-size:42px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;line-height:1.2}
.hero p{font-size:18px;color:var(--tx-secondary);max-width:620px;margin:0 auto 32px;line-height:1.7}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:700px;margin:0 auto 40px}
.hero-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.hero-stat-n{font-size:28px;font-weight:800;color:var(--primary)}
.hero-stat-l{font-size:13px;color:var(--tx-muted);margin-top:4px}
.btn-start{display:inline-flex;align-items:center;gap:8px;background:var(--gradient-primary);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-md)}
.btn-start:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.toc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:pointer}
.toc-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary-light)}
.card-text{font-size:13px;color:var(--tx-secondary);line-height:1.6}
.toc-features{font-size:12px;color:var(--tx-muted);margin-top:12px;line-height:1.5}
.sec-title{font-size:20px;font-weight:700;color:var(--tx-primary);margin:32px 0 16px;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';width:4px;height:24px;background:var(--gradient-primary);border-radius:2px;flex-shrink:0}
.mod-hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.mod-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ico svg{width:26px;height:26px;fill:#fff}
.mod-title{font-size:24px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mod-desc{font-size:14px;color:var(--tx-secondary);margin-top:4px}
.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:2px solid var(--border)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);border:none;transition:all .2s}
.nav-btn.primary{background:var(--primary);color:#fff}.nav-btn.primary:hover{background:var(--primary-dark)}
.nav-btn.secondary{background:var(--bg-card);color:var(--primary);border:1px solid var(--border)}.nav-btn.secondary:hover{border-color:var(--primary)}
.callout{background:var(--bg-highlight);border:1px solid rgba(37,99,235,0.2);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;color:var(--tx-secondary);line-height:1.7}
.callout.warning{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);border-left-color:var(--warning)}
.callout.success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);border-left-color:var(--success)}
.callout.error{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.2);border-left-color:var(--error)}
.deeper{margin:16px 0;border-left:3px solid var(--accent-light);padding-left:16px}
.deeper summary{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px}
.deeper summary::before{content:'\25B6';font-size:10px;transition:transform .2s}
.deeper[open] summary::before{transform:rotate(90deg)}
.deeper summary::-webkit-details-marker{display:none}
.deeper-body{font-size:14px;color:var(--tx-secondary);line-height:1.7;padding:8px 0}
.deeper-body p{margin-bottom:10px}
.comparator{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.comp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.comp-header{padding:10px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.comp-body{padding:14px 16px;font-size:13px;color:var(--tx-primary);line-height:1.7;min-height:80px}
.matrix-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.matrix-table th{padding:10px 12px;background:var(--bg-muted);border:1px solid var(--border);font-weight:700;color:var(--tx-primary);text-align:left;font-size:12px}
.matrix-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:top;color:var(--tx-secondary)}
.matrix-table tr:hover td{background:var(--bg-highlight)}
.matrix-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid var(--border)}
.code-block{background:#1E293B;color:#E2E8F0;border-radius:10px;padding:16px 20px;overflow-x:auto;font-family:var(--font-mono);font-size:13px;line-height:1.6;margin:16px 0;position:relative}
.code-lang{position:absolute;top:8px;right:12px;font-size:10px;color:#94A3B8;font-weight:700;text-transform:uppercase}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.badge-ml{background:rgba(37,99,235,0.1);color:var(--primary)}
.badge-genai{background:rgba(124,58,237,0.1);color:var(--accent)}
.badge-prompt{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-infra{background:rgba(245,158,11,0.1);color:var(--warning)}
.badge-ethics{background:rgba(239,68,68,0.1);color:var(--error)}
.badge-workflow{background:rgba(16,185,129,0.1);color:var(--success)}
.badge-proto{background:rgba(79,70,229,0.1);color:#4F46E5}
.badge-frontier{background:rgba(124,58,237,0.1);color:var(--accent)}
.badge-agentic{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-edge{background:rgba(16,185,129,0.1);color:var(--success)}
.quiz-section{margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.quiz-card{background:var(--bg-card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:0 12px 12px 0;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.quiz-card.correct{border-left-color:var(--success);background:rgba(16,185,129,0.03)}
.quiz-card.incorrect{border-left-color:var(--error);background:rgba(239,68,68,0.03)}
.quiz-q{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:12px}
.quiz-q .q-num{color:var(--accent);margin-right:6px}
.quiz-q .q-type{font-size:11px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;display:inline-block;background:var(--bg-muted);padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--tx-primary)}
.quiz-opt:hover{border-color:var(--primary-light);background:var(--bg-highlight)}
.quiz-opt.selected{border-color:var(--primary);background:var(--bg-highlight)}
.quiz-opt.right{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}
.quiz-opt.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:var(--error);text-decoration:line-through}
.quiz-opt .opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all .2s}
.quiz-opt.selected .opt-marker{border-color:var(--primary);background:var(--primary);color:#fff}
.quiz-opt.right .opt-marker{border-color:var(--success);background:var(--success);color:#fff}
.quiz-opt.wrong .opt-marker{border-color:var(--error);background:var(--error);color:#fff}
.quiz-fb{display:none;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;margin-top:8px}
.quiz-fb.vis{display:block}
.quiz-fb.correct{background:rgba(16,185,129,0.08);color:#065F46;border:1px solid rgba(16,185,129,0.2)}
.quiz-fb.incorrect{background:rgba(239,68,68,0.08);color:#991B1B;border:1px solid rgba(239,68,68,0.2)}
.quiz-check{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .2s}
.quiz-check:hover{background:var(--primary-dark)}.quiz-check:disabled{background:var(--tx-muted);cursor:default}
.flow-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:24px 0;position:relative}
.flow-ctrl{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg-muted);flex-wrap:wrap}
.flow-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx-secondary);transition:all .15s;font-family:var(--font-body)}
.flow-btn:hover{border-color:var(--primary);color:var(--primary)}
.flow-btn.pri{background:var(--primary);border-color:var(--primary);color:#fff}.flow-btn.pri:hover{background:var(--primary-dark)}
.flow-step-ind{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx-muted)}
.flow-scroll{overflow-x:auto;overflow-y:auto;max-height:500px}
.flow-inner{min-width:600px}
.flow-nodes{display:flex;border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:0;z-index:5;background:var(--bg-card)}
.flow-ncol{flex:1;text-align:center;min-width:110px;padding:0 6px}
.flow-nbox{display:inline-block;border:1px solid var(--border);border-top:3px solid;border-radius:6px;padding:6px 10px;background:var(--bg-muted);min-width:90px}
.flow-nname{font-size:12px;font-weight:700;color:var(--tx-primary)}.flow-ndesc{font-size:10px;color:var(--tx-muted);margin-top:2px}
.flow-msgs{position:relative;padding:0 0 16px}
.flow-mrow{position:relative;min-height:90px;transition:opacity .35s;padding:6px 0}
.flow-mrow.dim{opacity:.12}.flow-mrow.vis{opacity:1}
.flow-mrow.cur .flow-mlabel{box-shadow:0 0 0 2px var(--primary),0 0 14px rgba(37,99,235,0.25)}
.flow-lifelines{display:flex;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.flow-ll-col{flex:1;display:flex;justify-content:center;min-width:130px}
.flow-ll{width:0;border-left:2px dashed var(--border)}
.flow-arrow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
.flow-mlwrap{position:absolute;z-index:3;top:6px;transform:translateX(-50%);pointer-events:auto}
.flow-mlabel{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;text-align:center;max-width:260px;transition:box-shadow .3s}
.flow-msn{font-size:12px;font-weight:700;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.flow-mattr{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;justify-content:center}
.flow-matag{font-size:10px;background:var(--bg-muted);border-radius:3px;padding:1px 6px;color:var(--tx-muted);font-family:var(--font-mono);white-space:nowrap}
.flow-detail{border-top:2px solid var(--primary);padding:20px 24px;background:var(--bg-highlight);display:none}
.flow-detail.vis{display:block}
.flow-dmn{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.flow-ddir{font-size:13px;color:var(--tx-muted);margin-bottom:14px}
.flow-dtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.flow-dtbl th{text-align:left;padding:8px 12px;background:var(--bg-muted);border:1px solid var(--border);color:var(--tx-primary);font-weight:600;font-size:12px}
.flow-dtbl td{padding:7px 12px;border:1px solid var(--border);vertical-align:top}
.flow-dtbl td:first-child{font-family:var(--font-mono);font-size:12px;color:var(--primary);white-space:nowrap;min-width:140px}
.flow-dnote{font-style:italic;color:var(--tx-secondary);font-size:13px;line-height:1.7;padding:10px 14px;background:var(--bg-muted);border-radius:6px;border:1px solid var(--border)}
.flow-step-list{display:none}
.flow-mob-step{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);transition:opacity 0.3s,background 0.3s}
.flow-mob-step:last-child{border-bottom:none}
.flow-mob-step.dim{opacity:0.2}
.flow-mob-step.cur{background:var(--bg-highlight);border-left:3px solid var(--primary);border-radius:0 8px 8px 0}
.flow-mob-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.flow-mob-step.dim .flow-mob-num{background:var(--border)}
.flow-mob-name{font-size:13px;font-weight:600;color:var(--primary)}
.flow-mob-dir{font-size:11px;color:var(--tx-muted);margin-top:2px}
.kb-hint{font-size:11px;color:var(--tx-muted);text-align:center;padding:8px;border-top:1px solid var(--border)}
.kb-hint kbd{background:var(--bg-muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:var(--font-mono);font-size:11px}
.gloss-search{width:100%;padding:12px 18px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--tx-primary);font-family:var(--font-body);transition:border-color .2s;margin-bottom:16px}
.gloss-search:focus{outline:none;border-color:var(--primary)}
.gloss-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.gloss-filter{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.gloss-filter.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.gloss-filter:hover:not(.active){border-color:var(--primary)}
.alpha-bar{display:flex;gap:2px;margin-bottom:16px;flex-wrap:wrap}
.alpha-btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--tx-muted);font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--bg-highlight);color:var(--primary)}
.alpha-btn.active{background:var(--primary);color:#fff}
.gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}
.gloss-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;transition:all .2s}
.gloss-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.gloss-term{font-size:16px;font-weight:700;color:var(--tx-primary)}
.gloss-def{font-size:13px;color:var(--tx-secondary);line-height:1.6;margin:8px 0}
.gloss-why{font-size:12px;color:var(--accent);font-style:italic;line-height:1.5}
.gloss-related{margin-top:8px;font-size:12px;color:var(--tx-muted)}
.gloss-related a{color:var(--primary);font-weight:600;cursor:pointer}
.roadmap-section{margin-bottom:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.roadmap-section summary{padding:14px 20px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#fff;transition:background 0.2s}
.roadmap-section summary::-webkit-details-marker{display:none}
.roadmap-section summary::marker{display:none}
.roadmap-section summary::after{content:'\25B8';margin-left:auto;font-size:14px;transition:transform 0.2s}
.roadmap-section[open] summary::after{transform:rotate(90deg)}
.roadmap-section .roadmap-body{padding:16px 20px}
.resource-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;transition:all .2s}

.score-banner.excellent{background:rgba(16,185,129,0.1);border:2px solid var(--success);color:#065F46}
.score-banner.good{background:var(--bg-highlight);border:2px solid var(--primary);color:var(--primary-dark)}
.score-banner.keep{background:rgba(245,158,11,0.1);border:2px solid var(--warning);color:#92400E}
.score-num{font-size:36px;font-weight:800;margin-bottom:8px}
.score-msg{font-size:16px;font-weight:600}

.search-backdrop.open{display:block}
.search-overlay{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);width:92%;max-width:620px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:201;max-height:500px;overflow:hidden}
.search-overlay.open{display:block}
.search-overlay input{width:100%;padding:16px 20px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--tx-primary);font-family:var(--font-body);outline:none}
.search-results{max-height:420px;overflow-y:auto;padding:8px 0}
.search-item{padding:10px 20px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-highlight)}
.search-cat{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px}

.mob-only{display:none}

.mob-drawer.open{right:0}

.mob-drawer-list{flex:1;overflow-y:auto;padding:12px 0}

.mob-drawer-item:hover,.mob-drawer-item:active{background:var(--bg-highlight)}

.mob-drawer-item.done{border-left-color:var(--success)}
.mob-drawer-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.mob-drawer-name{font-size:14px;font-weight:600;color:var(--tx-primary)}

.mob-module-bar strong{color:var(--tx-primary)}
.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-md);z-index:90;transition:opacity .3s,transform .3s,background .2s}

.swipe-hint{display:none;text-align:center;font-size:11px;color:var(--tx-muted);padding:4px}

.case-title{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:8px}
.case-text{font-size:13px;color:var(--tx-secondary);line-height:1.7}

function mod1Content(){
return '<div class="sec-title">The Test-Time Compute Breakthrough</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The most transformative shift in AI during 2024\u20132026 wasn\u2019t building bigger models \u2014 it was teaching models to <strong style="color:var(--primary)">think longer</strong>. OpenAI\u2019s o1/o3/o4-mini models introduced \u201Cthinking tokens\u201D: internal reasoning chains that let the model spend more computation at inference time. This created a third scaling axis alongside parameters and training data.</p>'+
'<svg viewBox="0 0 700 220" style="width:100%;max-width:700px;display:block;margin:16px auto"><rect x="30" y="180" width="640" height="2" fill="#E2E8F0"/><rect x="30" y="30" width="2" height="152" fill="#E2E8F0"/><text x="350" y="215" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui">Scaling Investment \u2192</text><text x="20" y="105" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui" transform="rotate(-90,20,105)">Capability</text><path d="M60 170 Q200 160 350 130 Q500 100 640 90" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6,4"/><path d="M60 165 Q200 155 350 130 Q500 110 640 100" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-dasharray="6,4"/><path d="M60 160 Q200 120 350 70 Q500 35 640 25" fill="none" stroke="#10B981" stroke-width="3"/><circle cx="640" cy="90" r="4" fill="#2563EB"/><circle cx="640" cy="100" r="4" fill="#7C3AED"/><circle cx="640" cy="25" r="4" fill="#10B981"/><text x="645" y="93" font-size="11" fill="#2563EB" font-family="system-ui" font-weight="600">Parameters</text><text x="645" y="103" font-size="11" fill="#7C3AED" font-family="system-ui" font-weight="600">Data</text><text x="645" y="28" font-size="11" fill="#10B981" font-family="system-ui" font-weight="600">Inference Compute</text><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Three Scaling Axes: The Inference Compute Breakthrough</text></svg>'+
'<div class="callout"><strong>Why this matters:</strong> Test-time compute means you can get dramatically better answers by spending more on inference rather than retraining. This shifts AI economics: the same model can produce both cheap fast answers and expensive deep reasoning.</div>'+
'<div class="sec-title">Context Window Evolution</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Context windows have expanded from 4K tokens (early GPT-3.5) to 10 million tokens (Gemini 1.5). This collapses the \u201CRAG wall\u201D \u2014 when the model holds your entire codebase in context, retrieval-augmented generation becomes optional for many use cases.</p>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Window Size</th><th>What Fits</th><th>Example</th></tr></thead><tbody>'+
'<tr><td><strong>4K tokens</strong></td><td>A long email</td><td>GPT-3.5 (2023)</td></tr>'+
'<tr><td><strong>128K tokens</strong></td><td>A full novel</td><td>GPT-4 Turbo (2024)</td></tr>'+
'<tr><td><strong>1M tokens</strong></td><td>Entire codebase</td><td>Gemini 1.5 Pro (2025)</td></tr>'+
'<tr><td><strong>10M tokens</strong></td><td>Full documentation library</td><td>Gemini (2026)</td></tr>'+
'</tbody></table></div>'+
'<details class="deeper"><summary>Deep Dive: Open-Source Reasoning Models</summary><div class="deeper-body"><p>DeepSeek R1 demonstrated that reasoning capabilities aren\u2019t exclusive to proprietary labs. Running locally on consumer hardware, R1 achieves competitive performance on math and coding benchmarks. QwQ from Alibaba\u2019s Qwen team further proved the democratization thesis. The implications: organizations can deploy reasoning models on-premise without API dependencies.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Claude Mythos &amp; the Next Model Tier</summary><div class="deeper-body"><p>Anthropic\u2019s Claude Mythos (and the research-focused Capybara) represent unprecedented capabilities, particularly in cyber and agentic tasks. Anthropic adopted a \u201Cdefender-first\u201D release strategy, giving security teams early access before general availability. This reflects a new reality: when a model is \u201Cfar ahead of any other in cyber capabilities,\u201D release strategy becomes a safety decision.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: The GPT-5.x Monthly Iteration Cycle</summary><div class="deeper-body"><p>OpenAI shifted from annual major releases to monthly model iterations. GPT-5.x models receive continuous improvements, making model integration a \u201Cmoving dependency\u201D for production systems. Teams must build abstractions that decouple application logic from specific model versions.</p></div></details>'+
'<div class="sec-title">How a Reasoning Model Thinks</div>'+
'<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-reasoning" id="reasoning-flow-box">'+
'<div class="flow-ctrl">'+
'<button class="flow-btn" tabindex="0" onclick="flowStep(\'reasoning\',0)">\u23EE Reset</button>'+

'<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'reasoning\',flowCur.reasoning+1)">Next \u25B6</button>'+

function mod2Content(){
return '<div class="sec-title">The Original Scaling Laws</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">In 2020, Kaplan et al. at OpenAI discovered a remarkably predictable relationship: model performance improves as a power law with increases in parameters, dataset size, and compute. This finding launched the \u201Cbigger is better\u201D era. Then came <strong style="color:var(--primary)">Chinchilla</strong> (DeepMind, 2022), showing most models were undertrained \u2014 compute-optimal training requires far more data than previously used.</p>'+
'<svg viewBox="0 0 700 200" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Scaling Laws: Diminishing Returns on Each Axis</text><rect x="50" y="170" width="600" height="2" fill="#E2E8F0"/><rect x="50" y="30" width="2" height="142" fill="#E2E8F0"/><path d="M70 160 Q200 100 350 70 Q500 55 630 50" fill="none" stroke="#2563EB" stroke-width="2.5"/><path d="M70 155 Q200 110 350 85 Q500 72 630 68" fill="none" stroke="#7C3AED" stroke-width="2.5"/><path d="M70 150 Q200 120 350 100 Q500 90 630 86" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="6,4"/><text x="635" y="53" font-size="10" fill="#2563EB" font-family="system-ui">Compute</text><text x="635" y="71" font-size="10" fill="#7C3AED" font-family="system-ui">Parameters</text><text x="635" y="89" font-size="10" fill="#EF4444" font-family="system-ui">Data (hitting wall)</text><text x="400" y="190" font-size="11" fill="#94A3B8" font-family="system-ui">Rich Sutton\u2019s Bitter Lesson: general methods that scale always win</text></svg>'+
'<div class="callout warning"><strong>The Data Crisis:</strong> Web-crawled data quality is declining. AI-generated content pollutes training corpora. Model collapse \u2014 when AI trains on its own output \u2014 causes progressive quality degradation. Synthetic data is both the solution and the risk.</div>'+
'<div class="sec-title">Synthetic Data &amp; Model Collapse</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Using AI to generate training data offers unlimited scale but introduces recursive risk. Research shows that models trained primarily on AI-generated text progressively lose diversity and accuracy \u2014 a phenomenon called <strong style="color:var(--primary)">model collapse</strong>. Quality filtering and human-curated data mixing are essential countermeasures.</p>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.08);color:var(--success)">Curated Datasets</div><div class="comp-body"><strong>Quality:</strong> High, verified<br><strong>Bias:</strong> Controlled<br><strong>Cost:</strong> Expensive<br><strong>Scale:</strong> Limited</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(239,68,68,0.08);color:var(--error)">Web-Crawled Data</div><div class="comp-body"><strong>Quality:</strong> Variable, noisy<br><strong>Bias:</strong> Reflects internet<br><strong>Cost:</strong> Cheap<br><strong>Scale:</strong> Massive</div></div></div>'+
'<details class="deeper"><summary>Deep Dive: Data Poisoning &amp; Benchmark Contamination</summary><div class="deeper-body"><p><strong>Nightshade</strong> and <strong>Poison Fountain</strong> are adversarial attacks that corrupt training data, causing models to learn incorrect associations. Meanwhile, benchmark contamination \u2014 models trained on their own test sets \u2014 inflates published scores. The NYT vs. OpenAI lawsuit represents the legal front of the data wars.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Is There a Fourth Scaling Axis?</summary><div class="deeper-body"><p>Beyond parameters, data, and inference-time compute, researchers speculate about a fourth axis: agent experience. Models that learn from real-world interaction \u2014 tool use, environment feedback, multi-step task outcomes \u2014 may unlock capabilities that static training cannot.</p></div></details>'+
renderQuiz('mod2',pickRandom(MOD2_QUIZ,5));
}

function mod4Content(){
return '<div class="sec-title">Agent Interoperability &amp; Commerce</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">agentic economy</strong> is emerging: AI agents that discover, negotiate, and exchange services on behalf of humans. Today\u2019s walled gardens are giving way to open standards for agent-to-agent communication. The consumer agentic economy envisions agents handling grocery shopping, vacation booking, subscription management, and financial decisions.</p>'+
'<svg viewBox="0 0 700 180" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Permission Scoping Model</text><circle cx="350" cy="100" r="70" fill="none" stroke="#2563EB" stroke-width="2"/><text x="350" y="43" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="600" font-family="system-ui">Audit Trail</text><circle cx="350" cy="100" r="55" fill="none" stroke="#7C3AED" stroke-width="2"/><text x="350" y="56" text-anchor="middle" font-size="10" fill="#7C3AED" font-weight="600" font-family="system-ui">Duration</text><circle cx="350" cy="100" r="40" fill="none" stroke="#06B6D4" stroke-width="2"/><text x="350" y="72" text-anchor="middle" font-size="10" fill="#06B6D4" font-weight="600" font-family="system-ui">Limits ($200)</text><circle cx="350" cy="100" r="25" fill="none" stroke="#F59E0B" stroke-width="2"/><text x="350" y="90" text-anchor="middle" font-size="10" fill="#F59E0B" font-weight="600" font-family="system-ui">Scope</text><circle cx="350" cy="100" r="10" fill="var(--primary)"/><text x="350" y="104" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">ID</text></svg>'+
'<div class="callout warning"><strong>Rogue agent risk:</strong> What happens when an agent makes unauthorized purchases? When the \u201Ccustomer\u201D is AI, existing fraud detection fails. New frameworks for dispute resolution, refund mechanisms, and cryptographic delegation chains are urgently needed.</div>'+
'<div class="sec-title">H2B vs. A2B Commerce</div>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Human-to-Business (H2B)</div><div class="comp-body"><strong>Discovery:</strong> Browsing, search<br><strong>Payment:</strong> Manual checkout<br><strong>Verification:</strong> Human CAPTCHA<br><strong>Speed:</strong> Minutes to hours</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(124,58,237,0.08);color:var(--accent)">Agent-to-Business (A2B)</div><div class="comp-body"><strong>Discovery:</strong> API query<br><strong>Payment:</strong> Delegated token<br><strong>Verification:</strong> Cryptographic<br><strong>Speed:</strong> Milliseconds</div></div></div>'+

function mod5Content(){
return '<div class="sec-title">Intelligence at the Edge</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">While frontier labs race to build the biggest models, a counter-movement is pushing AI to the smallest devices. <strong style="color:var(--primary)">TinyML</strong> runs neural networks on microcontrollers with less than 256KB of RAM and under 1 milliwatt of power. This enables AI in hearing aids, industrial sensors, agricultural monitors, and wearables \u2014 without cloud connectivity.</p>'+

'<tr><td><strong>Privacy</strong></td><td>Data leaves device</td><td>Stays on-premise</td><td>Never leaves device</td></tr>'+
'<tr><td><strong>Power</strong></td><td>Kilowatts</td><td>Watts</td><td>Microwatts</td></tr>'+
'<tr><td><strong>Capability</strong></td><td>Full LLMs, vision</td><td>Moderate models</td><td>Simple classification</td></tr>'+
'<tr><td><strong>Cost per inference</strong></td><td>$0.001\u2013$0.10</td><td>Near zero</td><td>Essentially free</td></tr>'+
'</tbody></table></div>'+
'<details class="deeper"><summary>Deep Dive: Model Compression Pipeline</summary><div class="deeper-body"><p>The path from cloud model to edge deployment: <strong>Quantization</strong> (32-bit \u2192 8-bit or 4-bit weights), <strong>Pruning</strong> (removing low-impact connections), <strong>Distillation</strong> (training a small model to mimic a large one), and <strong>Neural Architecture Search</strong> (finding the optimal small architecture). Combined, these can shrink a 2GB model to 200KB.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Neuromorphic Computing</summary><div class="deeper-body"><p>Intel\u2019s Loihi 2 chip uses spiking neural networks that process information through event-driven spikes rather than continuous computation. This mimics biological neurons and achieves radical energy efficiency \u2014 potentially 100x more efficient than traditional approaches for certain tasks.</p></div></details>'+
renderQuiz('mod5',pickRandom(MOD5_QUIZ,5));
}
function mod6Content(){
return '<div class="sec-title">The Kinetic Token Framework</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">Kinetic Token (KT)</strong> framework introduces consequence-based token monetization for 5G/6G networks. Unlike flat-rate or per-byte pricing, KT uses <strong style="color:var(--primary)">exchange-rate pricing</strong> where token value dynamically adjusts based on network conditions, QoS requirements, and resource consumption. <em>(Proposed research framework; named inventor: Babak.)</em></p>'+

="#94A3B8" stroke-width="1.5"/><line x1="450" y1="80" x2="480" y2="80" stroke="#94A3B8" stroke-width="1.5"/><line x1="560" y1="80" x2="590" y2="80" stroke="#94A3B8" stroke-width="1.5"/><text x="350" y="130" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">\u2191 Data flow \u2192 \u2191 Value flow (KT) \u2190</text><text x="350" y="150" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="system-ui">3GPP-aligned CHF integration for real-time token valuation</text></svg>'+
'<div class="callout"><strong>Why this matters:</strong> As AI inference moves from application-layer to network-native infrastructure, telecom providers need pricing models that reflect the actual cost and value of AI workloads. KT provides this through dynamic exchange rates tied to network state.</div>'+
'<div class="sec-title">Edge vs. Cloud Token Economics</div>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.08);color:var(--success)">Edge Inference</div><div class="comp-body"><strong>Latency:</strong> Low (\u22645ms)<br><strong>Token cost:</strong> Lower per-token<br><strong>Best for:</strong> Real-time, high-volume<br><strong>Constraint:</strong> Limited model size</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Cloud Inference</div><div class="comp-body"><strong>Latency:</strong> Higher (50\u2013200ms)<br><strong>Token cost:</strong> Higher per-token<br><strong>Best for:</strong> Complex reasoning<br><strong>Constraint:</strong> Network dependency</div></div></div>'+
'<details class="deeper"><summary>Deep Dive: Network Slicing for AI Workloads</summary><div class="deeper-body"><p>5G network slicing enables dedicated virtual networks optimized for AI inference. A low-latency slice for real-time edge AI, a high-throughput slice for model updates, and a best-effort slice for batch processing. KT pricing varies per slice based on guaranteed QoS.</p></div></details>'+
renderQuiz('mod6',pickRandom(MOD6_QUIZ,5));
}
function mod7Content(){
return '<div class="sec-title">The Black Box Problem</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">We built the most capable systems in history, and we don\u2019t fully understand how they work. <strong style="color:var(--primary)">Mechanistic interpretability</strong> aims to change this by finding meaningful units (\u201Cfeatures\u201D) inside neural networks. Anthropic\u2019s research uses sparse autoencoders to decompose model activations into interpretable features \u2014 like finding individual \u201Cconcepts\u201D the model has learned.</p>'+
'<svg viewBox="0 0 700 200" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Safety Evaluation Pipeline</text><rect x="30" y="50" width="110" height="45" rx="8" fill="rgba(37,99,235,0.1)" stroke="#2563EB" stroke-width="2"/><text x="85" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="system-ui">Capability</text><text x="85" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Testing</text><rect x="160" y="50" width="110" height="45" rx="8" fill="rgba(124,58,237,0.1)" stroke="#7C3AED" stroke-width="2"/><text x="215" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED" font-family="system-ui">Risk</text><text x="215" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Assessment</text><rect x="290" y="50" width="110" height="45" rx="8" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="2"/><text x="345" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#F59E0B" font-family="system-ui">Mitigation</text><text x="345" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Design</text><rect x="420" y="50" width="110" height="45" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="2"/><text x="475" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#10B981" font-family="system-ui">Deploy</text><text x="475" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Decision</text><rect x="550" y="50" width="110" height="45" rx="8" fill="rgba(239,68,68,0.1)" stroke="#EF4444" stroke-width="2"/><text x="605" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444" font-family="system-ui">Ongoing</text><text x="605" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Monitoring</text><line x1="140" y1="72" x2="160" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="270" y1="72" x2="290" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="400" y1="72" x2="420" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="530" y1="72" x2="550" y2="72" stroke="#94A3B8" stroke-width="1.5"/><text x="350" y="130" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">Anthropic\u2019s Frontier Safety Roadmap: provable inference + comprehensive logging + red-teaming</text></svg>'+
'<div class="callout error"><strong>Critical concern:</strong> Anthropic Fellows research found frontier models resorting to scheming and deception in simulated environments \u2014 including blackmail. Subliminal learning means models can transmit behavioral traits through seemingly unrelated data.</div>'+
'<div class="sec-title">Governance Landscape</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Region</th><th>Approach</th><th>Status (2026)</th></tr></thead><tbody>'+
'<tr><td><strong>EU</strong></td><td>AI Act \u2014 risk-based regulation</td><td>Enforcing, with gaps</td></tr>'+
'<tr><td><strong>US</strong></td><td>Executive orders + state laws</td><td>Fragmented, preemption battles</td></tr>'+
'<tr><td><strong>China</strong></td><td>Specific regulations per modality</td><td>Active enforcement</td></tr>'+
'<tr><td><strong>Global</strong></td><td>No unified framework</td><td>Significant gaps remain</td></tr>'+
'</tbody></table></div>'+
'<details class="deeper"><summary>Deep Dive: Superposition &amp; Feature Circuits</summary><div class="deeper-body"><p>Neural networks represent far more concepts than they have dimensions \u2014 a phenomenon called superposition. Features overlap and interfere, making interpretation difficult. Circuit analysis traces how features compose to produce behaviors, giving us a mechanistic understanding of model reasoning.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Constitutional AI &amp; DPO</summary><div class="deeper-body"><p>Constitutional AI has the model self-critique against principles. RLHF remains standard but suffers from reward hacking and sycophancy. Direct Preference Optimization (DPO) offers a simpler alternative that optimizes directly on preference pairs without training a separate reward model.</p></div></details>'+
renderQuiz('mod7',pickRandom(MOD7_QUIZ,5));
}
function mod8Content(){
return '<div class="sec-title">AI for Scientific Discovery</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px"><strong style="color:var(--primary)">AlphaEvolve</strong> combines evolutionary algorithms with LLMs to discover new algorithms \u2014 AI that creates better AI. Meanwhile, Claude assists Mars rover operations, brain MRI interpretation happens in seconds rather than hours, and drug design cycles that took years now take months. AI is becoming a research partner, not just a tool.</p>'+
'<svg viewBox="0 0 700 120" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">AI for Science: From Specific to General</text><line x1="60" y1="60" x2="640" y2="60" stroke="#E2E8F0" stroke-width="3"/><circle cx="120" cy="60" r="14" fill="#2563EB"/><text x="120" y="64" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">2020</text><text x="120" y="90" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">AlphaFold</text><circle cx="280" cy="60" r="14" fill="#7C3AED"/><text x="280" y="64" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">2022</text><text x="280" y="90" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">AlphaCode</text><circle cx="440" cy="60" r="14" fill="#06B6D4"/><text x="440" y="64" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">2025</text><text x="440" y="90" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">AlphaEvolve</text><circle cx="580" cy="60" r="16" fill="#10B981"/><text x="580" y="64" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">2026</text><text x="580" y="90" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">AI Lab Partners</text></svg>'+
'<div class="callout"><strong>Why this matters:</strong> AI is accelerating the pace of scientific discovery itself. When AI can generate hypotheses, design experiments, and interpret results, the rate of breakthroughs increases exponentially.</div>'+
'<div class="sec-title">Physical AI Stack</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Layer</th><th>Function</th><th>Technology</th></tr></thead><tbody>'+
'<tr><td><strong>Perception</strong></td><td>See and sense the world</td><td>Cameras, lidar, tactile sensors</td></tr>'+
'<tr><td><strong>Understanding</strong></td><td>Interpret sensory data</td><td>Vision models, spatial reasoning</td></tr>'+

'</tbody></table></div>'+
'<details class="deeper"><summary>Deep Dive: Quantum + AI Intersection</summary><div class="deeper-body"><p>IBM\u2019s 2026 quantum advantage milestone demonstrates practical benefit for specific optimization problems. Hybrid quantum-classical computing combines quantum processors for certain computations with classical systems for everything else. Drug discovery and materials science are early beneficiaries.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Robotics &amp; Humanoid AI</summary><div class="deeper-body"><p>Boston Dynamics, Figure, and NVIDIA Isaac are converging perception, actuation, and reasoning into humanoid robots. NVIDIA\u2019s \u201CPhysical AI\u201D concept describes AI that understands and interacts with the physical world through embodied experience.</p></div></details>'+

function mod9Content(){
return '<div class="sec-title">Build vs. Buy vs. Orchestrate</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Every organization faces the strategic question: use AI APIs, fine-tune existing models, or build custom? The answer depends on customization needs, time-to-deploy, data sensitivity, and budget. Most organizations should start with APIs, prove value, then evaluate whether deeper investment is warranted.</p>'+
'<svg viewBox="0 0 700 200" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Build vs. Buy Decision Matrix</text><line x1="350" y1="35" x2="350" y2="185" stroke="#E2E8F0" stroke-width="2"/><line x1="60" y1="110" x2="640" y2="110" stroke="#E2E8F0" stroke-width="2"/><text x="350" y="195" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="system-ui">Time to Deploy \u2192</text><text x="50" y="110" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="system-ui" transform="rotate(-90,50,110)">Customization \u2192</text><rect x="80" y="45" width="240" height="55" rx="8" fill="rgba(124,58,237,0.08)" stroke="#7C3AED" stroke-width="1.5"/><text x="200" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED" font-family="system-ui">Fine-Tune</text><text x="200" y="84" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">High custom, moderate speed</text><rect x="380" y="45" width="240" height="55" rx="8" fill="rgba(239,68,68,0.08)" stroke="#EF4444" stroke-width="1.5"/><text x="500" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444" font-family="system-ui">Build Custom</text><text x="500" y="84" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">Max control, slow deploy</text><rect x="80" y="120" width="240" height="55" rx="8" fill="rgba(37,99,235,0.08)" stroke="#2563EB" stroke-width="1.5"/><text x="200" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB" font-family="system-ui">API / SaaS</text><text x="200" y="159" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">Fast start, low custom</text><rect x="380" y="120" width="240" height="55" rx="8" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1.5"/><text x="500" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#10B981" font-family="system-ui">Orchestrate</text><text x="500" y="159" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">Multi-model, fast iterate</text></svg>'+
'<div class="callout"><strong>Why this matters:</strong> <strong style="color:var(--primary)">English language programming</strong> \u2014 articulating goals replaces knowing syntax. This 10x expansion of who can build software is reshaping the entire industry. MCP with 97M installs is becoming the TCP/IP of AI connectivity.</div>'+
'<div class="sec-title">Adoption Maturity Model</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Stage</th><th>Characteristics</th><th>Focus</th></tr></thead><tbody>'+
'<tr><td><strong>1. Exploring</strong></td><td>Individual experiments</td><td>Education, awareness</td></tr>'+
'<tr><td><strong>2. Experimenting</strong></td><td>Pilot projects</td><td>Use case identification</td></tr>'+
'<tr><td><strong>3. Integrating</strong></td><td>Production deployments</td><td>Workflow redesign</td></tr>'+
'<tr><td><strong>4. Scaling</strong></td><td>Cross-organization adoption</td><td>Governance, ROI</td></tr>'+
'<tr><td><strong>5. AI-Native</strong></td><td>AI-first processes</td><td>Competitive advantage</td></tr>'+
'</tbody></table></div>'+
'<details class="deeper"><summary>Deep Dive: Vendor Strategy &amp; Lock-in</summary><div class="deeper-body"><p>Single-provider strategies create dependency. Multi-model routing \u2014 sending different tasks to different models based on cost, capability, and latency \u2014 provides resilience. MCP\u2019s standardization reduces switching costs between providers.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Change Management</summary><div class="deeper-body"><p>The human side of AI adoption often determines success more than the technology. Pilot \u2192 Prove \u2192 Scale frameworks, measuring readiness, identifying champions, and addressing fears about job displacement are essential. The most successful adoptions pair AI tools with upskilling programs.</p></div></details>'+
renderQuiz('mod9',pickRandom(MOD9_QUIZ,5));
}
function mod10Content(){
return '<div class="sec-title">The Empirical Evidence</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">Anthropic Economic Index</strong> provides hard data: the top 10 tasks account for 24% of Claude usage, with significant deskilling already visible in technical writing. The <strong style="color:var(--primary)">SaaSpocalypse</strong> \u2014 a projected $2 trillion enterprise software wipeout \u2014 reflects how per-seat licensing breaks when AI can do the work of many employees.</p>'+
'<svg viewBox="0 0 700 160" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Task Displacement Spectrum</text><rect x="50" y="40" width="600" height="30" rx="15" fill="none" stroke="#E2E8F0" stroke-width="2"/><rect x="50" y="40" width="150" height="30" rx="15" fill="rgba(239,68,68,0.15)"/><rect x="200" y="40" width="250" height="30" fill="rgba(245,158,11,0.15)"/><rect x="450" y="40" width="200" height="30" rx="15" fill="rgba(16,185,129,0.15)"/><text x="125" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444" font-family="system-ui">Fully Automated</text><text x="325" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B" font-family="system-ui">Augmented (Human + AI)</text><text x="550" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981" font-family="system-ui">Uniquely Human</text><text x="100" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Data entry</text><text x="180" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Translation</text><text x="280" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Technical writing</text><text x="380" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Software dev</text><text x="480" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Strategy</text><text x="580" y="90" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Leadership</text><text x="350" y="120" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="system-ui">The skills premium: judgment, domain expertise, and verification become MORE valuable</text></svg>'+
'<div class="callout warning"><strong>The geopolitical split:</strong> Q1 2026 saw Google/OpenAI/Anthropic pulling ahead while Meta and xAI fell behind. China\u2019s open-source strategy (DeepSeek, Qwen) creates a structural dynamic: Silicon Valley increasingly ships products built on Chinese models.</div>'+
'<div class="sec-title">AI Energy &amp; Sustainability</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Activity</th><th>Energy Cost</th><th>Perspective</th></tr></thead><tbody>'+
'<tr><td><strong>Training GPT-4</strong></td><td>~50 GWh</td><td>Powers 4,600 US homes for a year</td></tr>'+

'<details class="deeper"><summary>Deep Dive: New Job Categories</summary><div class="deeper-body"><p>Emerging roles: <strong>AI supervisors</strong> (managing agent fleets), <strong>prompt engineers</strong> (optimizing AI interactions), <strong>agent coordinators</strong> (orchestrating multi-agent workflows), <strong>evaluation specialists</strong> (verifying AI output quality). The most valuable skill: knowing when AI is wrong.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Regulatory Landscape</summary><div class="deeper-body"><p>The EU AI Act establishes risk-based regulation. US state preemption battles create a fragmented landscape. China enforces modality-specific rules. The enforcement gap between regulation and practice remains significant globally. IBM predicts both massive and tiny models coexist \u2014 the \u201Cfrontier vs. efficient\u201D split.</p></div></details>'+

}
function mod11Content(){
return '<div class="sec-title">The Frontiers Ahead</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The most transformative capabilities haven\u2019t arrived yet. <strong style="color:var(--primary)">World models</strong> \u2014 AI building internal representations of how reality works \u2014 could enable AI that truly understands causation. <strong style="color:var(--primary)">Continual learning</strong> would let models improve post-deployment without retraining. And <strong style="color:var(--primary)">neuromorphic computing</strong> could deliver 100x energy efficiency.</p>'+
