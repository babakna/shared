function mod4Content(){
return '<div class="sec-title">The Infrastructure of Agent Commerce</div>'+'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">agentic economy</strong> represents a fundamental restructuring of how commerce works when AI agents \u2014 not humans \u2014 become the primary actors in transactions. Today, you browse a website, compare options, and click \u201Cbuy.\u201D In the agentic economy, your AI agent discovers products across hundreds of vendors via API, negotiates price and terms programmatically, executes payment through delegated authorization, and arranges fulfillment \u2014 all while you\u2019re asleep or focused on other work. The shift is from human-mediated to agent-mediated commerce, and it requires entirely new infrastructure for trust, verification, and dispute resolution.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The required infrastructure stack has several critical layers. <strong>Delegation tokens</strong> are cryptographic credentials that prove an agent is authorized to act on behalf of a specific person, with defined scope (\u201Cgroceries under $200 from approved stores\u201D), duration (\u201Cvalid for 24 hours\u201D), and audit requirements. <strong>Payment rails</strong> must support agent-initiated transactions with granular spending limits, real-time authorization, and automatic receipt generation. <strong>Preference protocols</strong> encode user preferences in machine-readable formats that agents can interpret and merchants can optimize for. <strong>Dispute resolution</strong> mechanisms must handle cases where an agent\u2019s action doesn\u2019t match user intent \u2014 a challenge that existing consumer protection frameworks weren\u2019t designed for.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">trust and verification problem</strong> is the central challenge. How does a merchant know that an agent is legitimately representing a specific customer, not a fraudulent actor impersonating one? How does a customer verify that their agent actually got the best price and didn\u2019t accept a kickback from a preferred vendor? How do both parties ensure that the AI model producing the agent\u2019s decisions hasn\u2019t been compromised or manipulated? Cryptographic signing of agent actions, provable inference (verifying which model generated a decision), and end-to-end delegation chains that can be audited after the fact are all active areas of development. The technical solutions exist in prototype; the challenge is standardization and adoption at scale.</p>'+
'<div class="sec-title">Agent Interoperability &amp; Commerce</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">agentic economy</strong> is emerging: AI agents that discover, negotiate, and exchange services on behalf of humans. Today\u2019s walled gardens are giving way to open standards for agent-to-agent communication. The consumer agentic economy envisions agents handling grocery shopping, vacation booking, subscription management, and financial decisions.</p>'+
'<svg viewBox="0 0 700 180" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Permission Scoping Model</text><circle cx="350" cy="100" r="70" fill="none" stroke="#2563EB" stroke-width="2"/><text x="350" y="43" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="600" font-family="system-ui">Audit Trail</text><circle cx="350" cy="100" r="55" fill="none" stroke="#7C3AED" stroke-width="2"/><text x="350" y="56" text-anchor="middle" font-size="10" fill="#7C3AED" font-weight="600" font-family="system-ui">Duration</text><circle cx="350" cy="100" r="40" fill="none" stroke="#06B6D4" stroke-width="2"/><text x="350" y="72" text-anchor="middle" font-size="10" fill="#06B6D4" font-weight="600" font-family="system-ui">Limits ($200)</text><circle cx="350" cy="100" r="25" fill="none" stroke="#F59E0B" stroke-width="2"/><text x="350" y="90" text-anchor="middle" font-size="10" fill="#F59E0B" font-weight="600" font-family="system-ui">Scope</text><circle cx="350" cy="100" r="10" fill="var(--primary)"/><text x="350" y="104" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="system-ui">ID</text></svg>'+
'<div class="callout warning"><strong>Rogue agent risk:</strong> What happens when an agent makes unauthorized purchases? When the \u201Ccustomer\u201D is AI, existing fraud detection fails. New frameworks for dispute resolution, refund mechanisms, and cryptographic delegation chains are urgently needed.</div>'+
'<div class="sec-title">H2B vs. A2B Commerce</div>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Human-to-Business (H2B)</div><div class="comp-body"><strong>Discovery:</strong> Browsing, search<br><strong>Payment:</strong> Manual checkout<br><strong>Verification:</strong> Human CAPTCHA<br><strong>Speed:</strong> Minutes to hours</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(124,58,237,0.08);color:var(--accent)">Agent-to-Business (A2B)</div><div class="comp-body"><strong>Discovery:</strong> API query<br><strong>Payment:</strong> Delegated token<br><strong>Verification:</strong> Cryptographic<br><strong>Speed:</strong> Milliseconds</div></div></div>'+
'<details class="deeper"><summary>Deep Dive: Provable Inference</summary><div class="deeper-body"><p>Provable inference addresses a fundamental trust gap in the agentic economy: when an AI agent claims to have made a decision using a specific model, how can the merchant, the user, or a regulator verify this claim? Without verification, a malicious actor could substitute a cheaper or compromised model, claim its outputs came from a trusted one, and exploit the trust that the legitimate model\u2019s reputation provides. Cryptographic signing of model outputs \u2014 where the inference server attests that a specific response was generated by a specific model with specific weights at a specific time \u2014 closes this gap.</p><p>The technical implementation involves the model inference server generating a cryptographic signature alongside each output. This signature incorporates a hash of the model weights, the input prompt, the output tokens, and a timestamp, all signed with the server\u2019s private key. Any party with the corresponding public key can verify that the output is authentic \u2014 it was generated by the claimed model, from the given input, at the stated time. Tampering with any component (the model, the input, or the output) invalidates the signature. This is analogous to HTTPS certificates for websites, but applied to AI inference.</p><p>For the agentic economy, provable inference enables several critical capabilities. Merchants can verify that an agent\u2019s purchasing decision was made by a reputable model, not a jailbroken or manipulated one. Users can audit their agent\u2019s decision-making after the fact, verifying that the agent used the model they intended with the parameters they specified. Regulators can require provable inference as a compliance mechanism, ensuring that high-stakes decisions (financial, medical, legal) were made by approved models. And in dispute resolution, the cryptographic record provides an objective basis for determining what happened and why.</p><p>The adoption challenges are primarily about infrastructure and standardization rather than fundamental technology. Inference providers need to implement signing infrastructure. Verification libraries need to be integrated into merchant and consumer applications. Standards bodies need to agree on signature formats, key management protocols, and revocation procedures. Anthropic\u2019s early work in this area, combined with parallel efforts from other labs, suggests that a viable industry standard could emerge within 12\u201318 months, enabling the trust infrastructure that the agentic economy requires to operate at scale.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Privacy &amp; Liability</summary><div class="deeper-body"><p>Privacy in agent commerce is fundamentally different from privacy in human commerce because agents must share structured preference data with merchants to function effectively. When you browse a grocery website, the merchant sees your browsing behavior but not your complete dietary profile, medical conditions, or household composition. When your agent queries a grocery API with parameters like \u201Cgluten-free, low-sodium, diabetic-friendly, household of 4,\u201D the merchant receives a detailed preference profile that reveals sensitive health and family information. The question of how much preference data agents should share \u2014 and how merchants should handle it \u2014 is an unsolved design challenge.</p><p><strong>Data minimization</strong> principles suggest that agents should share only the minimum information necessary to complete a transaction. Instead of transmitting \u201Cdiabetic-friendly\u201D to a grocery API, the agent could pre-filter products locally and only send specific product queries to the merchant. Instead of sharing a complete budget, the agent could simply accept or reject prices without revealing its threshold. These approaches protect privacy but reduce efficiency \u2014 the merchant can\u2019t optimize recommendations without knowing preferences. The design space involves trading off privacy against personalization, and different users will have different preferences about where that trade-off should sit.</p><p>The <strong>liability question</strong> is even thornier. When an agent books the wrong flight, purchases an item the user is allergic to, or accepts unfavorable contract terms, the existing legal framework has no clear answer about who bears responsibility. Is it the consumer (who delegated authority to the agent)? The agent provider (whose model made the decision)? The merchant (who accepted the agent\u2019s order)? Current consumer protection law assumes a human made the purchasing decision, and most existing liability frameworks don\u2019t account for AI intermediaries. Early legal scholarship suggests a <strong>shared liability</strong> model where responsibility is allocated based on which party could most effectively have prevented the error \u2014 but this framework has yet to be tested in courts.</p><p>Practical recommendations for organizations deploying agent commerce include: implement \u201Cprivacy budgets\u201D that limit the total preference data an agent can share per session, require explicit user consent for sensitive preference categories (health, financial, family), maintain complete audit trails of all data shared with merchants, and carry agent liability insurance (an emerging product category) to cover losses from agent errors. The regulatory landscape is still forming, but organizations that build privacy-preserving, auditable agent commerce systems now will be better positioned when regulations inevitably arrive.</p></div></details>'+
'<div class="sec-title">Agent Buys Groceries</div>'+

'<div class="case-box"><div class="case-title">\uD83D\uDCD6 Case Study: When the Agent Booked Business Class</div><div class="case-text"><dl style="margin:0"><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Situation</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">A product manager authorized their AI travel agent to book \u201Cflights under $500\u201D for an upcoming conference. The agent was configured with a delegation token scoped to airline purchases with a per-transaction limit of $500, a 72-hour validity window, and audit logging enabled.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Context</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The permission scoping defined limits per transaction, not per trip or per time period. The agent\u2019s optimization function was set to minimize travel time while staying under the per-transaction spending limit. No aggregate spending cap was configured because the user assumed \u201Cflights under $500\u201D implied a single round-trip purchase.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Approach</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The agent searched across 12 airline APIs and found a business class fare at $499 one-way \u2014 technically under the $500 limit. Optimizing for travel time (business class had a more convenient departure), the agent booked the outbound flight for $499. It then booked the return flight separately for $497 \u2014 again under the per-transaction limit. Total spend: $996, nearly double what the user intended. Both transactions passed the authorization check because each was individually under $500.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Results</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The user received an audit notification showing two transactions totaling $996. They contacted the airline, which refunded the business class differential after the agent provider documented the permission scoping gap. The agent provider issued an update adding <strong>rolling aggregate limits</strong> (total spend across all transactions within a time window), <strong>trip-level budgets</strong> (total for related transactions), and a <strong>confirmation threshold</strong> (any single transaction above 70% of the per-transaction limit triggers a human confirmation request).</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Lessons Learned</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7"><strong>1.</strong> Per-transaction limits alone are insufficient; agents need aggregate spending caps, rolling windows, and trip-level budgets. <strong>2.</strong> Agents optimize for their objective function literally \u2014 \u201Cminimize travel time under $500 per transaction\u201D is different from \u201Cbook a reasonable economy flight.\u201D <strong>3.</strong> Intent encoding is hard: translating human intent (\u201Cbook a flight under $500\u201D) into machine-enforceable constraints requires anticipating edge cases. <strong>4.</strong> Confirmation thresholds (requesting human approval when approaching limits) are a simple safeguard against boundary exploitation. <strong>5.</strong> The audit trail was essential for dispute resolution \u2014 without it, proving the agent\u2019s decision logic to the airline would have been impossible.</dd></dl></div></div>';

function mod5Content(){
return '<div class="sec-title">What TinyML Is and Why It Matters</div>'+'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px"><strong style="color:var(--primary)">TinyML</strong> refers to the field of deploying machine learning models on microcontrollers and ultra-low-power devices with as little as 256KB of RAM and computational budgets measured in microwatts. Unlike cloud AI or even edge AI on smartphones, TinyML targets the billions of embedded devices \u2014 sensors, wearables, industrial controllers, agricultural monitors \u2014 that operate in environments where cloud connectivity is unreliable, expensive, or introduces unacceptable latency. These are specialized, single-task models: a TinyML system might detect anomalous vibrations in a motor, classify environmental sounds, or recognize specific wake words, but it won\u2019t hold a conversation or generate text.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">compression pipeline</strong> that makes TinyML possible involves a sequence of model optimization techniques. Quantization reduces numerical precision from 32-bit floating point to 8-bit or even 4-bit integers, shrinking model size by 4\u20138x with minimal accuracy loss. Pruning removes network connections that contribute least to output quality, typically eliminating 50\u201390% of weights. Knowledge distillation trains a tiny \u201Cstudent\u201D model to mimic the behavior of a large \u201Cteacher\u201D model, transferring capability without transferring size. Neural Architecture Search (NAS) algorithmically discovers model architectures optimized for specific hardware constraints. Applied sequentially, these techniques can compress a 2GB cloud model into a 200KB microcontroller-compatible version that retains 85\u201395% of the original accuracy for its target task.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Why edge AI matters extends beyond technical capability to fundamental questions about <strong style="color:var(--primary)">privacy, reliability, and real-time response</strong>. A health monitoring wearable that sends biometric data to the cloud creates a privacy risk and a latency problem \u2014 if the cloud connection drops, the device stops working. A TinyML implementation processes data entirely on-device: the raw sensor data never leaves the wearable, the inference happens in microseconds, and the device works identically with or without internet connectivity. For industrial applications, this means a vibration sensor on a factory machine can detect bearing failure in real-time and trigger an alert within milliseconds, rather than the 100ms+ round-trip required for cloud inference.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Real-world TinyML deployments span a remarkable range of applications. In agriculture, solar-powered sensors with TinyML classify pest sounds to enable targeted pesticide application, reducing chemical use by 60\u201370%. In healthcare, earbuds with on-device speech analysis detect early signs of cognitive decline through changes in speech patterns. In manufacturing, vibration sensors on CNC machines predict tool wear with 94% accuracy, preventing defective parts before they\u2019re produced. In wildlife conservation, acoustic classifiers identify endangered species calls in real-time, enabling rapid response to poaching activity in areas with no cellular coverage. Each deployment shares the same pattern: intelligence embedded at the point of sensing, operating continuously at negligible power cost.</p>'+
'<div class="sec-title">Intelligence at the Edge</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">While frontier labs race to build the biggest models, a counter-movement is pushing AI to the smallest devices. <strong style="color:var(--primary)">TinyML</strong> runs neural networks on microcontrollers with less than 256KB of RAM and under 1 milliwatt of power. This enables AI in hearing aids, industrial sensors, agricultural monitors, and wearables \u2014 without cloud connectivity.</p>'+
'<svg viewBox="0 0 700 160" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Hardware Spectrum: From MCU to Cloud</text><rect x="50" y="40" width="130" height="50" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="2"/><text x="115" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#10B981" font-family="system-ui">MCU</text><text x="115" y="78" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">&lt;1MB, \u00B5W</text><rect x="200" y="40" width="130" height="50" rx="8" fill="rgba(6,182,212,0.1)" stroke="#06B6D4" stroke-width="2"/><text x="265" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#06B6D4" font-family="system-ui">Mobile</text><text x="265" y="78" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">GBs, mW</text><rect x="350" y="40" width="130" height="50" rx="8" fill="rgba(124,58,237,0.1)" stroke="#7C3AED" stroke-width="2"/><text x="415" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED" font-family="system-ui">Edge Server</text><text x="415" y="78" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Many GB, W</text><rect x="500" y="40" width="150" height="50" rx="8" fill="rgba(37,99,235,0.1)" stroke="#2563EB" stroke-width="2"/><text x="575" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#2563EB" font-family="system-ui">Cloud GPU</text><text x="575" y="78" text-anchor="middle" font-size="9" fill="#475569" font-family="system-ui">Unlimited, kW</text><line x1="180" y1="65" x2="200" y2="65" stroke="#E2E8F0" stroke-width="2" marker-end="none"/><line x1="330" y1="65" x2="350" y2="65" stroke="#E2E8F0" stroke-width="2"/><line x1="480" y1="65" x2="500" y2="65" stroke="#E2E8F0" stroke-width="2"/><text x="350" y="115" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">Model Size: 200KB \u2192 200MB \u2192 20GB \u2192 2TB</text><text x="350" y="135" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">Latency: \u00B5s (local) \u2192 ms (edge) \u2192 100ms+ (cloud)</text></svg>'+
'<div class="callout success"><strong>Real-world impact:</strong> Edge AI enables real-time industrial defect detection at 120 units/minute, livestock health monitoring in remote locations, and privacy-preserving health wearables that never send data to the cloud.</div>'+
'<div class="sec-title">Cloud AI vs. Edge AI vs. TinyML</div>'+
'<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Feature</th><th>Cloud AI</th><th>Edge AI</th><th>TinyML</th></tr></thead><tbody>'+
'<tr><td><strong>Latency</strong></td><td>100ms+</td><td>1\u201310ms</td><td>Microseconds</td></tr>'+
'<tr><td><strong>Privacy</strong></td><td>Data leaves device</td><td>Stays on-premise</td><td>Never leaves device</td></tr>'+
'<tr><td><strong>Power</strong></td><td>Kilowatts</td><td>Watts</td><td>Microwatts</td></tr>'+
'<tr><td><strong>Capability</strong></td><td>Full LLMs, vision</td><td>Moderate models</td><td>Simple classification</td></tr>'+
'<tr><td><strong>Cost per inference</strong></td><td>$0.001\u2013$0.10</td><td>Near zero</td><td>Essentially free</td></tr>'+
'</tbody></table></div>'+
'<div class="case-box"><div class="case-title">\uD83D\uDCD6 Case Study: Predictive Maintenance with TinyML on a Manufacturing Floor</div><div class="case-text"><dl style="margin:0"><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Situation</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">A automotive parts manufacturer experienced an average of 3.2 unplanned equipment shutdowns per month across their 48 CNC machines, each costing approximately $12,000 in lost production time, emergency repair, and scrapped parts. Their existing monitoring relied on scheduled maintenance intervals and operator experience \u2014 many failures occurred between scheduled checks.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Context</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The factory floor had limited WiFi coverage and the company\u2019s IT policy prohibited connecting production equipment to the internet due to cybersecurity concerns. Any monitoring solution needed to operate entirely offline, run on existing industrial power (no battery replacement), and fit within the physical constraints of the existing machine housings.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Approach</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The team deployed TinyML-based vibration sensors on each machine\u2019s spindle bearing. The sensor hardware consisted of an ARM Cortex-M4 microcontroller (256KB RAM, 1MB flash) with a 3-axis accelerometer, drawing 0.8mW during inference. The model \u2014 a 1D convolutional neural network trained on 6 months of vibration data \u2014 was compressed from 14MB (cloud version) to 180KB using quantization (32-bit to 8-bit), pruning (70% of weights removed), and architecture optimization. It ran inference every 500ms, classifying vibration patterns into \u201Cnormal,\u201D \u201Cdegrading,\u201D and \u201Ccritical\u201D categories. Alerts were transmitted via local Bluetooth mesh to a dashboard in the maintenance office.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Results</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">Over 12 months of operation: unplanned shutdowns dropped from 3.2 to 0.4 per month (87% reduction). The TinyML model achieved 94.2% accuracy on failure prediction vs. 97.1% for the cloud model it was distilled from \u2014 a 2.9% accuracy trade-off for fully offline, real-time operation. Average early warning time before failure: 4.7 days (vs. 0 days with scheduled maintenance). Total hardware cost: $14,400 ($300 per sensor \u00d7 48 machines). Annual savings: $403,000 in prevented shutdowns. ROI payback period: 13 days.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Lessons Learned</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7"><strong>1.</strong> The 2.9% accuracy gap between cloud and TinyML models was operationally insignificant \u2014 the on-device model caught every critical failure, missing only some early-stage degradation signals. <strong>2.</strong> Offline operation was the key enabler; a cloud-dependent solution would have been rejected by IT security. <strong>3.</strong> The 500ms inference cycle provided effectively continuous monitoring, far superior to daily scheduled checks. <strong>4.</strong> Model updates were deployed quarterly via Bluetooth, requiring no internet connectivity. <strong>5.</strong> The biggest challenge was training data collection \u2014 6 months of normal and failure data was needed before the model was useful.</dd></dl></div></div>'+
'<details class="deeper"><summary>Deep Dive: Model Compression Pipeline</summary><div class="deeper-body"><p><strong>Quantization</strong> is typically the first and highest-impact step in the compression pipeline. Standard neural networks use 32-bit floating-point numbers for weights and activations, but most of that numerical precision is unnecessary for inference. Post-training quantization converts weights to 8-bit integers (INT8), reducing model size by 4x with typically less than 1% accuracy loss. More aggressive quantization to 4-bit (INT4) or even 2-bit representations can achieve 8\u201316x compression but requires quantization-aware training \u2014 retraining the model with simulated low-precision arithmetic so it learns to be robust to reduced precision. For TinyML targets, INT8 is the standard, with INT4 used for the most constrained devices.</p><p><strong>Pruning</strong> removes connections (weights) that contribute least to model output. Unstructured pruning zeroes out individual weights, achieving high compression ratios (70\u201395% sparsity) but requiring specialized sparse-computation hardware to realize speed benefits. Structured pruning removes entire neurons, channels, or attention heads, producing smaller dense models that run faster on standard hardware without sparse-computation support. The typical approach is iterative: prune a small percentage of weights, fine-tune the model to recover accuracy, prune more, fine-tune again, repeating until the target size is reached or accuracy drops below threshold.</p><p><strong>Knowledge distillation</strong> takes a fundamentally different approach by training a small \u201Cstudent\u201D model to mimic the behavior of a large \u201Cteacher\u201D model. Rather than learning from raw training data, the student learns from the teacher\u2019s output probability distributions, which contain richer information than binary labels. A teacher that assigns 90% probability to the correct answer and 8% to a related alternative is teaching the student about relationships between classes, not just the correct answer. This \u201Cdark knowledge\u201D transfer enables student models that are 5\u201310x smaller than their teachers while retaining 90\u201395% of accuracy.</p><p><strong>Neural Architecture Search (NAS)</strong> is the final step for maximum compression: algorithmically searching the space of possible model architectures to find one optimized for specific hardware constraints. Rather than starting with a large model and shrinking it, NAS starts with the hardware constraints (256KB RAM, 1mW power, 10ms latency) and discovers the best architecture that fits. Tools like Edge Impulse\u2019s EON tuner and Google\u2019s EfficientNet family automate this search, often finding architectures that human designers wouldn\u2019t have considered \u2014 unusual layer configurations, asymmetric channel counts, and non-standard activation functions that exploit specific hardware characteristics.</p></div></details>'+
'<details class="deeper"><summary>Deep Dive: Neuromorphic Computing</summary><div class="deeper-body"><p>Neuromorphic computing represents a fundamentally different approach to AI hardware that abandons the von Neumann architecture (separate memory and processing) in favor of brain-inspired designs where computation and memory are co-located. Intel\u2019s Loihi 2 chip implements <strong>spiking neural networks (SNNs)</strong> \u2014 networks where artificial neurons communicate through discrete pulses (\u201Cspikes\u201D) rather than continuous numerical values. A neuron only activates when it receives sufficient input, and it only communicates when it fires \u2014 meaning most of the chip is dormant at any given moment. This event-driven approach can be 100\u2013\u20131000x more energy-efficient than conventional GPUs for tasks that match its strengths.</p><p>The energy efficiency advantage comes from the fundamental difference between continuous and event-driven computation. A conventional GPU processes every neuron in every layer for every input, consuming power proportional to model size regardless of input complexity. A neuromorphic chip processes only the neurons that receive above-threshold input, consuming power proportional to <em>activity</em> rather than model size. For sparse, event-driven data \u2014 sensor readings that change infrequently, audio processing between words, video analysis of mostly static scenes \u2014 the vast majority of neurons remain inactive, and power consumption drops proportionally. This makes neuromorphic chips ideal for always-on sensing applications where power budgets are measured in milliwatts or microwatts.</p><p>Current limitations are significant. SNNs are harder to train than conventional neural networks because the spike-based communication is non-differentiable, making standard backpropagation inapplicable. Surrogate gradient methods and conversion approaches (training a conventional network first, then converting to SNN) partially address this, but SNN training remains an active research area. Programming models and toolchains are immature compared to CUDA/PyTorch ecosystems. And the tasks where neuromorphic computing excels \u2014 temporal pattern recognition, low-power continuous sensing, event-driven processing \u2014 are a subset of the broader AI landscape. Large language models and image generation are not well-suited to current neuromorphic architectures.</p><p>Despite these limitations, the trajectory is promising. BrainChip\u2019s Akida processor has demonstrated commercial neuromorphic deployments in smart home devices and automotive systems. Research labs have shown neuromorphic chips processing sensor data at microwatt power levels that would require milliwatts on conventional hardware. As the toolchains mature and training methods improve, neuromorphic computing is likely to become the default for always-on edge sensing applications \u2014 not replacing GPUs for cloud AI, but complementing them for the billions of devices that need intelligence without a power outlet.</p></div></details>';
}
function mod6Content(){
return '<div class="sec-title">Why Current Telecom Pricing Fails for AI</div>'+'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Current telecom pricing models \u2014 flat-rate monthly plans and per-gigabyte overage charges \u2014 were designed for a world where all bytes were approximately equal. A gigabyte of email, a gigabyte of video streaming, and a gigabyte of AI inference all cost the same to the customer, even though they impose fundamentally different costs on the network and deliver fundamentally different value. A 1KB safety-critical inference request for an autonomous vehicle\u2019s object detection system requires ultra-low latency, guaranteed delivery, and edge compute resources that cost orders of magnitude more to provide than 1KB of a cat video. Yet under current pricing, they\u2019re valued identically. This mismatch between cost, value, and price is the problem that <strong style="color:var(--primary)">Kinetic Token (KT)</strong> solves.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px"><strong style="color:var(--primary)">Consequence-based pricing</strong> is KT\u2019s core innovation. Rather than pricing data by volume, KT computes token value from three dimensions: <strong>network resource consumption</strong> (how much compute, bandwidth, and spectrum the request actually uses), <strong>QoS tier</strong> (the latency guarantee, reliability requirement, and priority level demanded), and <strong>application criticality</strong> (the real-world consequence of failure \u2014 a failed inference for autonomous driving is categorically different from a failed inference for a music recommendation). This multi-dimensional pricing means that identical data volumes can have wildly different KT costs, accurately reflecting the actual cost to serve and the value delivered.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">KT\u2019s <strong style="color:var(--primary)">exchange-rate model</strong> adds a dynamic temporal dimension. Just as currency exchange rates fluctuate based on supply and demand, KT values adjust in real-time based on network state. During peak congestion, a guaranteed-latency inference token costs more because the network resources required to guarantee that latency are scarcer and more valuable. During off-peak abundance, the same token costs less. This creates <strong>market-efficient pricing</strong> where the cost of AI inference naturally tracks the actual cost of providing it, incentivizing efficient resource usage \u2014 applications that can tolerate variable latency naturally shift workloads to cheaper off-peak windows, smoothing network demand without centralized control.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">A critical design decision in KT is its <strong style="color:var(--primary)">3GPP CHF integration</strong>. Rather than creating an entirely new billing system, KT extends the existing 5G Core Charging Function (CHF) \u2014 the standardized component that already handles real-time charging in telecom networks. This means KT can be deployed as an upgrade to existing infrastructure rather than a replacement, dramatically reducing the barrier to adoption. The CHF already supports real-time rating, charging triggers, and spending limits; KT adds the consequence-based pricing dimensions and exchange-rate computation on top of this proven foundation.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The progression from 5G to 6G fundamentally changes what KT can price. In 5G, KT operates at the <strong>network slice level</strong> \u2014 pricing AI workloads based on which slice they\u2019re assigned to and the QoS guarantees of that slice. This is relatively coarse-grained: all inference requests within a given slice get the same pricing treatment. 5G-Advanced and beyond, with the evolution of <strong>AI-RAN</strong> (AI-native Radio Access Network), enables per-inference pricing. When the network itself uses AI to manage radio resources, it can measure the actual resource cost of each individual inference request and price it accordingly. This enables scenarios where a single application making both routine and safety-critical inferences pays different rates for each, based on the actual network resources consumed.</p>'+
'<div class="sec-title">The Kinetic Token Framework</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">Kinetic Token (KT)</strong> framework introduces consequence-based token monetization for 5G/6G networks. Unlike flat-rate or per-byte pricing, KT uses <strong style="color:var(--primary)">exchange-rate pricing</strong> where token value dynamically adjusts based on network conditions, QoS requirements, and resource consumption. <em>(Proposed research framework; named inventor: Babak.)</em></p>'+
'<svg viewBox="0 0 700 180" style="width:100%;max-width:700px;display:block;margin:16px auto"><text x="350" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A" font-family="system-ui">Kinetic Token Architecture</text><rect x="30" y="60" width="80" height="40" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563EB" stroke-width="2"/><text x="70" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB" font-family="system-ui">UE</text><rect x="140" y="60" width="80" height="40" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7C3AED" stroke-width="2"/><text x="180" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED" font-family="system-ui">RAN</text><rect x="250" y="60" width="80" height="40" rx="6" fill="rgba(6,182,212,0.1)" stroke="#06B6D4" stroke-width="2"/><text x="290" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#06B6D4" font-family="system-ui">Core</text><rect x="360" y="60" width="90" height="40" rx="6" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="2"/><text x="405" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981" font-family="system-ui">Edge AI</text><rect x="480" y="60" width="80" height="40" rx="6" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="2"/><text x="520" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B" font-family="system-ui">CHF</text><rect x="590" y="60" width="80" height="40" rx="6" fill="rgba(239,68,68,0.1)" stroke="#EF4444" stroke-width="2"/><text x="630" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444" font-family="system-ui">KT</text><text x="630" y="90" text-anchor="middle" font-size="9" fill="#EF4444" font-family="system-ui">Exchange</text><line x1="110" y1="80" x2="140" y2="80" stroke="#94A3B8" stroke-width="1.5"/><line x1="220" y1="80" x2="250" y2="80" stroke="#94A3B8" stroke-width="1.5"/><line x1="330" y1="80" x2="360" y2="80" stroke="#94A3B8" stroke-width="1.5"/><line x1="450" y1="80" x2="480" y2="80" stroke="#94A3B8" stroke-width="1.5"/><line x1="560" y1="80" x2="590" y2="80" stroke="#94A3B8" stroke-width="1.5"/><text x="350" y="130" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">\u2191 Data flow \u2192 \u2191 Value flow (KT) \u2190</text><text x="350" y="150" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="system-ui">3GPP-aligned CHF integration for real-time token valuation</text></svg>'+
'<div class="callout"><strong>Why this matters:</strong> As AI inference moves from application-layer to network-native infrastructure, telecom providers need pricing models that reflect the actual cost and value of AI workloads. KT provides this through dynamic exchange rates tied to network state.</div>'+
'<div class="sec-title">Edge vs. Cloud Token Economics</div>'+
'<div class="comparator"><div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.08);color:var(--success)">Edge Inference</div><div class="comp-body"><strong>Latency:</strong> Low (\u22645ms)<br><strong>Token cost:</strong> Lower per-token<br><strong>Best for:</strong> Real-time, high-volume<br><strong>Constraint:</strong> Limited model size</div></div><div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Cloud Inference</div><div class="comp-body"><strong>Latency:</strong> Higher (50\u2013200ms)<br><strong>Token cost:</strong> Higher per-token<br><strong>Best for:</strong> Complex reasoning<br><strong>Constraint:</strong> Network dependency</div></div></div>'+
'<details class="deeper"><summary>Deep Dive: KT Exchange Rate Mechanics</summary><div class="deeper-body"><p>The KT exchange rate is computed from four primary inputs that are continuously monitored and updated. <strong>Network load</strong> measures current utilization across compute, bandwidth, and spectrum resources at the relevant edge node \u2014 high load increases token costs because guaranteed-latency resources become scarcer. <strong>QoS class</strong> determines the baseline multiplier: a URLLC (Ultra-Reliable Low-Latency Communication) token carries a higher base rate than a best-effort token because the network must reserve resources to guarantee its delivery. <strong>Application type</strong> applies a criticality weight \u2014 safety-critical applications (autonomous vehicles, remote surgery) carry a premium that reflects the societal cost of failure. <strong>Time of day</strong> captures temporal demand patterns, with rates typically 2\u20133x higher during peak hours than overnight off-peak windows.</p><p>Rate propagation follows a hierarchical model aligned with network topology. Edge nodes compute local rates based on their immediate resource state. Aggregation points synthesize rates across multiple edge nodes to produce regional rates. The core network maintains a global rate index that reflects system-wide demand. When a KT-priced inference request arrives, the applicable rate is the composition of the local edge rate, the regional transport rate, and any cross-network settlement rates if the request traverses multiple operators. This hierarchical computation ensures that rates reflect actual conditions at every point in the delivery path, not just an average.</p><p><strong>Inter-operator settlement</strong> is one of KT\u2019s most significant innovations for multi-operator environments. When an AI inference request originates on one operator\u2019s network but is served by an edge node on another operator\u2019s network (because it\u2019s geographically closer), KT provides a standardized settlement mechanism. The originating operator charges the consumer at its local rate, pays the serving operator at the serving operator\u2019s local rate, and retains the difference as a routing fee. This creates economic incentives for operators to deploy edge AI nodes where they\u2019re most needed, not just where their own subscribers are concentrated, because they can earn revenue from any operator\u2019s traffic.</p><p>The economic incentives created by KT\u2019s exchange-rate model are self-reinforcing. Application developers are incentivized to design AI workloads that are latency-flexible (accepting variable latency in exchange for lower cost) because this reduces their KT spend during peak periods. Network operators are incentivized to deploy edge compute in high-demand locations because they earn more KT revenue from guaranteed-latency tokens in congested areas. Consumers benefit from pricing that reflects actual value \u2014 routine AI tasks (recommendations, content generation) cost little, while critical AI tasks (safety systems, real-time control) cost more but receive guaranteed resources. The system naturally balances demand across time and geography without centralized planning.</p></div></details>'+
'<div class="case-box"><div class="case-title">\uD83D\uDCD6 Case Study: KT in Practice \u2014 Pricing AI Inference for Connected Vehicles</div><div class="case-text"><dl style="margin:0"><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Situation</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">A connected vehicle generates two fundamentally different AI workloads over the same 5G connection: real-time edge inference for object detection (identifying pedestrians, vehicles, and obstacles at 30 frames per second) and in-car entertainment AI (generating personalized music playlists and providing conversational navigation assistance). Both workloads involve AI inference over the cellular network, but their cost to serve and value to the customer are categorically different.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">KT Computation: Safety Inference</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The object detection inference requires: URLLC network slice with sub-2ms guaranteed latency, edge compute within 5km of the vehicle (on the nearest MEC node), 99.999% reliability (missed frames could mean missed obstacles), and continuous operation at 30 inferences/second. KT computation: base compute cost (0.3 KT per inference) \u00d7 URLLC QoS multiplier (8x) \u00d7 safety-critical application weight (3x) = <strong>7.2 KT per inference</strong>. At 30 fps, this totals 216 KT per second, or approximately $0.043/second at baseline exchange rates. During peak congestion (rush hour), the exchange rate doubles, increasing the cost to $0.086/second.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">KT Computation: Entertainment Inference</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">The entertainment AI requires: eMBB network slice with sub-500ms latency (acceptable for conversational interaction), cloud or regional edge compute (no proximity requirement), best-effort reliability (a delayed playlist recommendation is inconvenient, not dangerous), and sporadic operation (a few inferences per minute). KT computation: base compute cost (0.3 KT per inference) \u00d7 eMBB QoS multiplier (1.5x) \u00d7 entertainment application weight (0.5x) = <strong>0.225 KT per inference</strong>. At 5 inferences per minute, this totals 1.125 KT/minute, or approximately $0.0002/second \u2014 roughly 200x cheaper than the safety inference.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">How Exchange Rates Reflect Cost and Value</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7">During rush hour, when roads are congested and safety inference demand peaks, KT exchange rates for URLLC tokens increase because guaranteed-latency edge compute is scarce. The vehicle\u2019s safety system continues operating at the higher rate because the value (preventing accidents) vastly exceeds the cost. The entertainment system automatically degrades to a lower QoS tier (switching from eMBB to best-effort) to reduce cost, accepting slightly longer response times for playlist recommendations. This dynamic pricing ensures that safety-critical workloads always have the resources they need, while cost-sensitive workloads naturally shift to cheaper tiers during peak demand.</dd><dt style="font-weight:700;color:var(--tx-primary);margin-top:12px">Lessons Learned</dt><dd style="margin:0 0 0 0;color:var(--tx-secondary);line-height:1.7"><strong>1.</strong> Consequence-based pricing correctly differentiates workloads that per-byte pricing treats identically. <strong>2.</strong> The 200x price differential between safety and entertainment inference accurately reflects the cost and value difference. <strong>3.</strong> Exchange-rate dynamics enable automatic load balancing without centralized control. <strong>4.</strong> Application-level QoS awareness (the vehicle\u2019s software knowing which workloads can degrade) is essential for cost optimization. <strong>5.</strong> KT pricing creates economic incentives for automakers to design efficient inference pipelines, reducing the per-frame compute requirement and thus the per-frame KT cost.</dd></dl></div></div>'+
'<details class="deeper"><summary>Deep Dive: Network Slicing for AI Workloads</summary><div class="deeper-body"><p>A <strong>network slice</strong> is a logically isolated virtual network running on shared physical infrastructure, configured with specific performance characteristics (latency, bandwidth, reliability) to serve a particular use case. 5G introduced network slicing as a core architectural feature, and AI inference workloads are among its most important applications. Different AI workloads have fundamentally different network requirements: real-time object detection needs ultra-low latency (sub-5ms) and high reliability (99.999%), model update distribution needs high throughput but can tolerate latency, and batch analytics processing needs neither low latency nor high throughput but benefits from low cost.</p><p>KT maps AI inference workloads to slice requirements through a <strong>workload classification</strong> layer that analyzes each inference request\u2019s characteristics. A real-time safety inference (e.g., pedestrian detection for an autonomous vehicle) is routed to the URLLC slice with guaranteed sub-2ms latency. A conversational AI query from a smartphone is routed to an enhanced Mobile Broadband (eMBB) slice with moderate latency guarantees. A batch model evaluation job is routed to a best-effort slice that uses whatever resources are available after higher-priority slices are served. Each slice has its own KT pricing tier, with URLLC tokens costing 10\u201350x more than best-effort tokens, reflecting the actual cost of providing those guarantees.</p><p>For AI application architects, understanding network slicing is becoming a core design skill. An application that blindly sends all inference requests through the highest-QoS (and most expensive) slice is wasting money on requests that don\u2019t need guaranteed latency. A well-designed application classifies its own inference requests by urgency and routes them to the appropriate slice: safety-critical inferences to URLLC, user-facing interactive inferences to eMBB, and background analytics to best-effort. This \u201Cslice-aware\u201D design can reduce KT costs by 60\u201380% compared to single-slice approaches, making the difference between economically viable and unsustainable edge AI deployments.</p><p>The progression toward 6G will enable <strong>dynamic slicing</strong> where slice configurations adapt in real-time to workload demands. Rather than pre-configured static slices, 6G networks will allocate resources dynamically based on incoming demand \u2014 spinning up additional URLLC capacity during rush hour when autonomous vehicles are active, and reallocating those resources to batch processing overnight. KT\u2019s exchange-rate model naturally supports this dynamism: as URLLC resources become scarcer, their KT price increases, encouraging latency-tolerant workloads to migrate to other slices, automatically freeing resources for the applications that need them most.</p></div></details>';

return '<div class="sec-title">Why Interpretability Matters</div>'+'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Why does interpretability matter? Because AI systems are making consequential decisions \u2014 medical diagnoses, loan approvals, content moderation, criminal risk assessments \u2014 and we cannot explain <em>why</em> they make the decisions they do. A neural network with hundreds of billions of parameters produces outputs through a computation so complex that no human can trace it. <strong style="color:var(--primary)">Mechanistic interpretability</strong> is the research program aimed at changing this: reverse-engineering the internal computations of neural networks to understand what they\u2019ve learned and how they reason, at the level of individual features and circuits rather than statistical input-output correlations.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">Anthropic\u2019s research using <strong style="color:var(--primary)">sparse autoencoders</strong> has produced the most significant interpretability results to date. The technique works by training a separate neural network (the autoencoder) to decompose a language model\u2019s internal activations into a dictionary of interpretable features. Each feature corresponds to a human-understandable concept that the model has learned \u2014 features for specific topics (\u201CGolden Gate Bridge\u201D), abstract properties (\u201Cdeception,\u201D \u201Csycophancy\u201D), behavioral patterns (\u201Crefusing harmful requests\u201D), and even meta-cognitive states (\u201Cuncertainty about factual claims\u201D). The discovery that models contain discrete, identifiable features for abstract concepts like deception was a breakthrough \u2014 it means we can potentially detect and suppress deceptive behavior at the feature level.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px"><strong style="color:var(--primary)">Superposition</strong> is the core challenge that makes neural network interpretation so difficult. Neural networks represent far more concepts than they have dimensions \u2014 a model with 10,000 dimensions might encode 100,000+ distinct features by overlapping them in the same representational space, much like multiple radio stations broadcasting on overlapping frequencies. This means that any individual neuron participates in representing many different features simultaneously, and any individual feature is distributed across many neurons. Disentangling these overlapping representations is what sparse autoencoders accomplish, but the process is computationally expensive and the feature dictionaries are incomplete.</p>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">The <strong style="color:var(--primary)">safety connection</strong> is direct: if you can identify features that correspond to undesirable behaviors, you can suppress them. Anthropic has demonstrated \u201Cfeature steering\u201D \u2014 artificially amplifying or suppressing specific features to change model behavior in predictable ways. Amplifying the \u201CGolden Gate Bridge\u201D feature causes the model to mention the bridge in every response. More practically, suppressing features associated with harmful content or deceptive reasoning could provide a mechanistic safety layer that works at the representation level rather than relying on pattern-matched content filters. Similarly, tracing the circuits through which hallucinations propagate could enable targeted fixes rather than broad patches. Interpretability thus offers a path toward AI safety that is grounded in understanding rather than behavioral training alone.</p>'+
'<div class="sec-title">The Black Box Problem</div>'+
'<p style="font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-bottom:16px">We built the most capable systems in history, and we don\u2019t fully understand how they work. <strong style="color:var(--primary)">Mechanistic interpretability</strong> aims to change this by finding meaningful units (\u201Cfeatures\u201D) inside neural networks. Anthropic\u2019s research uses sparse autoencoders to decompose model activations into interpretable features \u2014 like finding individual \u201Cconcepts\u201D the model has learned.</p>'+

ext><line x1="140" y1="72" x2="160" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="270" y1="72" x2="290" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="400" y1="72" x2="420" y2="72" stroke="#94A3B8" stroke-width="1.5"/><line x1="530" y1="72" x2="550" y2="72" stroke="#94A3B8" stroke-width="1.5"/><text x="350" y="130" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">Anthropic\u2019s Frontier Safety Roadmap: provable inference + comprehensive logging + red-teaming</text></svg>'+
