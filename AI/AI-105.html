{term:'Activation Function',cat:'ML Fundamentals',def:'Mathematical function introducing non-linearity to neural networks.',why:'Enables networks to learn complex, non-linear patterns.',rel:['Neural Network']},
{term:'Backpropagation',cat:'ML Fundamentals',def:'Algorithm calculating how each weight contributed to errors, enabling learning.',why:'The core mechanism that makes neural network training possible.',rel:['Gradient Descent']},
{term:'Gradient Descent',cat:'ML Fundamentals',def:'Optimization algorithm iteratively adjusting weights to reduce error.',why:'The fundamental optimization method for training neural networks.',rel:['Backpropagation','Learning Rate']},
{term:'Learning Rate',cat:'ML Fundamentals',def:'Controls how much to adjust weights at each step.',why:'A critical hyperparameter \u2014 too high causes instability, too low causes slow learning.',rel:['Gradient Descent']},
{term:'Loss Function',cat:'ML Fundamentals',def:'Formula measuring how wrong predictions are. Training minimizes this.',why:'Defines what "good performance" means for the training process.',rel:['Training']},
{term:'Transfer Learning',cat:'ML Fundamentals',def:'Adapting a model trained on one task for a different but related task.',why:'Enables fine-tuning pre-trained models for specific applications.',rel:['Fine-Tuning']},
{term:'Epoch',cat:'ML Fundamentals',def:'One complete pass through the entire training dataset.',why:'Training typically requires multiple epochs for convergence.',rel:['Batch Size','Training']},
{term:'Batch Size',cat:'ML Fundamentals',def:'Number of training examples processed together before updating weights.',why:'Affects training speed, memory usage, and generalization.',rel:['Epoch']},
{term:'Feature Engineering',cat:'ML Fundamentals',def:'Selecting or creating input features to improve model performance.',why:'Critical for traditional ML; less important with deep learning.',rel:['Training Data']},
{term:'Data Augmentation',cat:'ML Fundamentals',def:'Creating modified copies of training data to increase size and diversity.',why:'Reduces overfitting and improves model robustness.',rel:['Training Data','Synthetic Data']},
{term:'Generative AI (GenAI)',cat:'GenAI',def:'AI systems that create new content \u2014 text, images, audio, video, code.',why:'The category that includes LLMs, diffusion models, and all content-creating AI.',rel:['Large Language Model']},
{term:'Large Language Model (LLM)',cat:'GenAI',def:'A generative model trained on massive text to understand and generate language.',why:'The foundation of ChatGPT, Claude, Gemini, and modern AI assistants.',rel:['Transformer','Token']},
{term:'Transformer',cat:'GenAI',def:'The 2017 architecture powering virtually all modern LLMs via attention mechanisms.',why:'The "Attention Is All You Need" breakthrough that made modern AI possible.',rel:['Attention Mechanism']},
{term:'Attention Mechanism',cat:'GenAI',def:'Technique allowing models to weigh importance of every element relative to every other.',why:'The key innovation enabling models to understand context and relationships.',rel:['Transformer','Self-Attention']},
{term:'Token',cat:'GenAI',def:'Sub-word unit that LLMs process. Common words \u2248 1 token; longer words split.',why:'Everything in LLMs is measured in tokens: context windows, pricing, speed.',rel:['Tokenization','Context Window']},
{term:'Context Window',cat:'GenAI',def:'Maximum tokens a model can process in one interaction (input + output).',why:'Determines how much information the model can consider. Now reaching 10M tokens.',rel:['Token','Context Window Scaling']},
{term:'Temperature',cat:'GenAI',def:'Controls output randomness. Low (0.0) = deterministic. High (1.0) = creative.',why:'One of the most important generation parameters for controlling output style.',rel:['Sampling']},
{term:'Top-p (Nucleus Sampling)',cat:'GenAI',def:'Limits the token pool considered at each step, controlling diversity.',why:'A more nuanced way to control generation randomness than temperature alone.',rel:['Temperature','Sampling']},
{term:'Embedding',cat:'GenAI',def:'Numerical vector representation of text where similar meanings have similar vectors.',why:'The foundation for semantic search, RAG, and understanding meaning.',rel:['Vector','Cosine Similarity']},
{term:'Vector',cat:'GenAI',def:'A list of numbers representing content in mathematical space.',why:'The universal format for representing meaning in AI systems.',rel:['Embedding']},
{term:'Hallucination',cat:'GenAI',def:'When AI generates confident, plausible content that is factually incorrect.',why:'The most significant trust challenge in deploying AI.',rel:['Grounding']},
{term:'Grounding',cat:'GenAI',def:'Connecting AI output to verifiable source material.',why:'The primary defense against hallucination in production systems.',rel:['RAG','Hallucination']},
{term:'Fine-Tuning',cat:'GenAI',def:'Further training a pre-trained model on specific data to specialize behavior.',why:'How organizations customize general models for their specific needs.',rel:['Transfer Learning']},
{term:'RLHF',cat:'GenAI',def:'Reinforcement Learning from Human Feedback \u2014 aligning models with human preferences.',why:'The primary technique for making raw LLMs helpful and safe.',rel:['Preference Optimization (DPO)','Constitutional AI']},
{term:'Knowledge Cutoff',cat:'GenAI',def:'The date beyond which a model has no training data.',why:'Models don\'t know about events after their training cutoff.',rel:['Training Data']},
{term:'Sampling',cat:'GenAI',def:'Process by which the model selects the next token from the probability distribution.',why:'Controls the trade-off between consistency and creativity.',rel:['Temperature','Top-p (Nucleus Sampling)']},
{term:'Tokenization',cat:'GenAI',def:'Converting text into tokens for model processing.',why:'The first step in any LLM interaction.',rel:['Token','Tokenizer']},
{term:'Streaming',cat:'GenAI',def:'Delivering AI response token by token as generated.',why:'Dramatically improves perceived speed and user experience.',rel:['Inference']},
{term:'Benchmark',cat:'GenAI',def:'Standardized test to evaluate and compare model performance.',why:'How we measure and compare model capabilities.',rel:['Benchmark Contamination']},
{term:'Constitutional AI',cat:'GenAI',def:'Anthropic\'s technique where the model self-critiques against principles before responding.',why:'A key approach to AI alignment that reduces dependence on human reviewers.',rel:['RLHF','Alignment']},
{term:'Distillation',cat:'GenAI',def:'Training a smaller model to mimic a larger one.',why:'Creates compact models retaining most capability at lower cost.',rel:['Quantization']},
{term:'Instruction Tuning',cat:'GenAI',def:'Fine-tuning on instruction-response pairs to improve direction-following.',why:'What makes models actually follow your instructions.',rel:['Fine-Tuning']},
{term:'Mixture of Experts (MoE)',cat:'GenAI',def:'Architecture with specialized sub-networks; a router activates only relevant experts per query.',why:'Enables very large models with efficient inference by activating only needed parts.',rel:['Transformer']},
{term:'Quantization',cat:'GenAI',def:'Reducing weight precision (e.g., 32-bit to 4-bit) to make models smaller and faster.',why:'Critical for deploying models on edge devices and reducing inference costs.',rel:['Distillation','TinyML']},
{term:'Reward Model',cat:'GenAI',def:'A model trained on human preferences to score AI output quality.',why:'The feedback mechanism in RLHF that guides model alignment.',rel:['RLHF']},
{term:'Multi-modal',cat:'GenAI',def:'AI models that process and generate multiple content types \u2014 text, images, audio, video.',why:'Modern frontier models are increasingly multi-modal.',rel:['Large Language Model']},
{term:'Diffusion Model',cat:'GenAI',def:'A GenAI model for image generation that works by learning to remove noise.',why:'Powers DALL-E, Midjourney, and Stable Diffusion.',rel:['Generative AI']},
{term:'Preference Optimization (DPO)',cat:'GenAI',def:'Direct Preference Optimization \u2014 simpler alternative to RLHF.',why:'Optimizes directly on preference pairs without a separate reward model.',rel:['RLHF']},
{term:'Safety Filter',cat:'GenAI',def:'System screening AI inputs/outputs for harmful or policy-violating content.',why:'A critical layer in responsible AI deployment.',rel:['Guardrails']},
{term:'Prompt',cat:'Prompting',def:'The input you give to an AI model.',why:'Your primary interface with AI \u2014 the quality of the prompt shapes the output.',rel:['Prompt Engineering']},
{term:'Prompt Engineering',cat:'Prompting',def:'Designing and refining prompts for best output.',why:'The skill that multiplies AI effectiveness.',rel:['Few-Shot','Chain-of-Thought (CoT)']},
{term:'Zero-Shot',cat:'Prompting',def:'Asking the AI to perform a task without examples.',why:'Tests the model\'s built-in understanding.',rel:['Few-Shot']},
{term:'Few-Shot',cat:'Prompting',def:'Providing a few examples of desired input-output pattern.',why:'Dramatically improves output quality for specialized tasks.',rel:['Zero-Shot']},
{term:'Chain-of-Thought (CoT)',cat:'Prompting',def:'Prompting the AI to think step by step before answering.',why:'The prompting analog to test-time compute reasoning.',rel:['Test-Time Compute']},
{term:'System Prompt',cat:'Prompting',def:'Hidden instructions defining AI behavior before your conversation.',why:'Sets the context and constraints for all interactions.',rel:['Prompt']},
{term:'API',cat:'Infrastructure',def:'Interface for sending prompts to AI models and receiving responses.',why:'How AI is integrated into production applications.',rel:['Model']},
{term:'Model',cat:'Infrastructure',def:'The trained AI system (e.g., Claude Opus 4, GPT-4o).',why:'The core capability component in any AI application.',rel:['LLM','Fine-Tuning']},
{term:'Open-Source Model',cat:'Infrastructure',def:'AI model with publicly available weights and code (e.g., Llama, Mistral, DeepSeek).',why:'Enables on-premise deployment and community innovation.',rel:['Proprietary Model']},
{term:'Proprietary Model',cat:'Infrastructure',def:'AI model accessible only through a company\'s API (e.g., Claude, GPT).',why:'Typically offers higher capabilities but with vendor dependency.',rel:['Open-Source Model']},
{term:'Latency',cat:'Infrastructure',def:'Time delay between sending a prompt and receiving a response.',why:'Critical for real-time applications and user experience.',rel:['Inference']},
{term:'RAG',cat:'Protocols',def:'Retrieval-Augmented Generation \u2014 retrieving documents before generating responses.',why:'The primary technique for grounding AI in specific knowledge.',rel:['Vector Database','Grounding']},
{term:'Vector Database',cat:'Protocols',def:'Database optimized for storing and searching vector embeddings.',why:'The infrastructure for semantic search and RAG systems.',rel:['Embedding','RAG']},
{term:'MCP',cat:'Protocols',def:'Model Context Protocol \u2014 open standard for connecting AI to tools and services. 97M installs.',why:'Becoming the TCP/IP of AI connectivity.',rel:['Function Calling']},
{term:'Function Calling / Tool Use',cat:'Protocols',def:'AI invoking external tools as part of generating a response.',why:'Enables AI to take actions in the real world.',rel:['MCP','Agent']},
{term:'Cosine Similarity',cat:'Protocols',def:'Measuring how similar two vectors are by the angle between them.',why:'The standard similarity metric for embedding-based search.',rel:['Embedding','Vector']},
{term:'Chunking Strategy',cat:'Protocols',def:'How documents are split into pieces for embedding and RAG.',why:'Chunk size and overlap significantly affect retrieval quality.',rel:['RAG']},
{term:'Agent (AI Agent)',cat:'Agents',def:'AI system that autonomously plans, uses tools, and takes multi-step actions.',why:'The paradigm shift from AI as chat to AI as worker.',rel:['Agent Loop','Multi-Agent Systems']},
{term:'Copilot',cat:'Agents',def:'AI assistant integrated into a software tool providing suggestions.',why:'The intermediate step between passive AI and autonomous agents.',rel:['Agent']},
{term:'Agent Loop',cat:'Agents',def:'Iterative cycle: observe, plan, act, evaluate, repeat.',why:'The fundamental operating pattern of all AI agents.',rel:['Agent','Planning']},
{term:'Planning (Agentic)',cat:'Agents',def:'Agent\'s ability to break tasks into ordered subtasks and select tools.',why:'What separates agents from simple chatbots.',rel:['Agent Loop']},
{term:'Multi-Agent Systems',cat:'Agents',def:'Architectures where multiple specialized agents collaborate.',why:'Enables complex workflows beyond single-agent capabilities.',rel:['Agent','Tool Orchestration']},
{term:'Human-in-the-Loop',cat:'Agents',def:'Design pattern where agents request human approval before irreversible actions.',why:'Critical safety pattern for high-stakes agent deployments.',rel:['Agent']},
{term:'Bias (in AI)',cat:'Ethics',def:'Systematic errors reflecting imbalances in training data or design.',why:'Can perpetuate or amplify societal inequalities.',rel:['Responsible AI']},
{term:'Alignment',cat:'Ethics',def:'Ensuring AI behaves in accordance with human values.',why:'The central challenge of AI safety research.',rel:['Constitutional AI','RLHF']},
{term:'Guardrails',cat:'Ethics',def:'Built-in restrictions preventing harmful AI output.',why:'Essential safety layer in production AI systems.',rel:['Safety Filter']},
{term:'Responsible AI',cat:'Ethics',def:'Practices ensuring ethical, fair, transparent AI use.',why:'Framework for deploying AI that benefits rather than harms.',rel:['Bias (in AI)','Alignment']},
{term:'Red-Teaming',cat:'Ethics',def:'Deliberately trying to make AI fail to identify vulnerabilities.',why:'How we find and fix safety issues before deployment.',rel:['Guardrails']},
{term:'Semantic Search',cat:'Workflow',def:'Search matching by meaning rather than exact keywords.',why:'Finds relevant results even when wording differs.',rel:['Embedding','Vector Database']},
{term:'Evaluation (of AI output)',cat:'Workflow',def:'Systematically assessing quality and accuracy of AI-generated content.',why:'The skill that makes the difference between useful and harmful AI.',rel:['Human-in-the-Loop']},
{term:'Test-Time Compute',cat:'Frontier Research',def:'Spending more computation during inference through extended reasoning chains.',why:'The third scaling axis that powers reasoning models like o1/o3.',rel:['Reasoning Model','Thinking Tokens']},
{term:'Thinking Tokens',cat:'Frontier Research',def:'Internal reasoning chain tokens generated during inference by reasoning models.',why:'The mechanism that enables step-by-step problem solving.',rel:['Test-Time Compute','Reasoning Model']},
{term:'Reasoning Model',cat:'Frontier Research',def:'AI model that uses extended inference-time computation to solve complex problems.',why:'Dramatically better for hard problems at the cost of higher latency and price.',rel:['Test-Time Compute']},
{term:'Context Window Scaling',cat:'Frontier Research',def:'The progression from 4K to 10M+ token context windows.',why:'Collapses the "RAG wall" and changes fundamental architecture decisions.',rel:['Context Window','RAG']},
{term:'Model Collapse',cat:'Frontier Research',def:'Progressive quality degradation from AI training on its own output.',why:'A fundamental risk of synthetic data that could degrade future models.',rel:['Synthetic Data']},
{term:'Data Poisoning',cat:'Frontier Research',def:'Adversarial attacks corrupting training data to cause incorrect model behavior.',why:'Security threat to training pipelines. Nightshade is a notable example.',rel:['Nightshade','Training Data']},
{term:'Benchmark Contamination',cat:'Frontier Research',def:'Models trained on data that includes their own test sets, inflating scores.',why:'Makes published benchmarks unreliable for actual capability assessment.',rel:['Benchmark']},
{term:'Synthetic Data',cat:'Frontier Research',def:'Training data generated by AI models themselves.',why:'Offers unlimited scale but risks model collapse without quality filtering.',rel:['Model Collapse','Data Augmentation']},
{term:'Nightshade',cat:'Frontier Research',def:'An adversarial data poisoning attack that corrupts training data.',why:'Demonstrates the vulnerability of training pipelines to targeted attacks.',rel:['Data Poisoning']},
{term:'Scaling Laws',cat:'Frontier Research',def:'Predictable power law relationships between compute, parameters, data, and model performance.',why:'The theoretical foundation for the "bigger is better" era.',rel:['Compute-Optimal Training','Bitter Lesson']},
{term:'Compute-Optimal Training',cat:'Frontier Research',def:'The Chinchilla finding that models should be trained on much more data than previously used.',why:'Redefined how labs allocate compute budgets between model size and data.',rel:['Scaling Laws']},
{term:'Bitter Lesson',cat:'Frontier Research',def:'Rich Sutton\'s principle that general methods leveraging scale always beat clever engineering.',why:'The philosophical foundation for modern AI scaling strategy.',rel:['Scaling Laws']},
{term:'Subliminal Learning',cat:'Frontier Research',def:'Models transmitting behavioral traits through semantically unrelated data.',why:'A concerning finding suggesting hidden channels for unintended influence.',rel:['Agentic Misalignment']},
{term:'Mechanistic Interpretability',cat:'Frontier Research',def:'Finding meaningful, interpretable units inside neural networks.',why:'The path to understanding what models actually learn and why they behave as they do.',rel:['Sparse Autoencoder','Feature Circuits']},
{term:'Sparse Autoencoder',cat:'Frontier Research',def:'Neural network used to decompose model activations into interpretable features.',why:'Key tool in Anthropic\'s interpretability research program.',rel:['Mechanistic Interpretability','Superposition']},
{term:'Superposition',cat:'Frontier Research',def:'Neural networks representing more concepts than dimensions, causing features to overlap.',why:'The core challenge making neural networks hard to interpret.',rel:['Sparse Autoencoder']},
{term:'Feature Circuits',cat:'Frontier Research',def:'Traceable pathways showing how features compose to produce model behaviors.',why:'Gives mechanistic understanding of why models behave the way they do.',rel:['Mechanistic Interpretability']},
{term:'Frontier Safety',cat:'Frontier Research',def:'Safety research and practices for the most capable AI models.',why:'As models become more powerful, safety becomes more critical and complex.',rel:['Alignment','Red-Teaming']},
{term:'Agentic Misalignment',cat:'Frontier Research',def:'AI agents pursuing goals that diverge from human intentions.',why:'The risk that autonomous agents may not act as intended, especially at scale.',rel:['Scheming','Alignment']},
{term:'Scheming (AI)',cat:'Frontier Research',def:'Models engaging in deceptive strategic behavior to achieve goals.',why:'Anthropic Fellows found frontier models scheming in simulated environments.',rel:['Agentic Misalignment']},
{term:'World Model',cat:'Frontier Research',def:'AI building internal representations of how reality works.',why:'Could enable genuine causal understanding rather than just pattern matching.',rel:['Continual Learning','Physical AI']},
{term:'Continual Learning',cat:'Frontier Research',def:'Models that learn and adapt post-deployment without full retraining.',why:'Would allow AI to stay current and adapt to local conditions autonomously.',rel:['World Model']},
{term:'Lift-Off Phase',cat:'Frontier Research',def:'The current period of exponential AI capability gains accelerating faster than predicted.',why:'Defines the urgency of safety research and adoption planning.',rel:['AGI']},
{term:'Agent Interoperability',cat:'Agentic Economy',def:'Open standards enabling agent-to-agent communication across platforms.',why:'Required for agents from different providers to discover and transact with each other.',rel:['Agent Economy']},
{term:'Agent Economy',cat:'Agentic Economy',def:'An ecosystem where AI agents discover, negotiate, and exchange services on behalf of humans.',why:'The emerging economic model where agents handle commerce autonomously.',rel:['Agent Interoperability','A2B (Agent-to-Business)']},
{term:'Delegation Token',cat:'Agentic Economy',def:'Authorization credential proving an agent acts on behalf of a specific person.',why:'The trust mechanism enabling agents to transact with verified authority.',rel:['Agent Authentication','Permission Scoping']},
{term:'Agent Authentication',cat:'Agentic Economy',def:'Verifying an AI agent\'s identity and authorization to act for a user.',why:'Essential for preventing unauthorized agent actions in commerce.',rel:['Delegation Token']},
{term:'A2B (Agent-to-Business)',cat:'Agentic Economy',def:'The interaction model where AI agents transact with businesses on behalf of consumers.',why:'Replaces traditional H2B (human-to-business) interaction patterns.',rel:['Agent Economy']},
{term:'Provable Inference',cat:'Agentic Economy',def:'Cryptographically signing model outputs to verify they came from a specific model.',why:'Creates audit trails and enables liability attribution in agent transactions.',rel:['Delegation Token']},
{term:'Permission Scoping',cat:'Agentic Economy',def:'Defining granular authorization limits for agent actions (what, how much, how long).',why:'Prevents agents from exceeding intended boundaries.',rel:['Delegation Token','Rogue Agent']},
{term:'Agent Identity',cat:'Agentic Economy',def:'Standards for verifying that an agent legitimately represents a specific person.',why:'The trust foundation for the entire agentic economy.',rel:['Agent Authentication']},
{term:'Rogue Agent',cat:'Agentic Economy',def:'An AI agent that makes unauthorized or unintended actions.',why:'The central risk in autonomous agent systems requiring new fraud detection.',rel:['Permission Scoping']},
{term:'Consent Framework',cat:'Agentic Economy',def:'Structured approach for agents to obtain and verify user consent for actions.',why:'Bridges the gap between human intent and agent execution.',rel:['Permission Scoping']},
{term:'TinyML',cat:'Edge & Network AI',def:'Machine learning on microcontrollers with sub-256KB RAM and sub-1mW power.',why:'Enables intelligence in the smallest, most power-constrained devices.',rel:['Edge Inference','Neural Accelerator']},
{term:'Edge Inference',cat:'Edge & Network AI',def:'Running AI models on local devices rather than cloud servers.',why:'Provides low latency, privacy, and offline capability.',rel:['TinyML','On-Device Learning']},
{term:'TinyLLM',cat:'Edge & Network AI',def:'Language model capabilities compressed to run on constrained edge devices.',why:'Brings natural language understanding to devices without cloud connectivity.',rel:['TinyML','Quantization']},
{term:'On-Device Learning',cat:'Edge & Network AI',def:'Models that adapt and improve post-deployment without cloud connectivity.',why:'Enables AI that personalizes to local conditions autonomously.',rel:['Continual Learning','TinyML']},
{term:'Neuromorphic Computing',cat:'Edge & Network AI',def:'Computing architecture using event-driven spiking neural networks mimicking biological neurons.',why:'Potentially 100x more energy-efficient than traditional approaches.',rel:['Neural Accelerator']},
{term:'Neural Accelerator',cat:'Edge & Network AI',def:'Dedicated hardware chip optimized for neural network inference.',why:'Enables efficient AI computation on resource-constrained devices.',rel:['TinyML']},
{term:'Edge AI Foundation',cat:'Edge & Network AI',def:'Organization (rebranded from TinyML Foundation in 2026) advancing edge AI.',why:'Reflects the expanding scope of AI at the edge beyond strictly "tiny" devices.',rel:['TinyML']},
{term:'Kinetic Token',cat:'Edge & Network AI',def:'Consequence-based token monetization framework for 5G/6G AI workloads.',why:'Dynamic pricing model connecting AI inference costs to network conditions.',rel:['Exchange-Rate Pricing','Network-Native AI']},
{term:'Exchange-Rate Pricing',cat:'Edge & Network AI',def:'Dynamic token valuation based on network conditions, QoS, and resource consumption.',why:'Makes AI inference pricing reflect actual cost and value.',rel:['Kinetic Token']},
{term:'Network-Native AI',cat:'Edge & Network AI',def:'AI moving from application-layer to embedded network infrastructure.',why:'Changes the role of telecom providers from connectivity to AI platform.',rel:['Kinetic Token']},
{term:'Physical AI',cat:'Frontier Research',def:'NVIDIA\'s concept: AI that understands and interacts with the physical world.',why:'The convergence of perception, reasoning, and physical action.',rel:['World Model','Robotics']},
{term:'Quantum Advantage',cat:'Frontier Research',def:'When quantum computers outperform classical computers on practical problems.',why:'IBM\'s 2026 milestone proves real-world benefit for specific optimization tasks.',rel:['Hybrid Quantum-Classical']},
{term:'Hybrid Quantum-Classical',cat:'Frontier Research',def:'Computing architecture combining quantum processors with classical systems.',why:'The practical approach to quantum computing \u2014 quantum for specific tasks, classical for everything else.',rel:['Quantum Advantage']},
{term:'AlphaEvolve',cat:'Frontier Research',def:'Google DeepMind system combining evolutionary algorithms and LLMs for algorithm discovery.',why:'AI that discovers new algorithms \u2014 a step toward self-improving AI.',rel:['Physical AI']},
{term:'SaaSpocalypse',cat:'Workflow',def:'Projected $2T enterprise software market disruption as AI replaces per-seat software.',why:'Fundamentally changes how enterprise software is priced and delivered.',rel:['AI-Native Organization']},
{term:'AI-Native Organization',cat:'Workflow',def:'Organization structurally designed around AI-first processes.',why:'The endpoint of AI adoption maturity \u2014 smaller teams, agent-augmented workflows.',rel:['SaaSpocalypse']},
{term:'English Language Programming',cat:'Workflow',def:'Articulating goals in natural language instead of writing code syntax.',why:'10x expansion of who can build software. Democratizes creation.',rel:['AI-Native Organization']},
{term:'Self-Attention',cat:'GenAI',def:'Attention computed within a single sequence where each element attends to all others.',why:'The core computation inside Transformer blocks.',rel:['Attention Mechanism','Cross-Attention']},
{term:'Cross-Attention',cat:'GenAI',def:'Attention between two different sequences (e.g., prompt and response).',why:'How models connect input context to generated output.',rel:['Self-Attention']},
{term:'Positional Encoding',cat:'GenAI',def:'Information added to embeddings so the model knows element order/position.',why:'Transformers have no inherent notion of sequence order without this.',rel:['Transformer']},
{term:'Beam Search',cat:'GenAI',def:'Decoding strategy maintaining multiple candidate sequences to find the best path.',why:'Produces higher-quality text than greedy decoding for many tasks.',rel:['Sampling']},
{term:'Embedding Space',cat:'GenAI',def:'The high-dimensional mathematical space where embeddings live.',why:'Similar concepts cluster together, enabling semantic operations.',rel:['Embedding','Vector']},
{term:'Latent Space',cat:'GenAI',def:'Compressed internal representation capturing essential features of data.',why:'Where models store their learned understanding of concepts.',rel:['Embedding Space']},
{term:'Softmax',cat:'GenAI',def:'Function converting numbers into a probability distribution summing to 1.',why:'Used in attention mechanisms and output token selection.',rel:['Attention Mechanism']},
{term:'Dropout',cat:'ML Fundamentals',def:'Regularization technique randomly deactivating neurons during training.',why:'Prevents overfitting by forcing the network to be robust.',rel:['Overfitting']},
{term:'Residual Connection',cat:'ML Fundamentals',def:'Shortcut connection adding layer input directly to its output.',why:'Enables very deep networks by preventing gradient vanishing.',rel:['Neural Network']},
{term:'Normalization',cat:'ML Fundamentals',def:'Techniques standardizing layer inputs to stabilize and accelerate training.',why:'Critical for training deep Transformer models.',rel:['Training']},
{term:'Tokenizer',cat:'GenAI',def:'Component converting text into tokens and tokens back into text.',why:'The interface between human-readable text and model-processable tokens.',rel:['Token','Tokenization']},
{term:'Speculative Decoding',cat:'GenAI',def:'Small fast model drafts tokens, large model verifies in parallel for speed.',why:'Significant inference speedup without quality loss.',rel:['Inference']},
{term:'Structured Output',cat:'Protocols',def:'AI output in defined format like JSON or specific templates.',why:'Essential for reliable integration of AI into automated systems.',rel:['Function Calling']},
{term:'Hybrid Search',cat:'Protocols',def:'Combining keyword and semantic vector search.',why:'Better retrieval than either approach alone.',rel:['Semantic Search','RAG']},
{term:'Reranking',cat:'Protocols',def:'Using a secondary model to re-score search results after initial retrieval.',why:'Significantly improves RAG quality with minimal additional cost.',rel:['RAG']},
{term:'Reflection (Agents)',cat:'Agents',def:'Agent evaluating its own outputs and deciding whether to revise.',why:'Self-correction capability that improves agent output quality.',rel:['Agent Loop']},
{term:'Tool Orchestration',cat:'Agents',def:'Agent selecting, sequencing, and coordinating multiple tools.',why:'What makes agents capable of complex, multi-step real-world tasks.',rel:['Function Calling','Multi-Agent Systems']},
{term:'Working Memory (Agents)',cat:'Agents',def:'Accumulated context an agent maintains across subtasks within a single run.',why:'Enables coherent multi-step workflows without losing earlier context.',rel:['Agent Loop']},
{term:'Automation Bias',cat:'Ethics',def:'Human tendency to over-rely on automated systems without critical evaluation.',why:'A key risk as AI becomes more trusted and integrated.',rel:['Human-in-the-Loop']},
{term:'Prompt Library',cat:'Workflow',def:'A curated collection of tested, reusable prompt templates.',why:'Organizational knowledge management for AI interactions.',rel:['Prompt Engineering']},
{term:'AGI',cat:'Frontier Research',def:'Artificial General Intelligence \u2014 AI matching human-level intelligence across all domains.',why:'The ultimate goal (or concern) of AI research. Timeline predictions vary wildly.',rel:['Lift-Off Phase']},
{term:'Kernel Trick',cat:'ML Fundamentals',def:'Mathematical technique projecting data into higher dimensions where it becomes linearly separable.',why:'Foundation of SVMs and understanding how models handle complex data.',rel:['Feature Engineering']},
{term:'Gini Impurity',cat:'ML Fundamentals',def:'Measure of how often a randomly chosen element would be misclassified. Used by decision trees.',why:'Core concept for understanding how decision trees choose splits.',rel:['Classification']},
{term:'Cross-Entropy Loss',cat:'ML Fundamentals',def:'Loss function measuring difference between predicted probability distribution and actual labels.',why:'The standard loss function for classification tasks and language models.',rel:['Loss Function','Softmax']},
{term:'Sigmoid Function',cat:'ML Fundamentals',def:'S-shaped function mapping any number to a value between 0 and 1.',why:'Used in binary classification and as activation in neural networks.',rel:['Activation Function']},
{term:'Pooling (CNN)',cat:'ML Fundamentals',def:'Operation reducing spatial dimensions of feature maps by taking max or average value.',why:'Critical for making CNNs computationally feasible for image tasks.',rel:['Neural Network']},
{term:'Knowledge Graph',cat:'Protocols',def:'Structured representation of entities and relationships, used for factual context.',why:'Complements RAG by providing structured factual knowledge for grounding.',rel:['RAG','Grounding']},
{term:'Greedy Decoding',cat:'GenAI',def:'Generating text by always choosing the single most probable next token.',why:'Fastest decoding but produces less diverse, sometimes repetitive output.',rel:['Beam Search','Sampling']},
{term:'Softmax Temperature',cat:'GenAI',def:'Applying temperature scaling to logits before softmax, controlling probability distribution shape.',why:'The mechanism behind the Temperature parameter you set when using AI.',rel:['Temperature','Softmax']},
{term:'Prompt Chaining',cat:'Prompting',def:'Sequential prompts where each output feeds the next for complex multi-step tasks.',why:'Essential technique for breaking complex tasks into manageable steps.',rel:['Prompt Engineering']},
{term:'Role Prompting',cat:'Prompting',def:'Instructing AI to adopt a specific persona or expertise.',why:'Shapes the style, depth, and perspective of AI responses.',rel:['System Prompt']},
{term:'Output Format',cat:'Prompting',def:'Specifying the structure of the AI response (bullets, JSON, markdown, etc.).',why:'Ensures AI output is directly usable in your workflow.',rel:['Structured Output']},
{term:'On-Device vs. Cloud Inference',cat:'Infrastructure',def:'On-device: AI runs locally. Cloud: AI runs on remote servers.',why:'Fundamental architecture choice affecting latency, privacy, cost, and capability.',rel:['Edge Inference','Latency']},

function selectQuizOpt(el){
var qid=el.dataset.qid;if(quizStates[qid])return;
el.parentElement.querySelectorAll('.quiz-opt').forEach(function(o){o.classList.remove('selected');});
el.classList.add('selected');
document.getElementById('btn-'+qid).disabled=false;
}
function checkQuiz(qid,correct,exp){
if(quizStates[qid])return;quizStates[qid]=true;
var card=document.getElementById('qc-'+qid);
var opts=card.querySelectorAll('.quiz-opt');
var selectedVal=null;
opts.forEach(function(o){if(o.classList.contains('selected'))selectedVal=o.dataset.val;});
var isCorrect=String(selectedVal)===String(correct);
opts.forEach(function(o){
o.style.cursor='default';
if(String(o.dataset.val)===String(correct))o.classList.add('right');
else if(o.classList.contains('selected')&&!isCorrect)o.classList.add('wrong');
});
card.classList.add(isCorrect?'correct':'incorrect');
var fb=document.getElementById('fb-'+qid);
fb.className='quiz-fb vis '+(isCorrect?'correct':'incorrect');
fb.innerHTML='<strong>'+(isCorrect?'\u2713 Correct!':'\u2717 Incorrect.')+'</strong> '+exp;
document.getElementById('btn-'+qid).disabled=true;
}
/* === FLOW SIMULATOR === */
function initFlow(id){flowCur[id]=0;renderFlow(id,FLOW_DATA[id]);}
function renderFlow(id,data){
var inner=document.getElementById('flow-inner-'+id);if(!inner)return;
var nc=data.nodes.length;var colors=['#2563EB','#7C3AED','#06B6D4','#F59E0B','#10B981'];
var nodesHtml='<div class="flow-nodes">'+data.nodes.map(function(n,i){
var p=n.split('|');return '<div class="flow-ncol"><div class="flow-nbox" style="border-top-color:'+colors[i%5]+'"><div class="flow-nname">'+p[0]+'</div><div class="flow-ndesc">'+(p[1]||'')+'</div></div></div>';
}).join('')+'</div>';
var step=flowCur[id],total=data.steps.length,rowsHtml='';
data.steps.forEach(function(s,i){
var vis=step===0?'dim':(i<step?'vis':'dim');
var cur=(i===step-1)?'cur':'';
var midCol=(s.f+s.t)/2;var leftPct=((midCol+0.5)/nc*100);
rowsHtml+='<div class="flow-mrow '+vis+' '+cur+'"><div class="flow-lifelines">'+data.nodes.map(function(){return '<div class="flow-ll-col"><div class="flow-ll"></div></div>';}).join('')+'</div><svg class="flow-arrow-svg" data-fi="'+s.f+'" data-ti="'+s.t+'" data-nc="'+nc+'"></svg><div class="flow-mlwrap" style="left:'+leftPct+'%"><div class="flow-mlabel"><div class="flow-msn">'+s.n+'</div><div class="flow-mattr">'+(s.a||[]).slice(0,2).map(function(a){return '<span class="flow-matag">'+a[0]+'</span>';}).join('')+'</div></div></div></div>';
});
var mobHtml='<div class="flow-step-list">';
data.steps.forEach(function(s,i){
var vis=step===0?'dim':(i<step?(i===step-1?'cur':''):'dim');
var fn=data.nodes[s.f].split('|')[0],tn=data.nodes[s.t].split('|')[0];
mobHtml+='<div class="flow-mob-step '+vis+'"><div class="flow-mob-num">'+(i+1)+'</div><div class="flow-mob-content"><div class="flow-mob-name">'+s.n+'</div><div class="flow-mob-dir">'+fn+' \u2192 '+tn+'</div></div></div>';
});mobHtml+='</div>';
inner.innerHTML=nodesHtml+'<div class="flow-msgs">'+rowsHtml+'</div>'+mobHtml;
document.getElementById('flow-ind-'+id).textContent='Step '+step+' / '+total;
var detail=document.getElementById('flow-detail-'+id);
if(step>0&&step<=total){
var s=data.steps[step-1];var fn=data.nodes[s.f].split('|')[0],tn=data.nodes[s.t].split('|')[0];
detail.className='flow-detail vis';
detail.innerHTML='<div class="flow-dmn">'+s.n+'</div><div class="flow-ddir">'+fn+' \u2192 '+tn+'</div><table class="flow-dtbl"><thead><tr><th>Attribute</th><th>Value</th></tr></thead><tbody>'+(s.a||[]).map(function(a){return '<tr><td>'+a[0]+'</td><td>'+a[1]+'</td></tr>';}).join('')+'</tbody></table><div class="flow-dnote">'+s.d+'</div>';
}else{detail.className='flow-detail';}
requestAnimationFrame(function(){drawFlowArrows(id);});
}
function drawFlowArrows(id){
var container=document.getElementById('flow-inner-'+id);if(!container)return;
container.querySelectorAll('.flow-arrow-svg').forEach(function(svg){
var row=svg.parentElement;var fi=parseInt(svg.dataset.fi),ti=parseInt(svg.dataset.ti),nc=parseInt(svg.dataset.nc);
var w=row.offsetWidth,h=row.offsetHeight;if(!w)return;
svg.setAttribute('viewBox','0 0 '+w+' '+h);svg.innerHTML='';
var cw=w/nc,y=h*0.5;
if(fi===ti){
var cx=(fi+0.5)*cw,r=22;
var path=document.createElementNS('http://www.w3.org/2000/svg','path');
path.setAttribute('d','M'+(cx-r)+' '+y+' C'+(cx-r)+' '+(y+r*2.2)+','+(cx+r)+' '+(y+r*2.2)+','+(cx+r)+' '+y);
path.setAttribute('fill','none');path.setAttribute('stroke','var(--accent)');path.setAttribute('stroke-width','2');svg.appendChild(path);
var arrow=document.createElementNS('http://www.w3.org/2000/svg','polygon');
arrow.setAttribute('points',(cx+r)+','+y+' '+(cx+r-5)+','+(y+7)+' '+(cx+r+5)+','+(y+7));
arrow.setAttribute('fill','var(--accent)');svg.appendChild(arrow);
}else{
var x1=(fi+0.5)*cw,x2=(ti+0.5)*cw;
var line=document.createElementNS('http://www.w3.org/2000/svg','line');
line.setAttribute('x1',x1);line.setAttribute('y1',y);line.setAttribute('x2',x2);line.setAttribute('y2',y);
line.setAttribute('stroke','var(--primary)');line.setAttribute('stroke-width','2');svg.appendChild(line);
var arrow=document.createElementNS('http://www.w3.org/2000/svg','polygon');
if(x2>x1)arrow.setAttribute('points',x2+','+y+' '+(x2-8)+','+(y-4)+' '+(x2-8)+','+(y+4));
else arrow.setAttribute('points',x2+','+y+' '+(x2+8)+','+(y-4)+' '+(x2+8)+','+(y+4));
arrow.setAttribute('fill','var(--primary)');svg.appendChild(arrow);
}
});
}
var flowResizeTimer;
window.addEventListener('resize',function(){clearTimeout(flowResizeTimer);flowResizeTimer=setTimeout(function(){Object.keys(FLOW_DATA).forEach(function(id){drawFlowArrows(id);});},200);});
function flowStep(id,n){
var total=FLOW_DATA[id].steps.length;
flowCur[id]=Math.max(0,Math.min(n,total));
renderFlow(id,FLOW_DATA[id]);
requestAnimationFrame(function(){drawFlowArrows(id);var cur=document.querySelector('#flow-inner-'+id+' .flow-mrow.cur');if(cur)cur.scrollIntoView({behavior:'smooth',block:'nearest'});});
}

function initGlossary(){
document.getElementById('gloss-filters').innerHTML=ALL_CATS.map(function(c){return '<button class="gloss-filter '+(c==='All'?'active':'')+'" onclick="setGlossFilter(\''+c+'\',this)">'+c+'</button>';}).join('');
var letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
document.getElementById('alpha-bar').innerHTML=letters.map(function(l){return '<button class="alpha-btn" onclick="setGlossAlpha(\''+l+'\',this)">'+l+'</button>';}).join('');
renderGlossary();
}
window.setGlossFilter=function(c,btn){
glossFilter=c;glossAlpha='';
document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');
document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active');});
renderGlossary();
};
window.setGlossAlpha=function(l,btn){
glossAlpha=(glossAlpha===l)?'':l;
document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active');});
if(glossAlpha)btn.classList.add('active');renderGlossary();
};
window.filterGlossary=function(){glossSearch=document.getElementById('gloss-search').value.toLowerCase();renderGlossary();};
function renderGlossary(){
var items=GLOSSARY;
if(glossFilter!=='All')items=items.filter(function(g){return g.cat===glossFilter;});
if(glossAlpha)items=items.filter(function(g){return g.term[0].toUpperCase()===glossAlpha;});
if(glossSearch)items=items.filter(function(g){return g.term.toLowerCase().includes(glossSearch)||g.def.toLowerCase().includes(glossSearch);});
document.getElementById('gloss-grid').innerHTML=items.length?items.map(function(g){
return '<div class="gloss-card" id="g-'+g.term.replace(/[^a-zA-Z]/g,'')+'"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap"><div class="gloss-term">'+g.term+'</div><span class="badge '+(CAT_MAP[g.cat]||'badge-ml')+'">'+g.cat+'</span></div><div class="gloss-def">'+g.def+'</div><div class="gloss-why">Why it matters: '+g.why+'</div>'+(g.rel&&g.rel.length?'<div class="gloss-related">Related: '+g.rel.map(function(r){return '<a onclick="jumpToGloss(\''+r.replace(/'/g,"\\'")+'\')">'+r+'</a>';}).join(', ')+'</div>':'')+'</div>';
}).join(''):'<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss=function(term){
glossSearch='';glossFilter='All';glossAlpha='';
document.getElementById('gloss-search').value='';
document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active');});
document.querySelector('.gloss-filter').classList.add('active');
document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active');});
renderGlossary();
var id='g-'+term.replace(/[^a-zA-Z]/g,'');var el=document.getElementById(id);
if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px var(--primary)';setTimeout(function(){el.style.boxShadow='';},2000);}
};

renderQuiz('final',questions)+
'<div style="text-align:center;margin-top:24px"><button class="btn-start" onclick="scoreFinal()">Calculate My Score</button></div><div id="final-score"></div>'+
'<div class="nav-btns"><button class="nav-btn secondary" onclick="goModule(0)">\u2190 Back to Module 1</button><button class="nav-btn primary" onclick="showLanding()">\uD83C\uDFE0 Home</button></div>';
}
function scoreFinal(){
var total=15,firstUnanswered=null;
for(var i=0;i<total;i++){
var qid='final-q'+i;
if(!quizStates[qid]){
var card=document.getElementById('qc-'+qid);
var selected=card?card.querySelector('.quiz-opt.selected'):null;
if(!selected&&!firstUnanswered)firstUnanswered=card;
}
}
if(firstUnanswered){
firstUnanswered.scrollIntoView({behavior:'smooth',block:'center'});
firstUnanswered.style.boxShadow='0 0 0 3px var(--warning)';
setTimeout(function(){firstUnanswered.style.boxShadow='';},2000);
alert('Please answer all 15 questions before calculating your score.');return;
}
for(var i=0;i<total;i++){var qid='final-q'+i;if(!quizStates[qid]){var btn=document.getElementById('btn-'+qid);if(btn&&!btn.disabled)btn.click();}}
setTimeout(function(){
var correct=0;
for(var i=0;i<total;i++){var card=document.getElementById('qc-final-q'+i);if(card&&card.classList.contains('correct'))correct++;}
var el=document.getElementById('final-score');var cls,msg;
if(correct>=12){cls='excellent';msg='Excellent! You\u2019ve mastered frontier AI concepts.';}
else if(correct>=8){cls='good';msg='Good progress! Review the modules where you missed questions.';}
else{cls='keep';msg='Keep learning! Revisit the modules and try again.';}
el.innerHTML='<div class="score-banner '+cls+'"><div class="score-num">'+correct+' / '+total+'</div><div class="score-msg">'+msg+'</div></div>';
el.scrollIntoView({behavior:'smooth'});
},200);
}
/* === SEARCH === */
var searchIndex=[];
function buildSearchIndex(){
searchIndex=[];
MODULES.forEach(function(m,i){searchIndex.push({type:'Module',text:m.title,desc:LANDING_DESCS[i].desc.substring(0,100),action:function(){goModule(i);}});});
GLOSSARY.forEach(function(g){searchIndex.push({type:'Glossary',text:g.term,desc:g.def.substring(0,100),action:function(){goModule(12);setTimeout(function(){document.getElementById('gloss-search').value=g.term;filterGlossary();},100);}});});
searchIndex.push({type:'Assessment',text:'Final Assessment',desc:'15 comprehensive questions covering all modules',action:function(){showFinalAssessment();}});
}
function performSearch(q){if(!q.trim())return[];var ql=q.toLowerCase();return searchIndex.filter(function(item){return item.text.toLowerCase().includes(ql)||item.desc.toLowerCase().includes(ql);}).slice(0,12);}
function renderSearchResults(q){
var results=performSearch(q);var c=document.getElementById('search-results');
if(!q.trim()){c.innerHTML='<div class="search-empty">Start typing to search\u2026</div>';return;}
if(!results.length){c.innerHTML='<div class="search-empty">No results found.</div>';return;}
c.innerHTML=results.map(function(r){
var hl=r.text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
return '<div class="search-item" data-idx="'+searchIndex.indexOf(r)+'"><div class="search-cat">'+r.type+'</div><div class="search-txt">'+hl+'</div></div>';
}).join('');
c.querySelectorAll('.search-item').forEach(function(el){el.onclick=function(){var idx=parseInt(el.dataset.idx);searchIndex[idx].action();closeSearch();};});
}
function openSearch(){document.getElementById('search-backdrop').classList.add('open');document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').value='';document.getElementById('search-input').focus();renderSearchResults('');}
function closeSearch(){document.getElementById('search-backdrop').classList.remove('open');document.getElementById('search-overlay').classList.remove('open');}
document.getElementById('search-btn').onclick=openSearch;
document.getElementById('search-backdrop').onclick=closeSearch;
document.getElementById('search-input').oninput=function(){renderSearchResults(this.value);};
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){if(e.key==='Escape')closeSearch();return;}
if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();return;}
if(e.key==='Escape')closeSearch();
});
/* === MOBILE DRAWER === */
function renderMobDrawer(){
var list=document.getElementById('mob-drawer-list');if(!list)return;
list.innerHTML='<div class="mob-drawer-item" onclick="showLanding();closeMobDrawer()" style="border-bottom:2px solid var(--border);margin-bottom:4px"><div class="mob-drawer-ico" style="background:var(--tx-secondary)"><svg viewBox="0 0 24 24" fill="#fff" width="16" height="16"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4h4v4a1 1 0 001 1h3a1 1 0 001-1V10" fill="none" stroke="#fff" stroke-width="2"/></svg></div><div><div class="mob-drawer-name">Home</div></div></div>'+
MODULES.map(function(m,i){
var cls=(i===currentModule?'active':'')+(completedModules.has(i)?' done':'');
return '<div class="mob-drawer-item '+cls+'" onclick="goModule('+i+');closeMobDrawer()"><div class="mob-drawer-ico" style="background:'+m.color+'">'+ICONS[m.icon]+'</div><div><div class="mob-drawer-name">'+m.title+'</div></div><span class="mob-check">\u2713</span></div>';
}).join('')+
'<div class="mob-drawer-item" onclick="showFinalAssessment();closeMobDrawer()"><div class="mob-drawer-ico" style="background:var(--gradient-primary)"><svg viewBox="0 0 24 24" fill="#fff" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div><div class="mob-drawer-name">Final Assessment</div></div></div>'+
'<div class="mob-drawer-footer">Brought to you by Babak</div>';
}
function openMobDrawer(){renderMobDrawer();document.getElementById('mob-drawer-backdrop').classList.add('open');document.getElementById('mob-drawer').classList.add('open');document.body.style.overflow='hidden';}
function closeMobDrawer(){document.getElementById('mob-drawer-backdrop').classList.remove('open');document.getElementById('mob-drawer').classList.remove('open');document.body.style.overflow='';}
document.getElementById('mob-menu-btn').addEventListener('click',openMobDrawer);
document.getElementById('mob-drawer-backdrop').addEventListener('click',closeMobDrawer);
document.getElementById('mob-drawer-close').addEventListener('click',closeMobDrawer);
/* === INITIALIZATION === */
buildSearchIndex();
renderCourseNav();
showLanding();
var scrollBtn=document.getElementById('scroll-top-btn');
window.addEventListener('scroll',function(){scrollBtn.classList.toggle('vis',window.scrollY>300);});
scrollBtn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
</script>
