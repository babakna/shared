<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deep Dive — Advanced Concepts for the AI-Literate Professional</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563EB;--primary-light:#3B82F6;--primary-dark:#1D4ED8;
  --accent:#7C3AED;--accent-light:#8B5CF6;
  --secondary:#06B6D4;
  --success:#10B981;--warning:#F59E0B;--error:#EF4444;
  --bg-body:#F8FAFC;--bg-card:#FFFFFF;--bg-muted:#F1F5F9;--bg-highlight:#EFF6FF;
  --tx-primary:#0F172A;--tx-secondary:#475569;--tx-muted:#94A3B8;
  --border:#E2E8F0;--border-active:#2563EB;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --gradient-primary:linear-gradient(135deg,#2563EB,#7C3AED);
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',sans-serif;
  --font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,'Liberation Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-body);color:var(--tx-secondary);line-height:1.6;font-size:16px}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}

.hdr{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ico{width:38px;height:38px;background:var(--gradient-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ico svg{width:22px;height:22px;fill:#fff}
.hdr-t{font-size:20px;font-weight:700;color:var(--tx-primary)}
.hdr-s{font-size:12px;color:var(--tx-secondary);margin-top:1px}
.hdr-s .by{color:var(--accent);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--bg-muted);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--tx-secondary);flex-shrink:0}
.hdr-btn:hover{border-color:var(--primary);color:var(--primary)}
.hdr-btn svg{width:18px;height:18px}
.hdr.compact .hdr-s{display:none}

.trail-wrap{background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:61px;z-index:99;display:none}
.trail-wrap.vis{display:block}
.trail{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:0;position:relative}
.trail-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--border);z-index:0;transform:translateY(-8px)}
.trail-stop{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;cursor:pointer;flex:1;min-width:0;padding:0 4px}
.trail-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);transition:all .3s;flex-shrink:0}
.trail-stop.done .trail-dot{background:var(--primary);border-color:var(--primary)}
.trail-stop.active .trail-dot{background:var(--accent);border-color:var(--accent);width:20px;height:20px;box-shadow:0 0 0 4px rgba(124,58,237,0.2);animation:pulse 2s infinite}
.trail-lbl{font-size:10px;color:var(--tx-muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;font-weight:600}
.trail-stop.done .trail-lbl,.trail-stop.active .trail-lbl{color:var(--tx-secondary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(124,58,237,0.2)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0.1)}}

.search-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.search-backdrop.open{display:block}
.search-overlay{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);width:92%;max-width:620px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:201;max-height:500px;overflow:hidden}
.search-overlay.open{display:block}
.search-overlay input{width:100%;padding:16px 20px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--tx-primary);font-family:var(--font-body);outline:none}
.search-results{max-height:420px;overflow-y:auto;padding:8px 0}
.search-item{padding:10px 20px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-highlight)}
.search-cat{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.search-txt{font-size:14px;color:var(--tx-primary);margin-top:2px}
.search-txt mark{background:rgba(37,99,235,0.15);color:var(--primary);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;color:var(--tx-muted);font-size:14px}

.main{max-width:960px;margin:0 auto;padding:24px}
.pane{display:none}.pane.on{display:block}

.hero{text-align:center;padding:80px 20px 60px}
.hero-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:12px;padding:6px 18px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}
.hero h1{font-size:42px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;line-height:1.2}
.hero p{font-size:18px;color:var(--tx-secondary);max-width:560px;margin:0 auto 32px;line-height:1.7}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:700px;margin:0 auto 40px}
.hero-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.hero-stat-n{font-size:28px;font-weight:800;color:var(--primary)}
.hero-stat-l{font-size:13px;color:var(--tx-muted);margin-top:4px}
.btn-start{display:inline-flex;align-items:center;gap:8px;background:var(--gradient-primary);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-md)}
.btn-start:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}

.mod-hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.mod-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-ico svg{width:26px;height:26px;fill:#fff}
.mod-title{font-size:24px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mod-desc{font-size:14px;color:var(--tx-secondary);margin-top:4px}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;margin-bottom:20px}
.card:hover{box-shadow:var(--shadow-md)}
.card-title{font-size:17px;font-weight:600;color:var(--tx-primary);margin-bottom:8px}
.card-text{font-size:14px;color:var(--tx-secondary);line-height:1.7}

.sec-title{font-size:20px;font-weight:700;color:var(--tx-primary);margin:32px 0 16px;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';width:4px;height:24px;background:var(--gradient-primary);border-radius:2px;flex-shrink:0}

.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}

.flip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.flip-card{perspective:800px;height:240px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:20px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.flip-front{background:var(--bg-card)}
.flip-back{background:var(--bg-highlight);transform:rotateY(180deg);overflow-y:auto}
.flip-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.flip-front .flip-label{color:var(--error)}
.flip-back .flip-label{color:var(--success)}
.flip-txt{font-size:13px;color:var(--tx-primary);line-height:1.6}
.flip-hint{font-size:11px;color:var(--tx-muted);margin-top:auto;text-align:right}

.timeline-wrap{overflow-x:auto;padding:20px 0;margin-bottom:24px}
.timeline{display:flex;align-items:flex-start;gap:0;min-width:700px;position:relative;padding:0 20px}
.timeline::before{content:'';position:absolute;top:20px;left:20px;right:20px;height:3px;background:var(--gradient-primary);border-radius:2px}
.tl-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:90px}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--primary);border:3px solid var(--bg-card);box-shadow:0 0 0 2px var(--primary);margin-bottom:10px;position:relative;z-index:1}
.tl-year{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:4px}
.tl-text{font-size:11px;color:var(--tx-secondary);text-align:center;line-height:1.4;max-width:110px}

.quiz-section{margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.quiz-card{background:var(--bg-card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:0 12px 12px 0;padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.quiz-card.correct{border-left-color:var(--success);background:rgba(16,185,129,0.03)}
.quiz-card.incorrect{border-left-color:var(--error);background:rgba(239,68,68,0.03)}
.quiz-q{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:12px}
.quiz-q .q-num{color:var(--accent);margin-right:6px}
.quiz-q .q-type{font-size:11px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;display:inline-block;background:var(--bg-muted);padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--tx-primary)}
.quiz-opt:hover{border-color:var(--primary-light);background:var(--bg-highlight)}
.quiz-opt.selected{border-color:var(--primary);background:var(--bg-highlight)}
.quiz-opt.right{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}
.quiz-opt.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:var(--error);text-decoration:line-through}
.quiz-opt .opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all .2s}
.quiz-opt.selected .opt-marker{border-color:var(--primary);background:var(--primary);color:#fff}
.quiz-opt.right .opt-marker{border-color:var(--success);background:var(--success);color:#fff}
.quiz-opt.wrong .opt-marker{border-color:var(--error);background:var(--error);color:#fff}
.quiz-fb{display:none;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;margin-top:8px}
.quiz-fb.vis{display:block}
.quiz-fb.correct{background:rgba(16,185,129,0.08);color:#065F46;border:1px solid rgba(16,185,129,0.2)}
.quiz-fb.incorrect{background:rgba(239,68,68,0.08);color:#991B1B;border:1px solid rgba(239,68,68,0.2)}
.quiz-check{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .2s}
.quiz-check:hover{background:var(--primary-dark)}
.quiz-check:disabled{background:var(--tx-muted);cursor:default}

.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:2px solid var(--border)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);border:none;transition:all .2s}
.nav-btn.primary{background:var(--primary);color:#fff}.nav-btn.primary:hover{background:var(--primary-dark)}
.nav-btn.secondary{background:var(--bg-card);color:var(--primary);border:1px solid var(--border)}.nav-btn.secondary:hover{border-color:var(--primary)}

.concept-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:default}
.concept-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.concept-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.concept-ico svg{width:24px;height:24px;fill:#fff}
.concept-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.concept-desc{font-size:13px;color:var(--tx-secondary);line-height:1.6}

.deeper{margin:16px 0;border-left:3px solid var(--accent-light);padding-left:16px}
.deeper summary{font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px}
.deeper summary::before{content:'\u25B6';font-size:10px;transition:transform .2s}
.deeper[open] summary::before{transform:rotate(90deg)}
.deeper summary::-webkit-details-marker{display:none}
.deeper-body{font-size:14px;color:var(--tx-secondary);line-height:1.7;padding:8px 0}

.case-study{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.case-badge{display:inline-block;background:rgba(124,58,237,0.1);color:var(--accent);font-weight:700;font-size:11px;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.case-title{font-size:17px;font-weight:700;color:var(--tx-primary);margin-bottom:12px}
.case-body dt{font-size:13px;font-weight:700;color:var(--primary);margin-top:12px}
.case-body dd{font-size:14px;color:var(--tx-secondary);line-height:1.7;margin-left:0;margin-top:4px}

.sim-area{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;box-shadow:var(--shadow-sm)}
.sim-title{font-size:16px;font-weight:600;color:var(--tx-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sim-title svg{width:20px;height:20px}

.callout{background:var(--bg-highlight);border:1px solid rgba(37,99,235,0.2);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;color:var(--tx-secondary);line-height:1.7}
.callout.warning{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);border-left-color:var(--warning)}
.callout.success{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);border-left-color:var(--success)}

.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.badge-ml{background:rgba(37,99,235,0.1);color:var(--primary)}
.badge-genai{background:rgba(124,58,237,0.1);color:var(--accent)}
.badge-prompt{background:rgba(6,182,212,0.1);color:var(--secondary)}
.badge-infra{background:rgba(245,158,11,0.1);color:var(--warning)}
.badge-ethics{background:rgba(239,68,68,0.1);color:var(--error)}
.badge-workflow{background:rgba(16,185,129,0.1);color:var(--success)}
.badge-proto{background:rgba(79,70,229,0.1);color:#4F46E5}
.badge-agents{background:rgba(16,185,129,0.1);color:var(--success)}
.badge-rag{background:rgba(245,158,11,0.1);color:var(--warning)}

.prompt-block{border-radius:8px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.prompt-block:hover{transform:translateX(4px)}
.prompt-block .pb-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.prompt-block .pb-text{font-size:13px;color:var(--tx-primary);line-height:1.6}
.prompt-block .pb-expand{display:none;font-size:13px;color:var(--tx-secondary);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.2)}
.prompt-block.expanded .pb-expand{display:block}

.comparator{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.comp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.comp-header{padding:10px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.comp-body{padding:14px 16px;font-size:13px;color:var(--tx-primary);line-height:1.7;min-height:80px}
.comp-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.comp-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.comp-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.warn-card{background:var(--bg-card);border:1px solid rgba(245,158,11,0.3);border-left:4px solid var(--warning);border-radius:0 12px 12px 0;padding:16px 20px;margin-bottom:12px}
.warn-title{font-size:15px;font-weight:600;color:var(--tx-primary);margin-bottom:6px}
.warn-text{font-size:13px;color:var(--tx-secondary);line-height:1.6}

.task-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:16px 0}
.task-card{perspective:800px;min-height:360px;cursor:pointer}
.task-inner{position:relative;width:100%;height:100%;min-height:360px;transition:transform .6s;transform-style:preserve-3d}
.task-card.flipped .task-inner{transform:rotateY(180deg)}
.task-front,.task-back{position:absolute;width:100%;backface-visibility:hidden;border-radius:12px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);top:0;left:0;right:0;min-height:360px}
.task-front{background:var(--bg-card);display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center}
.task-back{background:var(--bg-highlight);transform:rotateY(180deg);font-size:13px;color:var(--tx-secondary);line-height:1.6;overflow-y:auto}
.task-front .concept-ico{margin-bottom:12px}

.spectrum{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:16px 0}
.spectrum-item{padding:16px;border-radius:10px;border:2px solid}
.spectrum-item.ok{border-color:var(--success);background:rgba(16,185,129,0.04)}
.spectrum-item.warn{border-color:var(--warning);background:rgba(245,158,11,0.04)}
.spectrum-item.bad{border-color:var(--error);background:rgba(239,68,68,0.04)}
.spectrum-icon{font-size:18px;margin-bottom:8px}
.spectrum-text{font-size:13px;color:var(--tx-primary);line-height:1.6}

.spot-passage{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px}
.spot-sentence{cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .2s;border:2px solid transparent}
.spot-sentence:hover{background:rgba(239,68,68,0.06)}
.spot-sentence.flagged{background:rgba(239,68,68,0.1);border-color:var(--error)}
.spot-sentence.revealed-h{background:rgba(239,68,68,0.12);border-color:var(--error)}
.spot-sentence.revealed-ok{background:rgba(16,185,129,0.08);border-color:var(--success)}

.scenario-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.scenario-opts{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.scenario-opt{padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.scenario-opt:hover{border-color:var(--primary)}
.scenario-opt.selected{border-color:var(--primary);background:var(--bg-highlight);color:var(--primary)}
.scenario-opt.best{border-color:var(--success);background:rgba(16,185,129,0.08);color:var(--success)}

.roadmap-tier{margin-bottom:32px}
.tier-header{padding:12px 20px;border-radius:10px;color:#fff;font-weight:700;font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.resource-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;transition:all .2s}
.resource-card:hover{box-shadow:var(--shadow-md)}
.resource-title{font-size:15px;font-weight:600;color:var(--tx-primary)}
.resource-provider{font-size:12px;color:var(--tx-muted);margin-top:2px}
.resource-meta{display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--tx-muted);flex-wrap:wrap}
.resource-why{font-size:13px;color:var(--tx-secondary);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.resource-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--primary);margin-top:8px}

.gloss-search{width:100%;padding:12px 18px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--tx-primary);font-family:var(--font-body);transition:border-color .2s;margin-bottom:16px}
.gloss-search:focus{outline:none;border-color:var(--primary)}
.gloss-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.gloss-filter{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);color:var(--tx-secondary);font-family:var(--font-body);transition:all .2s}
.gloss-filter.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.gloss-filter:hover:not(.active){border-color:var(--primary)}
.alpha-bar{display:flex;gap:2px;margin-bottom:16px;flex-wrap:wrap}
.alpha-btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--tx-muted);font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--bg-highlight);color:var(--primary)}
.alpha-btn.active{background:var(--primary);color:#fff}
.gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}
.gloss-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;transition:all .2s}
.gloss-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.gloss-term{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--tx-secondary);line-height:1.6;margin:8px 0}
.gloss-why{font-size:12px;color:var(--accent);font-style:italic;line-height:1.5}
.gloss-related{margin-top:8px;font-size:12px;color:var(--tx-muted)}
.gloss-related a{color:var(--primary);font-weight:600;cursor:pointer}

.score-banner{padding:24px;border-radius:12px;text-align:center;margin-top:24px}
.score-banner.excellent{background:rgba(16,185,129,0.1);border:2px solid var(--success);color:#065F46}
.score-banner.good{background:var(--bg-highlight);border:2px solid var(--primary);color:var(--primary-dark)}
.score-banner.keep{background:rgba(245,158,11,0.1);border:2px solid var(--warning);color:#92400E}
.score-num{font-size:36px;font-weight:800;margin-bottom:8px}
.score-msg{font-size:16px;font-weight:600}

.tx-step-visual{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:16px 0;margin:16px 0}
.tx-step{flex:1;min-width:100px;padding:12px 8px;text-align:center;border-right:2px solid var(--border);position:relative;opacity:.3;transition:all .4s}
.tx-step:last-child{border-right:none}
.tx-step.active{opacity:1;background:var(--bg-highlight);border-radius:8px}
.tx-step-ico{font-size:28px;margin-bottom:6px}
.tx-step-name{font-size:12px;font-weight:700;color:var(--tx-primary)}
.tx-step-desc{font-size:11px;color:var(--tx-secondary);margin-top:4px;line-height:1.4}

.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-md);z-index:90;transition:opacity .3s,transform .3s,background .2s}
.scroll-top:hover{background:var(--primary-dark);transform:translateY(-2px)}
.scroll-top.vis{display:flex}

.flow-btn:focus-visible,.quiz-opt:focus-visible,.comp-tab:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

.toc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-sm);transition:all .2s;cursor:pointer}
.toc-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary-light)}
.toc-features{font-size:12px;color:var(--tx-muted);margin-top:12px;line-height:1.5}

.flow-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:24px 0;position:relative}
.flow-ctrl{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg-muted);flex-wrap:wrap}
.flow-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx-secondary);transition:all .15s;font-family:var(--font-body)}
.flow-btn:hover{border-color:var(--primary);color:var(--primary)}
.flow-btn.pri{background:var(--primary);border-color:var(--primary);color:#fff}.flow-btn.pri:hover{background:var(--primary-dark)}
.flow-step-ind{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx-muted)}
.flow-scroll{overflow-x:auto;overflow-y:auto;max-height:500px}
.flow-inner{min-width:600px}
.flow-nodes{display:flex;border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:0;z-index:5;background:var(--bg-card)}
.flow-ncol{flex:1;text-align:center;min-width:110px;padding:0 6px}
.flow-nbox{display:inline-block;border:1px solid var(--border);border-top:3px solid;border-radius:6px;padding:6px 10px;background:var(--bg-muted);min-width:90px}
.flow-nname{font-size:12px;font-weight:700;color:var(--tx-primary)}.flow-ndesc{font-size:10px;color:var(--tx-muted);margin-top:2px}
.flow-msgs{position:relative;padding:0 0 16px}
.flow-mrow{position:relative;min-height:90px;transition:opacity .35s;padding:6px 0}
.flow-mrow.dim{opacity:.12}.flow-mrow.vis{opacity:1}
.flow-mrow.cur .flow-mlabel{box-shadow:0 0 0 2px var(--primary),0 0 14px rgba(37,99,235,0.25)}
.flow-lifelines{display:flex;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0}
.flow-ll-col{flex:1;display:flex;justify-content:center;min-width:130px}
.flow-ll{width:0;border-left:2px dashed var(--border)}
.flow-arrow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
.flow-mlwrap{position:absolute;z-index:3;top:6px;transform:translateX(-50%);pointer-events:auto}
.flow-mlabel{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;text-align:center;max-width:260px;transition:box-shadow .3s}
.flow-msn{font-size:12px;font-weight:700;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.flow-mattr{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;justify-content:center}
.flow-matag{font-size:10px;background:var(--bg-muted);border-radius:3px;padding:1px 6px;color:var(--tx-muted);font-family:var(--font-mono);white-space:nowrap}
.flow-detail{border-top:2px solid var(--primary);padding:20px 24px;background:var(--bg-highlight);display:none}
.flow-detail.vis{display:block}
.flow-dmn{font-size:16px;font-weight:700;color:var(--tx-primary);margin-bottom:4px}
.flow-ddir{font-size:13px;color:var(--tx-muted);margin-bottom:14px}
.flow-dtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.flow-dtbl th{text-align:left;padding:8px 12px;background:var(--bg-muted);border:1px solid var(--border);color:var(--tx-primary);font-weight:600;font-size:12px}
.flow-dtbl td{padding:7px 12px;border:1px solid var(--border);vertical-align:top}
.flow-dtbl td:first-child{font-family:var(--font-mono);font-size:12px;color:var(--primary);white-space:nowrap;min-width:140px}
.flow-dnote{font-style:italic;color:var(--tx-secondary);font-size:13px;line-height:1.7;padding:10px 14px;background:var(--bg-muted);border-radius:6px;border:1px solid var(--border)}

.flow-step-list{display:none}
.flow-mob-step{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);transition:opacity 0.3s,background 0.3s}
.flow-mob-step:last-child{border-bottom:none}
.flow-mob-step.dim{opacity:0.2}
.flow-mob-step.cur{background:var(--bg-highlight);border-left:3px solid var(--primary);border-radius:0 8px 8px 0}
.flow-mob-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.flow-mob-step.dim .flow-mob-num{background:var(--border)}
.flow-mob-name{font-size:13px;font-weight:600;color:var(--primary)}
.flow-mob-dir{font-size:11px;color:var(--tx-muted);margin-top:2px}

.flow-scroll,.tx-step-visual,.timeline-wrap,.trail-wrap{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.flow-scroll::-webkit-scrollbar,.tx-step-visual::-webkit-scrollbar,.timeline-wrap::-webkit-scrollbar,.trail-wrap::-webkit-scrollbar{height:4px}
.flow-scroll::-webkit-scrollbar-thumb,.tx-step-visual::-webkit-scrollbar-thumb,.timeline-wrap::-webkit-scrollbar-thumb,.trail-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.sim-focusable{outline:none;border-radius:12px;transition:box-shadow .2s}
.sim-focusable:focus{box-shadow:0 0 0 3px rgba(37,99,235,0.3)}
.sim-focusable:focus-visible{box-shadow:0 0 0 3px rgba(37,99,235,0.3)}
.kb-hint{font-size:12px;color:var(--tx-muted);text-align:center;margin-top:8px;opacity:0.7}
.kb-hint kbd{background:var(--bg-muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:var(--font-mono);font-size:11px}

.swipe-hint{display:none;position:absolute;top:50%;right:8px;transform:translateY(-50%);background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;pointer-events:none;animation:swipeHintFade 3s forwards;z-index:10}
@keyframes swipeHintFade{0%,60%{opacity:1}100%{opacity:0;display:none}}

.matrix-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.matrix-table th{padding:10px 12px;background:var(--bg-muted);border:1px solid var(--border);font-weight:700;color:var(--tx-primary);text-align:left;font-size:12px;position:sticky;top:0}
.matrix-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:top;color:var(--tx-secondary)}
.matrix-table tr:hover td{background:var(--bg-highlight)}
.matrix-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid var(--border)}

.rubric-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.rubric-item label{flex:1;font-size:14px;color:var(--tx-primary);font-weight:500}
.rubric-weight{width:60px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:14px;font-family:var(--font-body);color:var(--tx-primary)}

@media print{
  .hdr,.trail-wrap,.search-overlay,.search-backdrop,.nav-btns,.flow-ctrl,.quiz-check,.train-btn,.hdr-btn,.scroll-top{display:none!important}
  .pane{display:block!important;page-break-after:always}
  .pane:not(.on){display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .card,.sim-area,.flow-box,.case-study,.quiz-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .flow-mrow{opacity:1!important}
  .flow-detail{display:block!important}
}

.mob-only{display:none}
.mob-drawer-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:300;backdrop-filter:blur(2px)}
.mob-drawer-backdrop.open{display:block}
.mob-drawer{position:fixed;top:0;right:-300px;width:280px;max-width:80vw;height:100%;background:var(--bg-card);z-index:301;transition:right 0.3s ease;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden}
.mob-drawer.open{right:0}
.mob-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mob-drawer-close{background:none;border:none;font-size:28px;color:var(--tx-secondary);cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.mob-drawer-close:hover{background:var(--bg-muted)}
.mob-drawer-list{flex:1;overflow-y:auto;padding:12px 0}
.mob-drawer-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent}
.mob-drawer-item:hover,.mob-drawer-item:active{background:var(--bg-highlight)}
.mob-drawer-item.active{background:var(--bg-highlight);border-left-color:var(--primary)}
.mob-drawer-item.done{border-left-color:var(--success)}
.mob-drawer-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mob-drawer-ico svg{width:16px;height:16px;fill:#fff}
.mob-drawer-name{font-size:14px;font-weight:600;color:var(--tx-primary)}
.mob-drawer-desc{font-size:11px;color:var(--tx-muted);margin-top:2px}
.mob-drawer-item .mob-check{display:none;color:var(--success);font-weight:700;margin-left:auto;font-size:14px}
.mob-drawer-item.done .mob-check{display:block}
.mob-drawer-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--tx-muted);text-align:center}
.mob-module-bar{display:none;background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 16px;font-size:13px;color:var(--tx-secondary);text-align:center}
.mob-module-bar strong{color:var(--tx-primary)}

@media(max-width:1024px) and (min-width:769px){
  .trail-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 16px}
  .trail{min-width:max-content}
  .trail-stop{flex:0 0 auto;padding:0 8px}
  .trail-lbl{font-size:10px;max-width:70px}
  .trail-dot{width:14px;height:14px}
  .trail-stop.active .trail-dot{width:18px;height:18px}
}

@media(max-width:768px){
  .mob-only{display:flex}
  .trail-wrap{display:none!important}
  .mob-module-bar{display:block}
  .swipe-hint{display:block}
  html,body{overflow-x:hidden;max-width:100vw}
  .hdr{padding:10px 16px}
  .hdr-t{font-size:16px}
  .hdr-s{font-size:11px}
  .hdr-ico{width:32px;height:32px;border-radius:6px}
  .hdr-ico svg{width:18px;height:18px}
  .mob-only.hdr-btn{width:44px;height:44px;background:var(--primary);color:#fff;border-color:var(--primary);border-radius:10px}
  .mob-only.hdr-btn:hover{background:var(--primary-dark)}
  .mob-only.hdr-btn svg{stroke:#fff;width:20px;height:20px}
  .main{padding:16px}
  .hero{padding:40px 16px 32px}
  .hero h1{font-size:28px}
  .hero p{font-size:15px}
  .hero-grid{grid-template-columns:repeat(3,1fr);gap:10px}
  .hero-stat{padding:14px 10px}
  .hero-stat-n{font-size:22px}
  .hero-stat-l{font-size:11px}
  .mod-hdr{flex-direction:column;align-items:flex-start;gap:12px}
  .mod-ico{width:40px;height:40px;border-radius:10px}
  .mod-title{font-size:20px}
  .mod-desc{font-size:13px}
  .sec-title{font-size:18px;margin:24px 0 12px}
  .grid-2,.grid-3,.flip-grid,.task-grid,.spectrum,.gloss-grid{grid-template-columns:1fr}
  .comparator{grid-template-columns:1fr}
  .card{padding:16px}
  .card-title{font-size:15px}
  .card-text{font-size:13px}
  .flip-card{height:auto}
  .flip-inner{height:auto;min-height:160px}
  .flip-front,.flip-back{position:relative;height:auto;min-height:160px}
  .flip-card:not(.flipped) .flip-back{display:none}
  .flip-card.flipped .flip-front{display:none}
  .flip-card.flipped .flip-back{display:flex;transform:none}
  .task-card{min-height:auto}
  .task-inner{height:auto;min-height:auto}
  .task-front,.task-back{position:relative;height:auto;min-height:auto}
  .task-card:not(.flipped) .task-back{display:none}
  .task-card.flipped .task-front{display:none}
  .task-card.flipped .task-back{display:block;transform:none}
  .tx-step-visual{flex-direction:column;overflow-x:visible;gap:0}
  .tx-step{min-width:unset;width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;text-align:left;border-right:none;border-bottom:2px solid var(--border)}
  .tx-step:last-child{border-bottom:none}
  .tx-step-ico{font-size:24px;margin-bottom:0;flex-shrink:0;width:40px;text-align:center}
  .tx-step-name{font-size:13px;font-weight:600}
  .tx-step-desc{font-size:12px;margin-top:2px}
  .tx-step.active{background:var(--bg-highlight);border-radius:8px;border-bottom:2px solid var(--primary)}
  .flow-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative}
  .flow-inner{min-width:unset!important}
  .flow-nodes{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 8px;gap:0;flex-wrap:nowrap}
  .flow-ncol{min-width:80px;flex:0 0 80px;padding:0 4px}
  .flow-nbox{min-width:70px;padding:4px 6px;border-radius:4px}
  .flow-nname{font-size:10px}
  .flow-ndesc{font-size:8px}
  .flow-mrow{min-height:60px}
  .flow-mlabel{padding:4px 8px;max-width:160px}
  .flow-msn{font-size:10px;max-width:140px}
  .flow-matag{font-size:8px;padding:1px 4px}
  .flow-detail{padding:12px 14px}
  .flow-dmn{font-size:14px}
  .flow-ddir{font-size:11px}
  .flow-dtbl{font-size:11px}
  .flow-dtbl td:first-child{min-width:80px;font-size:10px}
  .flow-dtbl td{padding:5px 8px}
  .flow-dnote{font-size:11px;padding:8px}
  .flow-ctrl{gap:4px;padding:8px 12px}
  .flow-btn{padding:6px 8px;font-size:10px}
  .flow-scroll::after{content:'Swipe to see all nodes \u2192';display:block;text-align:center;font-size:10px;color:var(--tx-muted);padding:4px 0;opacity:0.6}
  .flow-scroll::before{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(to right, transparent, var(--bg-card));pointer-events:none;z-index:4}
  .timeline-wrap{position:relative}
  .timeline-wrap::after{content:'Swipe \u2192';position:absolute;top:10px;right:10px;font-size:10px;color:var(--tx-muted);background:var(--bg-card);padding:2px 8px;border-radius:10px;border:1px solid var(--border);opacity:0.7}
  .timeline{min-width:600px}
  .tl-item{min-width:80px}
  .tl-text{font-size:10px;max-width:75px}
  .tl-year{font-size:11px}
  .quiz-card{padding:16px}
  .quiz-q{font-size:14px}
  .quiz-opt{padding:10px 12px;font-size:13px;min-height:44px}
  .quiz-fb{font-size:12px}
  .prompt-block{padding:12px 14px}
  .prompt-block .pb-text{font-size:12px}
  .prompt-block .pb-expand{font-size:12px}
  .comp-body{font-size:12px;padding:12px 14px}
  .comp-header{font-size:11px;padding:8px 14px}
  .case-study{padding:16px}
  .case-title{font-size:15px}
  .case-body dd{font-size:13px}
  .deeper{margin:12px 0;padding-left:12px}
  .deeper summary{font-size:13px}
  .deeper-body{font-size:13px}
  .deeper-body p{font-size:13px}
  .callout{padding:12px 14px;font-size:13px}
  .warn-card{padding:14px 16px}
  .warn-title{font-size:14px}
  .warn-text{font-size:12px}
  button,.flow-btn,.quiz-check,.train-btn,.nav-btn,.comp-tab,.scenario-opt{min-height:40px}
  .nav-btns{flex-direction:column;gap:10px}
  .nav-btn{width:100%;justify-content:center;text-align:center;padding:14px;font-size:14px}
  .gloss-card{padding:14px 16px}
  .gloss-term{font-size:14px}
  .gloss-def{font-size:12px}
  .gloss-why{font-size:11px}
  .gloss-filters{gap:4px}
  .gloss-filter{padding:4px 10px;font-size:11px}
  .alpha-bar{gap:1px}
  .alpha-btn{width:24px;height:24px;font-size:10px}
  .resource-card{padding:14px 16px}
  .resource-title{font-size:14px}
  .resource-why{font-size:12px}
  .tier-header{font-size:14px;padding:10px 16px}

const mainEl = document.getElementById('main-content');

function renderTrail(){
  const t = document.getElementById('trail');

    const cls = completedModules.has(i) ? 'done' : (i === currentModule ? 'active' : '');
    return '<div class="trail-stop '+cls+'" onclick="goModule('+i+')" title="'+m.title+'"><div class="trail-dot"></div><div class="trail-lbl">'+m.short+'</div></div>';
  }).join('');
}

function goModule(idx){
  if(idx < 0){showLanding();return;}
  currentModule = idx;
  document.getElementById('trail-wrap').classList.add('vis');
  document.getElementById('hdr').classList.add('compact');
  renderTrail();
  renderModule(idx);
  const mobBar = document.getElementById('mob-module-bar');
  if(mobBar){
    if(idx >= 0 && idx < MODULES.length){
      mobBar.innerHTML = '<strong>'+MODULES[idx].title+'</strong> \u2014 Module '+(idx+1)+' of '+MODULES.length;
      mobBar.style.display = '';
    } else { mobBar.innerHTML = ''; }
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function showLanding(){
  currentModule = -1;
  document.getElementById('trail-wrap').classList.add('vis');
  document.getElementById('hdr').classList.remove('compact');

function renderModule(idx){

function completeAndNext(idx){ completedModules.add(idx); goModule(idx + 1); }

function getModuleContent(idx){
  switch(idx){
    case 0: return mod1Content();

  '<div class="sec-title">Multi-Modal Models</div>'+
  '<div class="grid-3">'+
    '<div class="concept-card"><div class="concept-ico" style="background:#2563EB"><svg viewBox="0 0 24 24" fill="#fff"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div><div class="concept-title">Text</div><div class="concept-desc">Tokenizer \u2192 Embeddings \u2192 Transformer. Words are split into sub-word tokens, converted to vectors, and processed through attention layers.</div></div>'+
    '<div class="concept-card"><div class="concept-ico" style="background:#7C3AED"><svg viewBox="0 0 24 24" fill="#fff"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div><div class="concept-title">Images</div><div class="concept-desc">Patch extraction \u2192 Vision encoder \u2192 Embeddings \u2192 Transformer. Images are divided into patches and encoded into the same vector space as text.</div></div>'+
    '<div class="concept-card"><div class="concept-ico" style="background:#06B6D4"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div><div class="concept-title">Audio</div><div class="concept-desc">Spectrogram \u2192 Audio encoder \u2192 Embeddings \u2192 Transformer. Audio is converted to spectrograms and encoded into the shared vector space.</div></div>'+
  '</div>'+
  '<div class="callout">Multi-modal models like GPT-4o, Claude (with vision), and Gemini can process text, images, and audio because each modality is converted into the same mathematical representation (embeddings) before entering the Transformer. The model doesn\u2019t \u201csee\u201d an image \u2014 it processes numerical vectors that represent visual features, just as it processes vectors that represent word meanings.</div>'+

  '<details class="deeper"><summary>Deeper Dive: What Happens During Fine-Tuning and RLHF</summary><div class="deeper-body">'+
    '<p>Modern LLM training has three distinct stages, each serving a different purpose:</p>'+
    '<p style="margin-top:10px"><strong>Stage 1 \u2014 Pre-training:</strong> The model is trained on trillions of tokens of internet text with a single objective: predict the next token. This is unsupervised \u2014 no human labels are needed. The model develops raw capability \u2014 grammar, facts, reasoning patterns, code understanding \u2014 all from this simple prediction task. Pre-training takes months on thousands of GPUs and costs tens of millions of dollars. The result is a model that can complete text but isn\u2019t good at following instructions or being helpful.</p>'+
    '<p style="margin-top:10px"><strong>Stage 2 \u2014 Supervised Fine-Tuning (SFT):</strong> The pre-trained model is further trained on thousands of curated instruction-response pairs. Human contractors write high-quality examples: \u201cSummarize this article\u201d \u2192 [expert summary], \u201cExplain quantum computing simply\u201d \u2192 [clear explanation]. This teaches the model to follow instructions rather than just complete text. The model goes from \u201cI can continue any text\u201d to \u201cI can answer questions and follow directions.\u201d</p>'+
    '<p style="margin-top:10px"><strong>Stage 3 \u2014 RLHF (Reinforcement Learning from Human Feedback):</strong> Human evaluators are shown multiple model outputs for the same prompt and rank them from best to worst. A reward model is trained on these rankings. The LLM is then optimized to produce outputs the reward model rates highly. This is what makes models helpful, harmless, and honest \u2014 it\u2019s the difference between a model that <em>can</em> answer your question and one that <em>wants</em> to answer it well. Constitutional AI (used by Anthropic) adds an additional self-evaluation step where the model critiques its own outputs against a set of principles.</p>'+
    '<p style="margin-top:10px"><strong>Why this matters:</strong> Understanding these stages explains why the same base model can behave differently across providers. OpenAI and Anthropic use different fine-tuning data and different RLHF preferences, which is why Claude and GPT have noticeably different \u201cpersonalities\u201d despite both being Transformer-based LLMs.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">Why the Same Prompt Produces Different Results Across Models</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt><dd>A tech writer sends the identical prompt to Claude, ChatGPT, and Gemini: \u201cSummarize this API changelog for product managers.\u201d Each produces a noticeably different output \u2014 different length, tone, structure, and even factual emphasis.</dd>'+
      '<dt>Why This Happens</dt><dd>Each model was trained on different data mixtures, fine-tuned with different instruction sets, and optimized with different RLHF preferences. Claude\u2019s training emphasizes nuance and caution; GPT tends toward expansive, confident responses; Gemini leverages Google\u2019s search integration for recency. Additionally, each platform adds its own system prompt that shapes behavior before your prompt even arrives.</dd>'+
      '<dt>What to Do</dt><dd>Don\u2019t assume one model is \u201cbetter.\u201d Instead, match the model to the task: use the model that produces the best output for your specific content type. Develop a brief \u201cmodel comparison\u201d habit: try important prompts across 2-3 models and compare results. Over time, you\u2019ll develop intuition for which model excels at which task.</dd>'+
      '<dt>Takeaway</dt><dd>Choosing the right model for the task matters as much as writing a good prompt. Results should be evaluated per-model, not assumed to be universal.</dd>'+
    '</dl></div>'+

  renderQuiz('mod1',[
    {type:'mc',q:'What does the attention mechanism in Transformers allow the model to do?',opts:['Process text faster than previous architectures','Connect every word to every other word simultaneously, regardless of distance','Understand the true meaning of words like humans do','Store more training data'],a:1,exp:'The attention mechanism allows each token to directly attend to every other token simultaneously, enabling the model to capture long-range dependencies.'},
    {type:'tf',q:'In a neural network, early layers detect basic features while deeper layers capture abstract patterns.',a:true,exp:'This hierarchical composition is fundamental \u2014 early layers find edges/word patterns, middle layers combine them, and deep layers capture high-level abstractions.'},
    {type:'mc',q:'What is the purpose of RLHF in the training pipeline?',opts:['To make the model larger','To teach the model to predict the next word','To optimize the model for helpfulness using human preference rankings','To convert text into tokens'],a:2,exp:'RLHF uses human rankings of model outputs to train a reward model, then optimizes the LLM to produce outputs that score highly \u2014 making it helpful, harmless, and honest.'},
    {type:'tf',q:'Multi-modal models have separate AI brains for text, images, and audio.',a:false,exp:'Multi-modal models convert all modalities into the same mathematical representation (embeddings) and process them through the same Transformer attention layers.'},
    {type:'mc',q:'Why might the same prompt produce different results in Claude vs. ChatGPT?',opts:['One is broken','They use identical training but different UIs','Different training data, fine-tuning preferences, and system prompts','Random chance'],a:2,exp:'Different models have different training data, RLHF preferences, and system prompts, leading to meaningfully different outputs for the same input.'}
  ]);
}

/* ══ MODULE 3: ADVANCED PROMPT ENGINEERING ══ */
function mod3Content(){
  return '<div class="sec-title">Few-Shot Prompting</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>Few-shot prompting provides the AI with examples of the desired input-output pattern before your actual request. Instead of describing what you want, you <em>show</em> it. This is one of the most powerful techniques for getting consistent, high-quality output.</p>'+
    '<p style="margin-top:12px"><strong>Example \u2014 Without few-shot:</strong> \u201cConvert this changelog to a release note.\u201d \u2192 Generic, inconsistent formatting.</p>'+
    '<p style="margin-top:12px"><strong>Example \u2014 With few-shot:</strong></p>'+
    '<div style="background:var(--bg-muted);border-radius:8px;padding:14px;margin:8px 0;font-family:var(--font-mono);font-size:13px;line-height:1.6">'+
      'Here are examples of how we convert changelogs to release notes:<br><br>'+
      'Changelog: "Fixed null pointer in auth module causing 500 on expired tokens"<br>'+
      'Release note: "<strong>Authentication Fix</strong> \u2014 Resolved an issue where expired sessions could cause an error. Users will no longer see unexpected errors when their session times out."<br><br>'+
      'Changelog: "Optimized query planner, 3x improvement on aggregate queries"<br>'+
      'Release note: "<strong>Faster Reports</strong> \u2014 Report generation is now up to 3x faster, particularly for complex aggregate queries."<br><br>'+
      'Now convert this changelog: [your changelog entry]'+
    '</div>'+
    '<p style="margin-top:8px">The model pattern-matches the format, tone, length, and style from your examples \u2014 far more reliable than describing what you want in words.</p>'+
  '</div></div>'+

  '<div class="sec-title">Chain-of-Thought Prompting</div>'+
  '<div class="comparator">'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(239,68,68,0.08);color:var(--error)">\u274C Without CoT</div><div class="comp-body"><strong>Prompt:</strong> \u201cIs this product description accurate?\u201d<br><br><strong>Output:</strong> \u201cThe description looks accurate and well-written.\u201d<br><br><em>The model gives a surface-level answer without actual analysis.</em></div></div>'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.08);color:var(--success)">\u2713 With CoT</div><div class="comp-body"><strong>Prompt:</strong> \u201cThink step by step: First identify each factual claim, then evaluate each claim against the source spec.\u201d<br><br><strong>Output:</strong> \u201c1. Claim: \u2018supports 10TB\u2019 \u2192 Spec says 5TB \u2014 INCORRECT. 2. Claim: \u2018AES-256 encryption\u2019 \u2192 Confirmed in spec \u2014 CORRECT. 3. Claim: \u201899.99% uptime\u2019 \u2192 Spec says 99.9% \u2014 INCORRECT.\u201d</div></div>'+
  '</div>'+
  '<div class="callout">Adding \u201cThink step by step\u201d or \u201cShow your reasoning\u201d dramatically improves accuracy for analytical tasks. The model is forced to process systematically rather than jumping to a conclusion.</div>'+

  '<div class="sec-title">System Prompt Design</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>System prompts are hidden instructions that define the AI\u2019s behavior before any user interaction. Every AI application uses them. Understanding their structure helps you work with AI tools more effectively \u2014 and design your own for API-based workflows.</p>'+
  '</div></div>'+
  '<div class="sim-area">'+
    '<p style="font-size:13px;font-weight:600;color:var(--tx-primary);margin-bottom:10px">Example System Prompt: Documentation Assistant</p>'+
    '<div style="background:var(--bg-muted);border-radius:8px;padding:16px;font-family:var(--font-mono);font-size:13px;line-height:1.7;color:var(--tx-primary)">'+
      '<span style="color:var(--accent);font-weight:700">Role:</span> You are a senior technical writer specializing in API documentation.<br>'+
      '<span style="color:var(--accent);font-weight:700">Style:</span> Use active voice, present tense, AP style. Write at an 8th-grade reading level.<br>'+
      '<span style="color:var(--accent);font-weight:700">Behavior:</span> When unsure about a technical detail, flag it with [VERIFY] rather than guessing.<br>'+
      '<span style="color:var(--accent);font-weight:700">Format:</span> Always use markdown. Use ## for section headings, bullet points for lists.<br>'+
      '<span style="color:var(--accent);font-weight:700">Constraints:</span> Never invent API endpoints. Never fabricate error codes. If the source material is ambiguous, state the ambiguity explicitly.<br>'+
      '<span style="color:var(--accent);font-weight:700">Context:</span> You are documenting a REST API for a B2B SaaS product. Your audience is developers integrating our API.'+
    '</div>'+
  '</div>'+

  '<div class="sec-title">Prompt Chaining</div>'+
  '<p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Breaking complex tasks into sequential, focused prompts produces dramatically better results than a single monolithic prompt.</p>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-chain" id="chain-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',Math.max(0,flowCur.chain-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'chain\',flowCur.chain+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-chain">Step 0 / 4</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-chain"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-chain"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<div class="sec-title">Structured Output</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">JSON Output</div><div class="card-text">Ask: \u201cExtract metadata from this article and return as JSON with fields: title, author, date, category, tags, summary.\u201d The AI returns clean, parseable JSON that can feed directly into your CMS or database.</div></div>'+
    '<div class="card"><div class="card-title">Markdown Tables</div><div class="card-text">Ask: \u201cCompare these three products in a markdown table with columns: Feature, Product A, Product B, Product C.\u201d Produces a structured comparison ready for documentation.</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Building a Prompt Chain for Document Review</summary><div class="deeper-body">'+
    '<p>Here\u2019s a real 4-step prompt chain used by a documentation team for reviewing technical documents against specifications:</p>'+
    '<p style="margin-top:10px"><strong>Step 1 \u2014 Extract Claims:</strong> \u201cRead this draft and list every factual claim, technical specification, and numerical value as a numbered list. Do not evaluate \u2014 just extract.\u201d This separation prevents the model from skipping claims it thinks are \u201cobviously correct.\u201d</p>'+
    '<p style="margin-top:10px"><strong>Step 2 \u2014 Cross-Reference:</strong> \u201cFor each claim in the list above, search the attached specification document. Mark each as CONFIRMED, CONTRADICTED, or NOT FOUND. Include the spec section number for confirmed/contradicted items.\u201d</p>'+
    '<p style="margin-top:10px"><strong>Step 3 \u2014 Style Review:</strong> \u201cNow review the original draft for style guide compliance: active voice, present tense, no jargon, headers for each section, bullet points for lists. Flag violations.\u201d Separating factual and style reviews prevents the model from conflating accuracy issues with formatting issues.</p>'+
    '<p style="margin-top:10px"><strong>Step 4 \u2014 Synthesize:</strong> \u201cCreate a review summary with three sections: Critical Issues (contradicted facts), Style Fixes (violations), and Suggestions (improvements). Prioritize by severity.\u201d The final step produces the actionable deliverable.</p>'+
    '<p style="margin-top:10px">This chain consistently catches 3-5x more issues than a single \u201creview this document\u201d prompt because each step has a single, focused job.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">From One Prompt to Four: How Chaining Transformed a Review Workflow</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt><dd>A content team asked AI to \u201creview this 20-page spec for accuracy and style.\u201d The AI produced vague feedback: \u201cThe document is well-structured with minor style inconsistencies.\u201d</dd>'+
      '<dt>Improvement</dt><dd>They broke the review into a 4-step chain: extract claims, verify against source, check style guide compliance, and synthesize findings.</dd>'+
      '<dt>Result</dt><dd>The chain identified 12 factual discrepancies, 8 style violations, and 5 missing sections \u2014 compared to \u201cminor inconsistencies\u201d from the single prompt.</dd>'+
      '<dt>Takeaway</dt><dd>Prompt chaining produces qualitatively better results because each step has a focused objective. The AI doesn\u2019t have to juggle multiple evaluation criteria simultaneously.</dd>'+
    '</dl></div>'+

  renderQuiz('mod3',[
    {type:'mc',q:'What is the primary advantage of few-shot prompting over zero-shot?',opts:['It uses less tokens','It\u2019s faster','The model pattern-matches your examples for consistent format and style','It bypasses the model\u2019s guardrails'],a:2,exp:'Few-shot prompting shows the model what good output looks like, allowing it to pattern-match format, tone, length, and style from your examples.'},
    {type:'tf',q:'Chain-of-thought prompting forces the model to show its reasoning, which tends to improve accuracy.',a:true,exp:'When the model must reason step by step, it catches errors it would miss when jumping directly to a conclusion.'},
    {type:'mc',q:'What is the purpose of a system prompt?',opts:['To make the AI smarter','To define the AI\u2019s behavior, role, and constraints before user interaction','To increase the context window','To fine-tune the model\u2019s weights'],a:1,exp:'System prompts set the behavioral framework \u2014 role, style, constraints, and context \u2014 that shapes all subsequent interactions.'},
    {type:'tf',q:'A single complex prompt always produces better results than breaking the task into a chain of focused prompts.',a:false,exp:'Prompt chaining typically produces dramatically better results for complex tasks because each step has a single, focused objective.'},
    {type:'mc',q:'Which structured output format would be most useful for feeding AI results into a CMS database?',opts:['Free-form prose','Markdown with headers','JSON with defined fields','A bulleted list'],a:2,exp:'JSON provides structured, parseable data that databases and CMS systems can ingest directly without manual reformatting.'}
  ]);
}

/* ══ MODULE 4: RAG, MCP & TOOL USE ══ */

  '<div class="card" style="margin-bottom:16px"><div class="card-text">RAG (Retrieval-Augmented Generation) grounds AI responses in your actual documents rather than relying solely on training data. This dramatically reduces hallucination and enables AI to answer questions about your organization\u2019s specific content.</div></div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-rag" id="rag-flow-box">'+

  '<div class="sec-title">MCP \u2014 How AI Connects to Your Tools</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-text">MCP (Model Context Protocol) is an open standard by Anthropic that standardizes how AI applications connect to external tools and data sources. Think of it as USB-C for AI \u2014 one universal connector instead of a different cable for every device.</div></div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-mcp" id="mcp-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',Math.max(0,flowCur.mcp-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'mcp\',flowCur.mcp+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-mcp">Step 0 / 8</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-mcp"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-mcp"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<div class="sec-title">Function Calling vs. MCP</div>'+
  '<div class="comparator">'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Function Calling</div><div class="comp-body"><strong>Single-tool invocation.</strong> You define specific functions the AI can call (e.g., get_weather, search_docs). The AI decides when to call them and with what parameters. Each function is custom-built for a specific API. Works well for simple integrations but doesn\u2019t scale.</div></div>'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(124,58,237,0.08);color:var(--accent)">MCP (Protocol)</div><div class="comp-body"><strong>Tool ecosystem protocol.</strong> Standardized way for AI to discover and use many tools from many providers. One protocol handles Jira, Google Drive, databases, and any MCP-compatible service. The AI client doesn\u2019t need to know each tool\u2019s API \u2014 MCP abstracts it.</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Why MCP Matters for Content Teams</summary><div class="deeper-body">'+
    '<p>MCP enables a future where your AI assistant can seamlessly interact with your entire content toolchain:</p>'+
    '<p style="margin-top:10px"><strong>CMS Integration:</strong> An MCP server for your CMS lets the AI read existing articles, check for duplicates, understand your content structure, and even draft updates that slot into the right location. Instead of copy-pasting content into chat, the AI pulls it directly from the source.</p>'+
    '<p style="margin-top:10px"><strong>Style Guide Enforcement:</strong> An MCP server wrapping your style guide means the AI can check every draft against your actual rules \u2014 not generic writing advice. It knows that your organization uses \u201clog in\u201d (two words, verb) and \u201clogin\u201d (one word, noun) because it has direct access to your style decisions.</p>'+
    '<p style="margin-top:10px"><strong>Analytics-Driven Content:</strong> Connect your analytics platform via MCP, and the AI can identify which articles have high bounce rates, which search queries lead to dead ends, and where content gaps exist \u2014 then draft content specifically targeted at those gaps.</p>'+
    '<p style="margin-top:10px"><strong>Publishing Pipeline:</strong> The end state is an AI assistant that can read from your CMS, check your style guide, query your analytics, draft content, and submit it for review \u2014 all through standardized MCP connections. Each integration is a plug-and-play MCP server, not custom code.</p>'+
    '<p style="margin-top:10px">MCP is still early, but adoption is accelerating. Understanding it now positions you to leverage these integrations as they become available.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">How RAG Eliminated 90% of Hallucinations in a Knowledge Base Bot</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt><dd>A support team deployed a chatbot using a vanilla LLM to answer customer questions. Within a week, customers reported receiving confident but incorrect answers about product features, pricing, and policies.</dd>'+
      '<dt>Root Cause</dt><dd>The LLM was answering from its general training data, not from the company\u2019s actual documentation. It hallucinated product features that didn\u2019t exist and quoted pricing from competitors.</dd>'+
      '<dt>Solution</dt><dd>Implemented RAG: all support articles, product docs, and policy documents were chunked, embedded, and stored in a vector database. The chatbot now retrieves relevant documents before generating each response.</dd>'+
      '<dt>Result</dt><dd>Hallucination rate dropped from ~30% to ~3%. When the bot doesn\u2019t find relevant documentation, it now says \u201cI couldn\u2019t find this information in our docs \u2014 please contact support\u201d instead of guessing.</dd>'+
    '</dl></div>'+

  renderQuiz('mod4',[
    {type:'mc',q:'What is the primary purpose of RAG?',opts:['To make AI responses faster','To ground AI responses in actual documents, reducing hallucination','To train the AI on your data','To replace the need for a knowledge base'],a:1,exp:'RAG retrieves relevant documents and includes them in the prompt context, grounding the AI\u2019s response in real source material.'},
    {type:'tf',q:'In a RAG pipeline, the vector database uses keyword matching to find relevant documents.',a:false,exp:'Vector databases use semantic similarity (comparing embedding vectors), not keyword matching. This enables finding relevant documents even when exact keywords differ.'},
    {type:'mc',q:'MCP is best described as:',opts:['A specific AI model','A standardized protocol for connecting AI to external tools','A type of prompt engineering','A database technology'],a:1,exp:'MCP (Model Context Protocol) is an open standard for connecting AI applications to external tools and data sources \u2014 like USB-C for AI.'},
    {type:'tf',q:'Function calling and MCP serve the exact same purpose and are interchangeable.',a:false,exp:'Function calling is single-tool invocation (custom per API); MCP is a standardized protocol for discovering and using entire tool ecosystems. MCP is broader and more scalable.'},
    {type:'mc',q:'When a RAG system cannot find relevant documents for a query, a well-designed system should:',opts:['Generate an answer from training data anyway','Report that it couldn\u2019t find relevant information','Make up plausible-sounding information','Search the internet instead'],a:1,exp:'A well-designed RAG system transparently reports when it can\u2019t find relevant documents rather than falling back to potentially hallucinated training data.'}
  ]);
}

/* ══ MODULE 5: AGENTIC AI ══ */
function mod5Content(){
  return '<div class="sec-title">What Is an Agent?</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-text" style="line-height:1.8">'+
    '<p>AI agents represent a spectrum of autonomy, from simple one-shot prompts to fully autonomous multi-step systems:</p>'+
  '</div></div>'+
  '<div class="grid-2">'+
    '<div class="concept-card" style="border-left:4px solid var(--border)"><div class="concept-title">Simple Prompt</div><div class="concept-desc">One question \u2192 one answer. No memory, no tools. Like asking a colleague a single question.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--primary-light)"><div class="concept-title">Chatbot</div><div class="concept-desc">Multi-turn conversation with memory within the session. Can reference earlier messages. Like an ongoing discussion.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--accent)"><div class="concept-title">Copilot</div><div class="concept-desc">AI integrated into your workflow tool, providing suggestions as you work. GitHub Copilot, Cursor, etc. You\u2019re in control; the AI assists.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--success)"><div class="concept-title">Agent</div><div class="concept-desc">Autonomous planning + tool use + multi-step execution. The AI decides what to do, which tools to use, and when to ask for help. You assign the goal; the agent figures out the steps.</div></div>'+
  '</div>'+

  '<div class="sec-title">The Agent Loop</div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-agent" id="agent-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',Math.max(0,flowCur.agent-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'agent\',flowCur.agent+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-agent">Step 0 / 8</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-agent"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-agent"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Agents Today vs. Tomorrow</summary><div class="deeper-body">'+
    '<p><strong>Where agents are now (2024-2025):</strong> Current AI agents are capable but require careful oversight. They excel at structured, well-defined tasks with clear success criteria \u2014 running code, searching documents, transforming content. They struggle with ambiguous goals, tasks requiring deep domain expertise, and situations requiring judgment calls that depend on organizational context. Agent failures tend to cascade: one wrong decision early in a multi-step task compounds through subsequent steps.</p>'+
    '<p style="margin-top:10px"><strong>Practical limitations today:</strong> Agents can\u2019t reliably handle tasks that require more than 10-15 steps. Their \u201cworking memory\u201d is essentially the context window, which means they can lose track of earlier decisions in long workflows. They don\u2019t learn from mistakes within a session (though the human can redirect them). And they can\u2019t yet assess their own confidence accurately \u2014 they may confidently proceed with a flawed approach rather than asking for help.</p>'+
    '<p style="margin-top:10px"><strong>Where agents are heading:</strong> Autonomous documentation maintenance (monitoring repos for changes and drafting updates), continuous content quality monitoring (flagging outdated articles, broken links, terminology inconsistencies), and proactive update suggestions (\u201cThis article references v3.1 features, but v3.2 is released \u2014 here\u2019s a suggested update\u201d). Multi-agent systems where specialized agents collaborate \u2014 one researches, one drafts, one reviews \u2014 are an active area of development.</p>'+
    '<p style="margin-top:10px"><strong>The human-in-the-loop remains essential:</strong> Even as agents become more capable, content workflows demand human approval before publication. The best near-term model is: agents handle research, drafting, and initial review; humans make judgment calls, approve publication, and handle edge cases.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">An Agent-Assisted Release Note Workflow</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt><dd>A documentation team spends 2 days each sprint converting engineering changelogs into customer-facing release notes across 5 product areas.</dd>'+
      '<dt>Agent Workflow</dt><dd>The team deploys an agent that: (1) monitors the Git repository for changelog updates, (2) retrieves relevant product context from the knowledge base, (3) drafts release notes using the team\u2019s established template and style guide, (4) cross-references against the existing documentation for consistency, and (5) submits drafts for human review with a confidence score for each item.</dd>'+
      '<dt>Result</dt><dd>The 2-day task became a 3-hour review session. The agent drafted 80% of items correctly on the first pass. The remaining 20% needed human editing, primarily for nuanced customer impact assessment that required product knowledge the agent didn\u2019t have.</dd>'+
      '<dt>Takeaway</dt><dd>Agents excel at structured, repeatable tasks with clear patterns. The human\u2019s role shifts from drafting to reviewing and adding judgment \u2014 a more valuable use of expertise.</dd>'+
    '</dl></div>'+

  renderQuiz('mod5',[
    {type:'mc',q:'What distinguishes an AI agent from a chatbot?',opts:['Agents are smarter','Agents can plan, use tools, and execute multi-step tasks autonomously','Agents have larger context windows','Agents don\u2019t need prompts'],a:1,exp:'Agents autonomously plan, select tools, execute actions, and evaluate results across multiple steps \u2014 chatbots respond to individual messages.'},
    {type:'tf',q:'Current AI agents can reliably handle any task without human oversight.',a:false,exp:'Current agents require careful oversight. They excel at structured tasks but struggle with ambiguity, and errors compound across steps.'},
    {type:'mc',q:'In the agent loop, what is the purpose of "working memory"?',opts:['To permanently store all past conversations','To accumulate context from each subtask so later steps can reference earlier results','To replace the need for tool calls','To train the model on new data'],a:1,exp:'Working memory accumulates results from each subtask, allowing the agent to build on earlier findings as it progresses through the plan.'},
    {type:'tf',q:'The "planning" step is what distinguishes an agent from a simple prompt-response pattern.',a:true,exp:'Planning \u2014 breaking a complex task into subtasks and determining sequence \u2014 is the defining capability that separates agents from chatbots.'},
    {type:'mc',q:'When should an agent stop and request human input?',opts:['Never \u2014 agents should be fully autonomous','Only when it encounters an error','Before making irreversible changes or when it encounters ambiguity','Only at the very end of the task'],a:2,exp:'Well-designed agents request human approval before irreversible actions and when they encounter ambiguity that requires judgment.'}
  ]);
}

/* ══ MODULE 6: ADVANCED AI WORKFLOW ══ */
function mod6Content(){

  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>A prompt library is a curated collection of tested, reusable prompt templates organized by task type. It\u2019s your team\u2019s most valuable AI productivity asset. Every time someone discovers a prompt that works brilliantly, it should be saved, documented, and shared.</p>'+
    '<p style="margin-top:12px"><strong>Structure each entry with:</strong> (1) Task category, (2) The prompt template with placeholder variables, (3) An example of good output, (4) Notes on when it works best and when it doesn\u2019t, (5) Which model produces the best results.</p>'+
  '</div></div>'+

  '<div class="sec-title">Build Your Evaluation Rubric</div>'+
  '<div class="sim-area" id="rubric-builder">'+

    '<div id="rubric-items">'+
      '<div class="rubric-item"><input type="checkbox" id="rb-acc" checked><label for="rb-acc">Factual Accuracy</label><input type="number" class="rubric-weight" value="30" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-tone" checked><label for="rb-tone">Tone & Voice</label><input type="number" class="rubric-weight" value="20" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-fmt"><label for="rb-fmt">Format Compliance</label><input type="number" class="rubric-weight" value="15" min="0" max="100">%</div>'+

    '</div>'+
    '<div class="callout" style="margin-top:16px">Adjust the weights to match your content type. Technical documentation might weight accuracy at 40%+ while marketing copy might weight tone higher. The key is having a <em>consistent</em> rubric so every reviewer applies the same standards.</div>'+

  '<div class="card"><div class="card-text" style="line-height:1.8">'+

    '<p style="margin-top:12px"><strong>Template:</strong> \u201cCompare the following three documents for consistency. Flag any instances where: (1) the same feature is described differently, (2) terminology varies (e.g., \u2018log in\u2019 vs. \u2018login\u2019), (3) version numbers or dates conflict, (4) procedural steps differ for the same task. Present findings as a table with columns: Issue, Document 1 Text, Document 2 Text, Recommendation.\u201d</p>'+
  '</div></div>'+

  '<div class="sec-title">Content Governance Framework</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">AI Usage Policy Elements</div><div class="card-text">\u2022 What types of content can use AI assistance<br>\u2022 Required review steps before publication<br>\u2022 Disclosure requirements (when to note AI involvement)<br>\u2022 Data handling rules (what can/cannot be sent to AI)<br>\u2022 Model selection guidelines by content type<br>\u2022 Escalation paths for edge cases</div></div>'+
    '<div class="card"><div class="card-title">Quality Assurance Checklist</div><div class="card-text">\u2022 All factual claims verified against source material<br>\u2022 No fabricated citations or statistics<br>\u2022 Style guide compliance confirmed<br>\u2022 Audience appropriateness reviewed<br>\u2022 Terminology consistency with existing docs<br>\u2022 Human judgment applied to tone and nuance</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Scaling AI Workflows Across Your Team</summary><div class="deeper-body">'+

    '<p style="margin-top:10px"><strong>Standardize prompts:</strong> When one writer discovers a prompt that works brilliantly, it should become a team resource. Create a shared wiki organized by task type. Each template includes the prompt text, example output, and notes on best/worst use cases.</p>'+
