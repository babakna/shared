    '<p style="margin-top:10px"><strong>Iterate monthly:</strong> Review which prompts are being used, which aren\u2019t working, and what new tasks could benefit from AI assistance. The prompt library should be a living document that evolves with your team\u2019s practice.</p>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">How a 12-Person Content Team Built Their AI Playbook</div>'+

      '<dt>Approach</dt><dd>They dedicated one sprint to: (1) auditing current AI usage across the team, (2) collecting the best prompts from each writer, (3) standardizing a shared prompt library with 30 templates, (4) establishing a review rubric, and (5) choosing default models for each task type.</dd>'+
      '<dt>Result</dt><dd>Within 3 months: content output increased 40%, average time-to-publish decreased from 5 days to 3 days, and consistency scores (measured by cross-document terminology checks) improved by 60%.</dd>'+
      '<dt>Takeaway</dt><dd>The investment in standardization paid for itself within the first month. Individual AI use is good; systematic team AI use is transformational.</dd>'+
    '</dl></div>'+

  renderQuiz('mod6',[
    {type:'mc',q:'What is the most valuable component of a team\u2019s AI prompt library?',opts:['The number of prompts','Tested, documented templates with example outputs and usage notes','Prompts for every possible task','The most complex prompts possible'],a:1,exp:'Quality over quantity \u2014 well-documented templates with examples and usage notes ensure consistent, reliable results across the team.'},
    {type:'tf',q:'AI can reliably replace human judgment for evaluating content tone and audience appropriateness.',a:false,exp:'While AI can flag potential issues, human judgment remains essential for evaluating tone, cultural sensitivity, and audience fit.'},
    {type:'mc',q:'What\u2019s the most effective use of AI for multi-document consistency?',opts:['Asking AI to rewrite all documents','Using AI to identify inconsistencies across documents','Having AI auto-merge all documents','Letting AI pick the best version'],a:1,exp:'AI excels at finding inconsistencies (terminology, version numbers, procedural differences) across document sets that humans miss after repeated reading.'},
    {type:'tf',q:'An AI content governance framework should include rules about what data can be sent to AI tools.',a:true,exp:'Data handling rules are essential \u2014 customer data, proprietary information, and compliance-sensitive content may require specific handling or on-premise models.'},
    {type:'mc',q:'When scaling AI workflows across a team, the best first step is:',opts:['Buying the most expensive AI tool','Auditing current workflows to identify where AI saves the most time','Requiring everyone to use AI for everything','Training everyone on prompt engineering simultaneously'],a:1,exp:'Start with an audit to identify high-impact opportunities, then standardize solutions for those specific tasks before expanding.'}
  ]);
}

/* ══ MODULE 7: ETHICS & RESPONSIBLE USE ══ */
function mod7Content(){
  return '<div class="sec-title">Sources of Bias in Training Data</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">Representation Bias</div><div class="card-text">Training data over-represents certain demographics, languages, and perspectives. English-language content dominates, Western cultural norms are treated as defaults, and historically marginalized perspectives are underrepresented. For content teams: AI-generated text may default to culturally specific idioms, assume Western business norms, or handle non-English terminology inconsistently.</div></div>'+
    '<div class="card"><div class="card-title">Historical Bias</div><div class="card-text">Training data reflects historical societal biases that existed in the source material. Gender stereotypes, racial biases, and professional assumptions from decades of published text are embedded in the model\u2019s patterns. The model doesn\u2019t know these biases are harmful \u2014 it treats them as statistical patterns to replicate.</div></div>'+
    '<div class="card"><div class="card-title">Selection Bias</div><div class="card-text">The internet text used for training is not a random sample of human knowledge. It over-represents opinions from people who write online, topics that generate engagement, and sources in English. Niche expertise, oral traditions, and non-digital knowledge are underrepresented.</div></div>'+
    '<div class="card"><div class="card-title">Confirmation Bias (in Prompts)</div><div class="card-text">LLMs are trained through RLHF to be agreeable and helpful. If your prompt implies a certain answer (\u201cIsn\u2019t it true that X is best?\u201d), the AI will often agree. Frame questions neutrally: \u201cWhat are the arguments for and against X?\u201d to get balanced output.</div></div>'+
  '</div>'+

  '<div class="sec-title">Alignment & Constitutional AI</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p><strong>Alignment</strong> is the challenge of ensuring AI systems behave in accordance with human values and intentions. It\u2019s why modern AI tools refuse harmful requests, try to be truthful, and acknowledge uncertainty.</p>'+
    '<p style="margin-top:12px"><strong>Constitutional AI</strong> (developed by Anthropic) adds a self-critique step: the model generates a response, then evaluates its own response against a set of principles (\u201cIs this helpful? Is this harmful? Is this honest?\u201d), and revises accordingly. This is one reason Claude tends to be more cautious and nuanced than models without this mechanism.</p>'+
    '<p style="margin-top:12px"><strong>Guardrails</strong> are specific safety mechanisms: content filters that block harmful outputs, refusal behaviors for dangerous requests, and bias mitigation techniques. They\u2019re not perfect \u2014 they sometimes refuse legitimate requests (false positives) and occasionally miss harmful outputs (false negatives).</p>'+
  '</div></div>'+

  '<div class="sec-title">Red-Team This Output</div>'+
  '<p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Red-teaming means deliberately looking for problems. Review this AI-generated content and identify potential issues. Click sentences you think have problems.</p>'+
  '<div id="redteam-area"></div>'+
  '<div style="text-align:center;margin:16px 0"><button class="flow-btn pri" id="rt-check-btn" onclick="checkRedTeam()">Check My Analysis</button></div>'+
  '<div id="rt-feedback" style="display:none"></div>'+

  '<div class="sec-title">Copyright & IP for Content Creators</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>Copyright law around AI-generated content is evolving rapidly. Here\u2019s the current practical landscape:</p>'+
    '<p style="margin-top:12px"><strong>AI-generated content copyright:</strong> In most jurisdictions, purely AI-generated content (no significant human creative input) is not copyrightable. However, content that involves substantial human selection, arrangement, and editing likely qualifies for copyright protection. Your editorial contribution matters legally.</p>'+
    '<p style="margin-top:12px"><strong>Using AI on others\u2019 content:</strong> Pasting copyrighted material into an AI tool for summarization or transformation creates legal gray areas. Your organization should have clear guidelines about what source material can be processed through AI tools.</p>'+
    '<p style="margin-top:12px"><strong>Practical guidelines:</strong> (1) Always add substantial human creative input to AI drafts. (2) Don\u2019t claim AI output as purely original work. (3) Follow your organization\u2019s disclosure policies. (4) Don\u2019t paste third-party copyrighted content into AI without authorization. (5) Keep records of your editorial process.</p>'+
  '</div></div>'+

  '<details class="deeper"><summary>Deeper Dive: Building Your Organization\u2019s AI Usage Guidelines</summary><div class="deeper-body">'+
    '<p>Every organization using AI for content creation needs clear, practical usage guidelines. Here\u2019s a framework for building yours:</p>'+
    '<p style="margin-top:10px"><strong>1. Define permitted use cases:</strong> Specify which tasks can use AI assistance (drafting, editing, summarization, translation) and which cannot (final approval, legal content, customer-facing commitments without review). Be specific \u2014 \u201cAI may be used for first drafts that will be reviewed by a human editor\u201d is better than \u201cAI may be used for writing.\u201d</p>'+
    '<p style="margin-top:10px"><strong>2. Establish review requirements:</strong> Define minimum review standards for AI-assisted content. Example: \u201cAll AI-assisted content must be reviewed by at least one subject matter expert before publication. Factual claims must be verified against primary sources. Citations must be confirmed to exist.\u201d</p>'+
    '<p style="margin-top:10px"><strong>3. Set data handling rules:</strong> Specify what data can and cannot be sent to AI tools. Customer PII, proprietary code, legal documents, and pre-announcement product details typically require on-premise solutions or explicit approval. Create a simple decision tree: \u201cIf the content contains X, use Y tool / get Z approval.\u201d</p>'+
    '<p style="margin-top:10px"><strong>4. Address disclosure:</strong> Determine when and how to disclose AI involvement. Some organizations disclose on all AI-assisted content; others disclose only when AI generated a substantial portion. Choose a policy and apply it consistently.</p>'+
    '<p style="margin-top:10px"><strong>5. Plan for evolution:</strong> AI capabilities change rapidly. Review and update your guidelines quarterly. Assign an \u201cAI lead\u201d who stays current on tool capabilities and policy implications.</p>'+
  '</div></details>'+

  renderQuiz('mod7',[
    {type:'mc',q:'What is Constitutional AI?',opts:['AI that follows the law','A technique where the model self-critiques its responses against a set of principles','AI that only works in democratic countries','A type of model architecture'],a:1,exp:'Constitutional AI has the model evaluate its own outputs against principles (helpful, harmless, honest) and revise before returning the response.'},
    {type:'tf',q:'Purely AI-generated content with no human creative input is generally copyrightable.',a:false,exp:'In most jurisdictions, purely AI-generated content without substantial human creative contribution is not eligible for copyright protection.'},
    {type:'mc',q:'What is red-teaming in the context of AI?',opts:['Using AI to generate red-colored content','Deliberately trying to find problems, failures, and safety issues in AI outputs','Training the model with negative examples','Testing AI response speed'],a:1,exp:'Red-teaming is the practice of deliberately probing AI outputs for problems \u2014 bias, inaccuracy, safety issues, and edge cases.'},
    {type:'tf',q:'If your prompt implies a certain answer, modern AI tools will always push back and give a balanced response.',a:false,exp:'LLMs are trained to be agreeable through RLHF. Leading prompts often get confirming responses. Frame questions neutrally for balanced output.'},
    {type:'mc',q:'An effective organizational AI usage policy should include:',opts:['A ban on all AI use until regulations are finalized','Only technical specifications for approved models','Permitted use cases, review requirements, data handling rules, and disclosure policies','A single rule: use your judgment'],a:2,exp:'Comprehensive guidelines cover what\u2019s permitted, how content is reviewed, what data can be sent to AI, and when to disclose AI involvement.'}
  ]);
}

/* ══ QUIZ SYSTEM ══ */
function renderQuiz(id, questions){
  return '<div class="quiz-section"><div class="sec-title">Knowledge Check</div>'+
  questions.map(function(q,i){
    var qid = id+'-q'+i;
    if(q.type === 'tf'){
      return '<div class="quiz-card" id="qc-'+qid+'"><div class="quiz-q"><span class="q-num">Q'+(i+1)+'.</span> '+q.q+' <span class="q-type">True / False</span></div><div class="quiz-opts">'+
        '<div class="quiz-opt" data-qid="'+qid+'" data-val="true" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">T</div>True</div>'+
        '<div class="quiz-opt" data-qid="'+qid+'" data-val="false" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">F</div>False</div>'+
      '</div><button class="quiz-check" id="btn-'+qid+'" onclick="checkQuiz(\''+qid+'\','+q.a+',\''+esc(q.exp)+'\')" disabled>Check Answer</button><div class="quiz-fb" id="fb-'+qid+'"></div></div>';
    } else {
      return '<div class="quiz-card" id="qc-'+qid+'"><div class="quiz-q"><span class="q-num">Q'+(i+1)+'.</span> '+q.q+' <span class="q-type">Multiple Choice</span></div><div class="quiz-opts">'+
        q.opts.map(function(o,j){return '<div class="quiz-opt" data-qid="'+qid+'" data-val="'+j+'" onclick="selectQuizOpt(this)" tabindex="0"><div class="opt-marker">'+String.fromCharCode(65+j)+'</div>'+o+'</div>';}).join('')+
      '</div><button class="quiz-check" id="btn-'+qid+'" onclick="checkQuiz(\''+qid+'\','+q.a+',\''+esc(q.exp)+'\')" disabled>Check Answer</button><div class="quiz-fb" id="fb-'+qid+'"></div></div>';
    }
  }).join('')+'</div>';
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,"&quot;")}

function selectQuizOpt(el){
  var qid = el.dataset.qid;
  if(quizStates[qid]) return;
  el.parentElement.querySelectorAll('.quiz-opt').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected');
  document.getElementById('btn-'+qid).disabled = false;
}

function checkQuiz(qid, correct, exp){
  if(quizStates[qid]) return;
  quizStates[qid] = true;
  var card = document.getElementById('qc-'+qid);
  var opts = card.querySelectorAll('.quiz-opt');
  var selectedVal = null;
  opts.forEach(function(o){if(o.classList.contains('selected')) selectedVal = o.dataset.val;});
  var isCorrect = String(selectedVal) === String(correct);
  opts.forEach(function(o){
    o.style.cursor = 'default';
    if(String(o.dataset.val) === String(correct)) o.classList.add('right');
    else if(o.classList.contains('selected') && !isCorrect) o.classList.add('wrong');
  });
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  var fb = document.getElementById('fb-'+qid);
  fb.className = 'quiz-fb vis '+(isCorrect?'correct':'incorrect');
  fb.innerHTML = '<strong>'+(isCorrect?'\u2713 Correct!':'\u2717 Incorrect.')+'</strong> '+exp;
  document.getElementById('btn-'+qid).disabled = true;
}

var flowCur = {training:0,chain:0,rag:0,mcp:0,agent:0};

function initFlow(id){
  flowCur[id] = 0;
  renderFlow(id, FLOW_DATA[id]);
}

function renderFlow(id, data){
  var inner = document.getElementById('flow-inner-'+id);
  if(!inner) return;
  var nodeCount = data.nodes.length;
  var colors = ['#2563EB','#7C3AED','#06B6D4','#F59E0B','#10B981'];
  var nodesHtml = '<div class="flow-nodes">'+data.nodes.map(function(n,i){
    var parts = n.split('|');
    return '<div class="flow-ncol"><div class="flow-nbox" style="border-top-color:'+colors[i%5]+'"><div class="flow-nname">'+parts[0]+'</div><div class="flow-ndesc">'+(parts[1]||'')+'</div></div></div>';
  }).join('')+'</div>';

  var step = flowCur[id];
  var total = data.steps.length;
  var rowsHtml = '';

  data.steps.forEach(function(s,i){
    var vis = step === 0 ? 'dim' : (i < step ? 'vis' : 'dim');
    var cur = (i === step - 1) ? 'cur' : '';
    var midCol = (s.f + s.t) / 2;
    var leftPct = ((midCol + 0.5) / nodeCount * 100);
    rowsHtml += '<div class="flow-mrow '+vis+' '+cur+'">'+
      '<div class="flow-lifelines">'+data.nodes.map(function(){return '<div class="flow-ll-col"><div class="flow-ll"></div></div>';}).join('')+'</div>'+
      '<svg class="flow-arrow-svg" data-fi="'+s.f+'" data-ti="'+s.t+'" data-nc="'+nodeCount+'"></svg>'+
      '<div class="flow-mlwrap" style="left:'+leftPct+'%"><div class="flow-mlabel"><div class="flow-msn">'+s.n+'</div>'+
      '<div class="flow-mattr">'+(s.a||[]).slice(0,2).map(function(a){return '<span class="flow-matag">'+a[0]+'</span>';}).join('')+'</div></div></div></div>';
  });

  var mobileStepsHtml = '<div class="flow-step-list">';
  data.steps.forEach(function(s, i){
    var vis = step === 0 ? 'dim' : (i < step ? (i === step - 1 ? 'cur' : '') : 'dim');
    var fromName = data.nodes[s.f].split('|')[0];
    var toName = data.nodes[s.t].split('|')[0];
    mobileStepsHtml += '<div class="flow-mob-step '+vis+'"><div class="flow-mob-num">'+(i+1)+'</div><div class="flow-mob-content"><div class="flow-mob-name">'+s.n+'</div><div class="flow-mob-dir">'+fromName+' \u2192 '+toName+'</div></div></div>';
  });
  mobileStepsHtml += '</div>';

  inner.innerHTML = nodesHtml + '<div class="flow-msgs">'+rowsHtml+'</div>' + mobileStepsHtml;
  document.getElementById('flow-ind-'+id).textContent = 'Step '+step+' / '+total;

  var detail = document.getElementById('flow-detail-'+id);
  if(step > 0 && step <= total){
    var s = data.steps[step-1];
    var fromName = data.nodes[s.f].split('|')[0];
    var toName = data.nodes[s.t].split('|')[0];
    detail.className = 'flow-detail vis';
    detail.innerHTML = '<div class="flow-dmn">'+s.n+'</div><div class="flow-ddir">'+fromName+' \u2192 '+toName+'</div>'+
      '<table class="flow-dtbl"><thead><tr><th>Attribute</th><th>Value</th></tr></thead><tbody>'+
      (s.a||[]).map(function(a){return '<tr><td>'+a[0]+'</td><td>'+a[1]+'</td></tr>';}).join('')+'</tbody></table>'+
      '<div class="flow-dnote">'+s.d+'</div>';
  } else { detail.className = 'flow-detail'; }

  requestAnimationFrame(function(){ drawFlowArrows(id); });
}

function drawFlowArrows(id){
  var container = document.getElementById('flow-inner-'+id);
  if(!container) return;
  container.querySelectorAll('.flow-arrow-svg').forEach(function(svg){
    var row = svg.parentElement;
    var fi = parseInt(svg.dataset.fi);
    var ti = parseInt(svg.dataset.ti);
    var nc = parseInt(svg.dataset.nc);
    var w = row.offsetWidth;
    var h = row.offsetHeight;
    if(!w) return;
    svg.setAttribute('viewBox', '0 0 '+w+' '+h);
    svg.innerHTML = '';
    var cw = w / nc;
    var y = h * 0.5;
    if(fi === ti){
      var cx = (fi + 0.5) * cw, r = 22;
      var path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M'+(cx-r)+' '+y+' C'+(cx-r)+' '+(y+r*2.2)+','+(cx+r)+' '+(y+r*2.2)+','+(cx+r)+' '+y);
      path.setAttribute('fill','none'); path.setAttribute('stroke','var(--accent)'); path.setAttribute('stroke-width','2');
      svg.appendChild(path);
      var arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arrow.setAttribute('points',(cx+r)+','+y+' '+(cx+r-5)+','+(y+7)+' '+(cx+r+5)+','+(y+7));
      arrow.setAttribute('fill','var(--accent)'); svg.appendChild(arrow);
    } else {
      var x1 = (fi + 0.5) * cw, x2 = (ti + 0.5) * cw;
      var line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1); line.setAttribute('y1',y); line.setAttribute('x2',x2); line.setAttribute('y2',y);
      line.setAttribute('stroke','var(--primary)'); line.setAttribute('stroke-width','2'); svg.appendChild(line);
      var arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      if(x2 > x1) arrow.setAttribute('points',x2+','+y+' '+(x2-8)+','+(y-4)+' '+(x2-8)+','+(y+4));
      else arrow.setAttribute('points',x2+','+y+' '+(x2+8)+','+(y-4)+' '+(x2+8)+','+(y+4));
      arrow.setAttribute('fill','var(--primary)'); svg.appendChild(arrow);
    }
  });
}

var flowResizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(flowResizeTimer);
  flowResizeTimer = setTimeout(function(){ Object.keys(FLOW_DATA).forEach(function(id){ drawFlowArrows(id); }); }, 200);
});

function flowStep(id, n){
  var total = FLOW_DATA[id].steps.length;
  flowCur[id] = Math.max(0, Math.min(n, total));
  renderFlow(id, FLOW_DATA[id]);
  requestAnimationFrame(function(){
    drawFlowArrows(id);
    var curRow = document.querySelector('#flow-inner-'+id+' .flow-mrow.cur');
    if(curRow) curRow.scrollIntoView({behavior:'smooth', block:'nearest'});
  });
}

function renderTxSteps(){
  var el = document.getElementById('tx-steps');
  if(!el) return;
  el.innerHTML = TX_STEPS.map(function(s,i){return '<div class="tx-step '+(i <= txCur ? 'active' : '')+'" id="txs-'+i+'"><div class="tx-step-ico">'+s.ico+'</div><div><div class="tx-step-name">'+s.name+'</div></div></div>';}).join('');
  document.getElementById('tx-step-ind').textContent = 'Step '+txCur+' / '+TX_STEPS.length;
  var detail = document.getElementById('tx-detail');
  if(txCur > 0 && txCur <= TX_STEPS.length){
    detail.style.display = 'block';
    var s = TX_STEPS[Math.min(txCur,TX_STEPS.length)-1];
    detail.innerHTML = '<strong>'+s.name+':</strong> '+s.desc;
  } else { detail.style.display = 'none'; }
}
function txStep(n){
  txCur = Math.max(0,Math.min(n,TX_STEPS.length));
  renderTxSteps();
  var activeStep = document.querySelector('.tx-step.active:last-of-type');
  if(activeStep) activeStep.scrollIntoView({behavior:'smooth', block:'nearest'});
}

  {term:'Safety Filter',cat:'GenAI',def:'A system that screens AI inputs and outputs for harmful, dangerous, or policy-violating content.',why:'Explains why AI sometimes refuses legitimate requests \u2014 safety filters can have false positives.',rel:['Guardrails','Red-Teaming']},
  {term:'Red-Teaming',cat:'GenAI',def:'Deliberately trying to make AI fail or bypass safety measures to identify vulnerabilities.',why:'Understanding red-teaming explains why AI tools sometimes seem overly cautious.',rel:['Guardrails','Safety Filter']},
  {term:'Prompt',cat:'Prompting',def:'The input you give to an AI model \u2014 your question, instruction, or request.',why:'Prompt quality directly determines output quality.',rel:['Prompt Engineering','System Prompt']},
  {term:'Prompt Engineering',cat:'Prompting',def:'Designing and refining prompts to get optimal output from an AI model.',why:'Your core skill for working effectively with AI tools.',rel:['Prompt','Few-Shot','Chain-of-Thought']},
  {term:'Zero-Shot',cat:'Prompting',def:'Asking AI to perform a task without providing any examples.',why:'Quick for simple tasks, but less consistent without examples.',rel:['Few-Shot','Prompt']},
  {term:'Few-Shot',cat:'Prompting',def:'Providing the AI with examples of the desired input-output pattern before your request.',why:'One of the most effective techniques for improving consistency.',rel:['Zero-Shot','Prompt Engineering']},
  {term:'Chain-of-Thought (CoT)',cat:'Prompting',def:'Prompting the AI to think step by step or show reasoning before answering.',why:'Produces more accurate results for complex analytical tasks.',rel:['Prompt Engineering']},
  {term:'Prompt Chaining',cat:'Prompting',def:'Breaking a complex task into sequential prompts where each output feeds the next.',why:'The most effective strategy for complex documentation tasks.',rel:['Prompt Engineering']},
  {term:'Role Prompting',cat:'Prompting',def:'Instructing the AI to adopt a specific persona or expertise.',why:'Setting a role calibrates language, tone, and detail depth.',rel:['System Prompt','Prompt Engineering']},
  {term:'Output Format',cat:'Prompting',def:'Specifying the structure of the AI\'s response (bullets, table, JSON, markdown).',why:'Explicit format instructions prevent manual reformatting.',rel:['Prompt Engineering','Structured Output']},
  {term:'API (Application Programming Interface)',cat:'Infrastructure',def:'Rules and protocols allowing software to communicate. In AI: the interface for prompts and responses.',why:'Understanding APIs helps you know why the same model behaves differently in different tools.',rel:['Model','Inference']},
  {term:'Model',cat:'Infrastructure',def:'The trained AI system that processes inputs and generates outputs.',why:'Different models have different capabilities, speeds, and costs.',rel:['LLM','Parameters','API']},
  {term:'Open-Source Model',cat:'Infrastructure',def:'An AI model whose weights and code are publicly available (e.g., Llama, Mistral).',why:'Open-source gives more control but requires expertise to deploy.',rel:['Model','Proprietary Model']},
  {term:'Proprietary Model',cat:'Infrastructure',def:'An AI model owned by a company, accessible only through their API (e.g., Claude, GPT).',why:'These are what you use through Claude.ai and ChatGPT.',rel:['Model','API','Open-Source Model']},
  {term:'Latency',cat:'Infrastructure',def:'The time delay between sending a prompt and receiving a response.',why:'Larger models and longer prompts = higher latency.',rel:['Inference','Model']},
  {term:'RAG (Retrieval-Augmented Generation)',cat:'RAG & Infrastructure',def:'A technique where AI retrieves relevant documents from a knowledge base before generating a response.',why:'RAG grounds AI in your actual documentation, reducing hallucination.',rel:['Embedding','Vector Database','Grounding']},
  {term:'Vector Database',cat:'RAG & Infrastructure',def:'A database optimized for storing and searching vector embeddings.',why:'The backend powering RAG and semantic search in AI knowledge bases.',rel:['Vector','Embedding','RAG']},
  {term:'Chunking Strategy',cat:'RAG & Infrastructure',def:'The method used to split documents into smaller pieces for embedding and storage in a RAG system.',why:'Chunk size affects retrieval quality \u2014 too small loses context, too large dilutes relevance.',rel:['RAG','Vector Database']},
  {term:'Hybrid Search',cat:'RAG & Infrastructure',def:'Combining keyword search and semantic (vector) search to get the best of both approaches.',why:'Hybrid search catches both exact matches and semantic matches, improving retrieval quality.',rel:['Semantic Search','RAG']},
  {term:'Reranking',cat:'RAG & Infrastructure',def:'Using a secondary model to re-score and reorder search results for better relevance.',why:'Reranking improves the quality of retrieved documents before they\u2019re sent to the LLM.',rel:['RAG','Hybrid Search']},
  {term:'Vector Similarity',cat:'RAG & Infrastructure',def:'A mathematical measure of how close two vectors are in embedding space, indicating semantic similarity.',why:'The core mechanism behind semantic search and RAG retrieval.',rel:['Cosine Similarity','Embedding']},
  {term:'Cosine Similarity',cat:'RAG & Infrastructure',def:'A specific method of measuring vector similarity based on the angle between two vectors, ranging from -1 to 1.',why:'The most common similarity metric used in vector databases and RAG systems.',rel:['Vector Similarity','Vector Database']},
  {term:'MCP (Model Context Protocol)',cat:'Protocols',def:'An open standard by Anthropic for connecting AI apps to external tools and data sources.',why:'MCP is how AI tools connect to your company\'s systems \u2014 the USB-C of AI.',rel:['Tool Use','Function Calling','API']},
  {term:'Function Calling / Tool Use',cat:'Protocols',def:'The ability of an AI to invoke external tools as part of generating a response.',why:'Makes AI go beyond text generation \u2014 it can look things up and take actions.',rel:['MCP','Agent','API']},
  {term:'Structured Output',cat:'Protocols',def:'AI output in a defined format like JSON, XML, or a specific template.',why:'Essential when output feeds into other systems (CMS, databases, pipelines).',rel:['Output Format','API']},
  {term:'Agent (AI Agent)',cat:'Agents',def:'An AI system that autonomously plans, makes decisions, uses tools, and takes multi-step actions.',why:'Agents can complete entire workflows \u2014 monitoring repos, drafting updates, flagging reviews.',rel:['Tool Use','MCP','Planning']},
  {term:'Copilot',cat:'Agents',def:'An AI assistant integrated into a software tool providing suggestions within your workflow.',why:'Copilots bring AI into tools you already use, reducing context-switching.',rel:['Agent','Tool Use']},
  {term:'Planning (Agentic)',cat:'Agents',def:'An AI agent\'s ability to break tasks into subtasks, determine sequence, and select tools.',why:'Understanding agent planning helps you design better task descriptions.',rel:['Agent','Prompt Chaining']},
  {term:'Agent Loop',cat:'Agents',def:'The iterative cycle agents follow: observe, plan, act, evaluate, repeat until the goal is met.',why:'Understanding the agent loop helps you predict agent behavior and design better tasks.',rel:['Agent','Planning (Agentic)']},
  {term:'Tool Orchestration',cat:'Agents',def:'An agent\u2019s ability to select and sequence multiple tools to accomplish a complex task.',why:'Orchestration is what makes agents powerful \u2014 combining search, code execution, and data retrieval.',rel:['Agent','Function Calling / Tool Use']},
  {term:'Working Memory (Agents)',cat:'Agents',def:'The accumulated context an agent maintains across subtasks, storing results and decisions for reference.',why:'Working memory is why agents can build on earlier steps \u2014 and why they struggle with very long tasks.',rel:['Agent Loop','Context Window']},
  {term:'Human-in-the-Loop (Agents)',cat:'Agents',def:'A design pattern where agents request human approval before irreversible actions.',why:'Essential for content workflows where accuracy matters more than speed.',rel:['Agent','Responsible AI']},
  {term:'Reflection (Agents)',cat:'Agents',def:'An agent\u2019s ability to evaluate its own outputs and correct mistakes before returning results.',why:'Self-reflection improves agent reliability, similar to a writer editing their own draft.',rel:['Agent Loop','Constitutional AI']},
  {term:'Multi-Agent Systems',cat:'Agents',def:'Architectures where multiple specialized agents collaborate \u2014 one researches, one drafts, one reviews.',why:'The future of complex AI workflows: specialized agents working together like a team.',rel:['Agent','Tool Orchestration']},
  {term:'Context Injection',cat:'Agents',def:'Inserting relevant information into the AI\u2019s context at request time.',why:'Every time you paste a document into AI chat, you\'re doing context injection.',rel:['RAG','Context Window','Prompt']},
  {term:'Bias (in AI)',cat:'Ethics',def:'Systematic errors in AI output reflecting imbalances in training data, design, or evaluation.',why:'AI content may inadvertently favor certain perspectives or use non-inclusive language.',rel:['Training Data','Fairness']},

  {term:'Automation Bias',cat:'Ethics',def:'The human tendency to over-rely on automated systems and accept their output without critical evaluation.',why:'The biggest practical risk for content editors using AI \u2014 always verify.',rel:['Hallucination']},

var CAT_MAP = {'ML Fundamentals':'badge-ml','GenAI':'badge-genai','Prompting':'badge-prompt','Infrastructure':'badge-infra','Ethics':'badge-ethics','Workflow':'badge-workflow','Protocols':'badge-proto','Agents':'badge-agents','RAG & Infrastructure':'badge-rag'};
var ALL_CATS = ['All','ML Fundamentals','GenAI','Prompting','Infrastructure','RAG & Infrastructure','Protocols','Agents','Ethics','Workflow'];
var glossFilter = 'All';
var glossAlpha = '';
var glossSearch = '';

function initMod9(){
  document.getElementById('gloss-filters').innerHTML = ALL_CATS.map(function(c){return '<button class="gloss-filter '+(c==='All'?'active':'')+'" onclick="setGlossFilter(\''+c+'\',this)">'+c+'</button>';}).join('');
  var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  document.getElementById('alpha-bar').innerHTML = letters.map(function(l){return '<button class="alpha-btn" onclick="setGlossAlpha(\''+l+'\',this)">'+l+'</button>';}).join('');
  renderGlossary();
}
window.setGlossFilter = function(c,btn){
  glossFilter = c; glossAlpha = '';
  document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  renderGlossary();
};
window.setGlossAlpha = function(l,btn){
  glossAlpha = (glossAlpha===l) ? '' : l;
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  if(glossAlpha) btn.classList.add('active');
  renderGlossary();
};
window.filterGlossary = function(){
  glossSearch = document.getElementById('gloss-search').value.toLowerCase();
  renderGlossary();
};

function renderGlossary(){
  var items = GLOSSARY;
  if(glossFilter !== 'All') items = items.filter(function(g){return g.cat === glossFilter;});
  if(glossAlpha) items = items.filter(function(g){return g.term[0].toUpperCase() === glossAlpha;});
  if(glossSearch) items = items.filter(function(g){return g.term.toLowerCase().includes(glossSearch) || g.def.toLowerCase().includes(glossSearch);});
  document.getElementById('gloss-grid').innerHTML = items.length ? items.map(function(g){
    return '<div class="gloss-card" id="g-'+g.term.replace(/[^a-zA-Z]/g,'')+'">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="gloss-term">'+g.term+'</div><span class="badge '+(CAT_MAP[g.cat]||'badge-ml')+'">'+g.cat+'</span></div>'+
      '<div class="gloss-def">'+g.def+'</div>'+
      '<div class="gloss-why">Why it matters: '+g.why+'</div>'+
      (g.rel.length ? '<div class="gloss-related">Related: '+g.rel.map(function(r){return '<a onclick="jumpToGloss(\''+r+'\')">'+r+'</a>';}).join(', ')+'</div>' : '')+
    '</div>';
  }).join('') : '<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss = function(term){
  glossSearch = ''; glossFilter = 'All'; glossAlpha = '';
  document.getElementById('gloss-search').value = '';
  document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.gloss-filter').classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  renderGlossary();
  var id = 'g-' + term.replace(/[^a-zA-Z]/g,'');
  var el = document.getElementById(id);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.boxShadow='0 0 0 3px var(--primary)'; setTimeout(function(){el.style.boxShadow='';},2000); }
};

    {type:'mc',q:'A well-designed RAG system that cannot find relevant documents should:',opts:['Generate an answer from training data','Say it couldn\u2019t find relevant information','Search the internet','Ask a different model'],a:1,exp:'Transparently reporting missing information is better than falling back to potentially hallucinated training data.'},
    {type:'tf',q:'Constitutional AI adds a self-critique step where the model evaluates its own output against principles.',a:true,exp:'Constitutional AI has the model critique its own responses against principles like helpfulness, harmlessness, and honesty.'},
    {type:'mc',q:'What is the most effective approach for complex document review?',opts:['One long prompt covering everything','Breaking the task into a chain of focused prompts','Using the highest temperature setting','Asking the AI to "try harder"'],a:1,exp:'Prompt chaining produces dramatically better results for complex tasks because each step has a focused objective.'},
    {type:'tf',q:'Purely AI-generated content without human creative input is generally copyrightable.',a:false,exp:'In most jurisdictions, purely AI-generated content without substantial human creative contribution is not copyrightable.'},

    '<div id="final-score"></div>'+
    '<div class="nav-btns"><button class="nav-btn secondary" onclick="goModule(0)">\u2190 Back to Module 1</button><button class="nav-btn primary" onclick="showLanding()">\uD83C\uDFE0 Home</button></div>';
}

function scoreFinal(){
  var correct = 0, total = 15;
  for(var i=0;i<total;i++){
    var qid = 'final-q'+i;
    if(!quizStates[qid]){
      var card = document.getElementById('qc-'+qid);
      if(card){
        var btn = document.getElementById('btn-'+qid);
        if(btn && !btn.disabled) btn.click();
        else {
          var opts = card.querySelectorAll('.quiz-opt');
          if(opts.length) { opts[0].click(); setTimeout(function(){btn.click();},10); }
        }
      }
    }
  }
  setTimeout(function(){
    for(var i=0;i<total;i++){
      var card = document.getElementById('qc-final-q'+i);
      if(card && card.classList.contains('correct')) correct++;
    }
    var el = document.getElementById('final-score');
    var cls, msg;
    if(correct >= 12){ cls='excellent'; msg='Excellent! You\u2019ve mastered advanced AI concepts.'; }
    else if(correct >= 8){ cls='good'; msg='Good progress! Review the modules where you missed questions.'; }
    else { cls='keep'; msg='Keep learning! Revisit the modules and try again.'; }
    el.innerHTML = '<div class="score-banner '+cls+'"><div class="score-num">'+correct+' / '+total+'</div><div class="score-msg">'+msg+'</div></div>';
    el.scrollIntoView({behavior:'smooth'});
  }, 200);
}

/* ══ GLOBAL SEARCH ══ */
var searchIndex = [];
function buildSearchIndex(){
  searchIndex = [];
  MODULES.forEach(function(m,i){
    searchIndex.push({type:'Module',text:m.title,desc:LANDING_DESCS[i].desc.substring(0,100)+'\u2026',action:function(){goModule(i);}});
  });
  GLOSSARY.forEach(function(g){
    searchIndex.push({type:'Glossary',text:g.term,desc:g.def.substring(0,100)+'\u2026',action:function(){goModule(8);setTimeout(function(){document.getElementById('gloss-search').value=g.term;filterGlossary();},100);}});
  });
  searchIndex.push({type:'Assessment',text:'Final Assessment',desc:'15 comprehensive questions',action:function(){showFinalAssessment();}});
}

function performSearch(query){
  if(!query.trim()) return [];
  var q = query.toLowerCase();
  return searchIndex.filter(function(item){return item.text.toLowerCase().includes(q)||item.desc.toLowerCase().includes(q);}).slice(0,12);
}

function renderSearchResults(query){
  var results = performSearch(query);
  var container = document.getElementById('search-results');
  if(!query.trim()){ container.innerHTML = '<div class="search-empty">Start typing to search\u2026</div>'; return; }
  if(!results.length){ container.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
  container.innerHTML = results.map(function(r){
    var hl = r.text.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    return '<div class="search-item" data-idx="'+searchIndex.indexOf(r)+'"><div class="search-cat">'+r.type+'</div><div class="search-txt">'+hl+'</div></div>';
  }).join('');
  container.querySelectorAll('.search-item').forEach(function(el){
    el.onclick = function(){
      var idx = parseInt(el.dataset.idx);
      searchIndex[idx].action();
      closeSearch();
    };
  });
}

function openSearch(){
  document.getElementById('search-backdrop').classList.add('open');
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
  renderSearchResults('');
}
function closeSearch(){
  document.getElementById('search-backdrop').classList.remove('open');
  document.getElementById('search-overlay').classList.remove('open');
}

document.getElementById('search-btn').onclick = openSearch;
document.getElementById('search-backdrop').onclick = closeSearch;
document.getElementById('search-input').oninput = function(){ renderSearchResults(this.value); };

/* ══ KEYBOARD NAVIGATION ══ */
document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if((e.ctrlKey||e.metaKey) && e.key === 'k'){ e.preventDefault(); openSearch(); return; }
  if(e.key === 'Escape'){ closeSearch(); return; }

  var focused = document.activeElement;
  if(!focused) return;
  var sim = focused.closest('.sim-focusable') || (focused.classList.contains('sim-focusable') ? focused : null);
  if(!sim) return;
  var simType = sim.dataset.sim;
  if(!simType) return;

  if(e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
    e.preventDefault();
    var dir = e.key === 'ArrowRight' ? 1 : -1;
    if(simType === 'tx'){
      txStep(txCur + dir);
    } else if(simType.startsWith('flow-')){
      var flowId = simType.replace('flow-','');
      flowStep(flowId, flowCur[flowId] + dir);
    }
  }
});
