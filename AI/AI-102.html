      '<tr><td><strong>Provider</strong></td><td>Anthropic</td><td>OpenAI</td><td>Google</td><td>Microsoft</td></tr>'+
      '<tr><td><strong>Top Model</strong></td><td>Claude Opus 4</td><td>GPT-4o</td><td>Gemini 2.5 Pro</td><td>GPT-4o (via OpenAI)</td></tr>'+
      '<tr><td><strong>Context Window</strong></td><td>200K tokens</td><td>128K tokens</td><td>1M+ tokens</td><td>128K tokens</td></tr>'+
      '<tr><td><strong>Multi-modal</strong></td><td>Text + Vision</td><td>Text + Vision + Audio</td><td>Text + Vision + Audio</td><td>Text + Vision</td></tr>'+
      '<tr><td><strong>Strengths</strong></td><td>Nuanced reasoning, safety, long docs</td><td>Versatility, ecosystem, plugins</td><td>Long context, Google integration</td><td>Office integration, enterprise</td></tr>'+
      '<tr><td><strong>Best For</strong></td><td>Complex analysis, content review</td><td>General tasks, creative writing</td><td>Research, multi-modal, long docs</td><td>Office workflows, coding</td></tr>'+
    '</tbody></table></div>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">Choosing the Right Model: How a Content Team Evaluated 4 Platforms</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A 10-person content team was using ChatGPT Plus individual accounts. Management asked them to standardize on one enterprise platform. The team needed to evaluate Claude, ChatGPT Enterprise, Gemini, and Copilot for their specific workflow: API documentation, knowledge base articles, and release notes.</dd>'+
      '<dt>Evaluation Method</dt>'+
      '<dd>They created a benchmark of 30 representative tasks across their three content types. Each task had a \u201cgold standard\u201d output (human-written, editor-approved). They ran all 30 tasks through each platform and scored outputs on 4 dimensions: factual accuracy (does it match the source spec?), style compliance (does it follow their style guide?), completeness (does it cover all required sections?), and edit distance (how much human editing is needed?).'+
      '<p style="margin-top:8px">They tracked time-to-first-draft, editing time, and total cost per task for each platform over a 2-week evaluation period.</p></dd>'+
      '<dt>Results</dt>'+
      '<dd>Claude scored highest on accuracy (92%) and style compliance (89%) for their technical documentation tasks. GPT-4 scored highest on creative flexibility for marketing-adjacent content. Gemini had the fastest response times but lower style compliance. Copilot was best for in-editor suggestions but weakest for standalone content generation.'+
      '<p style="margin-top:8px">The surprise finding: the platform that \u201cfelt best\u201d in casual use (ChatGPT) wasn\u2019t the platform that scored best on their specific tasks (Claude). Without systematic evaluation, they would have chosen based on familiarity rather than fit.</p></dd>'+
      '<dt>Decision</dt>'+
      '<dd>They standardized on Claude Team for documentation and knowledge base work (primary workload, 80% of tasks) and kept ChatGPT access for brainstorming and marketing content (20% of tasks). Total cost was lower than 10 individual ChatGPT Plus subscriptions.</dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) Evaluate on YOUR tasks, not on generic benchmarks \u2014 model rankings vary by use case. (2) \u201cBest model\u201d depends on what you\u2019re measuring \u2014 accuracy, speed, cost, and style compliance produce different winners. (3) Most teams don\u2019t need to pick just one \u2014 using 2 platforms for different task types is pragmatic. (4) Enterprise plans are usually cheaper than multiple individual subscriptions and provide better security, admin controls, and usage analytics. (5) Re-evaluate quarterly \u2014 model capabilities change rapidly and last quarter\u2019s winner may not be this quarter\u2019s.</dd>'+
    '</dl></div>'+

  '<details class="deeper"><summary>Deeper Dive: When to Use Which Model</summary><div class="deeper-body">'+
    '<p>Not every task needs the most powerful (and expensive) model. Here\u2019s a practical decision framework:</p>'+
    '<p style="margin-top:10px"><strong>Small, fast tasks</strong> (grammar check, quick summary, format conversion): Use smaller/faster models like Claude Haiku, GPT-4o mini, or Gemini Flash. They\u2019re cheaper, faster, and more than capable for routine work. Running every spell-check through a frontier model is like driving a Ferrari to the mailbox.</p>'+
    '<p style="margin-top:10px"><strong>Complex reasoning</strong> (multi-step analysis, technical review, nuanced writing): Use the most capable models \u2014 Claude Opus, GPT-4, Gemini Pro. The quality difference is noticeable for tasks requiring deep understanding, subtle judgment, or following complex instructions.</p>'+
    '<p style="margin-top:10px"><strong>Long documents</strong> (processing 50+ page specs, analyzing entire codebases): Prioritize models with the largest context windows. Gemini\u2019s 1M+ token window is unmatched for very long documents. Claude\u2019s 200K handles most practical needs.</p>'+
    '<p style="margin-top:10px"><strong>Image analysis</strong> (diagram review, screenshot analysis, visual content): Use multi-modal models \u2014 GPT-4o, Claude with vision, or Gemini. Not all models handle images equally well; test with your specific image types.</p>'+
    '<p style="margin-top:10px"><strong>Privacy-sensitive content</strong> (internal docs, customer data, legal content): Consider on-premise open-source models like Llama or Mistral. Data never leaves your infrastructure. The performance trade-off may be worth it for compliance-critical work.</p>'+
  '</div></details>'+

  renderQuiz('mod2', pickRandom(MOD2_QUIZ_POOL, 5));
}

/* ══ MODULE 3: ADVANCED PROMPT ENGINEERING ══ */
function mod3Content(){
  return '<div class="card"><div class="card-text" style="line-height:1.8">'+
  '<p>AI-101 covered the six components of a good prompt. This module gives you the advanced techniques that separate adequate prompts from expert-level prompts. The difference matters: a basic prompt might produce a serviceable first draft, but an advanced prompt using few-shot examples, chain-of-thought reasoning, and prompt chaining produces output that requires minimal editing and catches issues a basic prompt misses entirely.</p>'+
  '<p style="margin-top:10px">The techniques below are ordered by impact. Few-shot prompting (showing examples) is the single most effective technique for consistency. Chain-of-thought prompting (forcing step-by-step reasoning) is the most effective for accuracy. System prompt design gives you persistent control over AI behavior. Prompt chaining breaks complex tasks into manageable steps. And structured output ensures results feed cleanly into your downstream workflows.</p>'+
  '<p style="margin-top:10px">You don\u2019t need all of these for every prompt. But knowing when to reach for each one \u2014 and combining them when needed \u2014 is what turns AI from a drafting assistant into a reliable production tool.</p>'+
  '</div></div>'+
  '<div class="sec-title">Few-Shot Prompting</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>Few-shot prompting provides the AI with examples of the desired input-output pattern before your actual request. Instead of describing what you want, you <em>show</em> it. This is one of the most powerful techniques for getting consistent, high-quality output.</p>'+
    '<p style="margin-top:12px"><strong>Example \u2014 Without few-shot:</strong> \u201cConvert this changelog to a release note.\u201d \u2192 Generic, inconsistent formatting.</p>'+
    '<p style="margin-top:12px"><strong>Example \u2014 With few-shot:</strong></p>'+
    '<div style="background:var(--bg-muted);border-radius:8px;padding:14px;margin:8px 0;font-family:var(--font-mono);font-size:13px;line-height:1.6">'+
      'Here are examples of how we convert changelogs to release notes:<br><br>'+
      'Changelog: "Fixed null pointer in auth module causing 500 on expired tokens"<br>'+
      'Release note: "<strong>Authentication Fix</strong> \u2014 Resolved an issue where expired sessions could cause an error. Users will no longer see unexpected errors when their session times out."<br><br>'+
      'Changelog: "Optimized query planner, 3x improvement on aggregate queries"<br>'+
      'Release note: "<strong>Faster Reports</strong> \u2014 Report generation is now up to 3x faster, particularly for complex aggregate queries."<br><br>'+
      'Now convert this changelog: [your changelog entry]'+
    '</div>'+
    '<p style="margin-top:8px">The model pattern-matches the format, tone, length, and style from your examples \u2014 far more reliable than describing what you want in words.</p>'+
  '</div></div>'+

  '<div class="sec-title">Chain-of-Thought Prompting</div>'+
  '<div class="comparator">'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(239,68,68,0.08);color:var(--error)">\u274C Without CoT</div><div class="comp-body"><strong>Prompt:</strong> \u201cIs this product description accurate?\u201d<br><br><strong>Output:</strong> \u201cThe description looks accurate and well-written.\u201d<br><br><em>The model gives a surface-level answer without actual analysis.</em></div></div>'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(16,185,129,0.08);color:var(--success)">\u2713 With CoT</div><div class="comp-body"><strong>Prompt:</strong> \u201cThink step by step: First identify each factual claim, then evaluate each claim against the source spec.\u201d<br><br><strong>Output:</strong> \u201c1. Claim: \u2018supports 10TB\u2019 \u2192 Spec says 5TB \u2014 INCORRECT. 2. Claim: \u2018AES-256 encryption\u2019 \u2192 Confirmed in spec \u2014 CORRECT. 3. Claim: \u201899.99% uptime\u2019 \u2192 Spec says 99.9% \u2014 INCORRECT.\u201d</div></div>'+
  '</div>'+
  '<div class="callout">Adding \u201cThink step by step\u201d or \u201cShow your reasoning\u201d dramatically improves accuracy for analytical tasks. The model is forced to process systematically rather than jumping to a conclusion.</div>'+

  '<div class="sec-title">System Prompt Design</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>System prompts are hidden instructions that define the AI\u2019s behavior before any user interaction. Every AI application uses them. Understanding their structure helps you work with AI tools more effectively \u2014 and design your own for API-based workflows.</p>'+
  '</div></div>'+
  '<div class="sim-area">'+
    '<p style="font-size:13px;font-weight:600;color:var(--tx-primary);margin-bottom:10px">Example System Prompt: Documentation Assistant</p>'+
    '<div style="background:var(--bg-muted);border-radius:8px;padding:16px;font-family:var(--font-mono);font-size:13px;line-height:1.7;color:var(--tx-primary)">'+
      '<span style="color:var(--accent);font-weight:700">Role:</span> You are a senior technical writer specializing in API documentation.<br>'+
      '<span style="color:var(--accent);font-weight:700">Style:</span> Use active voice, present tense, AP style. Write at an 8th-grade reading level.<br>'+
      '<span style="color:var(--accent);font-weight:700">Behavior:</span> When unsure about a technical detail, flag it with [VERIFY] rather than guessing.<br>'+
      '<span style="color:var(--accent);font-weight:700">Format:</span> Always use markdown. Use ## for section headings, bullet points for lists.<br>'+
      '<span style="color:var(--accent);font-weight:700">Constraints:</span> Never invent API endpoints. Never fabricate error codes. If the source material is ambiguous, state the ambiguity explicitly.<br>'+
      '<span style="color:var(--accent);font-weight:700">Context:</span> You are documenting a REST API for a B2B SaaS product. Your audience is developers integrating our API.'+
    '</div>'+
  '</div>'+

  '<div class="sec-title">Prompt Chaining</div>'+
  '<div class="callout success"><strong>The #1 advanced technique:</strong> If you learn only one thing from this module, make it prompt chaining. Breaking a complex task into sequential focused steps \u2014 where each step\u2019s output feeds the next \u2014 will improve your output quality more than any other technique. A 5-step chain with simple prompts outperforms a single complex prompt almost every time.</div>'+
  '<p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Breaking complex tasks into sequential, focused prompts produces dramatically better results than a single monolithic prompt.</p>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-chain" id="chain-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',Math.max(0,flowCur.chain-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'chain\',flowCur.chain+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'chain\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-chain">Step 0 / 4</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-chain"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-chain"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<div class="sec-title">Structured Output</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">JSON Output</div><div class="card-text">Ask: \u201cExtract metadata from this article and return as JSON with fields: title, author, date, category, tags, summary.\u201d The AI returns clean, parseable JSON that can feed directly into your CMS or database.</div></div>'+
    '<div class="card"><div class="card-title">Markdown Tables</div><div class="card-text">Ask: \u201cCompare these three products in a markdown table with columns: Feature, Product A, Product B, Product C.\u201d Produces a structured comparison ready for documentation.</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Building a Prompt Chain for Document Review</summary><div class="deeper-body">'+
    '<p>Here\u2019s a real 4-step prompt chain used by a documentation team for reviewing technical documents against specifications:</p>'+
    '<p style="margin-top:10px"><strong>Step 1 \u2014 Extract Claims:</strong> \u201cRead this draft and list every factual claim, technical specification, and numerical value as a numbered list. Do not evaluate \u2014 just extract.\u201d This separation prevents the model from skipping claims it thinks are \u201cobviously correct.\u201d</p>'+
    '<p style="margin-top:10px"><strong>Step 2 \u2014 Cross-Reference:</strong> \u201cFor each claim in the list above, search the attached specification document. Mark each as CONFIRMED, CONTRADICTED, or NOT FOUND. Include the spec section number for confirmed/contradicted items.\u201d</p>'+
    '<p style="margin-top:10px"><strong>Step 3 \u2014 Style Review:</strong> \u201cNow review the original draft for style guide compliance: active voice, present tense, no jargon, headers for each section, bullet points for lists. Flag violations.\u201d Separating factual and style reviews prevents the model from conflating accuracy issues with formatting issues.</p>'+
    '<p style="margin-top:10px"><strong>Step 4 \u2014 Synthesize:</strong> \u201cCreate a review summary with three sections: Critical Issues (contradicted facts), Style Fixes (violations), and Suggestions (improvements). Prioritize by severity.\u201d The final step produces the actionable deliverable.</p>'+
    '<p style="margin-top:10px">This chain consistently catches 3-5x more issues than a single \u201creview this document\u201d prompt because each step has a single, focused job.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">From One Prompt to Four: How Chaining Transformed a Review Workflow</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A content team asked AI to \u201creview this 20-page product specification for accuracy and style.\u201d The AI returned vague, unhelpful feedback: \u201cThe document is generally well-structured with minor style inconsistencies in sections 3 and 7. Consider reviewing technical terminology for consistency.\u201d The team had no actionable items \u2014 just hand-waving.</dd>'+
      '<dt>Context</dt>'+
      '<dd>The spec covered a major API update with 40+ endpoint changes, new error codes, and revised rate limits. A single-prompt review was asking the model to simultaneously track factual accuracy across 40 endpoints, check style guide compliance, verify completeness against the engineering changelog, and produce a coherent summary \u2014 too many objectives competing for attention within one pass.</dd>'+
      '<dt>Approach</dt>'+
      '<dd>They broke the review into a 4-step prompt chain, with each step focused on a single objective:'+
      '<p style="margin-top:8px"><strong>Step 1 \u2014 Extract Claims:</strong> \u201cRead this draft and list every factual claim, technical specification, and numerical value as a numbered list. Do not evaluate \u2014 just extract.\u201d This produced a list of 67 verifiable claims.</p>'+
      '<p style="margin-top:8px"><strong>Step 2 \u2014 Cross-Reference:</strong> \u201cFor each claim in the list above, search the attached engineering changelog. Mark each as CONFIRMED, CONTRADICTED, or NOT FOUND. Include the changelog section for confirmed/contradicted items.\u201d This identified 12 contradicted claims and 8 claims with no source.</p>'+
      '<p style="margin-top:8px"><strong>Step 3 \u2014 Style Review:</strong> \u201cNow review the original draft for style guide compliance: active voice, present tense, no jargon, headers for each section, bullet points for lists. Flag each violation with the specific rule broken.\u201d This found 8 style violations.</p>'+
      '<p style="margin-top:8px"><strong>Step 4 \u2014 Synthesize:</strong> \u201cCreate a review summary with three sections: Critical Issues (contradicted facts), Style Fixes (violations), and Missing Coverage (sections in the changelog with no corresponding documentation). Prioritize by severity.\u201d</p></dd>'+
      '<dt>Results</dt>'+
      '<dd>(1) The 4-step chain identified 12 factual discrepancies, 8 style violations, and 5 missing sections \u2014 compared to \u201cminor inconsistencies\u201d from the single prompt. (2) Total processing time: ~8 minutes across all 4 steps, compared to ~2 minutes for the single useless prompt. (3) The review caught a critical error: the spec listed rate limits from the previous API version, not the new one \u2014 an error that would have caused customer-facing documentation to be wrong. (4) The team adopted this chain as their standard review workflow.</dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) A single prompt asking for multiple types of analysis produces shallow results on all dimensions. Each step in a chain gets the model\u2019s full attention. (2) Separating extraction from evaluation prevents the model from skipping claims it \u201cthinks\u201d are obviously correct. (3) The chain\u2019s total cost (4 API calls) was trivial compared to the cost of publishing a spec with wrong rate limits. (4) Not every task needs chaining \u2014 simple tasks with one objective work fine in a single prompt. Chain when the task has distinct subtasks that benefit from focused attention.</dd>'+
    '</dl></div>'+

  '<div class="callout warning"><strong>When NOT to chain:</strong> Don\u2019t chain simple tasks. If a single prompt reliably produces good output, adding steps adds latency and cost without improving quality. Chain when: (1) the task has clearly distinct subtasks, (2) a single prompt produces inconsistent results, or (3) you need different \u201cexpertise\u201d at different stages (e.g., factual extraction vs. style review).</div>'+

  renderQuiz('mod3', pickRandom(MOD3_QUIZ_POOL, 5));
}

/* ══ MODULE 4: RAG, MCP & TOOL USE ══ */
function mod4Content(){
  return '<div class="card"><div class="card-text" style="line-height:1.8">'+
  '<p>RAG and MCP solve the same fundamental problem from different angles: <strong>how do you give AI access to information it wasn\u2019t trained on?</strong> RAG does it by retrieving documents and injecting them into the prompt as context. MCP does it by giving AI the ability to call tools that access external systems in real time. In practice, most production AI systems use both \u2014 RAG for document-based knowledge and MCP/function calling for live data and actions.</p>'+
  '<p style="margin-top:10px">Understanding these technologies matters even if you never build them yourself. When your organization deploys an AI-powered knowledge base, RAG is what determines whether it gives accurate answers or hallucinates. When Claude connects to your Jira, Confluence, or Google Drive, MCP is the protocol making that possible. Knowing how they work helps you diagnose problems (\u201cWhy does the chatbot keep giving outdated answers?\u201d \u2014 probably a retrieval or chunking issue) and set realistic expectations (\u201cCan AI answer questions about last week\u2019s meeting?\u201d \u2014 only if the meeting notes are in the retrieval corpus).</p>'+
  '</div></div>'+

  '<div class="sec-title">RAG Pipeline \u2014 How AI Searches Your Documents</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-text">RAG (Retrieval-Augmented Generation) grounds AI responses in your actual documents rather than relying solely on training data. This dramatically reduces hallucination and enables AI to answer questions about your organization\u2019s specific content.</div></div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-rag" id="rag-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'rag\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'rag\',Math.max(0,flowCur.rag-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'rag\',flowCur.rag+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'rag\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-rag">Step 0 / 7</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-rag"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-rag"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<div class="callout warning"><strong>The #1 RAG failure:</strong> When a RAG system gives wrong answers, the problem is almost always retrieval, not generation. The LLM faithfully answers based on whatever documents were retrieved. If the wrong documents were retrieved \u2014 because of poor chunking, weak embeddings, or a query that doesn\u2019t match the document vocabulary \u2014 the LLM confidently generates a wrong answer grounded in irrelevant context. Always diagnose retrieval quality first.</div>'+

  '<div class="sec-title">MCP \u2014 How AI Connects to Your Tools</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-text">MCP (Model Context Protocol) is an open standard by Anthropic that standardizes how AI applications connect to external tools and data sources. Think of it as USB-C for AI \u2014 one universal connector instead of a different cable for every device.</div></div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-mcp" id="mcp-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',Math.max(0,flowCur.mcp-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'mcp\',flowCur.mcp+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'mcp\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-mcp">Step 0 / 8</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-mcp"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-mcp"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<div class="callout"><strong>MCP vs. function calling:</strong> Function calling is model-specific (Claude\u2019s tool use, GPT\u2019s function calling). MCP is protocol-level \u2014 build one MCP server for Jira, and it works with any MCP-compatible AI client. Think of function calling as teaching one specific AI to use a tool, and MCP as building a universal adapter that any AI can plug into.</div>'+

  '<div class="sec-title">Function Calling vs. MCP</div>'+
  '<div class="comparator">'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(37,99,235,0.08);color:var(--primary)">Function Calling</div><div class="comp-body"><strong>Single-tool invocation.</strong> You define specific functions the AI can call (e.g., get_weather, search_docs). The AI decides when to call them and with what parameters. Each function is custom-built for a specific API. Works well for simple integrations but doesn\u2019t scale.</div></div>'+
    '<div class="comp-panel"><div class="comp-header" style="background:rgba(124,58,237,0.08);color:var(--accent)">MCP (Protocol)</div><div class="comp-body"><strong>Tool ecosystem protocol.</strong> Standardized way for AI to discover and use many tools from many providers. One protocol handles Jira, Google Drive, databases, and any MCP-compatible service. The AI client doesn\u2019t need to know each tool\u2019s API \u2014 MCP abstracts it.</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Why MCP Matters for Content Teams</summary><div class="deeper-body">'+
    '<p>MCP enables a future where your AI assistant can seamlessly interact with your entire content toolchain:</p>'+
    '<p style="margin-top:10px"><strong>CMS Integration:</strong> An MCP server for your CMS lets the AI read existing articles, check for duplicates, understand your content structure, and even draft updates that slot into the right location. Instead of copy-pasting content into chat, the AI pulls it directly from the source.</p>'+
    '<p style="margin-top:10px"><strong>Style Guide Enforcement:</strong> An MCP server wrapping your style guide means the AI can check every draft against your actual rules \u2014 not generic writing advice. It knows that your organization uses \u201clog in\u201d (two words, verb) and \u201clogin\u201d (one word, noun) because it has direct access to your style decisions.</p>'+
    '<p style="margin-top:10px"><strong>Analytics-Driven Content:</strong> Connect your analytics platform via MCP, and the AI can identify which articles have high bounce rates, which search queries lead to dead ends, and where content gaps exist \u2014 then draft content specifically targeted at those gaps.</p>'+
    '<p style="margin-top:10px"><strong>Publishing Pipeline:</strong> The end state is an AI assistant that can read from your CMS, check your style guide, query your analytics, draft content, and submit it for review \u2014 all through standardized MCP connections. Each integration is a plug-and-play MCP server, not custom code.</p>'+
    '<p style="margin-top:10px">MCP is still early, but adoption is accelerating. Understanding it now positions you to leverage these integrations as they become available.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">How RAG Eliminated 90% of Hallucinations in a Knowledge Base Bot</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A support team at a SaaS company deployed a customer-facing chatbot using a vanilla LLM (no retrieval, no grounding). Within the first week, the support team received 23 customer complaints about incorrect answers \u2014 the bot confidently stated product features that didn\u2019t exist, quoted pricing from competitors as if it were the company\u2019s own, and fabricated integration capabilities.</dd>'+
      '<dt>Context</dt>'+
      '<dd>The chatbot was answering from the LLM\u2019s general training data, which included information about many SaaS products. It had no access to the company\u2019s actual documentation, pricing pages, or feature lists. When a customer asked \u201cDoes your platform support SSO?\u201d, the bot answered based on what SaaS platforms generally support \u2014 not what this specific product actually offered. The team initially blamed \u201cAI hallucination\u201d but the real problem was architecture: the bot had no source of truth.</dd>'+
      '<dt>Approach</dt>'+
      '<dd>They implemented a RAG pipeline in three phases:'+
      '<p style="margin-top:8px"><strong>Phase 1 \u2014 Document ingestion:</strong> All support articles (340 documents), product documentation (120 pages), pricing pages, and policy documents were chunked into ~500-token segments, embedded using a text embedding model, and stored in a vector database.</p>'+
      '<p style="margin-top:8px"><strong>Phase 2 \u2014 Retrieval integration:</strong> Every customer query now triggers a similarity search against the vector database. The top 5 most relevant document chunks are retrieved and injected into the prompt as context, along with the instruction: \u201cAnswer the customer\u2019s question using ONLY the provided documentation. If the answer is not in the documentation, say: I couldn\u2019t find this in our docs \u2014 please contact support at [email].\u201d</p>'+
      '<p style="margin-top:8px"><strong>Phase 3 \u2014 Iterative tuning:</strong> They monitored retrieval quality for 2 weeks, adjusting chunk sizes (settled on 400\u2013600 tokens with 50-token overlap), adding metadata filters (product version, content type), and implementing a reranking step to improve retrieval relevance.</p></dd>'+
      '<dt>Results</dt>'+
      '<dd>(1) Hallucination rate dropped from ~30% to ~3% within the first month. (2) The remaining 3% were mostly cases where the documentation itself was outdated or ambiguous \u2014 a documentation problem, not an AI problem. (3) Customer satisfaction with chatbot responses improved from 2.1/5 to 4.2/5. (4) Support ticket volume decreased 18% as the chatbot successfully resolved more queries. (5) When the bot doesn\u2019t find relevant documentation, it now gracefully redirects to human support instead of guessing.</dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) A vanilla LLM without retrieval is almost never appropriate for customer-facing applications \u2014 the hallucination risk is too high. (2) RAG quality depends entirely on retrieval quality \u2014 the LLM faithfully answers based on whatever documents it receives, so if the wrong documents are retrieved, the answer is wrong. (3) Chunk size matters more than most teams expect \u2014 too small and you lose context, too large and you dilute relevance. (4) The \u201cI don\u2019t know\u201d fallback is the most important design decision \u2014 a bot that admits ignorance is vastly better than one that fabricates answers. (5) RAG doesn\u2019t eliminate the need for good documentation \u2014 it exposes documentation gaps by showing exactly which queries have no source material to draw from.</dd>'+
    '</dl></div>'+

  renderQuiz('mod4', pickRandom(MOD4_QUIZ_POOL, 5));
}

/* ══ MODULE 5: AGENTIC AI ══ */
function mod5Content(){
  return '<div class="card"><div class="card-text" style="line-height:1.8">'+
  '<p>Agentic AI represents the biggest shift in how we interact with AI since ChatGPT launched. The conversation model \u2014 type a prompt, get a response, refine, repeat \u2014 is being replaced by the delegation model: assign a goal, let the AI plan the steps, use tools, evaluate its own progress, and deliver a result. The human\u2019s role changes from \u201cprompter\u201d to \u201cmanager.\u201d</p>'+
  '<p style="margin-top:10px">This shift requires a fundamentally different skill set. With a chatbot, prompt quality determines output quality. With an agent, <em>goal definition</em> determines output quality. A clear, well-bounded goal with explicit success criteria (\u201cReview these 50 articles for style guide compliance, flag violations with the specific rule broken, and generate a summary of the 10 most common violation types\u201d) produces excellent results. A vague goal (\u201cFix the docs\u201d) produces exactly the kind of unfocused, partially-correct work you\u2019d get from a human employee given the same vague instruction.</p>'+
  '<p style="margin-top:10px">The critical judgment call with agents is <strong>supervision level</strong>. Current agents (2025\u20132026) are capable enough to be useful but unreliable enough to require oversight. The right supervision level depends on two factors: <em>reversibility</em> (can you undo a bad action?) and <em>consequence</em> (what\u2019s the worst case?). Editing a draft is reversible and low-consequence \u2014 let the agent work autonomously with periodic review. Publishing to production is irreversible and high-consequence \u2014 require human approval before every action. Most content workflows fall somewhere in between.</p>'+
  '</div></div>'+

  '<div class="sec-title">What Is an Agent?</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-text" style="line-height:1.8">'+
    '<p>AI agents represent a spectrum of autonomy, from simple one-shot prompts to fully autonomous multi-step systems:</p>'+
  '</div></div>'+
  '<div class="grid-2">'+
    '<div class="concept-card" style="border-left:4px solid var(--border)"><div class="concept-title">Simple Prompt</div><div class="concept-desc">One question \u2192 one answer. No memory, no tools. Like asking a colleague a single question.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--primary-light)"><div class="concept-title">Chatbot</div><div class="concept-desc">Multi-turn conversation with memory within the session. Can reference earlier messages. Like an ongoing discussion.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--accent)"><div class="concept-title">Copilot</div><div class="concept-desc">AI integrated into your workflow tool, providing suggestions as you work. GitHub Copilot, Cursor, etc. You\u2019re in control; the AI assists.</div></div>'+
    '<div class="concept-card" style="border-left:4px solid var(--success)"><div class="concept-title">Agent</div><div class="concept-desc">Autonomous planning + tool use + multi-step execution. The AI decides what to do, which tools to use, and when to ask for help. You assign the goal; the agent figures out the steps.</div></div>'+
  '</div>'+

  '<div class="callout"><strong>Where most content teams are today:</strong> The majority of content professionals are in the <em>Copilot</em> stage \u2014 using AI integrated into their tools (Claude in the browser, Copilot in the editor) for suggestions and drafts. The move to <em>Agent</em> is happening now but requires trust-building: start with low-risk autonomous tasks (research, first-draft generation), verify agent reliability on YOUR specific content, then gradually expand autonomy as confidence grows. Don\u2019t jump straight to full delegation.</div>'+

  '<div class="sec-title">The Agent Loop</div>'+
  '<div class="flow-box sim-focusable" tabindex="0" data-sim="flow-agent" id="agent-flow-box">'+
    '<div class="flow-ctrl">'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',0)">\u23EE Reset</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',Math.max(0,flowCur.agent-1))">\u25C0 Prev</button>'+
      '<button class="flow-btn pri" tabindex="0" onclick="flowStep(\'agent\',flowCur.agent+1)">Next \u25B6</button>'+
      '<button class="flow-btn" tabindex="0" onclick="flowStep(\'agent\',99)">Show All \u23ED</button>'+
      '<span class="flow-step-ind" id="flow-ind-agent">Step 0 / 8</span>'+
    '</div>'+
    '<div class="flow-scroll"><div class="flow-inner" id="flow-inner-agent"></div></div>'+
    '<div class="swipe-hint">Swipe \u2192</div>'+
    '<div class="flow-detail" id="flow-detail-agent"></div>'+
    '<div class="kb-hint">Click here, then use <kbd>\u25C0</kbd> <kbd>\u25B6</kbd> arrow keys to navigate</div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Agents Today vs. Tomorrow</summary><div class="deeper-body">'+
    '<p><strong>Where agents are now (2025\u20132026):</strong> Current AI agents are capable but require careful oversight. They excel at structured, well-defined tasks with clear success criteria \u2014 running code, searching documents, transforming content. They struggle with ambiguous goals, tasks requiring deep domain expertise, and situations requiring judgment calls that depend on organizational context. Agent failures tend to cascade: one wrong decision early in a multi-step task compounds through subsequent steps.</p>'+
    '<p style="margin-top:10px"><strong>Practical limitations (as of 2025\u20132026):</strong> Agents can\u2019t reliably handle tasks that require more than 10-15 steps. Their \u201cworking memory\u201d is essentially the context window, which means they can lose track of earlier decisions in long workflows. They don\u2019t learn from mistakes within a session (though the human can redirect them). And they can\u2019t yet assess their own confidence accurately \u2014 they may confidently proceed with a flawed approach rather than asking for help.</p>'+
    '<p style="margin-top:10px"><strong>Where agents are heading:</strong> Autonomous documentation maintenance (monitoring repos for changes and drafting updates), continuous content quality monitoring (flagging outdated articles, broken links, terminology inconsistencies), and proactive update suggestions (\u201cThis article references v3.1 features, but v3.2 is released \u2014 here\u2019s a suggested update\u201d). Multi-agent systems where specialized agents collaborate \u2014 one researches, one drafts, one reviews \u2014 are an active area of development.</p>'+
    '<p style="margin-top:10px"><strong>The human-in-the-loop remains essential:</strong> Even as agents become more capable, content workflows demand human approval before publication. The best near-term model is: agents handle research, drafting, and initial review; humans make judgment calls, approve publication, and handle edge cases.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">An Agent-Assisted Release Note Workflow</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A documentation team of 4 writers spends 2 days each sprint converting engineering changelogs into customer-facing release notes across 5 product areas. The process is repetitive and well-structured \u2014 perfect for agent assistance \u2014 but requires product knowledge to assess customer impact, which the writers have and AI does not.</dd>'+
      '<dt>Context</dt>'+
      '<dd>Each sprint produces 30\u201350 changelog entries across 5 repositories. Each entry needs to be evaluated for customer impact, translated into plain language, categorized (feature, fix, improvement, deprecation), and formatted according to the team\u2019s release note template. The writers spend roughly 60% of their time on mechanical translation and 40% on judgment calls about customer impact.</dd>'+
      '<dt>Agent Workflow</dt>'+
      '<dd>The team deployed an agent that executes a 5-step workflow:'+
      '<p style="margin-top:8px"><strong>(1) Monitor:</strong> The agent watches the Git repository for changelog updates tagged with the current sprint.</p>'+
      '<p style="margin-top:8px"><strong>(2) Retrieve context:</strong> For each changelog entry, the agent retrieves relevant product context from the knowledge base \u2014 feature descriptions, previous release notes, and customer-facing terminology.</p>'+
      '<p style="margin-top:8px"><strong>(3) Draft:</strong> Using the retrieved context and the team\u2019s established template, the agent drafts a customer-facing release note for each entry. It categorizes each item and assigns a confidence score.</p>'+
      '<p style="margin-top:8px"><strong>(4) Cross-reference:</strong> The agent checks each draft against existing documentation for terminology consistency and flags any conflicts.</p>'+
      '<p style="margin-top:8px"><strong>(5) Submit for review:</strong> Drafts are submitted to the team\u2019s review queue, sorted by confidence score (lowest confidence first, so humans review the most uncertain items first).</p></dd>'+
      '<dt>Results</dt>'+
      '<dd>(1) The 2-day task became a 3-hour review session. (2) The agent drafted 80% of items correctly on the first pass. (3) The remaining 20% needing human editing were primarily nuanced customer impact assessments \u2014 exactly the kind of judgment that requires product expertise. (4) Writers reported higher job satisfaction \u2014 they spent their time on interesting judgment calls instead of mechanical reformatting.</dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) Agents excel at structured, repeatable tasks with clear patterns and well-defined templates. (2) The confidence score was critical \u2014 it let the team focus human attention where it mattered most instead of reviewing every item equally. (3) The agent\u2019s cross-referencing step caught terminology inconsistencies the team previously missed. (4) The human\u2019s role shifted from drafting to reviewing and adding judgment \u2014 a more valuable use of expertise. (5) Start agent deployment with your most structured, lowest-risk workflow. Release notes were ideal because every output gets human review before publication.</dd>'+
    '</dl></div>'+

  '<div class="callout warning"><strong>Agent errors compound.</strong> In a chatbot, a wrong answer is one wrong answer. In an agent running a 10-step workflow, a wrong decision at step 3 corrupts steps 4 through 10. This is why the best agent workflows include quality checkpoints between stages \u2014 the agent assesses its own intermediate output and flags low-confidence results for human review before proceeding. Build these checkpoints into your agent design from day one.</div>'+

  renderQuiz('mod5', pickRandom(MOD5_QUIZ_POOL, 5));
}

/* ══ MODULE 6: ADVANCED AI WORKFLOW ══ */
function mod6Content(){
  return '<div class="card"><div class="card-text" style="line-height:1.8">'+
  '<p>Individual AI productivity gains are valuable, but they don\u2019t scale. When one writer has great prompts and another struggles, the team\u2019s overall output quality is inconsistent and unpredictable. This module covers the infrastructure that turns individual skill into team capability: shared prompt libraries, evaluation rubrics, multi-document consistency workflows, and content governance frameworks.</p>'+
  '<p style="margin-top:10px">The goal is to make your team\u2019s worst AI output as good as your best writer\u2019s average AI output. That requires standardization \u2014 not of creativity, but of baseline quality. The prompt library ensures everyone starts from a proven template. The evaluation rubric ensures everyone applies the same review standards. The governance framework ensures everyone follows the same rules about data handling and disclosure. Together, these create a foundation that lets individual writers focus on judgment and creativity rather than reinventing basic prompts from scratch.</p>'+
  '</div></div>'+
  '<div class="sec-title">Building Your Prompt Library</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>A prompt library is a curated collection of tested, reusable prompt templates organized by task type. It\u2019s your team\u2019s most valuable AI productivity asset. Every time someone discovers a prompt that works brilliantly, it should be saved, documented, and shared.</p>'+
    '<p style="margin-top:12px"><strong>Structure each entry with:</strong> (1) Task category, (2) The prompt template with placeholder variables, (3) An example of good output, (4) Notes on when it works best and when it doesn\u2019t, (5) Which model produces the best results.</p>'+
  '</div></div>'+

  '<div class="sec-title">Build Your Evaluation Rubric</div>'+
  '<div class="sim-area" id="rubric-builder">'+
    '<p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Select and weight the criteria that matter most for your content type. This creates a custom evaluation checklist for reviewing AI output.</p>'+
    '<div id="rubric-items">'+
      '<div class="rubric-item"><input type="checkbox" id="rb-acc" checked><label for="rb-acc">Factual Accuracy</label><input type="number" class="rubric-weight" value="30" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-tone" checked><label for="rb-tone">Tone & Voice</label><input type="number" class="rubric-weight" value="20" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-fmt"><label for="rb-fmt">Format Compliance</label><input type="number" class="rubric-weight" value="15" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-comp" checked><label for="rb-comp">Completeness</label><input type="number" class="rubric-weight" value="20" min="0" max="100">%</div>'+
      '<div class="rubric-item"><input type="checkbox" id="rb-src"><label for="rb-src">Source Attribution</label><input type="number" class="rubric-weight" value="15" min="0" max="100">%</div>'+
    '</div>'+
    '<div class="callout" style="margin-top:16px">Adjust the weights to match your content type. Technical documentation might weight accuracy at 40%+ while marketing copy might weight tone higher. The key is having a <em>consistent</em> rubric so every reviewer applies the same standards.</div>'+
  '</div>'+

  '<div class="callout success"><strong>The fastest way to build a team AI playbook:</strong> Don\u2019t start from scratch. Have each team member submit their 3 best-performing prompts. Test all submissions against the same 10 representative tasks. The top performers become your starter templates. Document each template with: the prompt text, an example of good output, when to use it, and when NOT to use it. You\u2019ll have a working playbook in a week.</div>'+

  '<div class="sec-title">Multi-Document Consistency Analysis</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>One of AI\u2019s most powerful applications for content teams is cross-document consistency checking. Humans struggle to catch inconsistencies across a 200-page documentation set reviewed over weeks. AI can compare entire document sets in minutes.</p>'+
    '<p style="margin-top:12px"><strong>Template:</strong> \u201cCompare the following three documents for consistency. Flag any instances where: (1) the same feature is described differently, (2) terminology varies (e.g., \u2018log in\u2019 vs. \u2018login\u2019), (3) version numbers or dates conflict, (4) procedural steps differ for the same task. Present findings as a table with columns: Issue, Document 1 Text, Document 2 Text, Recommendation.\u201d</p>'+
  '</div></div>'+

  '<div class="sec-title">Content Governance Framework</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">AI Usage Policy Elements</div><div class="card-text">\u2022 What types of content can use AI assistance<br>\u2022 Required review steps before publication<br>\u2022 Disclosure requirements (when to note AI involvement)<br>\u2022 Data handling rules (what can/cannot be sent to AI)<br>\u2022 Model selection guidelines by content type<br>\u2022 Escalation paths for edge cases</div></div>'+
    '<div class="card"><div class="card-title">Quality Assurance Checklist</div><div class="card-text">\u2022 All factual claims verified against source material<br>\u2022 No fabricated citations or statistics<br>\u2022 Style guide compliance confirmed<br>\u2022 Audience appropriateness reviewed<br>\u2022 Terminology consistency with existing docs<br>\u2022 Human judgment applied to tone and nuance</div></div>'+
  '</div>'+

  '<details class="deeper"><summary>Deeper Dive: Scaling AI Workflows Across Your Team</summary><div class="deeper-body">'+
    '<p>Individual AI productivity gains are valuable, but the real transformation happens when an entire team adopts a systematic approach. Here\u2019s how to scale from individual use to team-wide practice:</p>'+
    '<p style="margin-top:10px"><strong>Audit first:</strong> Have each team member list the 5 tasks they spend the most time on weekly. Map each to an AI workflow category (research, drafting, editing, transformation, metadata, QA). You\u2019ll quickly see where AI saves the most collective hours.</p>'+
    '<p style="margin-top:10px"><strong>Standardize prompts:</strong> When one writer discovers a prompt that works brilliantly, it should become a team resource. Create a shared wiki organized by task type. Each template includes the prompt text, example output, and notes on best/worst use cases.</p>'+
    '<p style="margin-top:10px"><strong>Measure impact:</strong> Track time-to-publish, error rates, and content volume before and after AI adoption. Concrete metrics make the case for continued investment and reveal where the workflow needs adjustment. A team that publishes 30% more content with 20% fewer errors has a compelling story to tell.</p>'+
    '<p style="margin-top:10px"><strong>Iterate monthly:</strong> Review which prompts are being used, which aren\u2019t working, and what new tasks could benefit from AI assistance. The prompt library should be a living document that evolves with your team\u2019s practice.</p>'+
  '</div></details>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">How a 12-Person Content Team Built Their AI Playbook</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A documentation team of 12 writers across 3 product lines used AI individually \u2014 each with their own prompts saved in different places, different tool preferences, and no shared quality standards. Output quality varied wildly between writers, and 3 of the 12 weren\u2019t using AI at all because they \u201ccouldn\u2019t get good results.\u201d</dd>'+
      '<dt>Context</dt>'+
      '<dd>Management had approved a Claude Team subscription but saw uneven adoption. The team lead conducted an informal audit and discovered that the 4 writers getting excellent AI results all used structured prompts with role, context, and examples \u2014 while the 5 getting poor results used one-line prompts like \u201crewrite this\u201d or \u201cmake this better.\u201d The quality gap wasn\u2019t about the tool; it was about prompting skill, and there was no mechanism to share what worked.</dd>'+
      '<dt>Approach</dt>'+
      '<dd>They dedicated one 2-week sprint entirely to standardization:'+
      '<p style="margin-top:8px"><strong>Week 1 \u2014 Audit and collect:</strong> Each writer submitted their 5 most-used prompts. The team tested all 60 prompts against the same set of 15 representative tasks (5 per product line) and scored output quality on a 1\u20135 rubric covering accuracy, style, completeness, and edit distance. They discovered that the top 12 prompts (all from the 4 skilled users) consistently scored 4+ while the bottom 30 scored under 3.</p>'+
      '<p style="margin-top:8px"><strong>Week 2 \u2014 Standardize and document:</strong> They distilled the best prompts into 30 templates organized by task type and product line. Each template included: the prompt text with [PLACEHOLDER] variables, an example of good output, notes on when to use and when NOT to use it, and which model produced the best results for that task. They also established a 5-point evaluation rubric with specific criteria for each score level.</p></dd>'+
      '<dt>Results</dt>'+
      '<dd>(1) Within 3 months, content output increased 40% across the team. (2) Average time-to-publish decreased from 5 days to 3 days. (3) Consistency scores (measured by quarterly cross-document terminology checks) improved by 60%. (4) The 3 writers who previously weren\u2019t using AI became productive users within 2 weeks \u2014 the problem had been prompting skill, not tool capability. (5) New team members onboarded onto AI workflows in 2 days instead of 2 weeks.</dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) Prompt quality variation across a team is the single biggest barrier to AI adoption \u2014 standardize early. (2) Testing prompts against the same inputs with a rubric reveals quality differences invisible in casual use. (3) The writers who \u201ccouldn\u2019t get good results\u201d became productive users once given proven templates \u2014 the tool was never the problem. (4) The playbook is a living document \u2014 they assigned a rotating \u201cAI lead\u201d each month to add new templates, retire underperformers, and adjust for model updates. (5) The ROI case wrote itself: 40% more output with no additional headcount, documented with before/after metrics.</dd>'+
    '</dl></div>'+

  renderQuiz('mod6', pickRandom(MOD6_QUIZ_POOL, 5));
}

/* ══ MODULE 7: ETHICS & RESPONSIBLE USE ══ */
function mod7Content(){
  return '<div class="card"><div class="card-text" style="line-height:1.8">'+
  '<p>AI tools are powerful, but they are not neutral. Every model carries biases from its training data, reflects the values embedded during alignment, and operates in a rapidly evolving legal landscape. For content professionals, this means understanding where bias hides, how guardrails work (and fail), what copyright law currently says about AI-generated content, and how to build organizational policies that protect your team and your audience.</p>'+
  '<p style="margin-top:10px">This module equips you with practical judgment. You\u2019ll examine how bias enters training data, understand alignment techniques like Constitutional AI, practice red-teaming AI output to catch problems before publication, navigate copyright considerations, and build the foundation for an organizational AI usage policy. The goal is not to avoid AI \u2014 it\u2019s to use it responsibly, with eyes open to both its capabilities and its risks.</p>'+
  '</div></div>'+
  '<div class="sec-title">Sources of Bias in Training Data</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-title">Representation Bias</div><div class="card-text">Training data over-represents certain demographics, languages, and perspectives. English-language content dominates, Western cultural norms are treated as defaults, and historically marginalized perspectives are underrepresented. For content teams: AI-generated text may default to culturally specific idioms, assume Western business norms, or handle non-English terminology inconsistently.</div></div>'+
    '<div class="card"><div class="card-title">Historical Bias</div><div class="card-text">Training data reflects historical societal biases that existed in the source material. Gender stereotypes, racial biases, and professional assumptions from decades of published text are embedded in the model\u2019s patterns. The model doesn\u2019t know these biases are harmful \u2014 it treats them as statistical patterns to replicate.</div></div>'+
    '<div class="card"><div class="card-title">Selection Bias</div><div class="card-text">The internet text used for training is not a random sample of human knowledge. It over-represents opinions from people who write online, topics that generate engagement, and sources in English. Niche expertise, oral traditions, and non-digital knowledge are underrepresented.</div></div>'+
    '<div class="card"><div class="card-title">Confirmation Bias (in Prompts)</div><div class="card-text">LLMs are trained through RLHF to be agreeable and helpful. If your prompt implies a certain answer (\u201cIsn\u2019t it true that X is best?\u201d), the AI will often agree. Frame questions neutrally: \u201cWhat are the arguments for and against X?\u201d to get balanced output.</div></div>'+
  '</div>'+

  '<div class="callout warning"><strong>The copyright gray zone:</strong> The legal landscape for AI-generated content is unsettled and evolving rapidly. What\u2019s clear: purely AI-generated content (no substantial human creative contribution) is generally not copyrightable. What\u2019s unclear: where the line falls between \u201cAI-assisted\u201d (copyrightable, human directed the creative process) and \u201cAI-generated\u201d (not copyrightable, human just pressed a button). Until the law settles, the safest position for content teams is: use AI for drafts and research, but ensure substantial human editing, judgment, and creative direction in every published piece.</div>'+

  '<div class="sec-title">Alignment & Constitutional AI</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p><strong>Alignment</strong> is the challenge of ensuring AI systems behave in accordance with human values and intentions. It\u2019s why modern AI tools refuse harmful requests, try to be truthful, and acknowledge uncertainty.</p>'+
    '<p style="margin-top:12px"><strong>Constitutional AI</strong> (developed by Anthropic) adds a self-critique step: the model generates a response, then evaluates its own response against a set of principles (\u201cIs this helpful? Is this harmful? Is this honest?\u201d), and revises accordingly. This is one reason Claude tends to be more cautious and nuanced than models without this mechanism.</p>'+
    '<p style="margin-top:12px"><strong>Guardrails</strong> are specific safety mechanisms: content filters that block harmful outputs, refusal behaviors for dangerous requests, and bias mitigation techniques. They\u2019re not perfect \u2014 they sometimes refuse legitimate requests (false positives) and occasionally miss harmful outputs (false negatives).</p>'+
  '</div></div>'+

  '<div class="sec-title">Red-Team This Output</div>'+
  '<p style="font-size:14px;color:var(--tx-secondary);margin-bottom:16px">Red-teaming means deliberately looking for problems. Review this AI-generated content and identify potential issues. Click sentences you think have problems.</p>'+
  '<div id="redteam-area"></div>'+
  '<div style="text-align:center;margin:16px 0"><button class="flow-btn pri" id="rt-check-btn" onclick="checkRedTeam()">Check My Analysis</button></div>'+
  '<div id="rt-feedback" style="display:none"></div>'+

  '<div class="sec-title">Copyright & IP for Content Creators</div>'+
  '<div class="card"><div class="card-text" style="line-height:1.8">'+
    '<p>Copyright law around AI-generated content is evolving rapidly. Here\u2019s the current practical landscape:</p>'+
    '<p style="margin-top:12px"><strong>AI-generated content copyright:</strong> In most jurisdictions, purely AI-generated content (no significant human creative input) is not copyrightable. However, content that involves substantial human selection, arrangement, and editing likely qualifies for copyright protection. Your editorial contribution matters legally.</p>'+
    '<p style="margin-top:12px"><strong>Using AI on others\u2019 content:</strong> Pasting copyrighted material into an AI tool for summarization or transformation creates legal gray areas. Your organization should have clear guidelines about what source material can be processed through AI tools.</p>'+
    '<p style="margin-top:12px"><strong>Practical guidelines:</strong> (1) Always add substantial human creative input to AI drafts. (2) Don\u2019t claim AI output as purely original work. (3) Follow your organization\u2019s disclosure policies. (4) Don\u2019t paste third-party copyrighted content into AI without authorization. (5) Keep records of your editorial process.</p>'+
  '</div></div>'+

  '<div class="case-study"><div class="case-badge">CASE STUDY</div>'+
    '<div class="case-title">When an AI Usage Policy Saved a Company from a PR Crisis</div>'+
    '<dl class="case-body">'+
      '<dt>Situation</dt>'+
      '<dd>A marketing team at a mid-size SaaS company used AI to generate a series of customer success stories for their website. The stories were polished, specific, and compelling. They included customer names, company names, specific metrics (\u201c47% increase in productivity\u201d), and direct quotes. The content was published without the standard editorial review because \u201cAI wrote it, and it looked perfect.\u201d</dd>'+
      '<dt>What Went Wrong</dt>'+
      '<dd>Three of the five \u201ccustomer success stories\u201d were entirely fabricated. The customer names were real companies found in the AI\u2019s training data, but those companies had never been customers. The metrics were plausible but invented. The \u201cdirect quotes\u201d were hallucinated. One of the named companies discovered the fake case study through a Google Alert and contacted the SaaS company\u2019s legal department.</dd>'+
      '<dt>Root Cause</dt>'+
      '<dd>The company had no AI content policy. There was no requirement to verify AI-generated claims against real data. The marketing team assumed that because the AI output was detailed and well-written, it was also accurate. The polished presentation of the content \u2014 proper formatting, specific numbers, realistic quotes \u2014 actually made the fabrication harder to detect. This is automation bias: well-formatted AI output feels trustworthy even when it\u2019s entirely made up.</dd>'+
      '<dt>The Fix</dt>'+
      '<dd>The company implemented a 4-part AI content policy within a week:'+
      '<p style="margin-top:8px"><strong>(1) Verification requirement:</strong> Every factual claim in AI-generated content must be verified against a primary source before publication. No exceptions for \u201cobvious\u201d facts \u2014 AI hallucinations are most dangerous when they\u2019re plausible.</p>'+
      '<p style="margin-top:8px"><strong>(2) Prohibited content categories:</strong> AI may not generate customer quotes, testimonials, or case studies with specific named entities without explicit written approval from those entities. AI may not generate statistics or data claims unless sourced from a provided dataset.</p>'+
      '<p style="margin-top:8px"><strong>(3) Review workflow:</strong> All AI-assisted content goes through the same editorial review as human-written content. The \u201cAI wrote it\u201d shortcut is eliminated. Every piece gets a fact-check, style review, and editorial sign-off.</p>'+
      '<p style="margin-top:8px"><strong>(4) Disclosure framework:</strong> Internal metadata tags track which content was AI-assisted. Public-facing content includes disclosure where required by industry standards or client contracts.</p></dd>'+
      '<dt>Lessons</dt>'+
      '<dd>(1) AI content policies are not bureaucratic overhead \u2014 they prevent real business damage. (2) The most dangerous AI output is the output that looks perfect \u2014 it bypasses human skepticism. (3) Verification is not optional, even when the content \u201cseems right.\u201d (4) Specific, named entities (people, companies, quotes, statistics) are the highest-risk hallucination targets \u2014 always verify these first. (5) Publishing unreviewed AI content is publishing unverified content, regardless of how polished it appears.</dd>'+
    '</dl></div>'+

  '<details class="deeper"><summary>Deeper Dive: Building Your Organization\u2019s AI Usage Guidelines</summary><div class="deeper-body">'+
    '<p>Every organization using AI for content creation needs clear, practical usage guidelines. Here\u2019s a framework for building yours:</p>'+
    '<p style="margin-top:10px"><strong>1. Define permitted use cases:</strong> Specify which tasks can use AI assistance (drafting, editing, summarization, translation) and which cannot (final approval, legal content, customer-facing commitments without review). Be specific \u2014 \u201cAI may be used for first drafts that will be reviewed by a human editor\u201d is better than \u201cAI may be used for writing.\u201d</p>'+
    '<p style="margin-top:10px"><strong>2. Establish review requirements:</strong> Define minimum review standards for AI-assisted content. Example: \u201cAll AI-assisted content must be reviewed by at least one subject matter expert before publication. Factual claims must be verified against primary sources. Citations must be confirmed to exist.\u201d</p>'+
    '<p style="margin-top:10px"><strong>3. Set data handling rules:</strong> Specify what data can and cannot be sent to AI tools. Customer PII, proprietary code, legal documents, and pre-announcement product details typically require on-premise solutions or explicit approval. Create a simple decision tree: \u201cIf the content contains X, use Y tool / get Z approval.\u201d</p>'+
    '<p style="margin-top:10px"><strong>4. Address disclosure:</strong> Determine when and how to disclose AI involvement. Some organizations disclose on all AI-assisted content; others disclose only when AI generated a substantial portion. Choose a policy and apply it consistently.</p>'+
    '<p style="margin-top:10px"><strong>5. Plan for evolution:</strong> AI capabilities change rapidly. Review and update your guidelines quarterly. Assign an \u201cAI lead\u201d who stays current on tool capabilities and policy implications.</p>'+
  '</div></details>'+

  '<div class="callout"><strong>Building your team\u2019s AI policy:</strong> A practical AI usage policy needs four components: (1) <em>Permitted uses</em> \u2014 what tasks can use AI assistance. (2) <em>Review requirements</em> \u2014 what review steps are required before AI-assisted content is published. (3) <em>Data handling rules</em> \u2014 what information can and cannot be sent to AI tools. (4) <em>Disclosure guidelines</em> \u2014 when and how to disclose AI involvement. Start simple, iterate based on real incidents, and review quarterly.</div>'+

  renderQuiz('mod7', pickRandom(MOD7_QUIZ_POOL, 5));
}

/* ══ QUIZ SYSTEM ══ */
function renderQuiz(id, questions){
  return '<div class="quiz-section"><div class="sec-title">Knowledge Check</div>'+
  questions.map(function(q,i){
    var qid = id+'-q'+i;
    if(q.type === 'tf'){
      return '<div class="quiz-card" id="qc-'+qid+'"><div class="quiz-q"><span class="q-num">Q'+(i+1)+'.</span> '+q.q+' <span class="q-type">True / False</span></div><div class="quiz-opts">'+
        '<div class="quiz-opt" data-qid="'+qid+'" data-val="true" onclick="selectQuizOpt(this)" tabindex="0" role="button" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();selectQuizOpt(this)}"><div class="opt-marker">T</div>True</div>'+
        '<div class="quiz-opt" data-qid="'+qid+'" data-val="false" onclick="selectQuizOpt(this)" tabindex="0" role="button" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();selectQuizOpt(this)}"><div class="opt-marker">F</div>False</div>'+
      '</div><button class="quiz-check" id="btn-'+qid+'" onclick="checkQuiz(\''+qid+'\','+q.a+',\''+esc(q.exp)+'\')" disabled>Check Answer</button><div class="quiz-fb" id="fb-'+qid+'"></div></div>';
    } else {
      return '<div class="quiz-card" id="qc-'+qid+'"><div class="quiz-q"><span class="q-num">Q'+(i+1)+'.</span> '+q.q+' <span class="q-type">Multiple Choice</span></div><div class="quiz-opts">'+
        q.opts.map(function(o,j){return '<div class="quiz-opt" data-qid="'+qid+'" data-val="'+j+'" onclick="selectQuizOpt(this)" tabindex="0" role="button" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();selectQuizOpt(this)}"><div class="opt-marker">'+String.fromCharCode(65+j)+'</div>'+o+'</div>';}).join('')+
      '</div><button class="quiz-check" id="btn-'+qid+'" onclick="checkQuiz(\''+qid+'\','+q.a+',\''+esc(q.exp)+'\')" disabled>Check Answer</button><div class="quiz-fb" id="fb-'+qid+'"></div></div>';
    }
  }).join('')+'</div>';
}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/`/g,'\\`')}

function selectQuizOpt(el){
  var qid = el.dataset.qid;
  if(quizStates[qid]) return;
  el.parentElement.querySelectorAll('.quiz-opt').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected');
  document.getElementById('btn-'+qid).disabled = false;
}

function checkQuiz(qid, correct, exp){
  if(quizStates[qid]) return;
  quizStates[qid] = true;
  var card = document.getElementById('qc-'+qid);
  var opts = card.querySelectorAll('.quiz-opt');
  var selectedVal = null;
  opts.forEach(function(o){if(o.classList.contains('selected')) selectedVal = o.dataset.val;});
  var isCorrect = String(selectedVal) === String(correct);
  opts.forEach(function(o){
    o.style.cursor = 'default';
    if(String(o.dataset.val) === String(correct)) o.classList.add('right');
    else if(o.classList.contains('selected') && !isCorrect) o.classList.add('wrong');
  });
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  var fb = document.getElementById('fb-'+qid);
  fb.className = 'quiz-fb vis '+(isCorrect?'correct':'incorrect');
  fb.innerHTML = '<strong>'+(isCorrect?'\u2713 Correct!':'\u2717 Incorrect.')+'</strong> '+exp;
  document.getElementById('btn-'+qid).disabled = true;
}

var flowCur = {training:0,chain:0,rag:0,mcp:0,agent:0};

function initFlow(id){
  flowCur[id] = 0;
  renderFlow(id, FLOW_DATA[id]);
}

function renderFlow(id, data){
  var inner = document.getElementById('flow-inner-'+id);
  if(!inner) return;
  var nodeCount = data.nodes.length;
  var colors = ['#2563EB','#7C3AED','#06B6D4','#F59E0B','#10B981'];
  var nodesHtml = '<div class="flow-nodes">'+data.nodes.map(function(n,i){
    var parts = n.split('|');
    return '<div class="flow-ncol"><div class="flow-nbox" style="border-top-color:'+colors[i%5]+'"><div class="flow-nname">'+parts[0]+'</div><div class="flow-ndesc">'+(parts[1]||'')+'</div></div></div>';
  }).join('')+'</div>';

  var step = flowCur[id];
  var total = data.steps.length;
  var rowsHtml = '';

  data.steps.forEach(function(s,i){
    var vis = step === 0 ? 'dim' : (i < step ? 'vis' : 'dim');
    var cur = (i === step - 1) ? 'cur' : '';
    var midCol = (s.f + s.t) / 2;
    var leftPct = ((midCol + 0.5) / nodeCount * 100);
    rowsHtml += '<div class="flow-mrow '+vis+' '+cur+'">'+
      '<div class="flow-lifelines">'+data.nodes.map(function(){return '<div class="flow-ll-col"><div class="flow-ll"></div></div>';}).join('')+'</div>'+
      '<svg class="flow-arrow-svg" data-fi="'+s.f+'" data-ti="'+s.t+'" data-nc="'+nodeCount+'"></svg>'+
      '<div class="flow-mlwrap" style="left:'+leftPct+'%"><div class="flow-mlabel"><div class="flow-msn">'+s.n+'</div>'+
      '<div class="flow-mattr">'+(s.a||[]).slice(0,2).map(function(a){return '<span class="flow-matag">'+a[0]+'</span>';}).join('')+'</div></div></div></div>';
  });

  var mobileStepsHtml = '<div class="flow-step-list">';
  data.steps.forEach(function(s, i){
    var vis = step === 0 ? 'dim' : (i < step ? (i === step - 1 ? 'cur' : '') : 'dim');
    var fromName = data.nodes[s.f].split('|')[0];
    var toName = data.nodes[s.t].split('|')[0];
    mobileStepsHtml += '<div class="flow-mob-step '+vis+'"><div class="flow-mob-num">'+(i+1)+'</div><div class="flow-mob-content"><div class="flow-mob-name">'+s.n+'</div><div class="flow-mob-dir">'+fromName+' \u2192 '+toName+'</div></div></div>';
  });
  mobileStepsHtml += '</div>';

  inner.innerHTML = nodesHtml + '<div class="flow-msgs">'+rowsHtml+'</div>' + mobileStepsHtml;
  document.getElementById('flow-ind-'+id).textContent = 'Step '+step+' / '+total;

  var detail = document.getElementById('flow-detail-'+id);
  if(step > 0 && step <= total){
    var s = data.steps[step-1];
    var fromName = data.nodes[s.f].split('|')[0];
    var toName = data.nodes[s.t].split('|')[0];
    detail.className = 'flow-detail vis';
    detail.innerHTML = '<div class="flow-dmn">'+s.n+'</div><div class="flow-ddir">'+fromName+' \u2192 '+toName+'</div>'+
      '<table class="flow-dtbl"><thead><tr><th>Attribute</th><th>Value</th></tr></thead><tbody>'+
      (s.a||[]).map(function(a){return '<tr><td>'+a[0]+'</td><td>'+a[1]+'</td></tr>';}).join('')+'</tbody></table>'+
      '<div class="flow-dnote">'+s.d+'</div>';
  } else { detail.className = 'flow-detail'; }

  requestAnimationFrame(function(){ drawFlowArrows(id); });
}

function drawFlowArrows(id){
  var container = document.getElementById('flow-inner-'+id);
  if(!container) return;
  container.querySelectorAll('.flow-arrow-svg').forEach(function(svg){
    var row = svg.parentElement;
    var fi = parseInt(svg.dataset.fi);
    var ti = parseInt(svg.dataset.ti);
    var nc = parseInt(svg.dataset.nc);
    var w = row.offsetWidth;
    var h = row.offsetHeight;
    if(!w) return;
    svg.setAttribute('viewBox', '0 0 '+w+' '+h);
    svg.innerHTML = '';
    var cw = w / nc;
    var y = h * 0.5;
    if(fi === ti){
      var cx = (fi + 0.5) * cw, r = 22;
      var path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M'+(cx-r)+' '+y+' C'+(cx-r)+' '+(y+r*2.2)+','+(cx+r)+' '+(y+r*2.2)+','+(cx+r)+' '+y);
      path.setAttribute('fill','none'); path.setAttribute('stroke','var(--accent)'); path.setAttribute('stroke-width','2');
      svg.appendChild(path);
      var arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arrow.setAttribute('points',(cx+r)+','+y+' '+(cx+r-5)+','+(y+7)+' '+(cx+r+5)+','+(y+7));
      arrow.setAttribute('fill','var(--accent)'); svg.appendChild(arrow);
    } else {
      var x1 = (fi + 0.5) * cw, x2 = (ti + 0.5) * cw;
      var line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1); line.setAttribute('y1',y); line.setAttribute('x2',x2); line.setAttribute('y2',y);
      line.setAttribute('stroke','var(--primary)'); line.setAttribute('stroke-width','2'); svg.appendChild(line);
      var arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      if(x2 > x1) arrow.setAttribute('points',x2+','+y+' '+(x2-8)+','+(y-4)+' '+(x2-8)+','+(y+4));
      else arrow.setAttribute('points',x2+','+y+' '+(x2+8)+','+(y-4)+' '+(x2+8)+','+(y+4));
      arrow.setAttribute('fill','var(--primary)'); svg.appendChild(arrow);
    }
  });
}

var flowResizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(flowResizeTimer);
  flowResizeTimer = setTimeout(function(){ Object.keys(FLOW_DATA).forEach(function(id){ drawFlowArrows(id); }); }, 200);
});

function flowStep(id, n){
  var total = FLOW_DATA[id].steps.length;
  flowCur[id] = Math.max(0, Math.min(n, total));
  renderFlow(id, FLOW_DATA[id]);
  requestAnimationFrame(function(){
    drawFlowArrows(id);
    var curRow = document.querySelector('#flow-inner-'+id+' .flow-mrow.cur');
    if(curRow) curRow.scrollIntoView({behavior:'smooth', block:'nearest'});
  });
}

var rtRevealed = false;
var selectedRTPassages = [];

function initMod7(){
  rtRevealed = false;
  selectedRTPassages = pickRandom(ALL_RT_PASSAGES, 3);
  var area = document.getElementById('redteam-area');
  if(!area) return;
  area.innerHTML = selectedRTPassages.map(function(p,pi){
    return '<div class="spot-passage" data-pidx="'+pi+'"><div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">Content Sample '+(pi+1)+'</div>'+
      p.sentences.map(function(s,si){return '<span class="spot-sentence" data-pidx="'+pi+'" data-sidx="'+si+'" tabindex="0" role="button" onclick="toggleRTFlag(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleRTFlag(this)}">'+s.s+' </span>';}).join('')+'</div>';
  }).join('');
  document.getElementById('rt-feedback').style.display = 'none';
  document.getElementById('rt-check-btn').style.display = '';
}

window.toggleRTFlag = function(el){
  if(rtRevealed) return;
  el.classList.toggle('flagged');
};

window.checkRedTeam = function(){
  rtRevealed = true;
  document.getElementById('rt-check-btn').style.display = 'none';
  var correct = 0, total = 0;
  selectedRTPassages.forEach(function(p,pi){
    p.sentences.forEach(function(s,si){
      var el = document.querySelector('.spot-sentence[data-pidx="'+pi+'"][data-sidx="'+si+'"]');
      if(s.h) total++;
      var flagged = el.classList.contains('flagged');
      if(s.h){
        el.classList.add('revealed-h');
        if(flagged) correct++;
        el.title = s.why;
      } else {
        el.classList.add('revealed-ok');
        el.classList.remove('flagged');
      }
    });
  });
  var fb = document.getElementById('rt-feedback');
  fb.style.display = 'block';
  fb.innerHTML = '<div class="callout '+(correct===total?'success':'warning')+'">You correctly identified <strong>'+correct+' of '+total+'</strong> problematic sentences. '+(correct===total?'Excellent red-teaming skills!':'Sentences highlighted in red contain fabricated or suspect claims. Hover over them for explanations.')+'</div>';
};

var GLOSSARY = [
  {term:'Artificial Intelligence (AI)',cat:'ML Fundamentals',def:'Computer systems that perform tasks typically requiring human intelligence, such as understanding language, recognizing patterns, and making decisions.',why:'The umbrella term for all the tools you use to augment your writing workflow.',rel:['Machine Learning (ML)','Deep Learning']},

  {term:'Training Data',cat:'ML Fundamentals',def:'The dataset used to teach a model. Can include text, images, code, and other content.',why:'Data quality and breadth directly affect what the AI knows and what biases it has.',rel:['Training','Bias (in AI)']},
  {term:'Overfitting',cat:'ML Fundamentals',def:'When a model memorizes training data instead of learning general patterns.',why:'An overfitted model handles known examples but fails on your unique content.',rel:['Training']},
  {term:'Classification',cat:'ML Fundamentals',def:'Assigning a category or label to an input (e.g., "Is this spam?").',why:'Directly applicable to content tagging and document categorization.',rel:['Supervised Learning']},
