  {term:'Weights',cat:'ML Fundamentals',def:'Numerical values inside a neural network adjusted during training that determine how input is processed.',why:'When people say "70B parameters," they mean 70 billion weights.',rel:['Neural Network','Parameters']},
  {term:'Parameters',cat:'ML Fundamentals',def:'The total number of adjustable weights in a model. A rough indicator of model capacity.',why:'Larger parameter counts generally mean more capable but more expensive models.',rel:['Weights','Model']},
  {term:'Backpropagation',cat:'ML Fundamentals',def:'The algorithm that calculates how much each weight contributed to prediction errors, enabling the model to learn by adjusting weights in the right direction.',why:'The mathematical engine of neural network learning. Without it, neural networks couldn\u2019t train.',rel:['Gradient Descent','Loss Function','Weights']},
  {term:'Gradient Descent',cat:'ML Fundamentals',def:'An optimization algorithm that iteratively adjusts model weights in the direction that reduces error, like walking downhill to find the lowest point in a valley.',why:'How models actually "learn" \u2014 they follow gradients toward better predictions.',rel:['Backpropagation','Learning Rate','Loss Function']},
  {term:'Loss Function',cat:'ML Fundamentals',def:'A mathematical formula measuring how wrong the model\u2019s predictions are. Training aims to minimize this value.',why:'The loss function is the model\u2019s report card \u2014 lower loss means better predictions.',rel:['Backpropagation','Gradient Descent']},
  {term:'Activation Function',cat:'ML Fundamentals',def:'A mathematical function applied to each neuron\u2019s output that introduces non-linearity, enabling the network to learn complex patterns.',why:'Without activation functions, a neural network could only learn simple linear relationships.',rel:['Neural Network']},
  {term:'Batch Size',cat:'ML Fundamentals',def:'The number of training examples processed together before updating model weights.',why:'Batch size affects training speed and model quality \u2014 larger batches are faster but may miss subtle patterns.',rel:['Training','Epoch']},
  {term:'Epoch',cat:'ML Fundamentals',def:'One complete pass through the entire training dataset.',why:'Models typically train for many epochs. Too few = underfitting; too many = overfitting.',rel:['Training','Batch Size']},
  {term:'Learning Rate',cat:'ML Fundamentals',def:'A hyperparameter controlling how much to adjust weights at each training step. Too high = unstable; too low = slow learning.',why:'One of the most critical settings in model training \u2014 affects whether training converges at all.',rel:['Gradient Descent','Training']},
  {term:'Transfer Learning',cat:'ML Fundamentals',def:'Taking a model trained on one task and adapting it for a different but related task, leveraging previously learned patterns.',why:'This is why fine-tuned models work \u2014 they transfer general language knowledge to specific tasks.',rel:['Fine-Tuning']},
  {term:'Data Augmentation',cat:'ML Fundamentals',def:'Creating modified copies of training data to increase dataset size and diversity (e.g., rotating images, paraphrasing text).',why:'Helps models generalize better, especially when training data is limited.',rel:['Training Data']},
  {term:'Feature Engineering',cat:'ML Fundamentals',def:'The process of selecting, transforming, or creating input features to improve model performance.',why:'In traditional ML, this was the most important skill. Deep learning automates much of it.',rel:['Machine Learning (ML)']},
  {term:'Diffusion Model',cat:'GenAI',def:'A GenAI model for image generation (e.g., DALL-E, Midjourney, Stable Diffusion). Works by learning to progressively remove noise from random data to create images.',why:'If you create visual content or need AI-generated images, these are the models behind the tools.',rel:['Generative AI (GenAI)','Multi-modal']},

  {term:'Large Language Model (LLM)',cat:'GenAI',def:'A generative AI model trained on massive text datasets to understand and generate human language.',why:'The technology powering the AI writing and editing tools you use daily.',rel:['Generative AI (GenAI)','Transformer','Token']},

  {term:'Mixture of Experts (MoE)',cat:'GenAI',def:'An architecture where the model routes each input to specialized sub-networks ("experts"), activating only a fraction of total parameters per query.',why:'Enables very large models to run efficiently \u2014 only part of the model is active for each request.',rel:['Transformer','Parameters']},

var ALL_CATS = ['All','ML Fundamentals','GenAI','Prompting','Infrastructure','RAG & Infrastructure','Protocols','Agents','Ethics','Workflow'];
var glossFilter = 'All';
var glossAlpha = '';
var glossSearch = '';

function initMod9(){
  document.getElementById('gloss-filters').innerHTML = ALL_CATS.map(function(c){return '<button class="gloss-filter '+(c==='All'?'active':'')+'" onclick="setGlossFilter(\''+c+'\',this)">'+c+'</button>';}).join('');

window.setGlossFilter = function(c,btn){
  glossFilter = c; glossAlpha = '';
  document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  renderGlossary();
};
window.setGlossAlpha = function(l,btn){
  glossAlpha = (glossAlpha===l) ? '' : l;
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  if(glossAlpha) btn.classList.add('active');
  renderGlossary();
};
window.filterGlossary = function(){
  glossSearch = document.getElementById('gloss-search').value.toLowerCase();
  renderGlossary();
};

function renderGlossary(){
  var items = GLOSSARY;
  if(glossFilter !== 'All') items = items.filter(function(g){return g.cat === glossFilter;});
  if(glossAlpha) items = items.filter(function(g){return g.term[0].toUpperCase() === glossAlpha;});
  if(glossSearch) items = items.filter(function(g){return g.term.toLowerCase().includes(glossSearch) || g.def.toLowerCase().includes(glossSearch);});
  document.getElementById('gloss-grid').innerHTML = items.length ? items.map(function(g){
    return '<div class="gloss-card" id="g-'+g.term.replace(/[^a-zA-Z]/g,'')+'">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="gloss-term">'+g.term+'</div><span class="badge '+(CAT_MAP[g.cat]||'badge-ml')+'">'+g.cat+'</span></div>'+
      '<div class="gloss-def">'+g.def+'</div>'+
      '<div class="gloss-why">Why it matters: '+g.why+'</div>'+
      (g.rel.length ? '<div class="gloss-related">Related: '+g.rel.map(function(r){return '<a onclick="jumpToGloss(\''+r+'\')">'+r+'</a>';}).join(', ')+'</div>' : '')+
    '</div>';
  }).join('') : '<div class="search-empty">No matching terms found.</div>';
}
window.jumpToGloss = function(term){
  glossSearch = ''; glossFilter = 'All'; glossAlpha = '';
  document.getElementById('gloss-search').value = '';
  document.querySelectorAll('.gloss-filter').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.gloss-filter').classList.add('active');
  document.querySelectorAll('.alpha-btn').forEach(function(b){b.classList.remove('active')});
  renderGlossary();
  var id = 'g-' + term.replace(/[^a-zA-Z]/g,'');
  var el = document.getElementById(id);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.boxShadow='0 0 0 3px var(--primary)'; setTimeout(function(){el.style.boxShadow='';},2000); }
};

function scoreFinal(){
  var total = 15;
  var firstUnanswered = null;
  for(var i = 0; i < total; i++){
    var qid = 'final-q' + i;
    if(!quizStates[qid]){
      var card = document.getElementById('qc-' + qid);
      var selected = card ? card.querySelector('.quiz-opt.selected') : null;
      if(!selected){
        if(!firstUnanswered) firstUnanswered = card;
      }
    }
  }
  var existingAlert = document.getElementById('final-unanswered-alert');
  if(existingAlert && !firstUnanswered) existingAlert.remove();
  if(firstUnanswered){
    var alertBanner = document.getElementById('final-unanswered-alert');
    if(!alertBanner){
        alertBanner = document.createElement('div');
        alertBanner.id = 'final-unanswered-alert';
        alertBanner.className = 'callout warning';
        alertBanner.style.textAlign = 'center';
        alertBanner.style.marginBottom = '16px';
        var scoreBtn = document.querySelector('#final-score').previousElementSibling;
        scoreBtn.parentNode.insertBefore(alertBanner, scoreBtn);
    }
    alertBanner.innerHTML = '<strong>Please answer all 15 questions before calculating your score.</strong> The highlighted question below still needs an answer.';
    firstUnanswered.scrollIntoView({behavior:'smooth', block:'center'});
    firstUnanswered.style.boxShadow = '0 0 0 3px var(--warning)';
    setTimeout(function(){ firstUnanswered.style.boxShadow = ''; }, 2000);
    return;
  }
  for(var i = 0; i < total; i++){
    var qid = 'final-q' + i;
    if(!quizStates[qid]){
      var btn = document.getElementById('btn-' + qid);
      if(btn && !btn.disabled) btn.click();
    }
  }
  setTimeout(function(){
    var correct = 0;
    for(var i = 0; i < total; i++){
      var card = document.getElementById('qc-final-q' + i);
      if(card && card.classList.contains('correct')) correct++;
    }
    var el = document.getElementById('final-score');
    var cls, msg;
    if(correct >= 12){ cls = 'excellent'; msg = 'Excellent! You\u2019ve mastered advanced AI concepts.'; }
    else if(correct >= 8){ cls = 'good'; msg = 'Good progress! Review the modules where you missed questions.'; }
    else { cls = 'keep'; msg = 'Keep learning! Revisit the modules and try again.'; }
    el.innerHTML = '<div class="score-banner ' + cls + '"><div class="score-num">' + correct + ' / ' + total + '</div><div class="score-msg">' + msg + '</div></div>';
    el.scrollIntoView({behavior:'smooth'});
  }, 200);
}

function performSearch(query){
  if(!query.trim()) return [];
  var q = query.toLowerCase();
  return searchIndex.filter(function(item){return item.text.toLowerCase().includes(q)||item.desc.toLowerCase().includes(q);}).slice(0,12);
}

function renderSearchResults(query){
  var results = performSearch(query);
  var container = document.getElementById('search-results');
  if(!query.trim()){ container.innerHTML = '<div class="search-empty">Start typing to search\u2026</div>'; return; }
  if(!results.length){ container.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
  container.innerHTML = results.map(function(r){
    var hl = r.text.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    return '<div class="search-item" data-idx="'+searchIndex.indexOf(r)+'"><div class="search-cat">'+r.type+'</div><div class="search-txt">'+hl+'</div></div>';
  }).join('');
  container.querySelectorAll('.search-item').forEach(function(el){
    el.onclick = function(){
      var idx = parseInt(el.dataset.idx);
      searchIndex[idx].action();
      closeSearch();
    };
  });
}

document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if((e.ctrlKey||e.metaKey) && e.key === 'k'){ e.preventDefault(); openSearch(); return; }
  if(e.key === 'Escape'){ closeSearch(); return; }

  var focused = document.activeElement;
  if(!focused) return;
  var sim = focused.closest('.sim-focusable') || (focused.classList.contains('sim-focusable') ? focused : null);
  if(!sim) return;
  var simType = sim.dataset.sim;
  if(!simType) return;

  if(e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
    e.preventDefault();
    var dir = e.key === 'ArrowRight' ? 1 : -1;
    if(simType === 'tx'){
      txStep(txCur + dir);
    } else if(simType.startsWith('flow-')){
      var flowId = simType.replace('flow-','');
      flowStep(flowId, flowCur[flowId] + dir);
    }
  }
});
